body:
  text: 大易緝説卷七元王申子撰震下巽上益增益也損上以益下也爲卦震下巽上損上卦乾之初而爲隂益下卦坤之初而爲陽損上益下也伊川曰風烈則雷迅雷激則風怒兩相助益益之象也故爲益益利有攸往利渉大川初與四成卦之主既皆當位二與五爲益之主又皆中正且動而巽順故利有攸往二體皆木下動上順舟楫安行之象故利渉大川彖曰益損上益下民説无疆自上下下其道大光以成卦之主釋卦名義上之四損乾之陽而爲巽下之初益坤之隂而爲震損上益下也是爲君而施德澤於民民之説之无窮已也乾之陽本在上乃遜坤之隂而已下之自上下下也是爲人上而屈已待下謙尊而光之道也故其道大光此卦之所以爲益利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行釋彖辭而極言之也利有攸徃者二五君臣以中正之道益天下故隨往而利也故曰中正有慶利渉大川者二體皆木舟楫之利所由濟也故曰木道乃行此皆卦體動而巽順所以其益日進无疆如是也乾下而初天施也坤上而四地生也天地施生之益无物不有无時不然未嘗一息間斷故又曰與時偕行象曰風雷益君子以見善則遷有過則改風與雷相資而相益者也君子觀此象以求益於已无若見善則遷有過則改二者益於人之大者也唯遷善則可以无過唯改過則可以爲善二者亦相資而相益者也初九利用爲大作元吉无咎初以剛正之才而爲成卦之主當益下之時而居最下之位得六四之應而處震動之初者也以如是之才遇如是之時故利用爲大作大作者興作利益天下之大事功也然居卑下之位資上益己之力而爲之必大善而有成功之吉斯可无咎儻非大善或无成功寧免咎乎元吉无咎警之也象曰元吉无咎下不厚事也言卑下本不當任重大之事才與時遇而或爲之必得元吉而後可以无咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉損下益上爲損故損之得益者上卦之五也損上益下爲益故益之得益者下卦之二也損之五益之二皆以虚中執柔以受人之益故爻辭多同但損之五以柔居剛柔爲虚受剛爲固守受益之至善故曰元吉益之二則以柔居柔疑受益之未固故戒以常永貞固然後能吉此則不同耳王用享于帝者言臣子之事君父猶王之事天故不於損六五言之而言之於益之六二者以見人君持謙虚恭順之心以事天天且自上益之況臣子持謙虚恭順以事君父乎此因六二受益於上之善推廣以言之也象曰或益之自外來也二在内虚中執柔以受人之益人皆願益之不但九五而已使中不虚外其來乎六三益之用凶事无咎有孚中行告公用圭三處益下之時而居下之上其位不正益人本非其任然居剛應剛而處震動之極是位不正而果於爲益者也惡乎宜乎其唯用之於凶變非常之事則无咎然亦必存之以孚誠行之以中道先達其誠於上然後可爲告公者言其意於上也用圭者達所告之誠也蓋位不正者不可果於爲益而忘其專也象曰益用凶事固有之也風雷震動之時而居震之極亦有凶變驚危之象凶變之事古今天下之所固有有益人之志固不問其位之當不當唯爲之得其道則无咎故爻皆警誨之辭六四中行告公從利用爲依遷國四處益下之時居上卦之下而得其正上承剛中之君下有剛正之助宜若可以行其益下之志矣然體柔用柔益非其能處巽之下動為不果故中道而行動必告諸公上待其從而後敢爲二三四互體坤也故曰國四益人之事唯順從上下二陽而後爲之以言六四有益人之志而无益人之才告公而從順從上也依人遷國順從下也是四比五應初而後能有所爲也故无吉亦无凶悔吝象曰告公從以益志也言四之益下有其志而无其才故曰以益志也九五有孚惠心勿問元吉有孚惠我德五以陽剛中正之德而居尊位處益下之時有中實之孚是爲君而能推誠心以益天下也益莫大於誠惠莫大於心既有此心有此誠則實惠及民不待問而知其爲大善之吉矣上既以誠惠其下則下亦以誠感其上懷君之惠感君之德上下交孚益道之至善也象曰有孚惠心勿問之矣惠我德大得志也言有此誠心則實惠及民不待問矣九五之志在於益下令人皆感戴以誠是五得志莫大於此也上九莫益之或擊之立心勿恒凶卦以損上益下爲益未聞損下以益上也損陽有餘益隂不足亦未聞損不足以益有餘也今上九反是以陽有餘而處退巽之極居无位之地非有益於人者而又當益之窮窮則變而損於下矣夫利者人所同欲九乃挾其剛强反益之道專利於已非徒无益於人而又損之故爲衆所嫉不唯无益之者且有起而擊之者矣是以聖人禁止之曰立心不可恒如是之專利若恒如是取凶之道也象曰莫益之偏辭也或擊之自外來也莫益之者嫉其封殖自私偏辭者責其偏於利己之辭也或擊之者知其必然召禍自外來者言在已有以召之也乾下兌上夬決也五陽決一隂也爲卦乾下兊上五陽盛長於下一隂將盡於上爲衆陽上進決去一隂之象伊川曰澤水之聚也乃上於至高之處有潰決之象故爲夬夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬決也爲剛決柔爲君子決去小人也決去小人之道當以天下之公議暴揚其罪於廣衆大庭使人咸知其惡則足以懲一而戒百也孚者由衷之誠號者命衆之辭有厲者謂五陽雖盛而一隂猶在高位不可忽也故必推誠以命衆使知尚有危機之可畏若易而无備則將有不虞之悔故曰孚號有厲邑私邑告自邑者先自治而後可以治人也曰揚曰號曰告曰王庭者以上六成卦之主居兊體而有外庭之象也戎兵也即從也不利即戎謂不可極於用剛以至兵戎則受害者衆也利有攸往謂一隂猶存尚利於有所往蓋必純乎君子而後可也彖曰夬決也剛決柔也健而説決而和釋卦名義而賛其德也以乾之健而行之以兊之説是以能決去小人而不失其和謂決去之而天下國家和平无傷也決而不和如漢唐之去宦寺適以致亂而天下之受禍者衆矣易之象聖人之訓可不畏哉揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也釋彖辭以一隂乗五陽乃其罪也故揚于王庭使衆知之衆陽協德相告相戒不敢慢忽故其危懼乃所以爲光大也夬之爲卦所尚者陽剛之盛也尚剛以自治則可若以即戎則尚剛太過其所尚得无窮乎陽雖盛而猶有隂焉必純乎陽而後可以絶小人之根故又曰剛長乃終也象曰澤上於天夬君子以施禄及下居德則忌澤上於天勢必潰決爲雨以及萬物夬之象也君子以之均施德澤以及於下若居畜不施乃君子之所忌如刓印吝賞畜施屯膏皆居德也怨懟所由興悖亂所由起豈非忌乎忌畏忌也初九壯于前趾往不勝爲咎初乾體而又以剛居剛故銳於進趾在下而先動之物前趾又動之先者初在四陽之下輕動躁進壯于前趾之象也隂居高位初首衆陽而往決之位卑而言高決无可勝之理其往也徒取禍咎耳象曰不勝而往咎也有必勝之道而往者勝也往而後勝且不可況不可勝而勇往者乎故爻辭曰往不勝而夫子曰不勝而往咎也謂非往之爲咎不能度其可勝而後往之爲咎也九二惕號莫夜有戎勿恤彖言孚號而以有厲處之矣二以陽剛之才遇同德之君當夬決之任而能居柔以晦其剛得中而知戒懼故亦惕號蓋必如是而後可免小人乗間抵隙之憂故雖莫夜隂伏之時有兵戎至亦不足慮矣以防之密而備之素也象曰有戎勿恤得中道也中矣而又以剛居柔剛而不過故曰得中道王童溪曰吾謀未發而彼得以先之非中也彼謀先發而吾无以待之亦非中也二之戒備得中道也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎胡安定曰此錯簡當曰壯于頄有凶獨行遇雨若濡有慍君子夬夬无咎於義順今從之上六以容説之資居衆陽之上有頄象焉頄面顴骨也三於衆陽之中獨與之應是妄用其剛而壯于頄也壯者張助其惡也故有凶不唯壯之復與之和故曰遇雨雨者隂陽和也既遇雨必爲所濡汚既濡汚則衆君子有慍怒之者故曰若濡有慍君子則不然見善明用心剛不牽於私唯義是視當決則決故无咎象曰君子夬夬終无咎也此爻以獨應上六言之有凶之象以陽剛得正言之有无咎之象用之存乎其人九四臀无膚其行次且牽羊悔亡聞言不信九三九四皆君子而未純者也三應上六四不中正而同居説體故其剛決不足上體之下故曰臀居不能安故曰无膚行不能決故曰次且謂欲止則衆陽進逼勢不得安如臀之无膚欲行則柔説失剛不能勇進其行又不免於次且也有悔可知羊内剛而羣行之物牽羊喻與衆陽牽連而進則悔可亡而四居柔體説不中不正雖聞斯言不能信用悔其可得亡乎象曰其行次且位不當也聞言不信聰不明也以剛居柔位不當也居柔體説失其剛明之正性故其聰不明不能聽信善言也九五莧陸夬夬中行无咎莧者隂柔易決之物陸者高平不畦之地非莧所宜喻上隂柔竊據高位非其所而易去也五以陽剛中正之德爲夬之主處夬之時當決即決然剛不可過又當以健而説決而和之道行之以中然後可以无咎象曰中行无咎中未光也以剛中正之君行中道於夬決之世宜吉而僅得无咎中且未光者何也親比上六使之貫盈罪極者五也及以剛應剛勉行中道以決之者亦五也故於中道未得爲光大上六无號終有凶以一隂而乗五陽之上貫盈惡極皆其自取當此之時黨𩔖已盡矣无所號訴矣終歸於凶矣象曰无號之凶終不可長也言其孤立於夬決之極終不可久也巽下乾上姤遇也爲卦巽下乾上巽風也乾天也風行天之下與物无不遇者又一隂始生即與陽遇故爲姤姤女壯勿用取女壯至四陽而後謂之壯姤唯一隂而曰女壯者何也蓋自是而爲遯爲否爲剥爲坤皆姤隂之爲也在人乃消陽之孽有驚懼之意焉況以一隂爲成卦之主初長於下即遇五陽是女之不貞而壯之甚者故戒以勿用取彖曰姤遇也柔遇剛也以成卦之主釋卦名義謂一隂始生即與陽遇也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉釋彖辭且賛其德之大也人之取女欲其長且久此女處遇則不貞以壯則害陽故勿用取然一隂遇五陽雖不貞而隂陽相遇亦不可廢五陽天也一隂地也天地相遇則萬物育品彚所以咸章也九五中正二以剛中遇之君臣相遇則治化成其道所以大行也然則天地不遇則品物不章君臣不遇則治化不行至於事事物物莫不以遇而成不遇而廢則姤之時之義豈不大哉象曰天下有風姤后以施命誥四方天之誥萬物莫疾乎風且无所不周君之誥萬民莫疾乎命亦无所不至故后王以施發命令徧誥四方亦猶風行於天之下也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅姤之成卦在此一爻或吉或凶亦判於此何則有以制之則吉无以制之則凶柅止車之物以金爲之堅强之至也而又繫之止之固也固止之使不得進則陽剛貞正之道庶乎其吉設不止之使之有所往則必浸長而害乎陽是見凶也聖人既設此兩端使君子知所戒矣又設羸豕之象使君子不以隂之微而忽之豕隂物也謂今日之隂雖微如羸弱之豕而異日蹢躅之害將可必也若忽其微而不信使至蹢躅則不可制矣象曰繫于金柅柔道牽也牽引也隂道雖微已有牽連浸長之勢不可无以止之也九二包有魚无咎不利賔魚隂物也古者以魚比民初六柔而散於下民之象也九二以剛中之德居大臣之位而首與之遇此得魚之最先者也其德又足以包而有之雖初與四應而二得之非正然姤之時以遇爲重隂陽相遇亦无咎也賔自外來者謂四也及四至則己後矣利安得以及之乎故曰不利賔象曰包有魚義不及賔也魚既爲二所有義不及於四矣故四无魚九三臀无膚其行次且厲无大咎三居上體之下故曰臀二與初相遇矣三乗二之上亦欲遇之二嫉之於下故其居不安如臀之无膚居既不安則行而去之行則上无應與故其行次且是處遇之時進退皆无所遇者故厲然所以无大咎者居得其正也象曰其行次且行未牽也下既无遇上又无與故曰行未牽言上下皆无牽引者故次且九四包无魚起凶初魚也本四所有而二先遇之是四亡其魚而二得之也四非无陽剛之才以包納於初今也有包无魚蓋四逺於初又不中不正无德以來之宜民之歸二而去己也居上而无民故動則凶起動也剛健之體鮮不動故戒象曰无魚之凶遠民也民可近而四遠之宜其无魚而取凶也九五以杞包𤓰含章有殞自天杞高大之良材喻衆陽也𤓰易蔓之柔物喻初隂也五以剛健居尊下有衆陽爲輔於此一隂之微去之易易而乃以中正之道含藏其剛健之美但以衆陽包而容之如𤓰在杞木覆䕃包容之下略无去之之意者蓋以姤亦自乾而來則一隂猶自天而降況天地間有陽必有隂乃天道之常聖人天也方隂之微豈容遽絶之且天下未嘗一日无小人顧吾處之者何如耳五乾也故以天道言之象曰九五含章中正也有殞自天志不舎命也唯中且正故能含章崇陽而抑隂固聖人之志有陽必有隂亦天道之常志不舎命者言聖人雖有抑隂之志亦不舎棄天道之常也上九姤其角吝无咎剛而處於最高之上者角也一卦五陽皆以遇初取義上九剛而居上極遠於初是自處至高而无與遇者也故吝然以陽剛居高隂亦不能侵之雖无遇亦无咎也象曰姤其角上窮吝也以至剛居最上窮極也窮極故不能俯就以求遇於人於遇之道爲吝也坤下兌上萃聚也爲卦坤下兊上地上有澤水之聚也誠齊曰澤水之聚也澤上於地聚之聚也故爲萃萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃下亨字羨文假至也宗廟上以聚祖考之神靈下以聚人心之誠敬是天下萃聚之大者莫大於宗廟故萃王假有廟人聚則多亂物聚則多爭事聚則多紊必得大人以治之而後其聚也可亨故利見大人亨然所聚不正則亦不能亨也故利貞亦以二五皆得其正也物聚則用冝豐故用大牲吉亦以兊爲羊坤爲牛皆大牲也物聚則力有餘而志可行故利有攸往亦以卦體順而以説行也彖曰萃聚也順以説剛中而應故聚也以卦德釋卦名義萃之義聚也坤順兊説爲其道順其情説故聚五以剛中正應二之柔中正故聚儻德不如是則不足以致天下之聚也王假有廟致孝享也利見大人聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣釋彖辭而極言之也孝享之際誠敬所萃故萃天下之心者无如假廟以致孝享大人者正己而物正者也見大人則聚而得其正故亨萃不以正其能亨乎物聚則用冝豐力贍則可以有爲此自然之理也故曰順天命然聚豈一端而已哉隂陽聚而後萬化成天地聚而後萬物育人物聚而後萬事興觀其所聚而天地萬物之情亦可見矣象曰澤上於地萃君子以除戎器戒不虞澤上有地臨則聚澤者地岸也澤上於地萃則聚澤者隄防也以地岸而聚澤則无隄防之勞以隄防而聚澤則有潰決之憂故君子觀此象爲治世之防除治其戎器以爲不虞之戒若以治安而忘戰守之備則是以舊防爲无用而壞之也其可乎初六有孚不終乃亂乃萃若號一握爲笑勿恤往无咎初與四正應本有孚而相聚者也然萃之時近則相親初六近從二隂以爲聚故與四相孚之志不能克終乃亂者爲同𩔖惑亂其心也乃萃者與同𩔖聚爲一也握者羣指之聚初若號呼以求正應則同𩔖如指之聚而笑之矣但勿恤其笑而往則得陽剛之應而无過咎不然則入隂小之羣矣寧免咎乎象曰乃亂乃萃其志亂也言初與四孚萃之志爲同𩔖所惑而亂也六二引吉无咎孚乃利用禴二以柔順中正之德上應陽剛中正之君萃之正也然居萃之時二遠於五而處二隂之間易以𩔖聚必九五引而進之則上下俱吉二亦可以无咎故曰引吉无咎此二五未聚而相求於初之時也孚信之在中禴祭之无文也及其既孚則二五中正相聚誠實相與如薄祭亦可交於神明矣此二五既孚而相聚於終之美也故曰孚乃利用禴象曰引吉无咎中未變也方萃之時近比乎隂而能自守不變以須正應唯剛立者能之二雖中正而質隂柔九五及其中未變之時引之故吉故无咎六三萃如嗟如无攸利往无咎小吝三隂柔不中不正處萃之時欲進而求聚於四則四非其應又非其𩔖欲退而求聚於二則二自以中正上應於五是求聚於人而莫之與徒自嗟嘆而已故曰萃如嗟如進退无與何所利哉故曰无攸利唯往從上六之正應則得所聚而无咎然求人而人不與然後往焉雖无咎而舉動如此亦可羞矣故曰小吝象曰往无咎上巽也言萃之時上六亦无與故能巽順以受六三此三所以往无咎也九四大吉无咎四處萃之時上比同德之五得君臣之聚如此其專下有三隂之從得臣民之聚如此其衆然位不當故戒之必大吉然後可以无咎謂得君專而不僭得人衆而不私則大吉也象曰大吉无咎位不當也以陽居隂位不當也況上下聚而歸之君道也而四居之亦位不當故必得大吉而後可以无咎九五萃有位无咎匪孚元永貞悔亡以九居五有其位矣居中得正可无咎矣以此居尊而聚天下之民民猶有不孚信者九四得臣民之聚於下故也九五當此之時何以處之唯修吾元永貞三德以聽其自孚然後悔可亡元善也无長人之善則聚而不親永久也无可久之道則聚而必離貞正也无貞正之守則聚而不固蓋聚人之道唯此三者爲萃九五之君者非志此不可象曰萃有位志未光也位者所以一天下之萃者也五有其位矣而人猶未孚是萃天下之志未光大也上六齎咨涕洟无咎萃卦之象三隂聚於下二陽聚於中上六孤立於外是萃之時而自取孤獨者也以柔説之體欲聚而孤故不安而咨嗟涕洟蓋説之極者易悲也皆其自取无所歸咎故曰无咎象曰齎咨涕洟未安上也當萃之時而孤立於上以柔乗剛而自絶於人其能安乎巽下坤上升進而上也爲卦巽下坤上巽木也坤地也爲地中生木木生於地中長而益高爲升之象初柔散而在下木之根也二三剛長而漸高木之幹也得坤土養之而益進升之象也故爲升升元亨用見大人勿恤南征吉巽順而進故升有大亨之理易言大人皆指陽爻王弼謂不以尊位拘蓋初六成卦之主也二以陽剛引之而升欲升於道而不見大人則不知其方欲升於位而不見大人則不得其援故升之道用見大人則勿有憂恤巽順而進亦見大人而无憂之道南征者向長養之方而進也故南征於升之道爲吉李實齋曰凡物之生自子至午生而長也彖曰柔以時升釋卦名義柔指初六成卦之主也初六一變則爲㤗時者其謂泰之時歟凡物自下而上謂之升物之升也由下而上木之升也由柔而剛柔升而得其時則達故曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也釋彖辭内巽而外順謂升之道巽而順則升暴而逆則折又二以剛中之德應於五五以柔中之德引之而升此升所以大亨也見大人則可以遂其升進之願故曰有慶向長養之方而往則上升之志得行故曰志行象曰地中生木升君子以順德積小以高大木之升於地由芽而根根而幹幹而枝葉一至順之積逆則生意息矣君子觀此象一以至順之德自卑小積之以成高大蓋天下事事物物所以高大未有不自卑自小積而成也初六允升大吉以柔而升升之義也在下則升在上則非升矣初以柔居下即木之升言之乃木之根巽承於二得陽則愈升六四又坤土之最下者而與之應信能升而大吉也以人事之升言之初以柔巽之德上承九二剛巽之賢二又以剛中之德上應於五唯能引之而升故亦信其升之必達而獲大吉也象曰允升大吉上合志也謂上與九二合志而同升故大吉也九二孚乃利用禴无咎此爻辭與萃六二同但萃之二以中正之德當萃之時處二隂之間必待中正之君引而進之然後无咎而有孚此則以剛中之德在所必升而五亦虚中以信之故實意交孚而自无咎二卦雖同爲君臣相孚然萃則君孚于其臣此則臣孚于其君故萃必无咎而後孚此則相孚而自无咎象曰九二之孚有喜也二盡其孚誠升而事上不獨爲臣之義无咎而已又可行其剛中之道以及天下而有喜也九三升虚邑三以陽剛之才居巽順之體位得其正有應於上以是而升如入无人之邑其進也孰禦以木之升言之則爲木之生而出於地者上无壅塞其長也孰遏故曰升虚邑言无阻也隂闢故虛坤爲國邑象曰升虛邑无所疑也謂其前无疑阻也六四王用亨于岐山吉无咎四公侯之位位已近君不可復升故以文王柔順履正者當之昔者文王之治岐也上則順事其君使之升進於德下則巽順乎人使之升進於位已則謙恭獨守其正用亨周道于岐山吉而无咎也象曰王用亨于岐山順事也一以柔順之道處之而无志於自升故曰順事也六五貞吉升階五之位天位也天不可階而升今曰升階何也蓋升之時坤道上行而以六居五是升而居尊位也然五所不足者貞也故必貞正而後可以獲吉必貞吉而後可以升階階者言其升之有序也象曰貞吉升階大得志也舜禹之升貞且吉聖人之志所願也湯武之升豈聖人之志願哉故貞吉升階者大得志也上六冥升利于不息之貞上以隂暗之資處升之極是冥然而升知進而不知止者也本无所利但移此而用之於貞正之事則利焉蓋以小人貪進不已之心爲吾進善不已之心也象曰冥升在上消不富也冥然而升于上極而不知止豈復有富益哉蓋升極則必退矣坎下兌上困窮也乏也爲卦坎下兊上水在澤上則澤中有水今在澤下則爲澤涸困乏之象也又一卦六爻陽剛皆爲隂柔所揜君子困窮之時也故爲困困亨貞大人吉无咎有言不信困之爲卦坎險兊説爲處險而説是身雖困而心泰然時雖困而道則亨也故曰困亨貞大人吉无咎者謂貞正乃大人處困而吉而无咎之道所以戒九二成卦之主中而不正也有言不信者謂處困而不求亨貞之道專務以言語求説於人冀以免困人誰信之所以戒上六成卦之主柔説於外也雖因成卦二爻以示戒然處困之道亦盡於此彖曰困剛揜也以卦體釋卦名義坎陽也爲兊隂所揜九二爲二隂所揜九四九五爲三與上所揜成卦上下亦爲隂所揜故曰困險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也以卦德及成卦之主釋彖辭内險而外説是處險而能説説者安於義命而樂其樂也故雖困而不失其亨能是者其唯君子乎貞正者大德之人處困之吉道謂成卦九二之大人以剛居中是必貞正而後能吉不然如成卦上六專尚乎兊説之口求以免困其誰信之衹取窮耳象曰澤无水困君子以致命遂志君子處困之道唯委致吾在天之命以成遂吾在已之志而已謂夫莫之致而至者命也艱難險阻死生變故皆不足以動吾心唯盡吾所得爲之義以遂吾志之所欲爲蓋處困而不致其命不可也一付之命亦不可也故命不可以不致志亦不可以不遂不然將變移於禍患隕穫於困窮豈君子之所爲乎初六臀困于株木入于幽谷三歲不覿卦以柔揜剛爲困之義爻義則不分剛柔皆以處困爲訓初居下體之後故曰臀坎體之下故曰幽谷言初以隂暗之資處困於下而不能自㧞如困守株木不得其安而不能動動則入于幽谷謂益陷於坎險之中也三嵗不覿者言厯三變而遇四之正應四不求初而求二故初不見濟困之道而不能出也如初者其柔暗无援終於處困者歟象曰入于幽谷幽不明也幽不明者入于幽而愈不明也九二困于酒食朱紱方來利用享祀征凶无咎酒食所以養生取自養之義朱紱所以蔽膝取謹行之義享祀取至誠感通於上之義二以陽剛處困於下然得中用柔故能不躁不競優游自養以待時上有剛中同德之君相與之志非不專也然亦爲隂所困與二之志不能直遂朱紱之來非不欲其進且必謹其行方來者言將來而未來是猶有所憚也爲二者唯冝盡其精誠求以感通於上如用享祀不可遽往往則適以取凶而无所歸咎矣諸卦義例皆取隂陽爲應唯困之世陽厄於隂止取同德相與今二五同德而相與之難若此皆處困故也象曰困于酒食中有慶也言二能以剛中自養時雖暫困將必得君而福慶及於天下故曰中有慶也六三困于石據于蒺蔾入于其宫不見其妻凶三以隂柔不中不正之資處險而用剛不善於處困者也石堅重之物觸之則必糜謂九四九五二剛在上堅重不可犯而三敢犯之以取困辱故繫辭曰非所困而困焉名必辱蒺蔾棘實之有角者㨿之則不安謂九二之剛不可乗而三敢乗之以取危困故繫辭曰非所據而據焉身必危欲進而求上六之應則又爲二陽所隔入于内而不得出雖欲一見其偶且不可得故繫辭曰死期將至妻其可得見邪如三者質柔志剛本欲困人適以自困而沒其身者也三陽上隂故以上爲妻不得出故曰入象曰據于蒺蔾乗剛也入于其宫不見其妻不祥也不祥者不善之證也九四來徐徐困于金車吝有終困之世隂揜陽者也故陽不以隂爲應而以同德相求故四不應初而求二也金剛物車任重謂二也四爲上所揜爲三所犯望二金車之來協力以濟其困者甚切而二亦爲三所揜故來而徐徐二來之徐乃四之困四以陽剛之才居近君之位不能自濟而待於人固可羞吝然二之陽終上進而副所望故有終此來字據四所居之地而言也象曰來徐徐志在下也雖不當位有與也四之困志之困也四之志在下之二而來徐徐所以困也以九居四不當陽剛之位以四求二不當相應之位然二與四有同德相與之誠故曰雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀二五同德相求而五以陽剛爲上所揜譬諸鼻之通氣於上者而見劓是五欲通於下而不能達困於上也所賴者剛中之二相與濟困而二又爲初與三所揜譬諸足之主行於下者而見刖是二欲進於上而不能行困於下也此二與五俱困之象也赤紱在下而謹行之飾君之困在无賢佐二處險中謹其行而未進則五困矣故曰困于赤紱然二五皆以剛居中以直相與九二必徐徐出險而之説故徐有説爲五者亦冝盡其精誠以致之如用祭祀則可以得天下之賢濟天下之困矣曰紱曰祀二五同辭以見君臣處困其志同也紱芾同或者以朱赤分君臣不必然也按隋志官有綬者則有紱紱隨綬色象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上不通於下下不進於上是相與之志未得也二五皆以中誠直道相與乃徐有説之事也感通以誠則必得賢以濟其困是祭而受福也上六困于葛藟于臲卼曰動悔有悔征吉葛藟柔物纒木而上喻上六乗剛而處於上也始纒而上欲困君子及其居髙則其身臲卼而不安欲困人適以自困故動則有悔動悔者動而得悔也有悔者有能自咎其失也若能自咎曰如是而取悔曷若改前所爲往而出困困極則變有吉之理故曰征吉兊爲口故曰象曰困于葛藟未當也動悔有悔吉行也始欲困人終以自困是自處不當也知悔而有悔焉則可以吉其所行也巽下坎上井之爲卦巽下坎上巽爲木坎爲水木者汲器巽者入也木器巽入于水而復上水者井之象也誠齋曰下二爻在坎之下若瓶之覆而入井之象中二爻若井中之瓶覆而復仰之象上二爻有瓶仰而出井之象故爲井井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶邑可改井不可改井之爲井取之不竭存之不盈无喪无得也往者得其所欲來者求而未已皆得以井其井往來井井也汔幾也繘綆也言幾至而未得用亦與未施綆於井同也未至者猶可勉而至若羸毁其瓶則終於无功矣故凶彖曰巽乎水而上水井以卦象釋卦名義井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也此章愚意韋編三絶時聖經之文必曰改邑不改井乃以剛中也无喪无得往來井井井養而不窮也蓋彖无不釋之文剛中謂二五以剛居中故德有常而不可改取之不竭无喪也存之不盈无得也此井之養物无窮夫人皆得以井其井也錯脫无疑井以出水濟用爲功幾至與未施綆水皆未出是未有功也未出猶可出若羸毁其瓶則終於无功矣是以凶也象曰木上有水井君子以勞民勸相木下有水汲器之入也木上有水汲器之出也汲器出則養物之功著矣君子以之勞民勸相勞民者以上養民勸相者使自相養則養之功用无不周矣井養之道也初六井泥不食舊井无禽陽清隂濁初以隂居最下泥之象也井清潔則可食今也濁而泥故人不食之且上无應與无上水之象是廢棄之舊井也人既不食水不復上則禽不至矣皆以言无濟物之功也象曰井泥不食下也舊井无禽時舎也以隂濁居井之底故爲泥泥則人不食矣舎棄也至於禽亦不往言爲時之所棄也九二井谷射鮒甕敝漏井以上出爲功今九二上无應與而下比於初爲不上而下之象是井而爲谷其水就下徒能注射泥中之細魚而已鮒魚喻初六蓋二以陽居隂隂拆則漏巽體下斷亦漏之象故曰甕敝漏皆以言水下注而失井養之道也象曰井谷射鮒无與也二有陽剛之才而无濟物之功者上无與而下比於初也九三井渫不食爲我心惻可用汲王明並受其福三以剛居剛在下之上是渫治之井清潔可食者也而正應隂柔不足援而出之是不爲人所食也我謂三也渫而不食行者亦爲之惻然於心顧其可汲而用者其唯九五同德之君然非其應唯王之明能照見而汲用之則上下均䝉其利故曰並受其福如九三者其有才智而不見知於上者歟象曰井渫不食行惻也求王明受福也井渫而不爲人所食縱井不自惻行道之人亦爲之惻然矣縱井不求上之我用人亦爲之求之以並受其福矣六四井甃无咎四以隂柔之才處井養之世不足以廣施利物然居得其正亦可自守故曰井甃甃者修砌其井使之不廢也言四之才雖不足以大有爲然亦不至於廢厥事故无咎誠齋曰四有兩甓接連之象故爲井甃象曰井甃无咎修井也言能修之而井養之功不至於廢故无咎九五井冽寒泉食五以坎中之陽居正中之位其才其德盡善盡美故其爲井也冽其爲泉也寒可以汲而食井之至善者也然不言吉者井以上出爲功五未至於上水未出井猶无功也象曰寒泉之食中正也使五而不中不正是井而不冽不寒人誰食之上六井收勿幕有孚元吉上井道之成也收者收功也勿幕勿揜覆也不覆則雖不言而人皆信其有濟物之實用故曰有孚少覆則人疑之矣蓋井以上出爲功亦言井之功至此已成而不可揜也故爲大善之吉象曰元吉在上大成也内卦井道成而未大外卦至上則大成矣離下兌上革變革也爲卦離下兊上離火也兊澤也火在下而炎上澤在上而潤下相就而相克故革晦庵曰澤上火下火燃則水乾水決則火滅中少二女合居而少上中下志不相得故革革已日乃孚元亨利貞悔亡事弊則革革改其故也故革之初人未遽信故必已日乃能有孚亦以六二成卦之主自初至二有已日之象二中而虚中虚有乃孚之象孚信也人心信從則所革之事可以大亨利貞者亦謂成卦六二與上六成卦之主皆得其正故所革皆當新舊之悔可亡若革而人不信從則不可以亨所革而不得其正則人亦不之信從悔其可亡乎彖曰革水火相息二女同居其志不相得曰革以卦象釋卦名義水在火上似既濟二女同居似睽然既濟則水火相交而爲用此則水火相就而相息暌則二女同居而不同行此則二女同居而志不相得此其情所以異也勢不容不革故曰革巳日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉以成卦之德釋彖辭且極言其時之大也革者聖人之不得已也天下事茍不至如水火之相息二女之不相得聖人豈得已而不己乎故未革之先聖人謹之既革之後天下信之所以然者聖人於未革之先灼見利害如離之明故未革而民願之將革而民傒之既革而民信之莫不欣從如兊之説此所謂大亨以正革而當也故新舊之悔皆亡不然則愈革愈弊能无悔乎極而言之天地隂陽相爲代謝以成四時者亦革而當也湯武順天應人以易世革命者亦革而當也然則於理之冝事之當天地聖人且不得不革則革之時豈不大哉象曰澤中有火革君子以治厯明時澤中有火火涸澤澤滅火故爲革君子以治厯明時者天地間最易差忒而不容不革者莫若厯數時序故以言之初九鞏用黃牛之革黃中色牛順物指六二也謂六二以順處中爲成卦之主任革之事革而當矣初陽得正而位乎下革非其任唯冝鞏固自守奉承六二之革而用之不可自作聰明而有所爲也或曰子於遯之六二用黄牛之革以爲皮革之革矣而此用黄牛之革乃以爲改革之革同一革字而作兩義聖人繫辭果如是无定據乎曰易之爲道也屢遷變動不居不可爲典要唯變所適子獨不見歸妹之五曰帝乙歸妹是於卦名歸妹上繫爻辭果有一妹歸之也泰之五亦曰帝乙歸妹无乃亦拘名卦亦有一妹可歸乎予於集問嘗辯之矣況革之六爻皆言革言改言變而此爻獨言皮革可乎蓋六二成革之主也以順居中有黄牛之象唯中唯順故革而當至三則不可復革四兊體而近君故主革之謀五爲革之主及上則革道成矣初豈非下民之用革者乎象曰鞏用黄牛不可以有爲也言初在下唯可用上之革不可自用以有爲也六二已日乃革之征吉无咎彖言已日乃孚革先於信也此言己日乃革革後於信也革先於信君之義也革後於信臣之體也六二以文明中正之臣遇陽剛中正之君處革之時爲成卦之主任革之事事雖可革然臣道不當爲革之先必也建明已日待上下皆曰然然後革之故所行皆吉且无過咎此初所謂中順之革也象曰已日革之行有嘉也已日而後革之則順而信故隨所行而有嘉美之稱也九三征凶貞厲革言三就有孚三居六二已革之後以剛居剛欲何爲哉故有征凶貞厲之戒謂志剛而往革不已則必凶固守此道則危厲何也蓋自初至三革道已小成矣亦已有孚而信於人矣豈容復有所往邪大抵革之道革而當則止二以中正順人心而革革巳當矣至三不可以復革而三以過剛不中處之故有此戒象曰革言三就又何之矣革道至三已就緒矣得其當則宜止又何往邪九四悔亡有孚改命吉二大臣也任革之事四近臣也主革之謀謂四以陽剛之才居近君之位上有同德之君下无私繫之嫌故能主其謀也且盡離明之見而居兊説之體柔傳所謂文明以説者也故能僅於出命使先後之悔皆亡而上下信之故曰悔亡有孚是以於所當革雖改君命而亦吉也蓋革非細故使革而有當不當豈徒知將順而不知匡救之義乎故極言之以爲萬世之訓象曰改命之吉信志也致君在志行志在事志然而事亦然者上也志然而事不然其可違志而不忠乎改命而吉者自信吾志也吾既信吾志上下獨不信吾志乎九五大人虎變未占有孚龍虎者大人之象變化莫測則取諸龍威信遠著則取諸虎五以陽剛中正居尊位於天下事所當革者无不得其當其昭著顯赫猶之虎變其文炳然而不可揜其威凜然而不可犯故不待占決而天下信之也象曰大人虎變其文炳也事理明著无疑如虎文之炳煥天下有不信乎上六君子豹變小人革面征凶居貞吉上革之終革道之成也君子循理而易化者固已顯然從革若豹文之變蔚然而不可揜矣小人昏愚而難變者雖未革心亦革其面以從上之敎令矣革而至於賢愚俱化革之成也三居革道之小成曰征凶矣上居革道之大成故又曰征凶謂革道已成而往革不己則是所革隨復變也故凶唯居守之以貞固則吉象曰君子豹變其文蔚也小人革面順以從君也君子豹變言内卦其文彬蔚而不可揜也小人革面言外卦以兊説從上而无情實也此聖人於革之終言革道已成不可復有所往也巽下離上鼎亨飪之器也爲卦巽下離上晦庵曰下一隂爲足二三四陽爲腹五隂爲耳上陽爲鉉鼎之象也而又以巽木從離火而致烹飪鼎之用也此卦所以爲鼎鼎元吉亨吉字疑羨卦无此義彖傳亦无羨明矣鼎之形法以正鼎之德中而實鼎之用大而周故可以致大亨故鼎元亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢釋卦名義且極言其用也卦之名鼎取鼎之象也有象而後有器今復取器以爲象故曰鼎象也卦具鼎之象而又以木從火是烹飪也聖人制爲烹飪之器豈徒自奉而已哉上以享上帝用犢而貴乎誠下以養聖賢備饔牢而盡其禮故享上帝曰亨養聖賢曰大亨禮所謂以少爲貴者鼎之用也巽而耳目聰明柔進而上行得中而應乎剛是以元亨以成卦之主釋彖辭初成下卦之巽五成上卦之離五爲耳離爲目在上而虚明故曰聰明是卦之德巽順而聰明且柔上進而居於五五又得中而下應乎剛是以元亨言人之德如卦之德亦可致大亨也象曰木上有火鼎君子以正位凝命鼎之形端而正鼎之體鎮而重君子取其端正之象以正其所居之天位使之愈久而愈安取其鎮重之象以凝其所受之天命使之愈久而愈固昔禹鑄鼎象物用能協于上下以承天休亦此意也初六鼎顚趾利出否得妾以其子无咎鼎之下趾之象也上應於四趾而向上顚之象也然居鼎之初中有未實其顚趾者出舊否惡以取新爲利也得妾而得其子亦猶是也以隂居下卑巽從陽乃妾之象妾非正者猶鼎之顚因不善以得善猶出否取新於顚趾也因惡以成功因賤以致貴何咎之有象曰鼎顚趾未悖也利出否以從貴也物忌顚覆唯鼎每覆則每潔故於鼎之道未悖也初而應四出否取新是人之棄賤以從貴也九二鼎有實我仇有疾不我能即吉二陽剛在中有實也鼎之方烹滋美惡臭決擇不可不審今九二上有離明柔中之五爲之應而下與初比易例陽剛爲隂柔所累曰疾謂初六乃疾九二之仇也傳云怨偶曰仇二居中應中不至失正但隂從陽者也二必遠之使不得以即我則吾之鼎實然後能吉象曰鼎有實慎所之也我仇有疾終无尤也鼎有實猶人之有才行也必所向者正則不陷於非故所之不可不慎也唯守吾之中使仇疾不能即則可以終无尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉三以陽剛居鼎之腹亦有實者然過剛而失中越五而從上故其行塞蓋萬物皆以足行唯鼎以耳行五鼎之耳也三不從五而從上是革鼎之耳而行其鼎之實故塞而不達離爲雉雉膏文明之美也謂三有五之雉膏而不之食蓋三不中而守正之過然三雖失於守正而體實巽順與五隂陽終必相合故曰方雨謂隂陽將和而爲雨也既雨則革耳之悔可以虧去而終獲其吉謂終以正道得君而獲吉也故曰終吉象曰鼎耳革失其義也不從五而從上是改革鼎耳以行其鼎實失用鼎之義亦失從君之義九四鼎折足覆公餗其形渥凶足初也公四也形鼎之形喻國家也鼎至於四鼎之實已滿四近君位高位謀大謀任重任而乃以陽居隂不中不正德已薄矣而又下應初六顚趾之隂柔故不勝任而敗乃事如鼎足之折既覆公餗而鼎之形亦渥然汚穢其凶可知象曰覆公餗信如何也三語之中舉其一則上下文皆在矣言委任不當果如何也欲人詳玩以爲永戒六五鼎黄耳金鉉利貞黃中色謂五之中也金剛德謂上之陽也主一鼎者在乎耳耳不虚中則鼎雖有鉉而无所措耳而无鉉則鼎雖有實而无所施故鼎之六五虚其中以納上九陽剛之助而後一鼎之實得以利及天下猶鼎黄耳之得金鉉也然耳而不正則雖虚中而不可舉猶君不正則雖虚受而人亦莫之從也故必曰利貞亦以隂居陽而有此戒象曰鼎黄耳中以爲實也五一卦之主亦成卦之主故舉一鼎全體之象以爲辭中實爲九二蓋五爲耳上爲鉉二爲實得鉉以助耳則九二剛中之實然後可行故聖人爻辭明指二爲實上爲鉉五爲耳若如諸説是五既爲耳又爲鉉又爲實其可乎上九鼎玉鉉大吉无不利鼎與井皆以上出爲功一陽横耳之上故爲鉉以陽剛居隂柔故爲玉以五之柔視上之剛則曰金以上之剛居隂之柔則曰玉上處鼎之終鼎之功成矣而剛柔適中又鼎之至善故大吉故无不利象曰鼎玉鉉剛柔節也居鼎之成功而剛柔中節善之善也震下震上震動也於象爲雷雷有震動之義震有驚懼之意一陽生於二隂之下必動而上故爲動二隂迫於一陽之進隂陽相激故爲雷乾初交於坤爲生物之長故爲長子震亨震來虩虩笑言啞啞震驚百里不喪匕鬯陽生於下必進進而上故亨虩蠅虎也周旋顧慮不寧之物謂震懼之來虩虩然不敢自寧則可以轉禍爲福移懼爲喜而笑言啞啞矣啞啞言笑和適也震動之大者莫若雷雷之震百里之遠莫不恐懼自失唯執匕鬯以承祭祀者一誠主敬獨不爲之變故曰不喪匕鬯言臨大震動而不自失者唯盡誠敬者能之然則誠敬者其處震之要道歟彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以爲祭主也釋彖辭陽動而進必亨恐懼修省亦致亨之道故曰震亨恐致福者謂因恐懼以致福也後有則者謂能恐懼而後自處有法度也有法度則安處震之道也雷震則遠者驚邇者懼唯執匕鬯以承祭祀者不自失彖云不喪匕鬯本謂誠敬之至今并取長子之義以釋之謂能敬其事於將恐將懼之時而不自失者則足以承宗廟社稷之重寄矣出字上脫不喪匕鬯一句象曰洊雷震君子以恐懼修省洊雷者重雷也雷洊震之時孰不恐懼而自修省君子觀此象敢不祗畏修其身省其過畏天之威當如洊雷之震也初九震來虩虩後笑言啞啞吉初剛而得正於震來之初知恐懼而不敢自寧則後必獲吉笑言啞啞矣一爻之辭與一卦同者初乃成卦之主事變震動之初尤當謹畏也象曰震來虩虩恐致福也笑言啞啞後有則也恐則致福有法度則自處安矣六二震來厲億喪貝躋于九陵勿逐七日得初震之主剛動之先者故其來猛而厲二以至柔當之度不能禦乃喪其所有中正之資躋于九陵以避之謂去其所居升九四之陵就同德之五以待震厲之衰陽高而在上二視之陵之象也震厲既過則所喪自復故勿逐七日得謂自二七變而復歸仍得其中正之資也蓋二居中得正於震厲之來以柔用柔故能順天道度時冝堅忍以待其自定若不量力度德忿然與物爭競放變故方張之初則所喪不可以復得矣此處震之道也象曰震來厲乗剛也謂乗初之剛而能以柔處之故終不失其中正也六三震蘇蘇震行无眚三處下卦之上前之震既終其勢稍蘇後之震方來未可以爲安也三以隂柔不中不正處之遂以爲蘇而忘其顧慮故曰蘇蘇謂即其少蘇而遂以爲蘇也是茍目前而忘後慮者也若能因一震懼行而去之則可无災眚居剛故能行應上則震終也象曰震蘇蘇位不當也三質剛志柔而位不當故蘇蘇而不知爲變計也九四震遂泥泥致遠恐泥之泥滯溺也下卦之震一陽動於二隂之下其勢伸而不屈上卦之震一陽陷於四隂之中其勢屈而不伸故有遂泥之象言四居大臣之位處震懼之時當大建明大設施以聳動一世而乃以剛居柔不中不正爲衆隂之所滯溺將何以亨震乎故曰遂泥遂有不反之意象曰震遂泥未光也未光者其以四有陽剛之才猶望其自振乎六五震往來厲億无喪有事五以隂柔當洊震之衝所處不正往而外則值上之窮来而内則乗四之剛是徃来皆厲也然居得其中可以自守唯當億度无喪其所有之事而已謂冝深思長慮不失其中則雖危而不至於凶也象曰震往來厲危行也其事在中大无喪也進退皆危則當以自保所有之中爲大也上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言上隂居隂柔怯之甚故視諸爻之震神氣己索索然而銷瞻視已矍矍然而驚矣是以往則必凶不往亦可以无咎蓋處一卦之外震不于身于其鄰耳但三乃上之婚媾上畏縮而不能援不免有怨咎之言也象曰震索索終未得也雖凶无咎畏鄰戒也言以至柔居震之終猶未得處震之道然无咎者以能畏鄰之震而自知戒也艮下艮上艮山也止也下二隂地也上一陽出於地上堅而且高故爲山一陽進而止於二隂之上謂陽自下而升升極則止故爲止上止而下靜亦止之義艮其背不獲其身行其庭不見其人无咎誠齋曰易者象也艮如二人重背而立以貞爲艮其背貞下卦不自見其身之耳目手足豈有此理以悔爲行其庭悔上卦以爲面前人之背而不見後人之面則必須九畫之卦而後成此象故愚易其貞悔而説之凡人之一身皆動作之物唯背爲止凡人之一家皆動作之所唯庭爲靜艮其背不獲其身言外卦如後一人止見前人之背不獲見其身耳目手足之動作者且背外而面内止之象也行其庭不見其人言内卦如前一人不出内庭而其前所向不見其有人亦背外而面内止之象也天下唯有所見則有所欲而不能止今内外皆无所見則无欲以動其心而止乃安不獲其身止而止也行而不見行而止也動靜皆止其所不爲物欲所移此艮之所以无咎也彖曰艮止也時止則止時行則行動靜不失其時其道光明以卦德釋卦名義艮止也然行止各有其時故時止而止止也時行而行亦止也非行之爲止也行其所當行即止其所當止也故能動静不失其時之宜艮之道所以光明也艮體篤實而高大亦自有光明之象艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也釋彖辭易背爲止以明背即止也背止之所也艮之能止者由止得其所也止不得其所則无可止之理蓋止得其所則安失其所則不安也内外二體隂陽敵應而不相與故相背而无所見是以各止其止止得其所而安故无咎象曰兼山艮君子以思不出其位一山兼一山重艮之象也君子觀艮止之象以思不出其位位者事物所當止之地也天生蒸民有物必有則則者君臣父子各有其道行止語黙各有其宜吾唯素其位而思不願乎其外即止其所當止也止之道大矣又豈但躐位踰階而後爲出其位哉初六艮其趾无咎利永貞趾在下而動之物艮其趾言止於動之初也凡事於其所當止能止於初則不至大失故无咎然隂柔之質易於變遷故又戒之以永貞謂事當止者既能止之於初又宜常永貞固以守之不可轉移故曰利永貞象曰艮其趾未失正也時當止而行者非正也當止即止則不失其正矣六二艮其腓不拯其隨其心不快腓足肚也不能自由而主於隨者二居中得正上无應與得所止矣然三爲同體又爲成卦之主剛而不中失止之宜二柔而居下不能救之而又不得不隨故曰不拯其隨雖咎不在已而其心終不快也象曰不拯其隨未退聽也言非不欲救其所随之三使之止而柔不勝剛下不勝上然亦未肯退聽其所爲則其隨也不獲已也不失己以狥非吾於艮之二中正而靜有取焉九三艮其限列其夤厲薫心夤王弼云荀作腎謂互體坎爲腎今從之成下卦之主者九三也三以一竒界乎四隂之間限之象也譬諸身則上下之際其腰乎蓋三以剛居剛止於下之上上之下使上下隔絶不通如一身氣脉自腰而下各止其止腎水分列於下无以交於心心火薫焦於上无以交於腎是上之德澤止於上而不達於臣民下之情意止於下而不達於君上者三之爲也其危厲而不安可知矣象曰艮其限危薫心也心者一身之主艮其限則一身上下判隔不通而其主危矣故曰危薫心也六四艮其身无咎四居近臣之位上輔柔弱之君以柔居柔而應又柔故止之功不及天下僅能止諸其身然而无咎者止於正也象曰艮其身止諸躬也上不能止其君之非下不能止天下之欲僅能止諸其一身雖无咎亦不足與有爲也六五艮其輔言有序悔亡艮之全卦以身取象者身動物也自三至五互體則震也震爲聲音故五以出言取義輔口之頰出言者也五君之位出命者也王言惟作命是君之言命令之所由出治亂之所由係可不謹歟艮其輔則言不妄出出必有序有序則悔可亡象曰艮其輔以中正也五以中得正止其輔者非不言也言之必出於中正也上九敦艮吉艮之諸爻其善者僅得无咎悔亡而已獨上九曰吉者蓋艮止也自初至五皆未得其止至上則以剛居柔是能止也處卦之外是知止也居艮之終止其止也此所謂至善之止且居重艮之上厚之至也是以重厚之德得其所止而安焉者也故吉象曰敦艮之吉以厚終也德愈厚而止愈安是止之善終者也其吉可知大易緝説卷七
