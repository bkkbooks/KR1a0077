body:
  text: 大易緝説卷二元王申子撰問成卦之主或問曰子於六十四卦專論成卦之主何也曰先天八卦後天重為六十四卦先天後天皆以乾坤為首蓋世間物物自天地生故聖人設卦卦卦自乾坤出乾坤二體之變即成卦之主文王主之以成卦體周公主之以取爻義夫子亦主之以為彖傳故聖人所繫卦辭爻辭無一字不在六畫上取來而諸賢之説則曰易者變易也變易以從道也以為繫易之辭聖人但據理而言多是設辭多是泛説果爾則是聖人率已意以繫易而可乎然愚所謂成卦之主有以二體取者有互全體取者有通六爻取者有專取上爻者有不取上爻者然各主之以成卦則一也以二體取者屯主初與五故彖以元亨利貞言五以勿用有攸往利建侯言初而彖傳曰剛柔始交蒙主二不主上以上居一卦之外也故彖專言五之求二而彖傳曰時中曰剛中也需主五故彖專言五孚光亨貞吉而彖傳曰位乎天位以正中也訟主二故彖言有孚窒惕中吉不利涉大川而彖傳曰剛來而得中也師主二故彖言貞丈人吉無咎而彖傳曰剛中而應行險而順比主五故彖以吉元永貞無咎不寧方來言五而彖傳曰以剛中也小畜主四故彖以密雲不雨自我西郊言四而彖傳曰柔得位而上下應之履主三故彖以履虎尾不嘻人亨言三而彖傳曰柔履剛也説而應乎乾同人主二故彖曰利君子貞而彖傳曰柔得位得中而應乎乾大有主五故彖曰元亨而彖傳曰柔得尊位大中而上下應之謙主三故彖曰亨君子有終而彖傳曰天道下濟而光明尊而光卑而不可踰豫主四故彖曰利建侯行師而彖傳曰剛應而志行順以動隨主初與上故彖以元亨利貞無咎言初而彖傳曰剛來而下柔言上與初蠱主初與上故彖曰先甲後甲而彖傳曰剛上而柔下終則有始臨主三故彖曰至于八月有凶而彖傳曰説而順至于八月有凶消不久也賁主二與上故彖以亨言二以小利有攸往言上而彖傳曰柔來而文剛分剛上而文柔復主初故彖曰亨反復其道七日來復利有攸往而彖傳曰剛反無妄主初故彖以元亨利貞言初而彖傳曰剛自外來而為主於內頤主初與上故彖以觀頤言上以自求口實言初而彖傳曰觀其所養觀其自養大過主初與上故彖以棟橈言初上之弱而彖傳曰本末弱也坎主二與五故彖曰有孚維心亨而彖傳曰乃以剛中也離主二與五故彖曰利貞亨畜牝牛吉而彖傳曰離麗也柔麗乎中正咸主三與上故彖以利貞言三上皆得其正而彖傳曰柔上而剛下恆主初與四故彖以利貞戒初四皆失其正而彖傳曰剛上而柔下遁主三故彖曰亨小利貞而彖傳曰遁而亨剛當位而應大壯主四故彖以利貞戒四之失其正而彖傳曰剛以動晉主五故彖曰康侯晝日三接而彖傳曰順而麗乎大明柔進而上行明夷主二故彖曰利艱貞而彖傳曰晦其明也內難而能正其志家人主二與四故彖曰利女貞而彖傳曰女正位乎內男正位乎外以言二五也睽主三與五故彖曰小事吉言三五柔而不正也而彖傳曰柔進而上行得中而應乎剛專言五也蹇主三與五故彖曰利西南不利東北貞吉而彖傳曰往得中曰其道窮也解主二與四故彖曰無所往其來復吉有攸往夙吉而彖傳曰乃得中也往有功也損主三與上故彖曰有孚元吉無咎可貞利有攸往而彖傳曰損下益上其道上行益主初與四故彖曰利有攸往而彖傳曰損上益下自上下下姤主初故彖曰女壯勿用取女而彖傳曰姤遇也柔遇剛也升主初故彖曰元亨用見大人勿恤南征吉而彖傳曰柔以時升困主二與上故彖以貞大人吉無咎言二以有言不信言上而彖傳曰以剛中也尚口乃窮也井主初與五故彖曰改邑不改井而彖傳曰乃以剛中也革主二與上故彖以巳日乃孚言二元亨利貞悔亡言二與上而彖傳曰大亨以正革而當其悔乃亡鼎主初與五故彖雖止以象言而彖傳猶曰柔進而上行得中而應乎剛震主初與四故彖以震來虩虩言初之懼以笑言啞啞言四之則故彖傳曰恐致福曰後有則也艮主三與上故彖以艮其背言上行其庭言三而彖傳曰止其所也漸主三與四故彖曰女歸吉利貞而彖傳曰進得位進以正歸妹主三與四故彖以征凶無攸利言三與四皆不得其正而三又以柔乘剛故彖傳曰位不當柔乘剛也豐主二與四故彖曰亨曰宜曰中而彖傳曰明以動曰尚大也旅主三與五故彖以小亨言五以貞吉言三而彖傳曰柔得中乎外而順乎剛止而麗乎明巽主初與四故彖曰小亨利有攸往利見大人而彖傳曰柔皆順乎剛兊主三與上故彖曰亨而又戒曰利貞而彖傳曰剛中而柔外渙主二與四故彖曰利涉大川利貞而彖傳曰剛來而不窮柔得位乎外而上同節主三與五故彖曰亨而彖傳曰剛柔分而剛得中當位以節中正以通中孚主三與四故彖曰利貞以言四戒三也而彖傳曰柔在內而剛得中小過主三與四故彖曰可小事不可大事以言三四二陽皆失位而不中也不宜上宜下上逆而下順也互全體取者泰乾下坤上故彖止言小往大來而彖傳曰內陽而外隂內健而外順否坤下乾上故彖止言大往小來而彖傳曰內隂而外陽內柔而外剛通六爻取者觀二陽之大者在上觀示下之四隂故彖傳止曰大觀在上噬嗑二陽居上下三隂居中頤齒之象也四以一剛梗於中故彖傳止曰頤中有物萃通六爻而不取上爻謂三隂聚於下二陽聚於中而上六不得聚故彖傳止曰萃聚也順以説故聚既濟通一卦而言隂上陽下故彖曰亨小曰初吉終亂而彖傳曰小者亨也曰剛柔正而位當也未濟通一卦而言故彖曰小狐汔濟濡其尾而彖傳止曰未出中也不續終也專取上爻者剝主上九故彖曰不利有攸往而彖傳曰柔變剛也小人長也大畜主上九故彖以利貞戒上而曰不家食吉彖傳曰剛上而尚賢夬主上六故彖曰揚于王庭孚號有厲告自邑而彖傳曰剛決柔也柔乘五剛也剛長乃終也問辭象變占或問曰子之説易卦卦爻爻必兼辭象變占四者而言之何也曰愚反覆大傳詳玩聖人之訓既曰君子居則觀其象而玩其辭動則觀其變而玩其占又曰易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占一再言此四者以示人是誠作易之要亦求易之要也何以見之天下至尊至大者莫若乾乾之初爻只四個字潛龍勿用其辭也龍其象也潛其變也而必曰勿用其占也卦卦爻爻備此四者而伊川易傳止尚其辭康節數學止尚其象漢上易説止尚其變晦庵本義止尚其占謂非説易不可謂説之全則恐猶有所遺也問錯簡脫簡羡文或問曰古今諸儒皆以為九經惟易不經秦火獨為全經今子乃云易中錯簡脫簡羡文凡二十有四無乃疑其所不當疑乎曰先儒只緣混文王彖辭與夫子彖傳為一而説之是以錯脫處隱而不見今愚分文王之彖自為一節夫子逐句傳文王之彖自為一節由是文意瞭然有不得不疑者學者試以豫之所疑質之經旨則自可見矣錯簡十二乾彖傳大明至御天十五字當在乃利貞下坤初六象曰履霜堅冰當依魏志作初六履霜隨彖傳天下隨時當依王肅本作天下隨之隨彖傳隨時之義大矣哉當依王肅本作隨之時義噬嗑大象雷電噬嗑當作電雷噬嗑無妄彖傳無妄之往何之矣上下必有錯簡夬九三君子夬夬當在若濡有愠下井彖傳井養而不窮也當在脫簡往來井井下繫辭丄天一至地十當在天數五地數五上繫辭下易者使傾當作傾者使易雜卦大過以下八卦繫辭上易曰自天祐之一節當在盜之招也下脫簡六坤文言主字下脫一利字屯彖傳脫勿用有攸往一句井彖傳脫無喪無得往來井井兩句震彖傳脫不喪匕鬯一句渙彖傳脫利貞一節解六三脫無咎二字羡文六同人彖傳羡同人曰三字大壯上六羡羝字一字鼎彖元吉亨羡吉字一字萃彖萃亨羡亨字一字漸彖傳漸之進也羡之字一字繫辭下能研諸侯之慮羡侯之二字問周易之名或問曰易經四聖人手而獨稱周易何也曰案周禮言三易其經卦皆八其别皆六十四夏曰歸藏以坤為首殷曰連山以艮為首意者文王重易更以乾坤為首始繫以六十四卦之名而為之彖故稱周易以别夏殷之易歟或者謂取周普周遍之義以名書則非也况夫子大傳有曰易之興也其當殷之末世周之盛德邪則稱周易不亦宜乎問六易之説或問曰古今説易者七百餘家而子獨取河圖洛書為天地之易并伏羲之畫文王之重周公之爻孔子之繫周子之圖為六易所謂七百餘家與先賢所集七易皆不與焉敢問何説曰易與諸經不同乃天地之文聖人節節因而成之有不容但已者蓋自無極而太極太極判而一隂一陽相為樞紐大而天地微而萬彚生生化化所以無窮皆自然而然至易至簡聖人不過因而發明之以詔萬世初未嘗加毫末作為於其間而古今諸家之説往往求之太過各務新竒或以性理或以氣候或以步占或以老莊雖切近如太玄潛虛經世猶各得其一偏故豫不得不摘出以見易之本旨在此而不在彼也問日月為易之説或問曰易道不過一隂一陽而已故鄭厚云易字從日從月一日也一月也此説如何曰易者生生化化不窮之理也太極未判兩儀未分已具此理故大傳曰生生之謂易而後言成象之謂乾效法之謂坤又曰易有太極是生兩儀是未有太極兩儀之先已有此易然則易豈有日月而後有者諸家只因認此字不分曉故節節差了如陸象山兄弟論無極曰易言有今乃言無是指易字只作一本書所以不識周子之無極皆此類也問彖或問曰先儒言夫子作十翼彖居其一是夫子作彖而子乃以為文王之辭彖曰下則以為夫子之彖傳何也曰文王重易後卦既有名名各有義六畫下或取卦德或取卦象或取卦體或取卦義或取卦變而繫之以辭以斷一卦之義此文王之辭夫子所謂彖也今經中彖曰乃夫子舉文王之辭而傳之猶今人舉書曰詩云之類若謂夫子作彖則夫子作繫辭不合自云智者觀其彖辭則思過半矣問彖傳或問曰子謂彖曰以下乃夫子舉文王之彖辭逐句釋之故曰彖傳其為義例如何曰夫子彖傳之例先釋文王所重六畫之象及所以名是卦之義如蒙山下有險險而止蒙是也既舉卦象以釋卦名然後逐句舉文王彖辭而釋之如蒙亨以亨行時中也以下一句釋蒙亨二字之類是也先儒之説皆混文王夫子之辭而釋之今愚分為兩節後蓋有不待釋而明白者矣其間夫子亦有不釋卦名而止釋彖辭者然亦未嘗不兼名義而傳之也故愚謂之彖傳問文言或問曰文言獨乾坤有之何也曰文言所以申彖傳之義獨乾坤有之者蓋卦卦自乾坤出乾坤德業至廣至大而聖凡分量有等有差故詳傳之以為之訓問大象或問曰諸卦大象取義與本卦之義不同何也曰愚觀文王重卦六畫上取象義立卦名往往不盡依伏羲先天卦象以取義夫子大象則取先天八卦本象而又取其善者用之如剝之為卦全卦以剝陽取義而大象乃取厚下安宅之類於此亦可見易之為道也屢遷用之吉凶則存乎其人也問爻辭或問曰聖人繫爻辭之義例如何曰此周公取名卦之義與成卦之主即其剛柔逺近之殊以乘六虛以求其時用之宜與不宜當與不當而繫之以吉凶悔吝之辭以示人初爻之辭猶擬之而後定自二爻至上爻則成其初辭所擬而已未嘗如諸説一爻各一義也問小象或問曰夫子釋周公爻辭而不稱爻曰初九曰而稱象曰者何也曰此因周公於逐爻初九六二兩字上取象取義故夫子稱象曰獨乾五見坤兩見且稱子曰易曰意者韋編三絶非一日之言而門人記之也其間有逐句釋者有止釋一句者有舉一句并下文釋之者有上二句舉爻辭以下二句釋之者學者毋一例觀之問繫辭或問曰繫辭之文先賢多疑其錯亂以為非夫子所作而子獨以為非聖人莫能道何也曰文王周公卦下爻下之辭皆繫辭也今子所問則上繫下繫夫子之辭也愚嘗即上下繫與卦爻之辭參互演繹見其間發明作易之要示人用易之法委曲詳盡有條有理非胸中自有全易者不能道特諸賢章分句解自為錯亂耳上繫止合分為十七節自未畫前聖人因天地自然之易畫而為卦説起次言聖人設卦觀象繫辭以明吉凶之變次言易道至大聖人用之亦極其大所以配天地成德業皆易之功次釋六爻示人以用易之法次即舉大衍揲蓍辭象變占用易之要者以示人次乃贊聖人作易以為天下用之極功卒也言聖人雖竭其旨意以示人學易者又不可徒泥夫卦象爻辭而不求諸心也起結甚明下繫止合分為十一節自重卦説起至功業見乎變情見乎辭便有憂患之意次即舉十三卦聖人功業見乎變之事次言卦爻之變例且釋十一爻示人以用易處變之法次述衰世之意與作易者其有憂患之辭次三陳九卦皆處變之事次論六爻之變次即明以文王與紂之事言之卒也推明乾坤至易至簡而知至險至阻者示人且以知言之情偽結之與上繫言乾坤易簡之道而及於可久可大之氣象大不侔矣愚故曰繫辭上夫子發明先天易用易處常之道繫辭下夫子發明後天易用易處變之道也整整如是何錯亂之有問序卦或問曰序卦之文伊川易傳卦卦引之而子乃以為非聖人所作然則卦果無序乎曰上經三十卦以反對觀之止十八卦首乾坤者萬物父母也十變為泰否泰否乾坤二體之交也又十變為剝復剝復乾陽坤隂之終始也又四變為坎離坎離乾陽坤隂交之極也下經三十四卦以反對觀之亦止十八卦首咸恆者山澤通氣雷風相薄萬物男女也十變為損益損益咸恆二體之交也又十變為漸歸妹漸歸妹陽男隂女之終始也又八變為既濟未濟既濟未濟亦坎離之互陽男隂女交之極也大略如此豈得無序但莫曉其間諸卦次第如何安排耳若夫經中序卦之文義乖理淺決非聖人所作愚正不曉伊川何所取而卦卦引之以作傳也問象數二字或問曰案玉井難子之説云王氏謂河圖數耦而象竒耦謂數至十竒謂一六之類洛書數竒而象耦竒謂數至九耦謂一九之類不思一六一九皆數也而謂之象審爾則十與九亦可言象也而可乎奈何曰易中自一至十其字雖同而所以取象取數則異此易之大本旨也蓋天地間數無耦象無竒人皆曰二四六八十耦數也不思二之前已有一則已成三矣自二至十數之皆然故曰數無耦非竒不行故才耦止可以言象而不可以言數天地間事事物物有對有待而後成象如有父斯有子之象有子斯有父之象有隂斯有陽之象有陽斯有隂之象獨則不成象矣故曰象無竒非耦不立故才竒止可以言數而不可以言象必以一配九以九配一以一配六以六配一然後成象所以朱子之言四象不但只曰六七八九者四象也而必曰以一二三四為六七八九者四象也所以周公繫三百八十四爻之辭必於初九六二之類兩字上取象義而夫子釋之亦云象曰所以易言蓍則曰大衍之數曰天地之數言蓍惟言數者蓍七七而竒故也易言卦則曰設卦以觀象曰八卦以象告言卦惟言象者卦八八而耦故也易之為易象數而已理與氣時寓乎其中學易者若不識得這兩字分曉何以言易問五行之説或問曰玉井難子之説云王氏兩儀生四象圖與説指水為老隂火為少陽木為少隂金為老陽先儒未嘗如此説周子太極圖朱子注曰火陽盛故居左水隂盛故居右木陽稚故次火金隂稚故次水蓋五行生成之數與四象太少之數各自為説不可強通又邵子經世書水火土石地之四象太柔為水太剛為火前亦未聞水是老隂火是少陽也子以為如何曰天地間只一個五行彼有所謂大五行之説則不經愚案洪範五行之次一曰水二曰火三曰木四曰金五曰土周子太極圖説亦曰陽變隂合而生水火木金土皆從河圖生數順數起則以六七八九十五成數配為五行一六成水二七成火三八成木四九成金五十成土也明矣六七八九非隂陽老少之數乎此固或者未之前聞然盛陽盛隂之於火水稚陽稚隂之於木金太柔太剛之於水火朱邵未生之前諸人其亦有如是之前聞乎且天下惟金為至剛火雖陽而有隂者存故易滅非老陽少陽之象乎天下惟水為至柔木雖柔而有剛者存故易折非老隂少隂之象乎先儒雖不如此説然天地之文聖人之經則説之甚詳善學者其何擇且周子太極圖所畫特見五行相生之序云耳蓋左之陽變而生水即乾交於坤之中而為坎之水也水生木木生火火生土土生金金復生水右之隂合而生火即坤交於乾之中而為離之火也火生土土生金金生水水生木木復生火其餘四畫則聚於下小圈者也又安有所謂木次火金次水之次乎借曰有次則木於水金於土土於火三畫將如何次邪學者案圖而觀即自可見不可堅執先賢一時之言而失先賢所望於後學之意若曰五行生成之數與四象太少之數各自為説不可強通案易曰太極生兩儀兩儀生四象太極圖説曰太極動而生陽靜而生隂分隂分陽兩儀立焉陽變隂合而生水火木金土是易之四象即洪範太極圖之五行洪範太極圖之五行即易之四象特易取河圖象數之生者言之猶未離乎氣也故止言四象二書取河圖象數之成者言之則已具其質矣故言五行謂之各自為説不可強通得乎問擬諸物象或問曰聖人有以見天下之賾擬諸其形容象其物宜是故謂之象然乾健行故為馬胡為坤亦為牝馬震坎之於馬也亦為美脊為善鳴大畜有乾而爻稱馬宜也屯賁睽渙明夷中孚卦無乾而爻亦稱馬坤順從故為牛胡為離亦畜牝牛大畜無妄遁革卦無坤而爻亦稱牛兊為羊外柔而內剛也夬歸妹有兊而爻稱羊宜也大壯無兊而三五上亦皆稱羊坎為豕剛躁藏於內也睽大畜無坎而爻辭亦稱豕如旅如鼎卦有離而爻稱雉如中孚卦有巽而爻稱翰音宜也胡為乾稱龍而震亦稱龍將使學者何所執以為依據邪曰昔亦嘗疑之及觀王輔嗣略例然後釐然有當於心其辭曰爻茍合順何必坤乃為牛義茍應健何必乾乃為馬而或者定馬於乾案文責卦有馬無乾則偽説滋蔓難可紀矣互體不足遂及卦變變又不足推致五行一失其原巧愈彌甚縱復或值而義無所取蓋存象忘意之由也忘象以求其意義斯見矣問辭同義異或問曰經曰生生之謂易曰易有太極則是太極未判之先元有之易以理言之也曰四營而成易曰六爻之動易以貢則又變易之易也曰易之為書也曰易之興也則又指有卦有爻之書言之也如曰無咎有本無咎有可以免咎有必如此而後無咎有不可咎於人有言其自取而又誰咎曰無咎則同而義不同如利見大人不拘上下如利涉大川不拘坎體如泰大來否小來是來於內也而困之四來徐徐需之上不速之客三人來則又據所居之地言其來也如歸妹之五曰帝乙歸妹是從歸妹卦上取義泰之五亦曰帝乙歸妹則又以隂柔順從在下之陽剛取義則初無一妹可歸也如革之初九曰黃牛之革則革乃名卦之革遁之六二亦曰黃牛之革則革乃皮革之革矣辭雖同而義則異將使學者何所準邪曰經不云乎易之為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適故於辭也亦然此聖人於繫易之際便示人以用易之法且曰神而明之存乎其人也問稱歲年月日或問曰經中稱歲稱年諸説不曰終則曰久而子獨以爻變言之其説可得聞歟曰聖人繫易無一字不在六畫上取來若卦無此象爻無此義聖人不鑿空著個字如處事變之稍艱者稱年案字義禾千為年比歲字有逺意處事變之稍易者稱歲案字義步成為歲比年字有近意其曰三其曰十以爻變求其情方為的當此因復之七日臨之八月革之巳日觸類而得之也問稱隂陽稱剛柔動靜或問曰古今只稱隂陽不稱陽隂而稱剛柔動靜何也曰厥初無極而太極太極具體之初必須先靜而後動是隂陽以體言之也及太極肇判又必先動而後靜是剛柔動靜以用言之也問彖象二物之説或問曰説易者有以彖之鼻向上象之鼻向下謂聖人取此二物以配隂陽故有彖曰象曰其説如何曰若以彖象為二物不知文言其狀何如此穿鑿好竒之論不足述也問參伍以變之説或問曰玉井難子之説云案朱子本義及語録即未嘗指定此是參以變此是伍以變不過謂參以數之又伍以數之更相考核以審其實而已所謂欲伍以參者蓋參差不齊之中便有個當然之理也若曰三而參之為九五而參之為十五以至十而參之為三十三而伍之為十五五而伍之為二十五以至十而伍之為五十雖不指定為何數其於字義亦可粗通又三伍五為十五亦河圖中宫洛書縱橫十五之數也引而伸之以至百千萬億之無窮故朱子語録云三個兩是六以五計之多一個三個三是九以十計之少一個又三個四只是十二必三個五五個三方成十五亦此意也以子之説為拘泥不通奈何曰愚初於此兩字莫得其説反覆諸家至朱子之言尤所致思為於下文遂成天地之文遂定天下之象兩句上説不去反復思之然後見得參者參也參三為參五者伍也伍五為伍故以為三參乾坤而成八卦三參八卦而成六十四是遂成天下剛柔相雜之文也一六二七三八四九五十各相伍而遂定天下五行生成相配之象如玉井所説又何以成天下之文定天下之象乎天官設其參傅其伍參亦謂卿三人伍亦謂大夫五人經中是參伍字諸説以參其伍及三與五字釋之可乎問復姤小父母之説或問曰康節云乾坤大父母復姤小父母説之者曰乾一變姤止於剝而受之以復坤一變復止於夬而受之以姤故乾坤是大父母一陽來復變而終於歸妹成十六陽一隂始姤變而終於隨成十六隂是小父母玉井亦難子曰上坤下震為復上乾下巽為姤此邵子所謂母孕長男父生長女者也以子之説為不然奈何曰此易中大節目雖是先賢之説有不安者不可置而不問以愚觀之既云復姤則是後天六畫之卦若以後天論乾坤是大父母咸恆是小父母一陽生於復由子至午而後為六陽之乾一隂生於姤由午至子而後為六隂之坤是復姤乃六畫卦中乾陽坤隂所自生而謂之小父母可乎若以生卦論則無一卦不生於乾坤今若以乾坤對復姤為言則不可謂之小父母矣問古今占卜之學或問曰自古以易為卜筮之書如左傳所占及鬼谷孫臏嚴君平司馬季主京房郭璞魏照管輅袁李之流與近世麻衣希夷康節諸人占卜如神而子皆不取其説何也曰此易之流非易之道天地間有理而後有氣有氣而後有象有象而後有數象有定氣數有變惟理無窮故聖人取其象以設卦以明夫微而不可見之理即其數以察變以御夫見而不可執之氣其卦也藏已往吉凶之理以示人使人居則觀其象而玩其辭先審其吉凶之幾盡其所當為之道及其動而疑疑而未斷也則命諸蓍其蓍也探未來吉凶之變以示人使人趨之避之以歸于性命而已如子所説占卜如神者則曰某日當有某禍某日當獲某福某數合主兄弟鬩牆某數合主夫婦參商言之於數年之前驗之於數年之後遂使為帝為王者委天道於氣數之適然而不知恐懼修省為子為弟者委人道於命分之當然而不修孝悌忠信如是則不復有舜曾之為子伊周之為臣矣甚而如射覆如遁甲如風角啓大惡不道之心皆是術有以致之易之為書和順道德而理於義窮理盡性以至於命果若是乎二程不受康節數學之傳其亦有見於此矣不然昔者夫子答子張十世可知之問未嘗一語及前知之事豈諸人生知之聖用易之道過於孔聖乎學易者先審乎此然後可以言易問揚子雲太玄準易如何曰太玄取數以一加二為三為三方三三而九為九州三九而二十七為二十七部九九而八十一為八十一家純乎取洛書數而用竒其所謂準易者玄之家準易之卦玄之首準易之彖故八十一家有八十一首玄之贊準易之爻故有七百二十九贊玄之贊有測準易爻之小象玄之文準易之文言玄之攤瑩掜圖告準易之上繫下繫玄之數以論九贊所象準易之説卦玄有衝以序八十一首隂陽之相對準易之序卦玄有錯以錯雜八十一首而説之準易之雜卦自首以下為十一篇然以愚觀之名曰準易而大不同者易之彖所以斷是卦之全體而玄之首四重方州部家而贊則不以四重為贊易之爻所以乘六虛之時用宜與不宜當與不當玄則初一次二次三次四次五次六次七次八次九而無位且無剛柔上下逺近之分則何以辨其時用宜不宜當不當邪易文言惟乾坤有之晬玄之乾也而玄之文不加之晬而加之中中者玄之中孚也其意專主交成卦氣以中孚為陽貞建子之月起于中孚故獨加以文而詳説之也是以司馬君實潛虛擬太玄專以氣候説易問易太玄潛虛取數曰易兼取河圖洛書之數故竒耦亭當體用兼備其數無欠亦無餘太玄純取洛書之數一六二七三八四九五五而無十自一至九亦無十故欠而增踦贏二贊潛虛純取河圖之數而用十為五十五行故餘而退元齊餘三者元始也齊中也餘終也退此三者而無變愚故曰太玄潛虛各得易之一偏者此也問易太玄潛虛揲蓍曰易之揲蓍也以天地真元之數一二三四五小衍之為十五大衍之為五十故四營之以求老少隂陽之策其五十之中又虛其一者天地之數皆生於一一太極也是所虛之一在七七四十九策之外是數也皆倚天地圎竒方耦而用之故能成變化而行鬼神太玄之數則起於三而終於九九者三其三也故玄之蓍用六六者兩其三也六而六之故玄用三十六策而揲以數起於三故又虛其三而用三十三而揲是所虛之三乃在六六三十六之內與易異矣以三搜之至三而止得七為一得八為二得九為三是再合餘而以三搜之也故有旦筮晝筮夜筮之不同竒竒而欠故也潛虛之數起於十十者兩其五也故潛虛之蓍用五五而五之合用二十五策而揲乃三倍而用七十五策以其起於五故虛五而用七十策是於五行數內各虛其一也揲之以十謂可以得名而未可以得變故再揲以七耦耦而餘故也問易太玄潛虛反對曰易之先天八卦後天重為六十四卦以反對反易觀之止三十六卦三十六乃自一至八之積也太玄以一加二成三為三方三三而九為九州三九而二十七為二十七部九九而八十一為八十一家其不易者九中增爭毅迎度吟瞢勤其反易者七十二合而觀之止四十五家四十五乃自一至九之積也潛虛以十十而十之其行當一百乃退而用五十五行是專用河圖五行之數故潛虛數有正有屈五十五亦自一至十之積也問太玄潛虛直日之説曰愚嘗謂太玄準易潛虛擬玄得易之餘而不見易道之大謂此類也何也易以乾坤二篇之策三百有六十當周天之度以歸餘象閏正其贏縮以見易道之變化即天道之流行初不以是擬其度而推測之也後之説者有以一卦直六日七分而坎離震兊四正卦各守其方至太玄則直以一首管九贊每一首直四日半以二贊管八策當一日以二萬六千二百四十四策當三百六十四日半又設踦贏二贊踦贊當一日四之二贏贊當一日四之一以當周天三百六十五度四分度之一而無贏縮至潛虛擬玄則遂以冬至之氣起於元轉而周天三百六十四變一變主一日乃授於餘而終之以一行當七日元齊當半餘當餘分以合周天之度是四聖人之易止為厯數之書耳問邵康節經世書曰此書程明道以為加倍法是也謂一生二二生四四生八八生十六十六生三十二三十二生六十四由是推而為萬物之數皆純乎用耦而無竒其為元會運世也則以日經日為元之元其數一謂日甲之數一也以日經月為元之會其數十二謂月之數十二也以日經星為元之運其數三百六十謂日之數三百六十也以日經辰為元之世其數四千三百二十謂時之數四千三百二十也是日為元月為會星為運辰為世也一元象一年十二會象十二月三百六十運象三百六十日四千三百二十世象四千三百二十時此一元之經即一年之數也一世三十年是為一十二萬九千六百年自元之元更相變而至于辰之元自元之辰更相變而至於辰之辰故名經世著一元之數使人引而伸之終而復始起帝堯甲辰終顯德已未紀世之治亂以符其説故自顯德後人皆可以續之易之道不止於是故不免謂之數學此愚所以於古今説易七百餘家之中獨取周子太極圖以附天地及四聖人之易為六易者此也無極而太極無極者厥初未有太極兩儀之先已具個生生不窮之理雖無象可象無名可名然其理則至極而無以加也故曰無極太極者理氣象數所以為萬化之根本者全體已具渾然而未分也雖渾然未分然舉天地萬物生生化化盡無以出於此亦無以加於此故曰太極無極而太極者謂有是理而後有是氣也然太極之名何所始乎其始於夫子大傳易有太極之言乎夫子之言本於伏羲之易伏羲之易本於河圖河圖中宫天五地十太極也蓋中宫之五其一其三其五總之則成九天數也其二其四總之則成六地數也合九與六已具太極十五之全數矣故天地真元之數止此五者其六則五上加一其七則五上加二其八則五上加三其九則五上加四其十則五上加五是各因五而得數以配上一二三四五而已十與五為太極者謂五為陽十為隂隂陽氣也五為竒十為耦竒耦象也其五其十則數也析而言之三二之合則天地也三個五則三才各一極也九與六則老陽老隂也七與八則少陽少隂也十與五則五行生成之數也以五乘十以十乘五則又大衍之數也是天地間曰理曰氣曰象曰數渾然為一而未分故為太極此伏羲因之以畫易夫子取之以立言周子得之以為圖也愚觀周子之圖其上止有一圈圖之名止曰太極而圖之説則曰無極而太極是周子分明於太極上説出無極以示人謂凡物之有不生於有必生於無况既曰無又曰極與下太極字並言是雖無一物而有個至極底道理在也晦庵乃曰此所謂無極而太極混無極太極於一圈已非周子圖意而象山則曰易言有今乃言無是指易字只作一本書所以皆不能見周子之無極愚謂周子所謂無極即夫子所謂易也夫子曰易有太極是生兩儀是未有太極兩儀之先已有個易易者生生化化不窮之理非一本書也今欲求周子之説當以夫子之言為本以河圖之象為證則無極太極之義瞭然矣太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉理氣象數之全體渾然已具而未分者太極也其全體既具則不能不動才動便是陽動極而靜才靜便是隂靜極復動一動一靜互為其根其陽之輕清者上而為天其隂之重濁者下而為地故曰分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉陽動隂靜互為其根陽得隂則變隂得陽則合一變一合則必有陽中之陽陽中之隂隂中之陽隂中之隂老少四象相生相成而沖氣居中故曰陽變隂合而生水火木金土蓋此五者在天成象在地成形其布於兩間以行四時者氣也故在易以圖象之生者言之曰四象在此圖以圖象之成者言之曰五行故周子復曰五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也此又沿流而溯其源以示人見五行即隂陽之變隂陽即太極之分太極本無極之理也五行之生各一其性五行物之成形者也性則理也此言物物各具一太極之理也無極之真二五之精妙合而凝乾道成男坤道成女真者理之實精者氣之粹此言太極既判兩儀既分此理此氣妙合而凝於天地間為六子所以化生萬物而無窮也妙合而凝者謂乾交於坤之初得震而為長男坤交於乾之初得巽而為長女乾交於坤之中得坎而為中男坤交於乾之中得離而為中女乾交於坤之上得艮而為少男坤交於乾之上得兊而為少女此圖之第四層在易則生八卦之位次故周子於此止言無極二氣五行而不言太極豈非太極既判惟理與氣運行天地間以造化萬物乎而先賢乃以為人道之男女非也何也其下文即曰化生萬物是人之男女而化生萬物豈理也哉况下文萬物生生之後方曰惟人也得其秀而最靈乎二氣交感化生萬物萬物生生而變化無窮焉乾坤六子老少隂陽相交相感化生萬物萬物又各相交感而生生化化無窮焉此其所以為易惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣此言人人各一極也二氣交感化生萬物人於萬物中獨秀而靈形之生也其體固靜靜則必動故神發知焉然形之生也不能無清濁之殊神之發也不能無理欲之異故五性感動而善惡分萬事出矣主日月合明四時凶小人聖人定之以中正仁義而主靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之説此又言聖人立三才之極也蓋萬物之中得理之全氣之正者人也人之中與太極合德者聖人也人之所以為人者中正仁義而已唯聖人獨能盡之其主靜者極之體其與合者極之用故與天地合其德日月合其明四時合其序鬼神合其吉凶其有修此中正仁義惟皇作極者君子也故吉其有悖此中正仁義不協于極者小人也故凶是以三極皆賴聖人而後能立故周子總三才之道歸之聖人蓋三才一理也隂陽以氣言剛柔以質言仁義以理言其實一也三才之內凡盈虛消長進退屈伸即死生之説原其始反其終則知生生化化無窮之理焉然則易之道在聖人聖人用之以立三才之極三極既立則易之道為天下用矣大哉易也斯其至矣易大傳曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業此言先天易也此圖實盡之故曰大哉易也此愚所以於古今説易七百餘家之中獨取河圖洛書之易并羲之畫文之重周公之爻孔子之繫及此圖為六易者此也先賢論無極太極晦庵之説曰上天之載無聲無臭而實造化之樞紐品彚之根柢也故曰無極而太極非太極之外復有無極也又曰不言無極則太極同於一物而不足以為萬化之根本不言太極則無極淪於空寂而不能為萬化之根本又曰濂溪恐人錯認太極别為一物故著無極二字以明之又曰無極只是説這道理當初元無一物只是有此理而已此個道理便會動而生陽靜而生隂又曰濂溪恐人道太極有形故曰無極而太極是無之中有個至極之理又曰太極只是極至更無去處了至言至髙至妙至精至神更沒去處又曰太極只是極好至善底道理又曰太極非是别為一物即隂陽而在隂陽即五行而在五行即萬物而在萬物只是一個理而已又曰人人有一太極物物有一太極象山曰易言有今乃言無又曰通書言中焉止矣未嘗一及無極字又曰太極二字聖人發明道之本原微妙中正今於其上又加無極二字是頭上安頭過為虛無好髙之論也太極圖或問或問曰玉井難子之説云周子太極圖自上而下第一圈無極而太極也朱子曰無極者理之極至而無以復加非太極之上别有無極也其次左陽動而中根隂右隂靜而中根陽其中又有一小圈則隂陽一太極也其次五行而水火之交系乎隂陽謂火陽根隂水隂根陽也又系以相生之序次以水火金木各系于一小圈言五行各具一太極也亦猶陽動隂靜之中又有一小圈也其次一大圈傍注乾道成男坤道成女則男女各一太極也王氏説既與先賢異矣又於乾道成男坤道成女下乃曰此言乾坤之六子非人道之男女也其下即曰化生萬物若以為人道之男女而化生萬物豈理也哉愚謂天地始判之初未有人也忽然而人生其間則凡為男者豈非乾道之所成為女者豈非坤道之所成邪此氣化也亦猶人著新衣裳忽然而生蟣虱也及至生生化化之後始有人道之感而生生不窮此形生也凡為男者亦乾道之成為女者亦坤道之成也故周子特作一圈以明男女各具一太極也若止以乾坤生六子言之則拘矣况周子立言自為兩節既曰乾道成男坤道成女以結上文又更端曰二氣交感化生萬物其文意亦不謂男女生萬物也若周子之意止以乾坤生六子言之則其上已有隂陽五行亦不應重作一圈以象乾坤之六子也王氏又曰猶恨周子多隂陽內太極一小圈愚謂此圖先賢説者已多朱子又有詳注反復辨論無以復加其曰中圈者有其本體也謂一隂一陽各具一太極也既恨其多此一圈曷不刪而去之為辭甚厲子聞過而不知改其可乎曰玉井賜教誠非後學淺見所及然竊自守其固陋未敢輕捨其故步者蓋詳周子名圖止曰太極其上止有一圈而其説則曰無極而太極於圖名太極字上著無極二字又著個而字是所謂太極者畢竟先無而後有况易大傳有曰生生之謂易而後言成象之謂乾效法之謂坤又曰易有太極是生兩儀是未有太極兩儀之先已有個生生之理在是即周子之所謂無極也陸象山乃曰易言有今乃言無指易字只作一本書果如象山所云今易書中指何者為太極邪以夫子之言觀周子之圖是不可以第一圈合無極而太極也若謂第一圈為無極而太極是無極太極共此一圈則周子不著個而字矣蓋無極止是有其理無象可象無名可名初無形影可狀然天地萬化至極之理具焉故曰無極太極則所以為萬化之根本者全體已具所謂萬化之根本者即愚於先天太極下所論理氣象數之全體渾然未分者是也雖渾然未分然舉天地萬物之至極盡無以出於此亦無以加於此故曰太極周子無極而太極云者謂厥初有其理而無可象無可名者今其體已具也其體既具則不能不動才動便是陽才靜便是隂故圖陽動隂靜於第二圈而為之説曰太極動而生陽靜而生隂一動一靜互為其根分隂分陽兩儀立焉動靜互根則必有陽中之陽陽中之隂隂中之陽隂中之隂故圖水火木金老少四象土居其中而為之説曰陽變隂合而生水火木金土五氣順布四時行焉其曰五行一隂陽隂陽一太極太極本無極者則又沿流而溯其源以示人非謂隂陽內又具一太極也况周子止説五行一隂陽隂陽一太極即不曽説五行一太極且必曰太極本無極則是太極與無極亦有間矣蓋太極本於理正所謂有理而後有氣亦非謂第一圈為無極而太極也若謂隂陽內合有隂陽各具一太極底圈則合有隂一圈陽一圈五行各具一太極既有五圈則男女各具一太極合有兩圈至於物物各具一太極又合有幾圈邪則各具一太極之説豈周子圖意哉其曰五行之生各一其性者於此方言氣以成形之後物物各具一太極之理以結上文而起下文乾坤六子化生萬物之序也故下圖一小圈而説曰無極之真二五之精妙合而凝是再從無極上説起即不在二氣交感上更端謂太極既判兩儀既分惟理與氣之真精者妙合而凝於天地間為六子以化生萬物故周子於此不説太極而止説無極二氣五行也此下一大圈傍注乾道成男坤道成女朱子本圖注水火木金下各系一畫於小圈上而曰此無極二五所以妙合而無間也果如是其畫不三則八今止四畫是著四象之生八卦也然則乾道成男坤道成女非人道之男女也明矣况此下方説二氣交感化生萬物是乾坤六子隂陽老少相交相感而化生萬物也萬物之中人為最靈蓋人亦物中之一耳豈有忽然而人生其間如新衣生蟣虱之理况下文始曰萬物生生而變化無窮惟人也得其秀而最靈方從人道上説去愚見如此故敢以河圖五與十為太極敢謂無極為無太極為有敢謂圖之五行即易之四象敢謂乾道成男坤道成女非人道之男女敢謂周子多隂陽內太極一小圈也玉井又曰若周子之意止以乾坤生六子言之則其上已有隂陽五行亦不應重作一圈以象乾坤之生六子也不思其上隂陽自是兩儀其上五行自是四象於乾坤六子之八卦何與焉昔先子龍溪常舉魏鶴山答友人書訓申子曰須從諸經字字看過思所以自得不可只從前賢言語上做工夫又曰近時講性理者幾於捨六經而觀語録甚者將程朱語録而編之若策括策套此其於吾身心不知果何益乎又曰要做窮理格物工夫須將三代以前規模在胸次若只在漢晉諸儒腳迹下盤旋終不濟事又曰向來多看先儒解説近思之不如一一自聖經看來蓋不到地頭親自涉歷一番終是見得不真又非一一精體實踐則徒為談辨文采之資耳又曰學者不求之周程張朱固不可徒求之周程張朱而不本之六經是捨禰而宗兄也不求之六經固不可徒求之六經而不反之吾心是買櫝而棄珠也又曰來書乃謂只須祖述朱文公諸書文公諸書讀之久矣政緣不欲於賣花擔上看桃李須樹頭枝底方見活精神愚之淺識陋聞病多坐此兹承玉井不鄙極口垂教故亦不敢不盡其愚以俟夫學者之自擇大易緝説卷二
