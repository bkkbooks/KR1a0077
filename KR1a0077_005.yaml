body:
  text: 大易緝說卷五元王申子撰坤下巽上觀示也觀示於下也凡自上觀示於下之觀字音去聲自下觀仰於上之觀字音平聲為卦坤下巽上風行地上觸動萬物物皆觀仰觀之象也二陽在上觀示於下為下衆隂之所觀仰亦觀之象且觀示者二陽之大也故曰大觀觀盥而不薦有孚顒若居上而為衆表儀以觀示於下者必極其誠敬然後下觀而化也盥者宗廟祭祀之始盥手酌鬯以求神誠意精一之時也薦者奉牲奉醴之際誠移於物精意少散之時也言觀之道當精一其誠若盥而不薦則有孚于人天下莫不顒然仰望而服從之也彖曰大觀在上順而巽中正以觀天下以卦體卦德釋卦名義此通六爻以成卦義者也謂二陽在上觀示于下故曰大觀在上下順上巽而五以中正為觀之主是又巽順乎理而以中正之道觀示天下觀之善也觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣釋彖辭而極言觀之道也觀示天下之道其誠意精一常如始盥之時則觀感之下人自相孚莫不從化蓋有不動而敬不言而信之妙如天觀示萬物之道雖神妙莫測然可觀於下者四時行焉萬化成焉未有一差忒者故聖人亦以其神妙莫測者運於上而設為政教使天下觀仰而服從之如此則聖人觀示天下之道即天之觀示萬物也象曰風行地上觀先王以省方觀民設教觀之為卦二陽髙出於衆隂之上是君民勢分本懸絶也今觀之象乃以風自天而下行於地上為義則是觀之世上下之分雖嚴而上下之情常相通而無間也先王體之時巡狩以省方國觀民俗以設政教故天下之民尊君如天愛君如親矣省方觀民之事也設教為民觀之事也初六童觀小人無咎君子吝初以隂柔處下居觀之世而逺於陽是其所觀見者淺近如童稚然故曰童觀小人下民也所見淺近不能識陽剛中正之道乃其分也不足為之過咎若君子而如是則可吝矣晦庵曰卦以觀示為義據九五為主也爻以觀瞻為義皆觀乎九五也象曰初六童觀小人道也初卑而下卑下而無逺見在凡民為可恕在君子則可羞矣六二窺觀利女貞二處大觀之世雖得正而應於五然以隂處隂暗而不明如九五陽剛中正之觀道但能窺覘而不能盡見故曰窺觀言見之小也隂柔居內而觀乎外所見不大而能順從者女子之正道故曰利女貞言見卑識暗但能順從而不失其正者特女子之利非大臣之事也象曰窺觀女貞亦可醜也二居大臣之位處大觀之時徒能窺觀為女子之貞是可醜也六三觀我生進退生出也謂才德之出於巳者六三質柔用剛處下之上上之下故有進退之象君子進退常觀乎時今不觀乎時而觀我生者蓋九五方以陽剛中正觀示天下則時不待觀也但觀吾之所有以為進退可也況三居柔順之極必於進不可也上有正應必於退亦不可也故或進或退但觀其出于已者可不可而已象曰觀我生進退未失道也謂于出處之道未為失也六四觀國之光利用賔于王四以巽順之德居公侯之位履得其正而近天子之光者也且居坤土之上有國之象也其所有之國政教法度莫非天子盛德輝光之所臨照者四觀於其國欣慕愛戴亦以用賔于王為利賔者賔于四門之賔言朝覲而承賔禮也大觀之時九五以中正之道觀示天下如初之民二之臣三之賢人君子四之有國有家者皆於觀感之下有孚顒若此觀道之盛也况省方設教之後有國者其不孚乎春秋𫝊曰敬仲生陳侯筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎亦有國之證也象曰觀國之光尚賔也尚志尚也言觀見天子之光於其國其志意慕說願賔于王也九五觀我生君子無咎五陽剛中正居尊位以觀天下此君子之道也天下皆仰而觀之在五又當觀已之所行必一出於君子之道然後可以立身於無過之地故曰觀我生君子無咎象曰觀我生觀民也此夫子以義推而言之謂民之善惡生於君君之善惡形於民者觀之道也九五欲觀在巳所行之得失觀諸民即可見矣上九觀其生君子無咎觀之二陽皆觀示於下為下所觀仰者也然人之觀仰止於九五上九雖不當事任然與五同德相比亦九五尊寵就謀之君子也其對我而言指五也謂五之所行其皆出於君子邪則上九與有光焉其或不然人於上九寧無辭乎此上九所以常觀九五所行使一出於君子之道然後可以自免於咎也故爻辭與五同唯其與我字異耳象曰觀其生志未平也平安寧也言上則受人君之尊寵下則萃臣民之觀瞻所以觀其生者格君之志不敢自寧也震下離上噬嗑噬囓也嗑合也頥中有物梗之噬而後合也上下二剛而中虛頥之象內三隂齒之象四以一剛梗於其中為頥中有物之象必噬之而後得合故為噬嗑在人事為有物梗之在人心為有欲間之皆務決去然後為得也噬嗑亨利用獄天下事所以不得亨通者皆由有梗間於其間噬而去之則亨矣故曰噬嗑亨卦二陽居上下三隂列於內如拘守四之一梗於中有獄之象且離明震威明與威乃用獄之道故曰利用獄若以用獄取全卦之義則非也彖曰頥中有物曰噬嗑此通六爻而取成卦之象以釋卦名義言九四為梗如有物梗於頥中非噬而去之不可以合故曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也以卦德卦體釋彖辭噬嗑而亨者梗去則亨也三陽三隂剛柔平分在獄則是非決白之象震動也離明也唯動則能斷唯明則能審徒知斷而不知審則有陷於非辜者矣徒知審而不知斷則有逸於刑憲者矣必電之明雷之威合用之然後是非無遁情故曰動而明雷電合而章此皆利用獄之道用獄者雖貴乎明而威然為君者則當推仁恕之心六五以柔居尊柔非去梗之宜然為君而用之庶獄則其所利故曰雖不當位利用獄也象曰雷電噬嗑先王以明罰敕法雷電當作電雷象無倒置者電掣則雷震雷迅則電赫相須並用亦有一噬一嗑之象電先雷掣使人知懼而修省先王以之先明其刑罰敕其法令以示人使人預知所畏遷善逺罪而不犯有司不然専以用獄為能則電雷之威亦褻矣初九屨校滅趾無咎趾在下而主於行者也九四為一卦之梗初居動體與之同德又與之為應是與之同惡者也然居卦之初惡雖形而未顯罪雖有而未大故但械其屨滅其趾使不得行止之於初而惡不行故得無咎繫辭曰小懲而大戒小人之福也象曰屨校滅趾不行也趾屨皆行之物校滅所以止其行使不得進而與四同惡也六二噬膚滅鼻無咎膚者惡之淺鼻者氣之通四為一卦之梗初乃與之相通為惡二以中正居大臣之位應柔中之君任去惡之責能於初惡尚淺之時乘而去之絶四之與不使之通故曰噬膚滅鼻是以中正之道為上去梗何咎焉象曰噬膚滅鼻乘剛也曰噬曰滅惡雖淺而力不易者柔乘剛故也六三噬臘肉遇毒小吝無咎臘乾臘全體骨為之堅韌之物也喻九四之強梗也三以隂柔不中正之才噬之能無遇毒乎故小吝然於時當噬故於義無咎象曰遇毒位不當也以柔居剛位不當也自處不得其當而以治人故人不服而有犯之者故遇毒九四噬乾胏得金矢利艱貞吉四乃一卦之梗而亦曰噬噬者誰也誠齊曰以九四噬九四近君之臣豈一人而已哉今從之胏與胾同乾肉之帶骨者乾胏喻強梗之九四也金剛矢直金矢喻剛直之九四也謂以剛直之臣噬強梗之臣因去強梗之臣而得剛直之臣也四雖剛直亦必艱難其心貞正其守而後可獲吉蓋位終不正故也象曰利艱貞吉未光也言去惡之道未為光大故必艱貞而後吉也六五噬乾肉得黃金貞厲無咎噬嗑一卦四為強梗初九應之而其惡尚淺六二以中正噬之故易為力六三以不中正噬之故艱為臘九四以剛直噬之故為胏胏則差易於臘矣上九雖與初及四同惡相濟然其強梗已衰無勢無助五以中剛噬之特乾肉耳雖不免噬囓之勞比胏則又易矣黃中色金剛物五居中用剛為得中剛之道然以柔質去強梗雖得中剛之道亦不可忽故戒之以貞固危厲乃可無咎象曰貞厲無咎得當也必貞厲然後無咎者謂以柔噬剛不如是不得其當也上九何校滅耳凶四剛強為一卦之梗而上九恃其剛明之極與之同德而又同體是同惡相濟而終於為梗者也且居卦之外火體炎上而去震逺是卦有雷霆之威若罔聞知炎炎于上而不顧故惡積而不可掩罪大而不可解至於何校而受滅耳之凶也象曰何校滅耳聰不明也使不自恃其剛明之極炎炎不顧則聽必聰聰必明聞過知改惡不至是矣離下艮上賁飾也文飾也二與上成賁之主也二之柔來于內以文剛而為離上之剛往於外以文柔而為艮艮上離下止於文明賁之義也又艮山也離火也山下有火照見其上草木品彚物物光明有賁飾之象焉故為賁賁亨小利有攸往徒質則不能亨質而有文以加飾之則可亨故曰賁亨然文盛則實必衰茍專尚文以往則流故曰小利有攸往小者謂不可太過以滅其質也亦以成卦六二文明中正故亨成卦上九剛而終止故小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下以成卦之主釋彖辭而極言之也剛柔相雜曰文故剛柔相文以成賁下體本乾柔來文其中而為離文雖柔而質則剛又中且正故亨上體本坤剛往文其上而為艮文雖剛而質則柔又剛而止故小利有攸往剛柔交錯此天道自然之文也聖人見天有剛柔交錯之文乃觀乎三辰五行之昭然者以察四時之變見人有上下尊卑各止其止之文也乃觀乎三綱五常之燦然者以化成天下此聖人用賁之道也象曰山下有火賁君子以明庶政無敢折獄山下有火則草木皆被其文彩賁之象也庶政者國家大小之政如宗廟朝廷禮樂法度之類皆可用文唯獄一事専用情實若用文飾則沒其實矣故君子用賁之象以修明庶政而無果敢於折獄初九賁其趾舍車而徒趾取在下而行之義初以陽剛履正而在下故其文未能賁飾於世但能賁飾其身之所行故曰賁其趾六二成卦之主初近從之則安如乘車六四初之正應初逺從之則勞如徒步然應四正也比二非正也初守其正寧舍車而徒此賢者在下賁其行者之所為也豈茍乎哉象曰舍車而徒義弗乘也初守其剛正知二之車於義不可茍而乘也六二賁其須須鬚也隨頥而動資飾於上之物也剛柔交而後成賁二雖下卦之主然必麗於剛而後賁道可成二柔而正三剛而正皆無應與故二附麗於三以成其賁故曰賁其須象曰賁其須與上興也謂二之柔必上與三之剛同興而後可以成其賁飾之功也九三賁如濡如永貞吉剛柔雜為文當賁之時三以剛之正文二四之柔二四以柔之正文三之剛是三居剛柔之會處文明之正賁之盛者也故曰賁如二隂上下浸潤以成其賁故曰濡如賁之盛莫善於此復何為哉唯永久貞固以守之使賁道成而無弊則吉象曰永貞之吉終莫之陵也陵者加而過之之謂終莫之陵者言賁之善終無以加於此也六四賁如皤如白馬翰如匪寇婚媾剛柔相文而後成賁四應初而比三皆可以賁故曰賁如然四守其正舍三而從初為三所隔故其賁如者皤如皤白也謂其不成賁也下賁不獲乃進而上行行則五亦隂也不能相賁故馬亦白翰馬之白者禮曰殷尚白戎乘翰是上下俱不獲賁守正而甘於白者也嚮若不為九三之寇所隔則與初相親而成賁矣蓋卦唯初與四兩爻以正相應故繫辭之意相似象曰六四當位疑也匪寇婚媾終無尤也以六居四位之當也近有三逺有初亦皆當位故疑然應初正也必與初合以成其賁故終無尤也六五賁于丘園束帛戔戔吝終吉古者建國經野城依丘阪丘在外而髙園在外而近喻上九也上九居卦之外乃髙蹈丘園之士也上卦剛上而文柔故五受賁於上是五不能自賁而賁于丘園也不能自賁故無文物之盛戔戔淺小也但用淺小束帛求賁於人言其質也以君為此可吝之道然能受賁於人以成其文明之治故亦終吉象曰六五之吉有喜也能取諸人以成賁而享其吉是有喜也上九白賁無咎上以陽剛之賢為成卦之主居艮止之極當賁道之終止文之流於終終則反而質矣是知文之不可以太過以其成賁之志不成以文而成以白者也故賁道成而無弊無弊故無咎象曰白賁無咎上得志也上九成卦之主志在成賁也今不成賁以文而成以白止文之窮而無滅質之咎是得其成賁之志也故曰上得志坤下艮上剝消剝殆盡之謂五隂上進陽將剝盡是隂剝陽小人剝君子之時也伊川曰山髙起地上而反附著於地頽剝之象故為剝剝不利有攸往上九一陽成卦之主也既窮於上往欲何之況天地間利於有所往者陽也今陽既剝矣為君子者不利於有所往也明矣彖曰剝剝也柔變剛也以卦體釋卦名義言五隂剝一陽其勢將盡變乾之剛而為坤之柔有驚懼之意焉故曰剝剝也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也釋彖辭自一隂之姤浸長浸盛至剝而五陽為五隂矣其進未止也則小人道長莫極於此為君子者唯當遜言晦迹以避其害故不利於有所往況坤順艮止剝之象也觀其象亦宜順而止之蓋有消必有息有盈必有虛乃天道之常君子處剝之世可不觀剝之象而行天之道乎象曰山附於地剝上以厚下安宅文王重卦合二體以取象義多出於先天卦象之外夫子大象則純取先天卦象為之且取其義之善者用之故與本卦之象義不同今剝之象山頽剝而附於地則地之基愈厚山之趾愈安為人上者觀此象以厚培其下安固其居此於剝象之中用其善者也初六剝牀以足蔑貞凶一陽在上五隂承之有牀之象牀人所藉以安其身譬之君子上所賴以安其國者也剝則不安矣足下也蔑無也初柔邪不正處剝之時上附羣隂剝陽於下故曰剝牀以足蔑貞者蔑無正道也以至微至下之小人首變陽剛而為隂是敢於蔑無正道凶可知也象曰剝牀以足以滅下也以足言者以隂滅陽於下也六二剝牀以辨蔑貞凶辨分隔上下牀之幹也二以隂柔處剝之時固非善類然以六居二猶能以正自處且上無應於此可正可邪可凶可吉之時有以辨之使歸于正猶可為也若失此不圖使蔑無正道則不至剝膚不止故凶象曰剝牀以辨未有與也謂六五不與之為應是不與之為剝也曰以辨者其邪其正由是分歟六三剝之無咎衆隂剝陽之時三獨居剛應剛去邪而從正無咎之道也象曰剝之無咎失上下也言不從其類而獨應上九之陽是與其上下之類相失也故於處剝之道為無咎六四剝牀以膚凶五剝之主其象身也剝巳及四是剝及膚矣剝其膚則身可知也禍巳及身其凶可知象曰剝牀以膚切近災也小人之禍進至於四極矣而五切近之故凶六五貫魚以宫人寵無不利魚隂物五君位也五以隂柔處剝故隂類如貫魚羣然附之宫人宫中之人亦隂類也五雖隂柔而居中用剛上比君子若能以順而止之之道使貫魚之類受吾恩寵但如宫人之在宫中不使之用事於外以剝乎陽則在彼在已亦無不利矣故此爻獨不言剝聖人於斯之時深有望於五之君也以字著力蓋天下未嘗一日無小人顧人君處之者何如耳象曰以宫人寵終無尤也以隂寵隂尤矣若以宫人之寵處之不使之用事於外則其尤終可無也上九碩果不食君子得輿小人剝廬衆陽剝落而上九獨存為衆木凋殘而一果不食之象羣隂載一陽為君子得輿之象一陽庇五隂為小人託處於廬下之象蓋木落而碩大之果獨存則生生之意不窮以言陽無可盡之理也剝極矣若君子在上則為民所載小人居之則剝至於盡如自撤其廬而其身亦無所庇矣象曰君子得輿民所載也小人剝廬終不可用也言小人之道終不可用也爻一也君子小人取象不同然則為小人而自剝其廬亦何利哉震下坤上復剛反也陽無可盡之理剝極則復反復所以次剝也為卦一陽生於五隂之下隂極於上而陽復於下也嵗十月坤隂既極建子則一陽生是為陽在地中復陽剛君子之道也消極而復返故為復善之義復亨出入無疾朋來無咎反復其道七日來復利有攸往復以初之一陽成卦故彖專主初而言初陽復反而上進順而無阻於前故亨出者進於外入者反於內反於內而進于外動而以順行是以無害故曰出入無疾一陽動而進羣隂順而退陽雖微而為主於內故善類之來可無抑塞之咎故曰朋來無咎往而復反者天道之常故曰反復其道自一隂生至此七變而陽始復故曰七日來復是由午至子七閲月而曰日者猶詩言一之日二之日陽也陽剛復反君子道長之時故利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎以卦體卦德釋彖辭復者剛反也陽剛剝極而復反則必漸長而亨通剛既反而動以順行是以亨是以出入無疾朋來亦可以無咎也反復者往而復來乃天道也是以一隂生歷七變而陽復來於內也利有攸往者陽剛復長君子之道可行也天地之心何心哉其動而生物也其長陽善而消隂惡也其進君子而退小人也是心也在人為靜極而動為一覺之天為天理復回而善端復見也嚮於積隂用事之時幾於熄矣至此而復乃可以見故曰復其見天地之心象曰雷在地中復先王以至日閉關商旅不行后不省方雷者陽之動地中者動於下而復者動之初也陽動而初生也為甚微唯宜養之以待其定故先王至日閉關以杜其出入之門商旅不行以絶其利欲之私后不省方不使隂陽往來之錯亂皆所以養陽剛之善為三極之主也後之主三極者曾不經意為君子而全吾身之天地者其又可忽諸初九不逺復無祗悔元吉復之卦義剛反也而爻義唯取反善以為訓初九陽剛得正居動之初亦復之初動而後有失失而後有復初動而即復是不逺復也不逺而復故不扺於悔祗抵也此大善而吉之道夫子以顔子當之謂其有不善未嘗不知知之未嘗復行然則一覺之天其一陽之復歟象曰不逺之復以修身也不逺之復君子修身之道也修身之道無他唯知其不善速改以從善而巳六二休復吉不逺復者復於未然休復者復於巳然也易例陽為天理隂為人欲二以隂居隂不能無過然居中得正故知過而能改過而能改即善矣故吉按釋文休亦訓巳象曰休復之吉以下仁也二居中得正而又能順從初九克己復禮之仁人於下故知過而改改而獲吉親近仁者之益如是乎六三頻復厲無咎三質柔志剛質柔故見善不明志剛故狂躁妄動而又不中不正處動之極是復而不固者也故屢失屢復屢失故危復故無咎象曰頻復之厲義無咎也非頻復之厲頻過之厲也厲而無咎者能復則於義為無咎也六四中行獨復行於四隂之中故曰中行言於其中自行其正也自行其正不從隂類而獨與初應故曰獨復言獨能復於善也然不言吉者初陽尚微未能相與以有為也象曰中行獨復以從道也言行於羣隂之中而獨能從陽剛君子之道也六五敦復無悔五於陽復之時而以隂柔居尊有一陽剛君子而踈逺在下左右之臣又皆柔弱故不能大有為但能執其中順之德敦篤以復一巳之善而已處衆隂之中而不能用其剛雖無悔非君道也象曰敦復無悔中以自考也考成也自考者言以中順自成其巳而已上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征復之成卦陽復於初也二從初故休復而吉四應初故獨復而行五雖應柔而居中用剛故能自復於善唯三與上情不繫於初而體隂柔不中不正以相應故三頻復而厲上迷復而凶迷謂終於惡而不返遂其奸而不悛也其凶可知其凶于而身則天災人眚之交至凶于而國則師敗君凶之甚危雖事經再變至于十年之久而復遇者猶頻復之三是終於迷者也其能濟乎故終不克征為君而用人如是可不戒哉象曰迷復之凶反君道也二與四順初而不順於五與五同德相順者唯上六故五信而用之爻言用行師是用之者柔順無為之六五也爻言以其國君凶是以之者迷奸不復之上六也然則致上六之凶者豈非用之者之過歟象曰反君道言悖為君用人之道也彖曰剛反反復也此曰反道反悖也震下乾上無妄不妄也純乎天理無往非實不容妄也為卦震下乾上動以天也伊川曰動以天為無妄動以人欲則妄矣易例陽為天理隂為人欲故卦爻以純乎陽者為貴無妄元亨利貞其匪正有眚不利有攸往無妄誠也誠者天之道也人而行天之道則何往不亨故曰元亨元有大善之義且初九成卦之主剛自外來居得其正而上應乎乾是又以剛正而行天之道也故元亨無妄所以元亨者亦利於貞正其有不正者雖無邪心但動不合乎正亦妄也妄則人將尤之天亦不祐之故匪正則有眚且不利有攸往非無妄之不利於往也匪正而涉於妄則不利於往也故聖人著一其字以别之彖曰無妄剛自外來而為主於內以成卦之主釋卦名義乾之剛本在上今來於初而為主且居得其正是以剛變柔以正去妄而為主於內也故無妄動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉以卦體卦德釋彖辭震動乾健故曰動而健是動以天也故大亨而五又以剛中正應二之柔中正而成卦之主又得其正是大亨以正皆天之道也其不正則妄矣妄則逆人理故有眚故不利有攸往無妄之往以下必有錯簡無乃曰無妄之時而為此匪正之往往將何之不唯人咎之而有眚天亦不祐之行矣哉言必不可行也蓋無妄六爻三得正而三不正故戒象曰天下雷行物與無妄先王以茂對時育萬物行於天之下鼓動萬物者雷也雷以時行而不妄故能發生萬物物應之亦以時出而不妄是物之無妄視雷之無妄故曰物與無妄先王象之勉對天時以育萬物使各得其宜亦取雷行無妄之義也古茂𢡟通初九無妄往吉初以剛正變柔邪為成卦之主於內居動之初以剛應剛是純乎天而無妄者也以此道而往何所不吉於以見無妄之往何之之文錯簡明矣象曰無妄之往得志也陽善隂惡陽天理隂人欲易之大義也無妄一卦獨初九以剛居剛而應剛動合乎乾是純乎天而無妄者莫如初九所以為無妄之主所以無往而不得其志也六二不耕穫不菑畬則利有攸往二以柔中正之德上應剛中正之乾疑若盡善者而爻辭之戒乃有歉然不足之意何哉蓋陽為天理隂為人欲二雖中正然以隂居隂寧免乎多欲故聖人戒之使自絶其私意期望之心然後為無妄之正然後利於有所往也耕農作之始穫其成終也田一嵗曰菑三嵗曰畬不云者欲其無所為於前無所兾於後也夫如是則欲心不存一順乎天矣夫如是則凡有所往亦無不利矣則云者必如是而後可之辭也象曰不耕穫未富也易例以陽為富言六二未得為陽實之富故以不耕穫不菑畬戒其欲也六三無妄之災或繫之牛行人之得邑人之災三處震之極切近於乾是動即天也是無妄者也既無妄奚其災曰事固有莫之致而自至者謂禍非自我致而自我得之無妄之災也如或者繫牛於斯為行道者得之而去居邑者莫之知也而反受其災蓋以三雖居剛應剛然體實隂柔而不中不正吉凶之報隨之故發此義象曰行人得牛邑人災也三居剛應剛動即乾行是動而得也動而得猶行人之得牛然以隂處陽不中不正是居而災也居而災猶邑人之受禍皆出於無妄故曰無妄之災九四可貞無咎無妄一卦動以天者初九也安其天而不動者九四也餘雖無妄而不純矣蓋四以乾體而應陽剛是純乎天也體陽剛而用隂柔是不動于欲也此九四無妄之道可貞固守之而無咎也象曰可貞無咎固有之也言四之無妄乃其固有之天故可以貞守而無咎九五無妄之疾勿藥有喜無妄者純乎天者也一不純則妄矣易例以陽為天理以隂為人欲故陽為隂所纍者皆曰疾如損之損其疾鼎之仇有疾兊之介疾有喜之類是也今五以剛中正之乾而下應純隂之二是二之隂為五之疾也然二亦柔中正以天德言之為不純疾也以中正言之則至善疾而非疾也果疾則藥以治之疾而非疾故勿藥且君臣皆以中正之道處無妄之世豈徒勿藥且有喜也喜者中正之道及於天下也象曰無妄之藥不可試也試暫用也果疾則藥疾而非疾則何以藥為藥則妄矣故曰不可試也或問曰舊說有曰以五之無妄如有為之病者勿藥治則有喜也有曰無妄之至而猶有疾則如之何聽其自作信其自愈而已故今人以耳目聰明血氣和平而偶有疾者為無妄之疾世固有之而子不以為然何也曰震下乾上動以天者卦之體也動以天為無妄動以人欲則妄者卦之義也陽為天理隂為人欲者又易之大義也今觀九四以陽處隂聖人乃曰可貞無咎九五乾體剛健中正而聖人乃曰無妄之疾且疾則當藥而勿藥疾則無喜而有喜疾必有自喜必有因蓋謂五雖剛健中正而所應則六二之純隂也凡陽為隂所纍者例曰疾是二之隂為五之疾也二雖為五之疾然亦柔順中正以隂陽言之則為疾以中正言之則不可藥也藥則不中不正而妄矣況君臣以中正相遇豈徒勿藥且有喜以及天下故曰無妄之疾勿藥有喜此無妄六爻獨初曰往吉四曰可貞無咎餘雖無妄而不純矣然則無妄一卦聖人取隂陽之純否以見理欲之分數豈不明白歟上九無妄行有眚無攸利以九居上不正也處無妄之極復欲動而有行是過於理而入於妄也其有眚其無攸利冝矣象曰無妄之行窮之災也無妄一卦下三爻動以天為無妄上三爻安其天而不動為無妄蓋無妄而復動則是過乎正理而入於妄矣今上九以健之極而動不已寧免窮之災乎乾下艮上大畜大陽也畜止也聚也止則聚也為卦乾下艮上乾天也艮山也大莫大於天而藴畜於山之中為所畜者大以艮之止止乾之健為畜止至大之象故為大畜大畜利貞不家食吉利涉大川大畜成卦上九也上九艮之止也畜止之道利在正固正固雖艮之體而上九所居不正故曰利貞戒之也上居一卦之外故有不家之象謂有大藴畜者宜施其所畜於外以兼善天下在上者亦冝與之共天位食天祿不可使之家居而食則利澤施於人吉之道也故曰不家食吉有大藴畜者必有大設施以濟天下故曰利涉大川彖曰大畜剛健篤實輝光日新其德以卦德釋卦名義乾體剛健艮體篤實篤實則有輝光著于外剛健則能日新其德此其所以有大藴畜也故為大畜剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也以成卦之主及卦德釋彖辭剛上謂上九成卦之主也六五以柔順尚其賢而巳下之尚其德也乾陽上進而艮止之能止健也尚賢德止至健大正之道非大正者亦不能此用大畜以畜善也有大藴畜者宜施於外以及於人上之人亦當進用之不可使之自食於家此用大畜以養賢也六五君也下應乎乾是合乎天也居尊位而動合乎天則何險不濟此用大畜以濟時也畜豈徒畜哉象曰天在山中大畜君子以多識前言往行以畜其德天在山中不必實有是事而說者多強實之愚謂唐有智禪師者答李泌芥子納須彌之問曰人謂公胸藏萬卷信乎為得此象之意言其所畜者大也君子以之多識前言往行以大其藴畜謂自極判以來大而天地微而萬類其常其變其得其失莫不備見於前言往行之中君子多識之於彼深體之於此所以大其藴畜於身也初九有厲利巳卦義兼畜止畜聚而言爻則唯言畜止之義上三爻畜止乾健者下三爻為艮所止者也蓋大畜之時為成卦之主者艮之止也初健體居下必於上進艮體在上得時得位屹然止之是前有危厲也若犯之而往則必見災故利在止而不進巳止也象曰有厲利巳不犯災也若不度其時之冝犯危而行有災必矣九二輿說輹二為五所止雖居健體而處得其中故能度其時勢之冝自止而不行如車輿說去輪輹而不進是以無失象曰輿說輹中無尤也能以中道自處止而不進故無過尤也初與二乾體至剛至健四與五隂柔畜之而遂不足以進時為之也故學易者貴識時識時則識易矣九三良馬逐利艱貞曰間輿衛利有攸往曰字鄭氏作日今從之九三以剛居剛處健之極上九以剛居上處畜之極健極則必進畜極則必亨三與上同德故合志合志故不相畜而相與俱進如良馬之相追逐言進之健其勢不可止也雖然三不可恃其才之健上之與而鋭於進亦宜持艱危之心由貞正之道日間習其車輿與其兵衛戒懼而無輕躁然後利於有所往也蓋處畜之時而過剛不中故有此戒九二其輿初九其衛也象曰利有攸往上合志也所以利於有攸往者以剛健之才與上九合志而上進也六四童牛之牿元吉牿者橫木於角以防其觸即楅衡也四處艮之初得位之正畜初者也凡事畜止於初則易為力猶童牛而即加之以牿大善而吉之道也四居近臣之位上止其君之非下止天下之惡能止於未發之初亦大吉之道也象曰六四元吉有喜也上不勞而下不傷以成畜止之功是有喜也六五豶豕之牙吉豶去其勢也豕剛躁之物牙最猛利而難力制者也蓋六五質雖柔而居中用剛知天下之惡不可力止而止之得其機要若去豕之勢則牙雖存而剛強自止故吉象曰六五之吉有慶也五君也止天下之惡而得其機使不勞而天下化豈非一人之有慶乎上九何天之衢亨胡氏云天之衢亨誤加何字今從之畜極則亨理之常也小畜畜之小故極而成大畜畜之大故極而散天衢天路也謂其亨通曠逺無所阻礙也此亦畜乾之極而乾陽亨達之象象曰何天之衢道大行也伊川云天衢非常語故夫子特設問曰何謂天之衢今從之若曰何其亨達無礙如此蓋陽剛之道大行也止惡不止善乃大畜之義震下艮上頥養也上覆下承衆齒森列頥之象也為卦震下艮上下動上止外實中虛亦頥之象頥曰食物以為養故取養為義頥貞吉觀頥自求口實頥養也頥不以正則物而巳故頥之道唯正則吉初與上成卦之主也觀頥謂自內觀外泛觀人物之所養正歟不正歟言上九也自求口實謂自外觀內觀實諸已以自養者正歟不正歟言初九也所養自養皆得其正則頥之道得矣彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉釋彖辭且極言之以贊其大也頥貞吉者頥養之道得其正則吉也觀其所養者謂外觀其所養如天地養萬物聖人養賢養萬民是也觀其自養謂內觀其自養如愼言語節飲食是也所以觀者觀其得正不得正也蓋正者人物所以得生之理而養者所以全其生也徒知全其生而不知所以全其得生之理則人與物何異哉故必以養正為頥之吉時者又當其可之謂飢而食渴而飲春而生秋而成之類皆欲得其時也然則天地間頥之時豈不大哉象曰山下有雷頥君子以愼言語節飲食上止下動中含四隂頥口之象也震於山下物隨而生頥養之義也君子觀此以時止則止之艮愼其可出而不可復入之言語焉以發動有節之震節其可入而不可復出之飲食焉此皆養生之切用至近而至大者故以取象初九舍爾靈龜觀我朵頥凶龜能咽息不食靈言其明智喻初九陽剛之才可不資養於外也朵樹花之垂者喻上九垂其頥以養在下之衆隂也爾謂初九我謂上九初與上以陽剛居上下為成卦之主故爾我之頥象也初之位雖應四然其象必與上合而後成頥之功或謂初觀四朵頥非也陽實隂虛實則可以養人虛則受人之養而巳初以陽居陽才本足以養人智本足以自養然以動體急於上行不能自守見上九垂頥於上乃舍其剛正可自養之資仰而觀之以求養失巳自賤亦甚矣其凶可知象曰觀我朵頥亦不足貴也衆隂觀上以求養巳不足貴而陽剛之賢亦為之自賤已甚故曰亦不足貴言本可貴以自賤而不足貴也六二顚頥拂經于丘頥征凶頥之諸爻自上而求養於下曰顚求養而違其道曰拂六二顚而又拂者也蓋二隂虛資養於人以位則上應於五而五亦隂虛不能及二二又不能自養必求養於陽下求於初則顚而不順不可行也上求於九則又越五而往其拂正道抑又甚焉故往則凶然則奈何曰守正而不動雖不獲養於人亦不自失於已可也丘山也艮也象曰六二征凶行失類也言二與上非應且非類也況越五而行取凶必矣六三拂頥貞凶十年勿用無攸利二與五拂頥之經三拂頥之貞頥貞吉而三拂之宜其凶也蓋上九頥之主三居相應之地求養於上疑若正也而拂而凶者何也頥之象上不應三而應初是應初者頥之正而三以柔邪不正之資必欲應上以求養是拂頥之正道也故凶十年勿用者謂雖經再變而上九終不與之為應是終為上九所棄也故曰無攸利象曰十年勿用道大悖也初上相應成頥之象頥之正也三以不正拂而違之是大悖乎頥之正道故凶此所謂近而不相得則凶者也六四顚頥吉虎視耽耽其欲逐逐無咎四居大臣之位而得其正顚而下應初九剛正之賢資其養以施於人而巳免曠敗之咎故雖顚而吉且見於外如虎視之耽耽者望之專也其存諸中如虎欲之逐逐者求不已也蓋資諸人者責望不專則人不聽信取之不繼則事將困窮是四自顧不足一意順從在下之賢以成其頥養之功故吉故無咎象曰顚頥之吉上施光也四在上而得其正故能取諸人以養人使德施光明吉可知也六五拂經居貞吉不可涉大川五君也養人者也而隂虛不足非徒無以養人且反資上九之養是拂違經常之道也故曰拂經然上九有剛實之德任頥養之責六五但居守為君之正道順而從之則頥之功亦足以及人此所謂養賢以及萬民者也故曰居貞吉是道也處安平無事之時垂拱仰成以養天下可也若用之艱危險難之際則非所宜故曰不可涉大川象曰居貞之吉順以從上也其吉者但能順從上九之賢以成頥養之功也上九由頥厲吉利涉大川由豫者上下由我以得豫由頥者上下由我以得養也蓋一卦若君若臣若民皆由巳以得養為人臣而尸此重大之任必常懷危厲之心以處之則吉故曰厲吉戒之也然以陽剛之德為成卦之主在上而得時衆皆倚任何事不濟故曰利涉大川豫之也象曰由頥厲吉大有慶也由豫大有得者天下之豫歸於四也由頥大有慶者頥養之功及天下也巽下兊上大過大者過也四陽之大聚於中過乎隂也為卦巽下兊上巽木也兊澤也澤滋養木者今過而至於滅木大過之象也故為大過大過棟橈利有攸往亨小過隂之小者過於上下大過陽之大者過於中也四陽聚於中三與四又中之中有屋棟之象焉上下二隂應三與四有柱之象而皆柔弱不勝二陽之重故有棟橈之象焉四陽雖過而二五得中內巽順而外和說以此而處大過不過於剛而可以行故利有攸往故亨棟橈以象言利亨以德言也彖曰大過大者過也以卦體釋卦名義陽為大陽之大者過乎隂也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉以成卦之主及卦體卦德釋彖辭本謂初末謂上成卦之主也弱謂隂柔不勝其應之重也然剛雖過而二五得中得中則不過矣下巽而上兊為內巽順而外以和說行之故利有攸往此大過之所以亨也聖人因此象設此卦正示人以用剛不可以太過故爻義亦以剛柔適中者為善時者亦適其中當其可之謂若失之於太過則非時矣故曰大過之時大矣哉或問曰舊說皆以大過為大者過過之大大事過凡事之大過乎常者皆是與夫立非常之大事興不世之大功成絶俗之大德皆大過之事於名卦之義疑若的當而子不以為然何也曰聖人作易大要以中正之道示人其觀象繫辭之㫖果如是彖辭宜曰大亨宜曰利見大人宜曰利涉大川今皆不言獨曰利有攸往亨夫子𫝊之曰剛過而中巽而說行蓋不過曰陽為大四陽聚於中陽過乎隂也因此象立此卦正欲示人以用剛不可以太過觀卦爻之辭亦自可見恐非示人以非常不可及之事也象曰澤滅木大過君子以獨立不懼遁世無悶澤至於滅木大過之象也君子觀木在澤下可沒而不可仆之象以之進而有為則獨立不懼以之退而窮處則遁世無悶蓋天下非之而不顧舉世不見知而不悔非君子有大過人之識者不能也初六藉用白茅無咎初六處陽過之時而以隂柔居巽之下上承四陽之大過於畏愼如承物不敢措諸地必藉之以潔白之茅愼之至也是以過柔之道處過剛之世過而得中故無咎象曰藉用白茅柔在下也以柔藉剛而在下也若如諸說以大過其常為卦義則初既處下而柔巽謹畏如此寧得無咎乎九二枯楊生稊老夫得其女妻無不利楊近水之木陽氣易過者也故取以喻二與五切比初上之隂而處陽之過也陽過則枯稊根芽也生於下喻得初之隂相濟而不枯也大過諸爻以剛柔適中者為善初以柔居剛二以剛居柔而比之是剛柔適中相濟而有功者也其陽過也如楊之枯如夫之老其相濟而有功也如枯而生稊如老夫得女妻言陽雖過矣九二處之得中故無不利象曰老夫女妻過以相與也老夫而女妻雖過乎常然陽隂相與以成生育之功則無不利也九三棟橈凶求大過二棟之象當以小過飛鳥之象橫而觀之卦象如屋室焉三與四二剛聚於中棟之象也二與五二剛夾於傍衆材之象也初承四上承三柱之象也三之棟橈者大過剛巳過矣唯可濟之以柔不冝益之以剛今三以剛居剛而為棟而上以柔居柔而為之柱故不勝而取橈折之凶且九三仰而應上六是柱傑然而在上棟反偃然而在下其橈之象亦可見也象曰棟橈之凶不可以有輔也三居剛過之時既極其剛而上六之應又極其柔故不可以輔而有橈折之凶九四棟隆吉有他吝三以剛居剛猶夫棟重之重上以柔居柔而為之應乃弱之弱故不能支而三之棟橈而凶今四則以剛居柔是重而得中之棟也初又以柔居剛是不過於柔者而為之應故能勝其任而四之棟隆而吉他謂三也譬之一室三之棟既橈四之棟豈能獨隆乎若四恃其隆兼三之棟而有之則剛柔適中者又失之過而有不勝之患矣故吝象曰棟隆之吉不橈乎下也言初之正應在乎下質雖柔而位則剛是本雖弱而基猶固也故曰不橈乎下九五枯楊生華老婦得其士夫無咎無譽男未室曰士喻九五無內助也婦已衰曰老喻上六隂極而衰也華生於上言五處大過之世以剛居剛而三陽皆不為之用獨與上六比是以過極之陽昵比過極之隂以過極之隂輔助過極之陽雖相與相得而不能成功如枯楊生華無益於枯老婦士夫無益於育縱無咎亦不足稱矣何譽之有象曰枯楊生華何可久也老婦士夫亦可醜也木枯而華是速其枯何可久也老婦士夫是過乎常而為柔邪所惑亦可醜也上六過涉滅頂凶無咎上以過極之隂處陽過之時與九五九三剛之極過者相比相應而不自知其為柔之過冒然自同於剛之過者以有為涉滅木之澤躐衆陽之上是不量已力不顧危亡履險蹈禍自取滅頂之凶者也曰無咎者言無所怨咎也兊體故涉象曰過涉之凶不可咎也上本至柔以比五應三而冒為大過之事以取沒身之凶然非五與三使之也故爻辭曰無咎而小象曰不可咎言其隂暗自知不明不可咎於人也坎下坎上坎險也陷也坎地之險而止乎水故為險一陽陷於二隂之中故為陷卦本坤也乾之陽交於其中體陽而用隂外暗而內明故於象為水習坎有孚維心亨行有尚八卦皆重坎獨加一習字彖象爻凡五言之聖人豈無意歟蓋八卦中唯坎為險險不可行而聖人作易必示人以行之之道行而不習則是行險僥幸鮮不及禍矣必如生於水者習於水而後可以行坎之道故曰習坎陽實在中為中有孚心之誠也維其心之誠故可以涉險而致亨故曰有孚維心亨坎以行為尚不行則常在險中行則無險不濟故曰行有尚卦之所言皆處坎之道也彖曰習坎重險也釋卦名義上下皆坎是為重險重險者險之又險其可不習以處之乎水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉以成卦之主及卦象卦德釋彖辭且極言其時用之大也陽動於中故流陷而未出故不盈流而盈則出險矣流而不盈是以為坎水愈險則愈行故曰行險坎中實水就下皆信之義故曰不失其信二五以剛居中為中心誠實可以致亨故曰維心亨不行則險何以濟故以行為尚是行則必有功也故曰往有功有險之時不可不濟無險之用不可不設故王公見天險之不可升也設為禮法使卑髙貴賤之分截不可踰見地險之不可無也設為城池使藩維屏翰之備嚴不可犯此皆行坎之道以處坎之時用坎之險者也然則坎之時之用豈不大哉王公指五與二成卦之主也象曰水洊至習坎君子以常德行習教事水至而又至為水洊至習坎之象也君子以之治已則必常其德行如源泉混混不舍晝夜以之治人則必習其教事如江海浸潤有加無已不可使功力之閒斷也初六習坎入于坎窞凶初體柔而用剛居重坎之下重險在前無濟險之才失處坎之道而妄動動而入于坎窞之中其陷益深故凶窞坎中之陷穴也象曰習坎入坎失道凶也失處險之道而益入于坎窞之中凶可知也九二坎有險求小得二處坎險之時陷於二隂之中是有險也然剛而得中剛則足以自濟中則動不失宜故可以求小得蓋險難無立脫之理由是以漸求濟險之術可也象曰求小得未出中也以剛中之才處此僅可小濟而不可以大得者以未出乎坎險之中也六三來之坎坎險且枕入于坎窞勿用下卦之險已終上卦之險又至是退而來巳險進而之愈險進退皆險則寧於可止之地而暫息焉且者聊爾之辭枕者息而未安之義能如此雖未離乎險亦不至深入于坎窞之中也蓋三質柔志剛不中不正故戒其進而入則陷益深為不可用勿者止之之辭也象曰來之坎坎終無功也險者人所欲出六三幸巳出險可以暫息若可息不息而復有進焉則入于坎窞之中愈困窮矣何功之有故戒以勿用謂不可以前險之出而欲圖功於終也六四樽酒簋二用缶納約自牖終無咎中有孚者坎之德不失信者坎之道故處險難者唯以誠實為貴坎之諸爻唯四與五隂陽得正故取兩爻明君臣處險之善道以為訓樽酒簋二而用缶質實之至也言相與處險難者尚質實不尚虛華也納約進結於君之謂牖取明之地也言上下情意或有未孚亦冝從其心之通明不蔽者以誠結之期於濟險而巳能如是則雖遇險難而終於無咎也象曰樽酒簋二剛柔際也五剛四柔各得其正故能以質實之道相交相接以濟險也九五坎不盈祇既平無咎盈則出險平則無險今不盈則不平不平則未出乎險也五雖未出乎險然以剛中正居尊位終有險平之望況險將終矣其時其才亦可出矣祇抵也必抵於既平盡濟天下以出於險然後無咎象曰坎不盈中未大也言以剛中正之德猶陷於險而未能光大亦足以見八卦中險最難處而坎之不可以不習也上六繫用徽纆置于叢棘三歲不得凶此當出險之時既無出險之才又無出險之援展轉不得出之象也上六以柔居柔不能自濟比五應三而三與五亦皆未能出乎險故其身如纒以徽纆置之叢棘之中至於三嵗而終不得出謂三變而遇成卦之二亦陷於坎窞之中是終於不得出也其凶可知象曰上六失道凶三歲也失道者展轉三歲而終不得出險之道也離下離上離麗也明也為卦一隂麗於二陽之間故為麗中虛而陽散於外故為明卦本乾也坤之隂交於中體隂而用陽外明而內暗故於象為火火體虛麗物而明又為日亦虛明之象離利貞亨畜牝牛吉離麗也凡物莫不各有所麗天地間無無麗之物在人當審其所麗麗得其正則亨故曰利貞亨離之成卦二與五也皆以柔順麗乎剛牛柔順之物牝牛柔順之柔順者畜牝牛謂離體明而用剛明過則察剛過則暴必畜養之以柔順之德則吉也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也以成卦之主及卦德釋卦名義并釋彖辭離麗也萬物皆有所麗日月有象則麗乎天百榖草木有形則麗乎土明與柔無形無象然亦必有所麗而後可行故明必麗乎正不正則偏用其明何以化天下柔必麗乎中正不中正則為柔邪何以能亨此二五柔明而麗乎中正而為成卦之主故能亨故能化天下也牝牛柔順之物畜之吉者謂離體明而用剛易失之過必養之以柔順之德則吉此又二五以柔順而麗上下之剛而為成卦之主所以吉也象曰明兩作離大人以繼明照于四方明兩作為大明相繼而出也明而有繼所以為重明之離大人以之大則世繼其明次則任賢以繼其明於事則以明相繼故能臨照四方而無遺也初九履錯然敬之無咎離者隂麗乎陽非陽麗乎隂也初以陽居下處得其正六二麗之冝也四居相應之地亦欲麗之是上之履我者交錯而來也二中正四同德所謂地醜德齊初卑而在下莫知適從唯有盡吾用下敬上之心敬之而已故無咎履詩云履我即兮之履踐其跡以相從也處離麗之世以下麗上之道當如是夫象曰履錯之敬以辟咎也履我者交錯而來吾皆敬之所以辟禍咎也六二黃離元吉離之全卦聖人以明兩作取象離之諸爻聖人以重明繼明取義故以九三為日昃之離九三既為日之昃則六二乃日之中也故曰黃離黃中色謂二以正中之德處離明之世而動合乎正中之道故元吉此離之盛也象曰黃離元吉得中道也六二中且正而止曰得中道者離以中為重言中則正在其中矣九三日昃之離不鼓缶而歌則大耋之嗟凶缶者質素之器耋者黧耋之色三居下體之終前明巳盡後明將繼之時故於離為日之昃以理言之日中則昃物盛則衰常事也三乃以其過明之體用其不中之剛不能泰然鼓缶而歌而且怛然為大耋之嗟謂不能安常守素以自樂而乃嘆老悲衰將何益哉徒取凶而已象曰日昃之離何可久也日昃之明其能久乎明者知其然必求以繼之其身心則安常處順而巳憂嗟者剛明之過也九四突如句其來如焚如死如棄如突如絶句聖人於五如之中特著一其字辭意蓋可見易例反於內曰來謂四以不中不正之剛而處下體方革之際是繼明而不正者也既不正又剛強故其進也暴突如言其進之暴也然進而往則六五明順得中不可以犯退而來則遇二之中正初與三之剛正皆疾其所為自下炎上而焚之焚之不足而誅死之而棄擲之言其疾之之甚其取禍已極凶不待言也或問曰小象以突如其來如為句而子於突如絶句可乎曰小象合兩句作一句之例甚多如包荒得尚于中行有孚惕出不節之嗟往厲必戒飲酒濡首之類皆是此言突如又言其來如方見其進退無所容也象曰突如其來如無所容也既著其突如犯上之遇又言其來如取禍之酷然後見其進退皆無所容其身也六五出涕沱若戚嗟若吉明兩作為離故六爻以繼明取義離之一卦唯四與上既剛強而又不中不正五當繼明之始不幸而麗於剛強不正者之閒為所陵犯故其憂懼至於沱然之涕嗟然之戚發於聲音顔色勢亦危矣幸其明而居剛能知憂懼故終能正其天位而獲吉也象曰六五之吉離王公也二與五成離之主也昔也為柔中之二重明而麗乎下公也今也居剛中之五繼明而麗乎上王也曰王曰公者其位號未定之時故不得不憂不懼或問曰舊說皆曰王與公皆尊而在上者之稱故不曰所麗得王公之正位則曰天下皆附麗於王公而子之說獨不然何也曰此諸賢疑繫辭而不詳考之之過也繫辭曰初辭擬之卒成之終者聖人繫爻辭之序也離之一卦聖人分明曰明兩作曰重明曰繼明故於九三即曰日昃曰大耋則上卦是繼明分曉信如諸說則六五乃麗天之日以文明之德得中用剛而居尊與其他柔居尊位者不同下有中正之二又有剛正之初與三可謂多助之世縱有強暴侵陵何至戚嗟涕沱邪蓋繼明之初位號未定遭此強暴不得不憂不懼故曰六五之吉離王公也至上九則王位已正然後曰王用出征聖人旨意豈不明白歟上九王用出征有嘉折首獲匪其醜無咎初九其日出之光六二其日之中九三則日之昃矣九四繼明之不正者六五繼明之正中而知懼者也至上則王之位已定矣故稱王王位既定則用之以出征者王命也故曰王用出征斯時也下雖附麗而有不附麗者焉上處剛明之極明則能照能照則足以察邪惡剛則能斷能斷則足以行刑威故王位既正即用之以征討其不附麗者以正定其邦家是以有嘉美之功然亦不可過於嚴察但當折取其首惡而所獲非及其醜類則庶乎威振而刑不濫罪得而民心服無咎之道也象曰王用出征以正邦也謂王位既正可以出征正其不正以正定其邦國也茍非繼明之始邦何待正乎大易緝說卷五
