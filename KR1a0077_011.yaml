body:
  text: 東魯韋前之太極一畫誰牽北巖篐外之遺編三分猶剩造化之初有易神明之用在人目孰徹於大方喙並馳於各牖蘭澧隱者卭蜀巽卿以手輯一家之言而髓探三聖之旨天機獨露揭之自本自根日用互明穀以見仁見知象數之源畢具性命之理全彰勘辨諸方拈提最義習齋田氏居延漠英吻合針鋒發光毫楮研朱點勘月標鶴洞之元副墨刊傳冰釋鵝湖之辨矧運值同文之世冝家有嚮道之書廬􅨦於此同參皋比為之勇撤龍圖現瑞豈但拓光芒滎洛之間象度截流于以贊聲教跋提之外明明指喻的的心宗延祐三年十一月望日前進士長沙李琳書
