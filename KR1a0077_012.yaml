body:
  text: 續刋大易緝說始末澤昨於大德十年任澧州路推官咨呈本路節文云竊謂天地以道託諸聖賢聖賢以道載諸經書所以紹天明扶世教立民命開太平故自孔聖刪定繫作之後在上者常以表章自任在下者多以訓注名家於是聖經旨義愈闡愈明聖經功用愈久愈著今觀世所謂九經者詩書二禮孝經語孟猶是聖賢雜著之書獨易與春秋純乎聖人之筆而易又出於天地之文故易最精微難得明白自子夏以來說之見於世者何啻數百家不為不多然河圗洛書之象數易所本也而未免錯亂先天後天之卦象易所祖也而未免缺疑學者迷惑終未釋然至如春秋一經按藝文志皆謂左氏受經於仲尼公穀受經於子夏既已訛矣後儒之說但祖三傳如釋例長厯集解調人繁露義函之類聞于世者亦不啻百餘家不為不多然元年春王正月之義終無確論雖胡氏有夏時冠周月之說陽氏有改歲不改正之論而學者質以古今之正義終不能無疑是皆守三傳之失昧作經之旨故也卑職誤叨恩命來此推刑訪得蜀儒王申子所解大易緝說春秋類傳二書公退之暇詳玩紬繹其大易緝說分緯河圖以溯伏羲畫卦之由錯綜河洛以定文王位卦之次又參上繫下繫以覆聖人設卦繫辭之旨又主成卦之爻以發聖人立象取義之因如貫通爻義如章分彖傳如訂晦菴十圖九書之旨辨濓溪無極太極之說無一毫之穿鑿有理致之自然其春秋類傳則曰有貶無褒乃夫子一部法書出乎周公之禮則入乎夫子之法撥亂反正無罪不書其志封疆者所以著侵奪之罪也其志世次者所以著篡弒之罪也志禮樂志正朔者著僭竊無王之罪也志官職志兵刑者著違制害民之罪也謂侯國不合自稱元年故書元年謂魯不合以子月為春故書春謂舉世不知有王故書王謂子月非正月故書正發此義例類成一書自我作古字字精當皆發先賢之未發深得聖人之本旨可謂窮到極處而不茍同者也詢之學校諸儒皆曰王申子前卭州兩請進士寓居慈利州天門山隱處幽深無心求仕垂三十年始成此書觀其覃思之精用力之勤誠可嘉尚古先有云六經氣數常與世運相為盛衰一治則經一明洪惟聖朝混一區宇偃武修文上駕唐虞下轢漢晉如此二經明於今日此逮聖朝氣運有以扶之使聖經復日月於混一之世也卑職再三思之與其使王申子私授門人曷若進呈朝省廣布天下為此將緝說類傳粧禙咨去如蒙繳申省臺送翰林集賢二院考正而表章之于以決萬世經傳之疑于以昭聖代文明之治聖經幸甚世教幸甚本路轉申湖廣等處行中書省并牒呈江南湖北道肅政亷訪司照詳去後當年十一月回准亷訪司牒該未經儒學提舉司考校是否相應本路移准湖廣等處儒學提舉司牒行據南陽書院王山長申嘗觀前賢解釋經書最難而解釋易與春秋之經為尤難何者詩書禮樂吾夫子刪之序之定之而已至於易則明體用一源顯微無間之理春秋則著王道權衡制治模範之經前輩謂二書為夫子之文章此非精於學識者不能發明故自昔以來注釋者何止數百家而猶未能盡今觀王申子所注易書如先後天二圖真得圖書經緯之要卦象爻辭真能折衷諸儒之說簡易明白所注春秋如元年春王正月等處出乎周公之禮則入乎夫子之法有貶無褒無罪不書等議論誠有功於聖治有補於後學而非茍然作者比若蒙轉申庶不負皓首窮經之志使後輩亦可聞風而興起矣備此牒呈去後承准廉訪司牒未經儒學提舉正官考校行據儒學提舉司狀申提舉許承事考較得王申子所著大易緝說得千百載經緯圖書之祕要發四聖人設卦繫爻之本旨其著春秋類傳破諸儒褒貶之泛說探聖人筆削之本心用力良勤考索有據誠有功於聖經有補於世教有益於後學與其他别箋數語經營入仕者不同得此移准常澧分司牒該考校得即與儒學提舉許承事較勘相同本路於至大元年三月備申湖廣行省移咨都省判送禮部行移翰林國史院送據修撰鄧從任呈議得王申子所著二經如易之十圗九書春秋之有貶無褒皆推本先儒之說紬繹錯綜附以己見言辭條達㫖意詳明誠皓首窮經之士非末學剽切以干仕進者比使廣其傳後學不為無補本院議得本人所著二書考據精確著述詳明傳之于世誠為有益備此回關禮部議得若令本處儒學印造庶廣其傳王申子皓首窮經不求聞達其志可尚如蒙移咨本省於山長學正內委用不負勤勞激勸其餘本部於至大四年三月具呈都省照詳移咨湖廣行省於山長學正內類選皇慶二年四月蒙行省劄付擬王申子充武昌路南陽書院山長王申子守志不出隱處山林反覆沉潛二書愈見明白澤嚮已刋類傳於澧城見者稱善兹念緝說尤不可無爰醵同志續鋟諸梓以與學者共峕延祐丙辰日長至承直郎前常德路總管府推官居延田澤拜首謹書
