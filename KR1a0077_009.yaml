body:
  text: 大易緝説卷九元王申子撰繫辭上天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼔之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣繫辭上下夫子之辭而門人記之也故有子曰字此節言未畫之前易之理在天地伏羲氏仰觀俯察得之於心天不閟道龍馬負圖而出于河伏羲之心黙與之契遂因之以畫八卦即天之尊地之卑以見乾坤之義乾坤者易中純陽純隂之卦也乾坤定而八卦成八卦成而六十四卦亦自此而生矣又即天地之卑高以見卦爻之貴賤故卑高陳而貴賤位矣即隂陽之動靜以見卦爻之剛柔故動靜有常而剛柔斷矣方者事情之所嚮物者品彚之不齊也即天地間事物之分合善惡之相形而卦爻吉凶之變生矣即天地間日月星辰變化之象山川草木變化之形而卦爻隂變而陽陽化而隂之道見矣此自然之易也摩交錯也盪推盪也卦之初也一隂一陽兩畫而已兩相摩而成四四相摩而成八謂以剛摩柔則爲震爲坎爲艮以柔摩剛則爲巽爲離爲兊而成八卦八卦又相盪而成六十四此易卦之變化也雷霆風雨日月寒暑此變化而成象者也乾交於坤而成男坤交於乾而成女此變化而成形者也此承上文變化而言也易始於乾坤乾又坤之始故爲大始始以氣言乾天也知猶知州縣之知主也天主於始物而已非生也生而成之者地也成以形言故曰乾知大始坤作成物然乾之所以始萬物者因物之自然健而動故易故其知者以易而知坤之所以成萬物者因乾之自然順而靜故簡故其能者以簡而能易者不難之謂簡者不繁之謂惟其易而不難也故人亦易知惟其簡而不繁也故人亦易從此則聖人即乾坤易簡之道以用於天下事物之間莫不易知而易從也惟其易知也故天下之人附而相親惟其易從也故天下之事順而有功有親者人皆樂其易也易則可常而久有功者事皆成於簡也簡則可充而大法乾坤之易簡至於可久可大則其德業過人遠矣德足乎已業著於外此又聖人法乾坤之易簡而得天下自然之理天下自然之理既得則可以與天地參而成位乎天地之中矣賢賢於堯舜之賢非賢者過之之謂右第一節言未畫之前易之理在天地既畫之後天地之理在乎易聖人又用易以參賛乎天地也聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利象者有事物之理可見无事物之形可執者也易之初也有象而未有卦及八卦既設而象寓焉象者一竒一耦似像乎事物之形者也及八重而六十四聖人又觀是卦有如是之象則繫之以如是之辭蓋卦以象而立象又以辭而見也明吉凶者謂有是象而吉凶之理已具繫之辭而吉凶之象始明也如隂陽竒耦相交相錯順則吉逆則凶當則吉否則凶因其順逆當否而繫之辭吉凶明矣其卦爻之中一剛一柔又相推盪或隂變爲陽或陽化爲隂則吉凶又起於剛柔之變化矣吉凶悔吝者易之辭也失得憂虞者事之變也是故得則其辭吉失則其辭凶事理可憂可虞則其辭有悔有吝失得憂虞雖未見觀吉凶悔吝之象則可知矣蓋吉凶者失得之象也悔吝者憂虞之象也凡此者易所以明人道而天地之道存焉變者自无而有如隂極則陽生退極而進之象也化者自有而无如陽極則隂生進極而退之象也是變化者進退之象也剛動而明昱乎晝也柔靜而昏昱乎夜也是剛柔者晝夜之象也凡此者易所以明天地之道而人道存焉三極者天地人之至理三才各一極也卦之始也初爲地中爲人上爲天及其既重則初二爲地三四爲人五上爲天是故六爻之象一動而三極之道皆著見於易中矣動即變化交錯之謂也序者六位時成之次序時與事當然之所也用易君子所居而安者得其序也所樂而玩者有其辭也故平居无事觀卦爻之象而玩其辭則可以察吉凶悔吝之故及動而應事觀卦爻而玩其占則可以決吉凶悔吝之幾故有不動動无不吉雖天祐之亦用易之功也右第二節言聖人設卦觀象繫辭以明吉凶悔吝使用易者觀玩之以避凶趨吉也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之彖者總言一卦事理已具之全體也故曰象象者如物有象全具而未成形也爻者錯言六位剛柔進退之无常也故曰變變者言剛柔變易而不可爲典要也其凶其吉所以言其事之失得也悔未純乎吉吝未純乎凶如物之有疵瑕也无咎本有咎者能以善而補其過故咎得无也謂諸卦彖辭爻辭所著吉凶悔吝无咎者皆以此也列分也陽貴隂賤上貴下賤亦有貴而无位有位而在下者故曰列貴賤者存乎位位者六爻之位也齊均也陽大隂小陽卦多隂則陽爲之主隂卦多陽則隂爲之主雖小大不齊而得時爲主則均也故曰齊小大者存乎卦卦者全卦之體也辯明也辯一卦一爻之吉凶者辭也故曰辯吉凶者存乎辭介者善惡已動而未形之幾也於此而憂之則不至悔吝矣故曰憂悔吝者存乎介震動也知悔則有以動其補過之心故可以无咎故曰震无咎者存乎悔是以聖人於隂陽小大之卦繫之以危險安易之辭各不同者所以指人所之使去危而就安趨吉而避凶也右第三節釋卦辭爻辭之通例以示人也易與天地準故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣爲物游魂爲變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體易之作也法乎天地及既作也與天地準準者具其道而與之齊也故易能彌綸天地之道彌者周遍之意極其體統之大也綸者經理之意盡其節日之詳也天地之道者隂陽進退消息盈虚之理也此言易道之大也故聖人仰觀日月星辰之所以運行俯察山川草木之所以形著而知形象則明其理則幽之故故者其事理之已然也又推原氣形之所始反而求氣形之所終故知陽伸而生隂屈而死之説説者其事理之明著也隂陽至精之氣聚而成形則爲物散而无形則爲魂而變矣即此可以知鬼神造化之情狀情者可以意而求狀者可以理而測也此言聖人作易本乎天地天地之道不出乎隂陽之進退屈伸也故易與天地相似而彼此无一毫之相違相戻也蓋易也其知足以周徧乎萬物其道足以輔相於天下雖變通无窮而不過乎中正雖旁行天下而不流於邪僻使人樂其天而順其理知其命而安其分故无不足之憂故曰樂天知命故不憂使人隨所處而安其居篤所性而推其仁故能不忘其濟物之心故曰安土敦乎仁故能愛蓋易之道知仁而已極而範圍裁制天地之運化而无或過委曲成就萬物之生息而无所遺晝夜者即幽明生死鬼神之謂也通而知之則消息盈虚之理又在易而不在天地矣此易之神妙无有方所之可指易之變化无有形體之可執也右第四節言易道之大聖人用之亦極其大也一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神隂陽未分爲太極太極既分爲隂陽故天地一隂一陽而已而所以爲一隂一陽者道也故曰一隂一陽之謂道道安在哉即易是也易者生生不窮之理也故繼此道者謂之善善即元也成之在人謂之性性則各具是道也善自道而出道由性而成然性之而能成之者聖人也自非聖人有性之而得其一二各隨所見者仁者謂之仁知者謂之知是也有得之而行不著習不察者百姓日用而不知者是也此君子之道所以全之者鮮也然天地生生不窮之至理著於萬物其跡可見者顯諸仁也天地生生不窮之妙用運於一元无跡可見者藏諸用也此天地所以鼔動萬物而變化无窮也然物有不能遂其生者天地則不顧聖人則憂一物之不得其所是天地不與聖人同其憂蓋天地无心聖人則有心故也此易之所以作也天地雖不與聖人同其憂而德業盛大則一萬物盈天地天地之富有萬物備於身非聖人之富有乎造化生生而无窮天地之日新易道變通而无窮非聖人之日新乎故聖人德業與天地同其盛大也何以能然聖人用易而已易者生生不窮之理也是理也具於太極未判之先散於天地有形之後著於易而用於聖人故易之初於无象而首成有象者乾也法乎乾而效之者坤也乾坤一隂陽易之象也隂陽一奇耦易之數也因其象推極其數以知方來者占也窮則必變變則通以應无窮者事也此隂陽之道可測而知者至於隂陽之妙用不可測而知者其易之神乎故曰隂陽不測之謂神右第五節言道不外乎隂陽而隂陽之理則備於易至其所以然則又不可窺測而未嘗倚於隂陽也夫易廣矣大矣以言乎遠則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德乾坤易之藴也而廣大生焉大則无外故於乾曰大廣則有方故於坤曰廣合乾與坤而言則所謂廣矣大矣云者易也故曰易廣矣大矣以言乎遠則不禦謂易道散於天地之間无往不可行也以言乎邇則靜而正謂易道寓於人心之中至正而可守也是道也无物不有无時不然故天地之間備矣專專一也直直遂也乾陽也靜則專一動則直遂蓋其體健其用无所不周是以大生焉翕斂聚也闢發逹也坤隂也靜則翕聚動則發達蓋其體順其用无所不至是以廣生焉然乾坤廣大未易見也配以天地而言則廣大可知矣乾坤之變通未易知也配以四時而言則變通可見矣隂陽往來之義配以日月之代明則可見矣中庸至德愚夫愚婦與知與能即易知易從之道故乾坤易簡之善配以中庸之至德而言則易簡亦可見矣右第六節言求易廣大之道當求之乾坤子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門上言廣矣大矣此復言至矣皆以言易之道无以加也易之道何道也在天曰隂陽在地曰柔剛在人曰仁義之道也有生之所固有聖人唯能盡之故德崇業廣聖人德業所以崇廣又有其由以言其知則高明高明所以效乎天也以言其禮則卑遜卑遜所以法乎地也崇也卑也非聖人强爲之蓋天地設位卑高以陳而易之道已行乎其中聖人之知與禮亦不過取易而用之耳是易之道具於有生之初而固存者也固存者性也存其固存者成其性也能成其性則天下道義皆從此出矣故曰道義之門右第七節言聖人用易之道以成其德業聖人有以見天下之賾而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化聖人之説卦繫爻也有以見天下之賾賾者理之含畜未露幽深難見者也聖人有以見之於是遠取諸物近取諸身擬其形容象其物冝立爲之象以示人擬猶比也象猶像也如擬乾健之形容而象以馬擬坤順之形容而象以牛之類取物之冝以此而像彼也既有此象則天下之賾人皆可得而見矣又有以見天下之動動者事之變化无窮至不一者也聖人有以見之於是觀其要而有綱之㑹變而无窮之通行其典之有常焉行其禮之有節焉而繫之以辭謂如是而吉如是而凶將以處其事之失得而斷其報之吉凶故即諸爻以示人既有此爻則天下之動人皆可得而見矣故其言天下之至賾也若虚若誣然皆理之所有不可厭而惡也其言天下之至動也若參若錯然皆隱然有緒不可紛而亂也是以聖人於一言一動之間必擬之得其當而後言議之得其冝而後動其所以擬議而不敢忽者所以成其變化也變化謂隂陽進退消息之時義不可爲典要者即易也右第八節賛聖人設卦象繫爻辭之極功也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子所以動天地也可不慎乎釋中孚九二爻義專以言行爲辭者以兊體而處中孚故也同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭釋同人九五爻義言私昵六二而不能大同故不以君道言止言二人同心不可間隔之義初六藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以往其无所失矣釋大過初六爻義見本卦下勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也釋謙九三爻義見本卦下亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也釋乾上九爻義見本卦下不出户庭无咎子曰亂之所生也則言語以爲階君不密則失臣臣不密則失身幾事不密則害成是以君子愼密而不出也釋節初九爻義此以慎密言語爲辭者兊體故也子曰作易者其知盜乎易曰負且乗致宼至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乗致宼至盜之招也釋解六三爻義見本卦下右第九節以上文言聖人設卦象繫爻辭使人擬議以用易故此舉七卦中爻義敎人以擬議之法蓋所謂擬議者隨所居之位及所遇之時以其辭觀其象以其象求其意以其意處其事變而通之神而明之然後爲得也大衍之數五十其用四十有九分而爲二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與佑神矣子曰知變化之道者其知神之所爲乎晦庵更次此節首以天一至地十次以天數五至行鬼神也次以大衍之數五十至再扐而後掛然後次以乾之䇿至其知神之所爲乎文理雖順今且依本文釋之大衍之數其㫖有七已詳著於衍數圖下然數之本一二三四五而已謂天地眞元之數不出此五者此五者小衍之爲十五大衍之爲五十故曰大衍之數五十其用四十有九者虚其一也蓋天數地數皆生於一一者太極也故揲者虚其一分而二以象兩儀掛其一以象三才四揲之以象四時歸其餘於扐以象閏謂一掛一揲一扐以象三歲一閏又再揲再扐通前凡五以象五歲再閏蓋閏之積以周天三百六十五度四分度之一而日止日行一度有奇朞三百六旬以成數約言是歲餘六度朔又虚其六是歲餘十二度積三歲而餘三十六度積五歲而餘六十度故三歲一閏五歲再閏此天道所以運行而无窮易一歸餘而易之道亦與天地同其變化而无窮也天一至地十二十字合在天數五上簡編失其次此即五十有五河圖數也天數五者一三五七九竒也積之爲二十有五地數五者二四六八十耦也積之爲三十天數地數五位各有合而生五行其隂陽之一生一成即一變一化也造化功用實行乎其間故曰成變化而行鬼神乾老陽九也揲過而得四者九四因九是爲三十六六因三十六是爲二百一十有六此乾一卦之䇿也坤老隂六也揲過而得四者六四因六是爲二十四六因二十四是爲百四十有四此坤一卦之䇿也總乾坤二卦之䇿凡三百有六十當期之日期周歲也舉成數耳二篇謂上下經陽爻一百九十二乾之屬也以三十六因之得六千九百一十二隂爻一百九十二坤之屬也以二十四因之得四千六百零八合之是萬有一千五百二十也少陽七也以四七二十八因之少隂八也以四八三十二因之二篇亦萬有一千五百二十也以象萬物之數此三才之内大而天地微而萬彚所不能逃者也四營者分二掛一揲四歸竒也易者變也成易成一變也三變成爻十有八變而成卦由八卦而言則爲小成引而伸之觸類而長之而成六十四卦三百八十四爻盡天地古今事物之理以極天下之情僞以定天下之吉凶易之能事於是畢矣此其道甚顯而其德行甚神也其顯也可與酬酢乎事物之變其神也可與佐佑乎造化之功故夫子賛之曰知變化之道者其知神之所爲乎右第十節言聖人即天地自然之象數以爲揲蓍求卦之法示人以用易之神也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有爲也將有行也問焉而以言其受命也如響无有遠近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无爲也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也易者无形之聖人聖人者有形之易故指易以言聖人亦可指聖人以言易亦可故曰易有聖人之道尚者尊之貴之之謂辭者所以明易之理或吉或凶或悔或吝之不同故以言者尚之則言无不當矣變者所以通易之用或凶變而吉或吉變而凶故以動者尚之則動无不冝矣象者像其物宜也故制器者尚之則可以盡制物之智占者極數知來也故卜筮者尚之則可以窮先知之神四者易之道亦聖人之道也是以君子將有所爲也將有所行也以蓍問易求其卦爻之辭而以發言而以處事則易受人之命而告之其速也如響應聲雖遠而六合之外近而目睫之間幽如鬼神深如淵海皆有以燭其未然之朕兆決其未來之吉凶此非至精至一者孰能與此此尚辭尚占之事也參音三伍以變者參音叅三爲參音三伍五爲五也蓋天地之數立於三而成於五也乾之畫三坤參音叅之而爲巽離兊坤之畫三乾參之而爲震坎艮是參音㕘其參音三而成八卦八卦又各參音叅之而成六十四此參音三以變也天一地六伍而生水地二天七伍而生火天三地八伍而生木地四天九伍而生金天五地十伍而生土此伍以變也錯者交而互之一左一右之謂綜者總而挈之一低一昂之謂錯綜以通其隂陽之變遂成天地剛柔相雜之文錯綜以極其竒耦之數遂定天下五行生成之象非天下之知變通不窮者孰能與於此此尚變尚象之事也然精則猶有思也變則猶有爲也易則无思而无不思无爲而无不爲故其不動而寂然也天下事物吉凶悔吝之理已具於中及其有感而動也天下事物吉凶悔吝之故无不通者此則易之神也故曰非天下之至神孰能與於此深者理之奥能極深則先知先覺而有以通天下之志矣幾者事之微能研幾則審是擇非而有以成天下之務矣合深與幾而至於利用出入而不知其所以然而然則神矣此其所以不疾而速不行而至也此易之道亦聖人之道故曰易有聖人之道四焉者此之謂也右第十一節掲辭象變占四者示人以求易而造其神也天一地二天三地四天五地六天七地八天九地十此合在天數五地數五上簡編失其次也一二三四五天地之數止此五者六七八九十各因五而得數以配上五者而已二五配合遂成水火木金土之象即河圖數也然天一而帝乃出於震之三不出於坎之一者何也蓋天地之數皆生於一是一不專爲天之數故天必包二而用三天用三者亦以天之象圓圓者徑一圍三竒圓用全故也地即用二者地不能包乎天又以地之體方方者徑一圍四耦方用半故也用半者上與左非隂也是以天之體常動地之體常靜陽之中有隂隂之中有陽獨陽不生獨隂不成皆本於此今析此十數言之一太極也天地之數皆生於一也二地之耦也三天之奇也五三二之合天地之數皆中於五也六三耦老隂數也七二耦一竒少陽數也八二竒一耦少隂數也九三奇老陽數也十天五地五天地之數皆終於十也然則十數之中四獨无所當何也蓋以體數言天三而虚其一地二而虚其二以用數言一四二三積之則十已具河圖全數故用一則二三四之九在矣用二則一三四之八在矣用三則一二四之七在矣用四則一二三之六在矣是四乃天地體用之全數也故二篇之䇿萬有一千五百二十必以四四揲之而後十數皆得其用是以由四而往五五天數也六六乾之䇿也七七大衍之用數也八八卦數也九九𤣥數也厥用无不周矣愚故曰三才之數莫備於河圖伏羲因而畫之此易之所以爲易也右第十二節言易中象數所由生也子曰夫易何爲者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫昔者聖人之作易也果何爲乎是必有以用之也天地間有形者皆物也有爲者皆務也所以開有物之始成有務之終者易也何也包括理氣象數以生生化化於无窮者易之道也故曰冒天下之道如斯而已故聖人以之通天下隱而未發之志定天下爲而未成之業斷天下然而未然之疑其興蓍也七七而四十九唯竒故圓其設卦也八八而六十四唯耦故方蓍則變化莫測故圓而神卦則一事有一理存故方以知而又交錯剛柔以成六爻之義盡其變易之道以貢於人貢獻也然則蓍卦爻未立之先天下之志有未通業有未定疑有未斷也聖人未免有憂世之心蓍卦爻既立之後聖人憂世之心可以滌除而泯智慮於无思无爲之表故曰以此洗心退藏於密洗者潔然而无一塵之累也密者寂然而人莫能窺之也至是則與民同其患者不在聖人而在易之吉凶矣故曰吉凶與民同患蓋蓍之神有以知未來之吉凶卦之知有以藏已往之吉凶也孰能使之然哉其古之聰明睿知神武不殺之聖人爲之也聰明睿知則能燭理神武則能明斷不殺則心乎愛物所以能爲天下後世致其憂也是以上而明於天之道下而察於民之故以筮則興蓍以卜則興龜蓍龜神物也故民之用有以開其先是興神物以前民用也然聖人豈但用諸民而已哉亦用之於身齋以去其不一之思戒以防其不測之變以神明其德神明其德即所以神明夫易之德也右第十三節言聖人爲天下後世慮故作易以爲天下後世用也是故闔戸謂之坤闢戸謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神乾坤易之門謂其收歛萬物而闔者坤之隂也其發生萬物而闢者乾之陽也隂陽一闔一闢而變生焉變變不窮則謂之通故謂之易聖人因其變通即其象器制而用之以為天下法皆出於自然故道常行乎法之中粗而耒耜佃漁精而禮樂政敎隨時之冝使民用之出入其中而不知其所以然而然至此則聖人之神其易之神也右第十四節極言聖人用易之神接上文開物成務之意是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以爲天下利莫大乎聖人探賾索隐鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也此易字非書也生生不窮之理也蓋未有太極之先已有個生生不窮之至理即濓溪所謂无極也无極而太極即所謂有理而後有氣氣即隂陽隂陽未分爲太極故曰易有太極蓋未分時隂陽渾然爲一而天地萬物盡无以出於此亦无以加於此故曰太極太極渾然之體既具則不能不動纔動便是陽動極而靜纔靜便是隂分隂分陽兩儀立焉故曰是生兩儀兩儀一隂陽也隂静陽動互爲其根則必有陽中之陽陽中之隂隂中之陽隂中之隂老少四象由是生焉故曰兩儀生四象四象成而竒耦參錯是生八卦八卦定而剛柔進退是生吉凶有吉有凶則利害興而人事作故曰吉凶生大業此聖人於易不得不竭其旨意以爲天下用也是故物皆有法有象而法象之大者莫大乎天地物皆有變有通而變通之大者莫大乎四時物亦有垂象者著明者而莫大乎在天之日月此易道之在天地者也物亦有至崇者至高者而莫大乎寶位之富貴以至備天下之物致天下之用立成器以利天下使民用之不窮者莫大乎聖人此易道之在聖人者也若夫探事理未露之賾索事理未顯之隱深者鈎而出之遠者致而至之以定吉凶以決疑怠使天下亹亹不倦以成其務者莫大乎蓍龜至此則易爲天下用矣夫蓍龜者天生神物也神者謂其能鈎深致遠探賾索隱也聖人占筮則之而已天地變化謂隂陽消息往來進退也聖人卦爻效之而已天垂象者謂天文之明著休咎以示人也聖人繫吉凶悔吝之辭象之而已河出圖洛出書天地以竒耦之象數示人也聖人畫重則之而已故首掲四象以示人者伏羲也繫卦爻之辭定吉凶之變以斷之者文王周公也是二三聖人之作易也豈加一毫已意而爲之不過發天地自然之藴以爲天下用而已右第十五節言易之爲易天地泄其機以示聖人聖人闡其理以示天下也易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也釋大有上九爻義當在盜之招也下簡編失次也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行上文言聖人即天地自然之理作易以示人其説備矣又慮夫人徒泥其辭而不求諸心故曰書不足以盡聖人之言言亦不足以盡聖人之意聖人亦自知言之不足以盡其意也故立象以盡其未盡之意設卦以盡其情僞又自知書不足以盡其言也故繫辭以盡其未盡之言且變而通之以盡夫使民冝之之利鼓之舞之以盡夫變通不窮之神凡此者聖人作易而寓於書者也緼包畜也言易之道包畜於乾坤乾坤一隂陽也易之爲易隂陽變化而已故乾坤成列而易立乎其中蓋乾坤有體而易无體易以无體託於乾坤故乾坤之象毁而不立則无以見易易道隱而不可見則乾坤之義亦息矣蓋言易之道固不繫於有書无書而无書則隂陽變化之道亦不可得而見以發明聖人不得不作易之意也是故超於有形之上者道也所以爲乾坤者也麗於有形之下者器也乾坤一隂陽隂陽亦未離乎器也於道器之中化而裁之則謂之變推其變旁行不窮則謂之通舉而措之於民則謂之事業故聖人之作易也先有以見天下之賾爲之象以示人又有以見天下之動爲之爻以示人然象固示人以賾矣非卦何以極天下之賾爻固示人以動矣非辭何以鼓天下之動故象則有卦爻則有辭然人之求易也不可徒泥夫卦象爻辭以求之又當反求吾身固有之德行變而通之神而眀之至於黙而成不言而信則忘象忘言吾身之中自有全易矣右第十七節言聖人作易雖竭其旨意以示人而學易者則不可徒泥夫卦象爻辭以求易而不求諸心也大易緝説卷九
