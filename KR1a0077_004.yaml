body:
  text: 大易緝説卷四元王申子撰乾下巽上小隂也畜止也為卦乾下巽上一隂得位而為成卦之主上下五陽皆為所畜是陽之大為隂之小者所畜故為小畜小畜亨密雲不雨自我西郊畜則必亨理之常也且一隂巽順而得位二五合志而上行亦有致亨之道故曰亨雲隂物也陽上進而隂畜之故有密雲之象陽上進而隂得時以畜止之故隂陽不和又為不雨之象我據成卦之四而言西亦隂方二三四互為兊故曰西郊皆以言隂為主而衆陽皆為所畜也彖曰小畜柔得位而上下應之曰小畜以成卦之主釋卦名義柔得位謂以六居四得其正位也上下應之謂一卦五陽皆從之也從之故為所畜是為小者所畜故曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也以卦德釋彖辭前以六四一爻而言則一隂畜五陽小畜之所以成卦也此以全卦之德言則三陽健而進一隂巽而順二五皆剛居中合志而上行小畜之所以能亨也雲者隂陽之氣畜而未和和則雨矣今雲猶得以上往是畜未極也故不和而不雨不雨故施未行皆小畜之義象曰風行天上小畜君子以懿文德卦取一隂畜五陽言為小者所畜也象取風行於天上言所畜者小也蓋昭回雲漢者天之文也風行於天之下以鼓動萬物者也今止行於天之上但能振耀天之文而功不及物是所畜者小而未大故君子象之以懿美其文德於身待時而後行也初九復自道何其咎吉復反也初以陽剛居健體志欲上行而為四得時得位者所畜故復然初剛而得正雖為所畜而復如自守以正不為所畜者故曰復自道言雖為彼所畜而復而吾實自復於道也故不曰無咎而曰何其咎冝其吉也象曰復自道其義吉也進退自得其冝吉可知也或問曰舊説皆謂陽本在上之物雖與四為應而不為所畜蓋小畜畜不住故陽剛進復于上而自道故何其咎而子不以為然何也曰小畜以巽畜乾以隂止陽為卦義大畜以艮畜乾以剛止健為卦義大畜下三爻可以類推若陽得上進何以為畜若果如諸説畜不住則聖人不以畜字名卦矣九二牽復吉二所乘之初為隂所畜亦既復矣所承之三又為隂所畜説輻而不進矣二以陽處隂居中得中上又無應故不待畜即與同類牽連而復是不自失其中者也自能審進退而不失其中故吉象曰牽復在中亦不自失也亦者承前象辭而言謂初既以剛正而自道二亦以剛中而不自失也亦有不與隂畜陽之意九三輿説輻夫妻反目三剛而不中居健之極無應而動四以隂柔畜之於前三遂説輻止而就之是三自處不以正而四得而制之也三既為四所制而又體剛用剛心不能平故不相和而有夫妻反目之象其孟子所謂身不行道不行於妻子者乎象曰夫妻反目不能正室也以九居三本得其正唯剛躁而昵於隂為隂所畜遂流於不正身不正而能正家者鮮矣六四有孚血去惕出無咎四以一隂當三陽之進冝有傷有懼而有咎者唯居一卦之中而虛虛中故有孚且與五皆得其正故五以中實信而從之所謂得位而上下應之也五既信從則衆陽不容不從其所畜矣故血去故惕出而咎亦無也非得正而又有孚誠以合五之志其能免乎象曰有孚惕出上合志也謂六四以當位中虛之孚上合九五當位中實之志故能以柔畜剛而不見傷害也九五有孚攣如富以其鄰攣如者牽攣相從也富者畜聚衆陽之實也易例以陽實為富以如春秋傳以某師之以言能左右而用之也鄰臣鄰謂四也九五以陽剛中正之君行巽順柔克之道中實有孚故衆陽牽攣從之而為之富然是富也雖五之孚有以致之然亦六四力也蓋小畜之時畜陽者四也而為臣鄰又同巽體故五能以之以畜聚衆陽衆陽之實盡為五有故曰富以其鄰象曰有孚攣如不獨富也言不獨九五有孚以畜聚衆陽之富亦六四有孚同志以畜聚衆陽而為之富也四五當位故皆有孚同體故同志上九既雨既處尚德載婦貞厲月幾望君子征凶畜至於上極矣上九體陽用隂隂陽和矣故既雨陽之尚往者止矣故既處昔之不雨者雨不處者處小畜之道成也皆六四所尚巽順之德積滿以致之載者積而滿也然隂柔用事終非正道不可不戒婦隂也月亦隂也言以隂畜陽以柔制剛婦而固守此道則危故曰婦貞厲隂道之盛如月之幾於望矣為君子者不可以有行行則必凶隨時而畜止可也象曰既雨既處德積載也君子征凶有所疑也隂之畜陽亦既極矣君子處斯之時其可無疑慮乎故有征凶之戒兊下乾上履行也故曰履不處也卦乃小畜反對畜止也履則三陽在上而行矣三陽進進而上行六三一隂乘二陽而躡其後故為行而不處之象又為卦天上澤下天髙在上而光接乎下澤卑在下而氣通于上此天地間粲然之禮也故又曰履者禮也禮亦人之所履故為履履虎尾不嘻人亨履以六三成卦三之象下迫於二陽之進上躡乎三陽之剛剛譬則虎也三譬則人之足也剛健之性進而不反猶虎之不能回頸以害人也三又能柔順以調其剛強和説以平其威怒故有履虎尾不嘻人之象如履危而無所傷所以能亨以卦義言為和説而行天之道故亨彖曰履柔履剛也以成卦之主釋卦名義言三以兊之柔躡乾之後而履其剛也故曰履説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也以卦德釋彖辭而取九五以為訓也格強暴者以柔不以剛平忿怒者以和不以競故以兊之説應乾之剛則雖如履虎尾之危而不為所傷也是以能亨以九五剛中正而履帝位其亨也宜盛大而光明唯其所行一於用剛故不免有夬履之疵引之以釋彖者見履之道尚柔不尚剛也象曰上天下澤履君子以辨上下定民志天上地下澤又下之下者而光潤相接此天地間燦然之禮也君子象此制禮以為民之防辨上下之分以定其志蓋上下之分明而後民志定民志定然後天下可得而治也初九素履往無咎素有先定之義素履者平日之踐履也君子於世幼而學壯而行乃其道也九居履之初以陽剛之才居得其正是踐履有其素也有此素履用之則行何咎之有象曰素履之往獨行願也願志願也素履先定故往而行行其志耳九二履道坦坦幽人貞吉履之時六三履剛而上進矣二有同于上無阻於前若與三俱進則履道坦坦平且易也然二剛介居中以隂自晦而不應於上是幽人貞固者之所為也於衆進之時獨貞固其守而安於靜吉可知也象曰幽人貞吉中不自亂也言不以衆皆進而易其所守之中是不以利欲亂其中者也六三眇能視跛能履履虎尾嘻人凶武人為于大君三以隂居陽以柔履剛謂其明耶則衆陽而獨隂謂其不明耶則又居於陽眇能視之象也謂其能行耶則衆剛而獨柔謂其不能行耶則又履乎剛跛能履之象也是體暗而用明才弱而志剛者也而又不中不正故不自度量而一於進敢於蹈危取禍如履虎尾而受嘻人之凶也若不顧強弱勇猛直前唯武人用之以有為於大君之事則可然彖亦主三而言曰不嘻人亨此曰嘻人凶何也蓋彖總言一卦之體爻則據其時與位而言所以不同故曰易之為道也屢遷象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也三質暗才弱本不足以有為以當履之時一隂為主適與時遇是以不顧其位不當勇於行而履危蹈禍斯道也唯武人用之以為王事一於進以行其志之剛則可故爻辭於嘻人凶後言之用各有當也九四履虎尾訴訴終吉訴訴驚懼之貌上三陽虎之象也四居其末是正履虎尾之上者然以剛居柔是質雖剛而志則柔故能訴訴然知所畏懼而終於獲吉象曰訴訴終吉志行也三與四皆履虎尾者三凶而四吉何也三柔而志剛勇於行而不知懼四剛而志柔謹於行而知所懼也懼則能防是以終吉其吉者上進之志行也九五夬履貞厲履之卦義履剛也履剛之道尚柔不尚剛也五雖中正以履帝位然以剛居剛而承乘應皆剛是一於尚剛者也夬履謂決於行也一於任剛決行而不顧則於中正之道豈能無疚乎若貞固守此危道也故曰貞厲象曰夬履貞厲位正當也居得致之位據得專之勢而任剛決行借使失得相半乖誤亦多矣雖得正亦危道也其可貞固守之乎上九視履考祥其旋元吉履之為道尚柔不尚剛也上九以陽居隂既能自抑其乾健之剛且獨應夫兊説之柔是處履之時尚柔而行者莫如上九其善可知考成也祥善也旋歸也言上九所視所履為能成履道之善於履之終而歸於大吉者也故曰其旋元吉象曰元吉在上大有慶也上履之終也元吉在上謂大善於終也大善於終者則其人大有福慶可知也乾下坤上泰通泰也為卦乾下坤上陽降而下隂騰而上天地交而二氣通萬物遂其生成故為泰泰小往大來吉亨泰否皆乾坤互易全體以成卦故止以隂陽言之小隂也大陽也往謂往於外來謂來於內陽下降隂上騰隂陽之氣交天地之泰也君推誠以接其下臣竭誠以事其上上下之志通朝廷之泰也君子在內小人在外各得其宜天下之泰也泰之道吉且亨也泰否吉凶之變無他隂陽邪正內外消長而巳彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也內陽外隂以卦體言內健外順以卦德言天地上下之交通君子小人之內外以人物言泰者其天地人物至和極治之時也象曰天地交泰后以財成天地之道輔相天地之冝以左右民天地交而隂陽和萬物遂所以為泰人君象之財成其道輔相其宜以左右民財如達財之財因而篤之以成其生養之道輔如輔弼之輔助而相之以贊其化育之宜此天地之間所以無一物之不泰也古財材通初九拔茅茹以其彚征吉初以剛正居下是君子而在下者也時既泰則進而上行茹根之牽連者彚類也君子進必以其類如茅之根拔其一則牽連而起矣下二陽乃其類也征行也志行道亦行也故吉象曰拔茅征吉志在外也獨善其身者內也兼善天下者外也初九上進之志在天下不在一身故曰在外其孟子所謂達可行於天下而後行之者也九二包荒用馮河不遐遺朋亡得尚于中行二以剛中上應於五五以柔中下應於二所謂上下交而其志同者也時既泰矣二居大臣之位所以處泰之道有四焉必恢含𢎞之量以包容荒穢不然則淺狹多疑而人不安必施剛果之用以濟深越險不然則循習茍安而事不立必深思逺慮而無幽遐之遺不然則狃於目前而忘後患必大公至正而無朋比之私不然則偏於所向而為害多矣蓋亦以二乾體也如乾之大故能包荒資乾之健故能馮河覆而無外故不遐遺剛而得中故能朋亡具此四者所以能合乎中行之君而致泰之盛也尚尚主之尚配合也應六五歸妹之義象曰包荒得尚于中行以光大也此小象舉一句而下文皆在之例言泰道之所以光明盛大也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福三居泰否往來之會隂陽升降之交而當陽進之極履盛滿之地而失泰道之中故為之戒曰無常安平而不陂者謂無常泰也無常往去而不復者謂隂將返也此天道之必然君臣能艱危其思正固其守庶可保泰而無咎倘以泰為可恃不以此理為可信恬不知恤則將自食其所有之福祿而永終矣食如食言之食沒而盡之也象曰無往不復天地際也此因隂陽之交際明泰否無常之理以為戒也六四翩翩不富以其鄰不戒以孚富實也隂虛陽實不富謂非陽之實也九三巳處泰之盛盛則必衰六四則泰運巳過故隂乘陽之衰羣然內復率其同類無實之鄰翩翩而來心意相孚不待告戒而自合此泰之變也亦可以見君子之易退小人之易進也有國者可不愼歟象曰翩翩不富皆失實也不戒以孚中心願也翩翩而來所謂不富者皆非陽實之賢也羣隂在外非其願欲久矣今四一動皆不待告戒而自孚以其中心之所願欲在此也六五帝乙歸妹以祉元吉六五以柔中之德下應九二剛中之臣順而從之如帝乙歸妹降其尊貴順從於人故能成其泰治之功以受福祉以獲無吉也伊川曰帝乙必古者制王姬下嫁之禮法者象曰以祉元吉中以行願也二五居中得中上下交以行其志願故受泰治之福而得大善之吉也上六城復于隍勿用師自邑告命貞吝上泰之終而又以隂柔處之泰復否矣隍城池嚮也積纍以成泰如取隍土纍以成城今泰復否如城之頽復返於隍也勢而至此自治不暇其可用師衆以治人乎故曰勿用師唯可行其告命於巳之私邑以自守故曰自邑告命蓋勿恤其孚以至於此雖得其正亦可羞吝矣若以剛健之才處之扶顚持危亦自有道故不曰凶而曰吝坤體故曰師曰邑象曰城復于隍其命亂也泰一變而為否其上下分崩離析之時雖有命亦亂矣告自邑所以救此亂也坤下乾上否否塞也與泰相反為卦坤下乾上是天地之氣不交上下之情不通所以為否否之匪人不利君子貞大往小來人與天地並立為三而所以維持三極者人也人之所以為人者盡人道而已今否之世以言天地則天地不交以言萬物則萬物不遂以言天下則天下無邦是人之道亡矣故曰否之匪人謂否之世非人道也不利者舉天下事事物物皆不利也乾不言所利謂所利者非止一物此不言所不利謂所不利者亦非止一事一物也當此之時為君子者尤冝貞固以自守故曰君子貞蓋陽往隂來小人道長君子道消也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也易中極亂之辭未有甚於此者經曰否泰反其類也唯反其類故其事一切相反然則人於隂陽內外消長之機可不戒哉可不愼哉象曰天地不交否君子以儉德辟難不可榮以祿夫子大象例於各卦象義之外别取其一端以用之若彖以不利君子貞為句則大象取義不如此重復矣誠齋曰君子當否之時唯以儉德辟難而已辟難可也何必儉德非能忍天下不可忍之窮不可辟天下不可辟之難窮之不忍而難之是辟辟之未幾而誘之者至矣誘之所投禍之所隨也唯不可榮以祿則免矣初六拔茅茹以其彚貞吉亨否之時三隂在下亦牽連同類而進故亦有拔茅茹之象蓋小人道長之時各從其類也然六方在初其小人之惡未著也其本心之正尚存也猶可示之以趨吉避凶之門故戒之以貞正則亦吉亦亨不必為小人之歸也曰貞不曰征者亦已有懼其進之意象曰拔茅貞吉志在君也小人之進其志在於得君而巳正否不顧也其孟子所謂有事君人者以事是君為容恱者也故戒之以貞而示之以吉或問曰舊説皆謂易為君子謀否下三爻以君子方否而在下者言之而子不以為然何也曰聖人設卦觀象以繫辭明取內小人外君子為否卦之義果如諸説則以何者為否且以下三隂為君子上三陽復以君子當之則剛柔善惡混無差别何以為易六二包承小人吉大人否亨六二質雖隂柔而居中得正處否之時猶小人中之君子也故其所承順者不但九五之君而已能并上三陽而包容承順之故曰包承言兼包其所承之陽也此亦小人之吉九五大人之否賴之以濟故曰大人否亨是以二曰小人吉五曰大人吉君臣對言中正故也象曰大人否亨不亂羣也處羣隂之中而中正獨異是不雜亂於其羣者也故大人之否賴之以亨六三包羞隂陽內外雖不同往來循環則一也三居否道將變之時隂道已窮之際不中不正居下之上衆陽將復其勢豈能久安若陽剛君子則見幾而作矣唯隂柔小人故包羞忍恥以茍富貴不忍捨去雖否道未革未至凶咎然識者亦巳羞之矣象曰包羞位不當也以隂居陽在下之上位不當也其草於包羞而不退者是不知其位之不當身之將危也九四有命無咎疇離祉四以陽剛當否運已革之時與五同德而處近臣之位是有濟否之才得君而得位者也然巳然而君不然雖有才有位其何為乎今臣有才而君命之君有命而臣行之豈唯濟否而無咎且使疇類皆離其福焉蓋君子之類由是而得伸也古疇儔離麗通象曰有命無咎志行也既有命則上之意不惑於羣小可知矣故四可無咎而濟否之志得行也九五休否大人吉其亡其亡繫于苞桑九五剛健中正之大人也故能以大人之道休息天下之否否之休大人之吉也然否雖休息猶非泰也故有其亡其亡之戒謂長顧却慮常防否之復來曰其亡矣其亡矣必益為安固之道如繫物於苞桑焉蓋桑根深固苞而叢者其固尤甚故繫辭曰安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也象曰大人之吉位正當也有大人之道而正當至尊之位故能休息天下之否是以吉也無其位雖有其道將何為乎上九傾否先否後喜上以陽剛之才當否運之終故能傾時之否以復於泰然不可以無警懼之心當以傾否為先喜泰為後而後可以保其否之必傾也象曰否終則傾何可長也否終則傾理之常也何可長者幸之之辭也離下乾上同人與人同也為卦離下乾上乾天也天上行離火也火亦炎上是火同於天也今卦不名同天而名同人者六二一隂為成卦之主而居下體人之位上下五陽皆欲同之也故卦曰同人而象取同乎天為大同之義同人于野亨利涉大川利君子貞野謂曠野取曠逺廣大之義同人者天下大同之道聖賢至公之心也故取曠逺廣大之野無纎毫蔽匿之私如是而同乃同人之道故亨亦與人同者無往而不亨無險之不濟況成卦之主文明中正而行乾之健其亨其利涉大川冝也然同不可以茍同必利乎君子之正道亦以二居得其正而承乘應皆正故也若同不以正則非吾所謂同矣彖曰同人柔得位得中而應乎乾曰同人以成卦之主釋卦名義柔謂六二乾謂九五二以中正而應乎中正之五是五與之同故曰同人同人曰羡文同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志至公無私者天道也同人所以亨所以利涉者以天道行也且二以離之文明行乾之剛健而中正相應乃君子同人之正道故天下之志萬有不同而君子一以此道貫而通之則不同者亦同矣故曰唯君子為能通天下之志通者貫而同之與天下為大同也象曰天與火同人君子以類族辨物有所不同而與之同者同人之義也天與火本非同類天上行火亦炎上而與之同故為同人之象族者宗之别同而異者也萬物不同而同稟隂陽以生異而同者也君子觀天與火同之象於族之同而異者則類而聚之使各同其同而親其親於物之異而同者則辨而别之使同其不同而羣以分如是則天地間人與物同者固同而不同者亦同矣初九同人于門無咎門限隔內外者也卦唯二之一隂衆陽之所欲同初以陽剛上進一出門即與之遇初非有意於同而得其所同者無爭於人何咎之有象曰出門同人又誰咎也出門之初即與人同見出於無意而得其所同者故不取咎於人人亦無咎之者故曰又誰咎也六二同人于宗吝宗所尊也同人者以聖賢至公之心行天下大同之道今二偏應於所尊之五不能與天下為大同故吝然彖取六二之柔中正應九五之剛中正為同人之正道而爻辭乃若此蓋彖以全卦之體而言則為中正相應爻則據所居之位而言則其用為甚狹矣象曰同人于宗吝道也二居大臣之位而處同人之世止與所尊之五同律以同人大公之道則為私狹故曰吝道也九三伏戎于莽升其髙陵三嵗不興莽林莽也四隂位隂則暗且居上之下三視之林莽之象也陵丘陵也三陽位陽則髙且居下之上二視之丘陵之象也三以剛居剛而又不中處同人之世而無應與下比於二而二以中正上應於五三不顧義挾其剛強欲奪而同之上則欲拒五之應乎二乃伏其兵戎於同惡之林下則欲迫二之同乎已乃升其所據之髙陵以瞰之然於義不直故三嵗不興謂三變而正遇九五之剛中正其姦終不敢發也未發故無凶咎象曰伏戎于莽敵剛也三歲不興安行也五剛中正下同二之柔中正於義其可敵乎故伏戎升陵至於三歲而終不敢發安行者言其剛強不義安得而行也九四乘其墉弗克攻吉城牆曰墉所以捍隔外侮者謂三也自上乘下曰乘謂四居外卦剛而不中不正下無應與欲內同六二而為九三所隔四挾其居髙之勢乘其墉而攻之然三剛而四柔其勢不敵四亦自知其義不直反而不攻亦由處柔而善變變而得冝故吉象曰乘其墉義弗克也其吉則困而反則也二實應五而欲以力奪之三不犯巳而欲以勢乘之義弗克也始也挾勢用剛雖巳違則及其困也能反於不過剛之則是以能吉九五同人先號咷而後笑大師克相遇五剛中正二柔中正相與一心而同者也為三四所隔不勝憤抑至於號咷然邪不勝正終必相遇故後笑必至於大師以克勝之而後得遇者以彼同惡者皆剛強而此同心者柔弱也伊川曰五君位而爻不取人君同人之義者蓋五專以私嫟應於二失其中正之德而不能與天下為大同非君道也又先隔則號咷後遇則笑是私情也故不言君道而止明二人同心不可間隔之義象曰同人之先以中直也大師相遇言相克也先所以號咷者以中誠理直不勝忿切而然也必大師克之而後能遇者以隔之者強也上九同人于郊無悔人所居為邑邑外曰郊是去人逺之地喻上九居一卦之外去二之人逺也蓋二為成卦之主以一隂為衆陽之所欲同者五為正應同之專者也初在下一出門即與之同無爭於五故無咎三四則伏戎乘墉而起爭矣上在五後其志未嘗不欲同乎二唯去二巳逺五又隔之於外如在邑外之郊故不得而同唯其不得而同故亦無悔雖無悔而於同人之道亦不足取也象曰同人于郊志未得也郊與野異野則曠逺廣大一有人無不見者是雖不求於同而無不同也郊則限於人所居邑之外是雖欲同而不可得而同也然則于野者無心於同而無往不同于郊者有志於同而不得而同也故曰志未得乾下離上大有所有之大也為卦乾下離上火在天上容光必照無所不有大有之象也又陽為大五以一隂居尊上下五陽皆為所有又有其大之象也五以謙虛處髙明以卑柔處剛健亦為能有其大之義故為大有大有元亨五為成卦之主以文明之德得中而居尊處大有之世而順乎乾是有德有位順天而行者也何往不亨故曰元亨元有大善之義若非明非中非順天之道則雖大有而不善及不能亨者有之矣彖曰大有柔得尊位大中而上下應之曰大有以成卦之主釋卦名義柔謂六五上下謂五陽五得中而居尊以柔而處剛為能盡大中之道以用於天下故上下之陽歸之是為大有其德剛健而文明應乎天而時行是以元亨以卦德釋彖辭內剛健而外文明有其德矣五又以柔中而順乎乾是有剛健文明之德順天道而時行者也是以元亨象曰火在天上大有君子以遏惡揚善順天休命火在天上洪纎髙下無往不照大有之象也君子觀此則知大有之世善善惡惡無所不有或遏或揚亦以順天之道承大有之休命也初九無交害匪咎艱則無咎五以一隂居尊為成卦之主厥孚以交上下而上下應之故二曰往三曰亨四匪其彭上履其信而思其順皆言其交於五也今初曰無交害豈非初獨處下不得交於五為有害於上下應之之義乎然初陽剛得正其無交於五非其咎也故不曰無咎而曰匪咎諒其在下也況交道亦不可輕易使失之輕易而不艱或以茍合為交則是徒知無交之害而不知茍合之為咎也故又曰艱則無咎豫其守正也象曰大有初九無交害也大有初九云者言大有之世而初九孤逺在下無交於五於上下應之之義不能無害也九二大車以載有攸往無咎二健而居柔剛而不過處大有盛而未滿之時如以大車載物容之有餘也而又有剛中之德上應柔中之君不但可以載亦可以往故無咎若至於盛滿則是車盈不可載亦不可往矣焉得無咎乎此聖人因九二健而得中發之以為處大有之法象曰大車以載積中不敗也積中不敗者言人之積載得中則止過則必有覆車折軸之憂焉得不敗九三公用亨于天子小人弗克亨春秋傳作享古亨享通朝獻也三居下之上公侯之位也其土地人民之富皆天子所有於大有之時以陽剛得正之君子處之必不私其有而以奉上故曰亨于天子以過剛不中之小人處之必擅為巳有因為不順故曰小人弗克爻一也用之則存乎其人象曰公用亨于天子小人害也小人無剛正之德故處大有則或為害而大有亦適足為小人害也九四匪其彭無咎四當大有過中之時有之盛者也且體剛而居不正之位上近柔中之君盛極則衰憂至矣唯剛明用柔知自損抑匪其彭而不敢以盛多自處故得無咎詩曰行人彭彭盛多之貌也象曰匪其彭無咎明辨晳也晳明之至者不處其盛多而得無咎者以其辨明事理之晳也居柔故能匪彭離體故能明晳六五厥孚交如威如吉虛中故有孚五以虛中之孚居尊位而上下交如以成大有然以一柔而交衆剛雖能推誠以得其心然易而無備則或生侮慢故必濟之以威如斯能獲吉蓋處大有之時居衆剛之上不可一於柔也象曰厥孚交如信以發志也威如之吉易而無備也一人之誠固足以發上下交如之志然以一隂主衆陽亦不可易而無備故必濟之以威如則吉上九自天祐之吉無不利以剛明之至而自居於隂當大有之極而淡然退處是能不有其有持謙虛以處盛滿者也滿招損謙受益時乃天道上九能於大有盛滿之時而益謙益退不居其有宜其自天祐之吉無不利也象曰大有上吉自天祐也大有上吉者言居大有之上履盛滿之極而能謙虛不居其有而獲天祐也大有而能謙其應如是歟夫子於繫辭復以交於五取義而言履信思乎順又以尚賢也若曰五以中虛之孚柔順之德交于上下衆陽皆自下應之九獨應之於上是履其孚信思其柔順也五又能以謙柔尚上九之賢是君臣上下處大有之極皆能不有其有順乎天而行是以自天祐之吉無不利艮下坤上謙謙退也有而不居之謂為卦艮下坤上地中有山也以山之髙而居地之下謙之象也以崇髙而處至卑之下謙之義也故為謙謙亨君子有終謙之成卦九三也三以一陽止乎內而順乎外故亨在人以謙自處不矜不伐而衆自與之亦無往不亨故曰謙亨凡謙之道先自卑而後尊先自晦而後顯是無其始而有其終也故曰有終謙而有終者其唯君子乎彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也以成卦之主釋彖辭而極言謙道以為訓也天髙而在上今一陽下濟以成其化育之功而其道光明此言謙之亨也地卑而在下今坤道上行以蘊夫艮山之髙而得其增益此言謙之有終也天道虧益者盈虛消息之謂也地道變流者圯頽傾注之謂也鬼神造化之迹凡過而損不足而益者皆是也天地鬼神猶然人之道可知矣自天道虧盈以下聖人所以戒盈而勸謙也故人居尊而能謙則德愈光明居卑而能謙則人亦莫能過之是不有其始而有其終君子之道也象曰地中有山謙君子以裒多益寡稱物平施山髙而居於地之下謙之象也坤卑而藴夫山之髙謙之益也君子以之裒取多者增益寡者所以稱物之宜而平其施也尊卑小大逺近親踈各當其分者稱物也父乾母坤民胞物與一視同仁者平施也皆損髙增卑之事故以取象初六謙謙君子用涉大川吉六體柔謙德也初處下卑位也以柔處下謙之又謙君子之行也謙謙之行不爭而勝衆無不與雖涉險難亦可無患況居平易乎故吉初前互體為坎而進於坤亦有涉川而吉之象象曰謙謙君子卑以自牧也牧有收而養之之意言君子以謙卑之道收斂身心以養其德故無不吉六二鳴謙貞吉誠積於心而發於聲曰鳴柔與下皆謙也二以柔居柔而位乎下得中且正是謙而滿其所願欲者也既得所欲其誠積於中隨所至而發於外故鳴此謙之正吉之道也象曰鳴謙貞吉中心得也言二中心得其所欲故鳴九三勞謙君子有終吉三以一陽為成卦之主而上下從之是一君子上為君所與下為衆所歸於上下謙退之時獨任重而有勳勞者也持此而處謙是又勞而不伐有功而不德者也是以巳愈謙於前人愈尊於後故曰有終吉象曰勞謙君子萬民服也萬民服者非服其有勞服其有勞而能謙也六四無不利撝謙撝發揮之謂四柔而得正上而能下固謙者也況上承柔謙之君下乘勞謙之臣巳居其間動作施為無所不利於用謙唯謙則處上處下亦無不利象曰無不利撝謙不違則也言六四撝謙故處上處下皆不失其當然之則也六五不富以其鄰利用侵伐無不利易例隂以陽為富君以臣為鄰五隂柔是不富也以柔處謙是不有其富也四近臣二大臣亦隂也奚其富蓋卦唯三之一陽二與四皆謙退而推讓之使輔於五是五本不富以其臣鄰而富也亦以見謙之世上下皆謙之盛德也然謙固吉德而君道則不可一於用謙必用侵伐使威德並著然後盡君道之宜蓋三以一陽處衆隂之間有統衆行師之象五為之君上為之應故二爻有侵伐行師之辭亦以救柔謙之過以為處謙之法象曰利用侵伐征不服也謙至九三萬民服矣豈五之謙德如此猶有不服者邪蓋服九三者服其有勞而能謙也君道則不可一於用謙故必侵伐乎謙德之所不能服者然後為宜也上六鳴謙利用行師征邑國謙豫反對卦也皆以一陽為成卦之主謙之上即豫之初豫之初曰鳴豫以應四也此曰鳴謙豈非以應三乎上六以柔居柔處謙之極而退居無位之地本謙退之至者然三為成卦之主得時得位而獨與之應故上六不得遂其謙退之志而發於聲故曰鳴鳴其謙退而未得之志也然已愈退而人愈歸故利用行師但謙而處柔志終不逺故止利於征巳邑國以自治而巳坤為邑國三有統衆行師之象象曰鳴謙志未得也可用行師征邑國也凡人得其所欲與不得其所欲者誠積於中必發於外故曰鳴二之鳴得其所欲故曰中心得上之鳴不得其所欲故曰志未得以謙退未得之志終不在逺故用行師止可以自治於內也坤下震上豫安也樂也為卦坤下震上順而動也順理而動則安動而和順則樂豫之義也雷動而出於地萬物皆恱豫豫之象也故為豫豫利建侯行師四以一陽為成卦之主居公侯之位上下順而從之建侯之象也一陽統衆隂以順而動行師之象也建侯行師二者慶賞刑威雖不同然皆上動而下順欲使夫人安且樂則一也故豫利建侯行師彖曰豫剛應而志行順以動豫以成卦之主及卦體釋卦名義四以一陽為上下所應而其志得行故豫坤順震動為順以動天下唯順理而動則安且樂故曰豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉以卦德釋彖辭而極言之也豫之為豫順以動也天地間不過一至順之理而巳故天地之運以順而動則日月四時不差忒而萬化成聖人之治以順而動則政刑清簡而萬民服然則動必以順天地聖人且不能違而況建侯行師乎豫之時之義豈不大哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷者隂迫於陽而發於聲者也潛在地中物猶鬱遏奮出地上則物皆和暢豫之象亦樂之象也故先王以之作樂褒崇功德極其盛則薦之上帝以配祖考言和樂之至也禮云春礿秋嘗礿有樂嘗無樂震為春是專以礿言之也初六鳴豫凶四為卦之主以一陽得時而在上初以隂柔不中不正而獨與之相應是小人處豫之時而專得寵於上者故其志意不勝恱豫至發於聲而鳴於外輕淺如是宜其凶也象曰初六鳴豫志窮凶也初以隂柔卑下而專上之寵以此處豫宜其氣驕志滿以招凶禍故曰志窮凶也六二介于石不終日貞吉豫主乎樂然豫樂易以溺人溺則反而憂矣卦獨此爻居中得正而又無應有自守之象是上下皆溺於豫而獨能以中正自守介然如石之安靜不為物欲所移故其處事思慮精詳能見憂樂倚伏之幾當去則速去之不俟終日此六二貞正之吉也夫子因二之見幾於繫辭極言知幾之道曰知幾其神乎吉之先見者也幾有吉有凶獨言吉者見之於先則無凶矣象曰不終日貞吉以中正也唯中與正故能守之堅而去之速處豫之善者也六三盱豫悔遲有悔盱上視也遲固戀也六三質柔志剛不中不正處上之下下之上處上之下故仰盱而貪慕乎四由豫之樂而四不與此悔之道處下之上故遲疑而固戀其居人上之樂而不見幾亦悔之道此爻正與六二相反盱則不能介于石遲則不能不終日中正與不中正故也象曰盱豫有悔位不當也隂柔處豫而不正宜其盱悔而遲有悔也九四由豫大有得勿疑朋盍簪四成豫之主以陽剛之才居大臣之位六五之君順而從之上下之隂朋而順之是得君専而衆由之而得豫者也故曰由豫上下之豫由巳而得則是其志得以大行也故曰大有得當此大有得之時上承柔弱之君而處多懼之地寧無憂疑乎故聖人安之曰勿疑勿疑之道在總盍上下之朋以歸于君如簪總盍衆髮以歸于上則所謂大有得者亦大臣之事也何疑之有象曰由豫大有得志大行也上下皆由四而得豫是四之志得以大行也六五貞疾恆不死六二貞則吉得中得正而不為豫所溺也六五貞則疾中而不正而溺於豫也五君也處豫之時而不以正以柔應柔而不自立四以陽剛得時得衆於下而已乘其上是柔弱耽溺之君而遇剛強權重之臣雖處豫其能安乎故疾疾者謂乘九四而不安也疾而曰貞者謂雖不正而猶得中得位也恆不死者謂雖不安然權失而位未亡也是逸樂荒怠之君徒擁虛器之所為者豫其可溺歟象曰六五貞疾乘剛也恆不死中未亡也五處豫而不正以柔而乘剛疾也中未亡位未去故貞疾而恆不死也上六冥豫成有渝無咎以隂處隂居豫之極是昏昏冥冥於逸豫之中其咎已成矣然能知豫樂之不可久幡然渝變則咎可無也蓋上雖隂柔然以震體居豫之終終則能變故也不言冥之凶但言渝之無咎聖人所以開遷善之門也象曰冥豫在上何可長也豫至於上極矣極則不可以久速渝可也震下兊上隨從也為卦震下兊上兊説於上下動而從之隨之象也伊川曰動而説説而動隨之義也雷震於澤中澤隨而動亦隨之象故為隨隨元亨利貞無咎隨從也以巳從物物來從已彼此相從無不亨者且初上為成卦之主皆得其正二與五又以中正相隨此隨之善可致大亨故曰元亨隨而得其正乃可無咎若所隨不正雖大亨亦不免於咎也故又曰利貞無咎春秋傳穆薑曰有是四德隨而無咎我皆無之豈隨也哉其言四德雖非經旨言隨之無咎則易之意也彖曰隨剛來而下柔動而説隨以成卦之主及卦體釋卦名義隨之成卦初九上六也乾上之剛來於內而下坤之柔是以上下下以貴下賤此物之所以説隨也乾剛一來而震兊之體成震動兊説動而説説而動故隨大亨貞無咎而天下隨時隨時之義大矣哉王肅本作天下隨之隨之時義大矣哉今從之隨之大亨利於貞正所隨不正亨亦有咎故曰大亨貞無咎亦謂初上成卦之主皆得其正而二五亦隨之以中正是天下隨之也時義者時之冝也聖人之治隨時宜而變通之如時乎揖讓不得不揖讓時乎征伐不得不征伐穴居易而棟宇結繩易而書契皆時之冝是豈強天下使之隨者斯時斯義非可與權者不能與於此故曰大矣哉象曰澤中有雷隨君子以嚮晦入宴息此夫子以時取象而用之兊正秋也雷乃收聲以息君子以之隨時之宜取其至明至近者言之嚮昏晦而入居於內宴息身心起居之隨時冝也推此以往動靜云為君子其可違時冝而不隨乎初九官有渝貞吉出門交有功官主也渝變也唯正是從者隨之義初居隨之時所主以相隨者四也而四為三所隨不與初應是所主者變也所主既變則唯正之隨庶乎獲吉六二居中得正志隨於初者也故初一出門而與之交二即説於相隨隂陽交則有功矣象曰官有渝從正吉也出門交有功不失也初之所主者既變而他則唯從乎正庶可獲吉故一出門而交乎中正之二雖非正應然隨得其正亦不為失也六二係小子失丈夫隨從也隂從陽者也二應五而比初初近而五逺二處隨之時若不自守以須正應則將係初之小子失五之丈夫矣二中正雖不至是但以隂柔處隨不得不戒象曰係小子弗兼與也人之所從不正則邪不非則是無兩從之理言二若係於初則必失於五弗兼與者戒二使之一於從五也六三係丈夫失小子隨有求得利居貞三近於四而逺於初者也隨之時隂必從陽然上隨則善下隨則暗舍下從上得隨之冝四亦無應無隨之者得三隨之必相親善故三有求必得言事事得其所求也然非已正應則有枉道之嫌故戒之曰利居貞言不可枉道隨人以徒遂其所求也三不正故戒象曰係丈夫志舍下也舍下從上如昏之從明事之從善君子之隨也九四隨有獲貞凶有孚在道以明何咎得下之應衆之隨君道也今九四以陽剛之才逼君位之近初應之二與三隨之是人臣而得在下衆心之隨者雖正亦凶蓋位極者不無逼上之嫌勢重者不無專強之慮唯中存事君之誠外盡為臣之道以明晢處之則不但可以免危疑亦可以保名節矣又何咎哉亦以陽剛君子而用柔故能變凶而無咎象曰隨有獲其義凶也有孚在道明功也能變凶而無咎者剛明之力也九五孚于嘉吉嘉善也九五以陽剛中正之德説而隨六二柔順中正之賢是其中誠樂善隨得其正者其吉可知象曰孚于嘉吉位正中也處正中之位由正中之道以應正中之臣故其從善之心出於誠也上六拘係之乃從維之王用亨于西山以説之至居隨之極得人之隨固結而不可解無以為喻若拘而係之縶而維之雖逃之而不可脫況可得而間之乎其太王亨王業于西山民之從之也如是夫象曰拘係之上窮也窮極也上窮者言在上而處説隨之極也巽下艮上蠱壞也事也壞乃有事也為卦巽下艮上巽懦而艮止事之所以壞也乾陽止於上坤隂巽於下上下不交泰之壞也二體皆以柔承剛其象則以風載山虛而不固勢必壞也且山下有風撓壞其物皆蠱之象故為蠱在文為蟲皿皿之有蟲其蠱壞也可知蠱元亨利涉大川先甲三日後甲三日以卦體言巽懦而艮止所以成蠱以卦德言事止於巽順可致大亨然蠱不自亨必不憚艱險以修飭之故利涉大川蠱之成卦初與上也故有先甲後甲之象甲者日之始事之端也先甲三日辛也謂事之已壞者飭而新之後甲三日丁也謂事之未壞者丁寧而使之勿壞如此則可以飭蠱而致大亨也彖曰蠱剛上而柔下巽而止蠱以成卦之主及卦德釋卦名義蠱之成卦初六上九也由二爻變而成艮巽皆剛上而柔下柔不足以承剛下巽而上止弱不足以立事故曰蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也釋彖辭以言飭蠱之道飭蠱至於元亨是天下之亂者復治矣然事不自治必涉艱險以往濟之然又不可以徒往必思慮周悉逆防其壞於未蠱之先整飭其壞於既蠱之後故先後各三日思之詳慮之逺也蠱者其亂之終治之始終則有始乃天道也蓋亦初終二爻為成卦主故取先後始終以為義象曰山下有風蠱君子以振民育德山下有風物皆撓壞蠱之象也君子以之於民俗之頽壞者振起而作興之使壞者復飭巳德之未壞者養育而培成之使不至於壞亦飭其巳壞防其將壞之事也初六幹父之蠱有子考無咎厲終吉蠱之六爻皆言飭蠱之道蠱在前飭在後故以父母之蠱取義父母之蠱子可辭其幹乎初在下而為主於內是子之幹蠱者也子承父之蠱而能幹則乃父為有子有子則乃父之咎可無矣然初弱於才幹之非易必兢兢業業常懷危厲之心以處之庶乎終吉象曰幹父之蠱意承考也言考則前人也為子者善繼前人之志善述前人之事則足以承乃考之意矣故曰意承考也九二幹母之蠱不足貞二以陽剛上應隂柔故曰幹母之蠱言母則在堂者也二以剛承柔而幹其蠱唯當以巽順處之若貞固用其陽剛矯拂太過則失其為子之道亦安能集事乎故有不可貞之戒象曰幹母之蠱得中道也言幹母之蠱者所貴乎得中道而不可過於剛也九三幹父之蠱小有悔無大咎言父不言考則父在也父在而子幹其蠱非剛固不可然過剛亦不可三以剛居剛未免過乎剛然居得其正是知其蠱不可以不飭者也故小有悔而無大咎象曰幹父之蠱終無咎也尚剛非子之道然用之於幹蠱則亦何咎哉六四裕父之蠱往見吝四當初二三幹蠱之後蠱亦少飭矣而又以柔居柔而處艮體亦止宜以寬裕之道處之可徐而不可急可紓而不可迫若勇而大有為則不唯才弱不勝而事愈壞矣故往則見吝象曰裕父之蠱往未得也四雖得正而弱於才往未得者戒其欲速則不達也六五幹父之蠱用譽五君也承父之業其盈盛則當持而守之其蠱壞則當飭而治之今五以柔弱之資承父之蠱疑若不善幹者而用譽何也蓋下有剛中之臣為之輔佐五能以柔中之德信而任之是以繼志述事享有令名也象曰幹父用譽承以德也以巳有柔中之德承父之蠱而在下之賢又承之以剛中之德也上九不事王侯髙尚其事上亦成卦之主乃以剛明之才而居艮止之極於多事之世而處無位之地是賢人君子識時冝守志節者也況當蠱之終乃壞之極不可為也居卦之外不在其位不當為也下無係應人不我知不必為也然則上九之不事王侯髙尚其事冝也王侯謂五與四剛止於終故不事艮體之上故髙尚象曰不事王侯志可則也此其節不但為天下之所髙而其志實可為天下之法也兊下坤上臨近也亦自上臨下之義為卦兊下坤上澤上有地岸也臨近乎水也又二陽浸長而幾於乾世道既復而近於泰故為臨臨元亨利貞至於八月有凶剛長而嚮盛則其亨也必大善且二陽上進前順而無阻故曰元亨然二體柔説而成卦之主六三也又不得其正故戒之曰利貞八月有凶者自六三八變而至觀為八月卦臨則二陽長於下四隂剝於上觀則四隂長於下二陽剝於上矣故曰有凶聖人於此二陽長而隂消之初為二陽消而隂長之慮也蓋方盛而慮衰則盛可久若既衰而後為之慮則無及矣彖曰臨剛浸而長以卦德釋卦名義謂剛浸長而近於泰故曰臨説而順剛中而應大亨以正天之道也至于八月有凶消不久也釋彖辭下説而上順二又以剛中之德上應柔中之五得中用中以相應故大亨中則正矣大亨而以正天之道也今成卦六三既不中又不正故有八月之凶謂成卦六三八變為八月之觀則二陽消於上矣故曰消不久也不久者臨與觀僅一反對亦以見其近也聖人治思亂安思危之意逺矣哉象曰澤上有地臨君子以教思無窮容保民無疆澤上有地以地臨水以上臨下之象也澤之於地有潤而無竭故君子以之教人其思無窮地之於澤有受而無阻故君子以之容民保而無外是二者亦以大臨小以上臨下之事也故以取象初九咸臨貞吉臨之為卦六三一變則為泰矣陽剛浸長之時也咸感也陽剛二君子而在下上有虛中好賢之君相與之感遇於臨之世故皆以咸臨言之初又剛而得正四復以正應之是以正道獲乎上而志得行也故曰貞吉象曰咸臨貞吉志行正也初九之志在於行其正道而又得四以正應之是以吉也九二咸臨吉無不利二處剛長之時以剛居中上有柔中之君虛其心與之感遇於泰道將成之際故吉故無不利此彖所謂剛中而應者也然初與二皆咸臨初吉而巳二吉且無不利者遇君與臣其功用固有間中與不中故也象曰咸臨吉無不利未順命也君臣感遇固吉無不利然四隂猶盛二隂猶得以間之故雖能以意氣相感而二猶未得以順從上命此其所以為二陽之臨而未即為三陽之泰也六三甘臨無攸利既憂之無咎剛長之時上下諸爻皆當位得中之君子獨一六三不中不正而以隂柔居下之上上無應與下畏二陽之逼乃挾其兊説之資行其甘諂之謀是謀也而果行則上不利於國家下不利於其身故曰無攸利處臨之時如六三者不可不憂既知憂之則可無咎憂之如何防八月之凶是也象曰甘臨位不當也既憂之咎不長也以柔乘剛不中不正是位不當也故甘以説人既憂之則將去之去之則彼之為咎不長臨為泰矣六四至臨無咎四居坤體切近兊澤故曰至臨言臨近之至也初九賢而在下四近臣也正與之應是又能至臨在下之賢與之共成剛長之治何咎之有象曰至臨無咎位當也以隂居四為得正近君而正為得位切近下體為至臨正應初九為下賢位之當咎之無也六五知臨大君之宜吉中庸曰惟天下至聖為能聰明睿知足以有臨也故知臨為大君之宜謂六五以柔中之德任九二剛中之賢不自用其知而兼衆知為知之大是宜為君而獲吉也象曰大君之宜行中之謂也五得中而又任剛中之賢是行其中而盡其為君之道者也上六敦臨吉無咎敦厚也以上臨下臨之義也六居一卦之上與下二陽雖非應比然其象則居髙臨下所臨者二陽而巳隂必從陽坤體則厚是以厚德而內從二陽之君子故吉故無咎象曰敦臨之吉志在內也謂上之志在於內從陽剛之君子也故吉大易緝説卷四
