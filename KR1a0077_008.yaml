body:
  text: 大易緝説卷八元王申子撰艮下巽上漸漸進也進以序爲漸爲卦艮下巽上止於下而巽於上爲不遽進之義又木生於山其長也不速非如生於下隰之易也亦漸之象故爲漸漸女歸吉利貞天下事進以漸者莫如女歸臣之進於位人之進於德皆當以序而漸進不以序則淩節犯義凶咎隨之矣事事皆然而女歸之禮尤不可不以漸故以女歸爲義漸之成卦三與四也二爻一交而隂陽各得其正言女歸之吉又利於如此之正也彖曰漸之進也以卦義釋卦名晦庵曰之字疑衍或是漸字女歸吉也進得位徃有功也進以正可以正邦也其位剛得中也止而巽動不窮也以成卦之主及卦德釋彖辭漸以長女配少男言女子不以過期而失其漸之正則人之進也其可不以漸而失其正乎坤之三上居於四乾之初下居於三由二爻交而男女各得其正位是坤隂上往而有功故女歸吉也以此正而行豈但女歸而吉雖一正天下可也故曰可以正邦其位者又謂三四雖得其正未若九五剛中正而居尊位也且止於内而巽於外故動不躁而進有漸進有漸則動不窮此漸之善也象曰山上有木漸君子以居賢德善俗德以漸而成俗以漸而化君子觀山上有木漸長而榮之象於此之賢德則居而守之以俟其自成故无躐等淩節之病於彼之習俗則以善道之以俟其自化故无刑驅勢迫之非蓋德之在已俗之在人皆非一朝一夕所可成者故也初六鴻漸于干小子厲有言无咎鴻飛以序艮巽二體首陽末隂又有大小二鴻相逐而序進之象故取以喻漸之進也干岸也艮少男故曰小子鴻水宿之禽今漸而進于水之干艮之小子但見其止之安以進爲危而有言而不知漸之為漸以漸而進非終於止也況在下則當進用柔則不躁无應則能漸得漸之宜何咎之有象曰小子之厲義无咎也艮之小子雖以爲厲然於漸進之義則无咎也六二鴻漸于磐飲食衎衎吉自干而磐則加進矣磐石之安平者象進之安裕也六二居中得正上應陽剛中正之君以他處之急於進矣二乃體艮而用柔方且從容安裕飲食以自養衎衎而自得无急於求進之心得漸進之道故吉象曰飲食衎衎不素飽也言二以中正自養非徒飽而无意於天下也特不汲汲於進必以漸而進耳九三鴻漸于陸夫征不復婦孕不育凶利禦宼陸高平之原非鴻所安喻三以剛居剛處下之上而不得其安不安故昵比於四四隂婦也三陽夫也三居艮止之極止極者進必鋭而四又以柔巽逢迎於前隂陽相説三迷於往而不知返故有夫征不復之象不正而合雖孕不育以言失漸之正其凶可知然四非偶也乃宼也三若移其不中之剛而爲得正之剛禦而去之則彼此不失其正故利彖傳言得位有功者三與四也而爻辭乃如此蓋卦以全體言爲得位之正爻以時義言爲失漸之宜故曰易之爲道也屢遷象曰夫征不復離羣醜也婦孕不育失其道也利用禦宼順相保也正應上九乃羣類也今三迷於就四而決於離羣是可醜也孕而不育是合非其道也若禦而去之則彼此各保其正是順以相保也六四鴻漸于木或得其桷无咎巽爲木爲風鴻乗風而升于木故曰漸于木然鴻趾連不木棲喻六四以隂乗陽而處不安也桷横平之柯喻不安之中而得稍安之地也此言四雖乗剛不安然居得其正且能巽順以處之故无咎象曰或得其桷順以巽也四躐居高失漸之道而得无咎者順巽而已故天下事欲求稍安於不安之時非順與巽不可也九五鴻漸于陵婦三歲不孕終莫之勝吉陵高阜也九居至尊之位如鴻之升于高陵也婦二也二與五應而爲三與四成卦得時者所隔未能即合故不孕謂不合則无成功也然二五皆中正彼雖暫隔終莫能勝況漸之時其合有漸故終於獲吉三歲者言自五至二厯三變而終與二合得其所願也象曰終莫之勝吉得所願也言三與四終不能勝二五之中正而五得所願也上九鴻漸于陸其羽可用爲儀吉胡氏曰陸字以叶韻當作逵逵雲路也今從之按説文逵九逵之道謂其通達无阻也蓋居一卦之最上處巽體之至極是風之高者爲鴻飛遇風而漸于逵之象鴻遇風則其羽尤爲閑雅不急不迫喻九以陽剛處漸之極而執巽用柔居无位之地德愈高而望愈隆是賢達君子之有高致者也故於進退容止之間從容有序可以爲天下之儀表其吉可知羽儀旌纛之屬象曰其羽可用爲儀吉不可亂也鴻之進也有序而不可亂羽又鴻之所藉以進者以況上九之高致其進也雍容有序而不可亂也兌下震上歸妹爲卦兊下震上誠齋曰漸曰女歸自彼歸我之辭爲娶婦之家也此曰歸妹自我歸彼之辭爲嫁女之家也无父有兄曰妹今從之彖傳言歸妹者三爻辭言歸妹者四六爻即无諸説所謂男女配合之象妹之爲言聖人專取長子嫁前人之少女以爲卦義明矣蓋震一索而居男之長兄也兊三索而居女之少妹也婦人謂嫁曰歸爲兄者動作經營於外爲妹者説順聽從於内歸妹之義也歸妹征凶无攸利三與四成卦之主也位皆不當上下二體皆柔乗剛故征凶无攸利彼歸妹者以兄而尸父之位亦位不當設不善處妹得以乗其兄歸于人而乗其夫亦征凶无攸利也故即卦體而爲之戒彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也以卦體釋卦名義且極言之以爲訓男有室女有家天地之大義也父子兄弟各盡其道亦天地之大義也天地交而後萬物興男女交而後萬世續歸妹者終前人之未終始後人之方始而嫁者又女之終娶者又男之始也説以動者兊説而震動也説而動此易言所歸之妹動于外也必説而動而後兄悌於妹之道盡使不説而動則兄於孝悌之義能无慊乎征凶位不當也无攸利柔乗剛也成卦之主既不當位而二五又不當隂陽之位初上亦不當上下之位一卦三隂皆乗三陽之上如此而往必凶必无攸利也象曰澤上有雷歸妹君子以永終知敝雷震於上澤隨而動兄動于外妹説而從歸妹之象也傳曰昏姻者禍福之始也要必慮永久之所終知其歸之所敝審之於初使可久而无悔斯善矣夫豈獨昏姻爲然哉初九歸妹以娣跛能履征吉初處卑而无正應上承九二之妹娣媵之象也陽剛在婦人爲賢明之德是娣之賢者也跛弱於行也幼孤之妹其行也弱而不振得如是之娣左右之則可行如跛之能履故曰征吉象曰歸妹以娣以恒也跛能履吉相承也傳曰凡師能左右之曰以以娣者言女君能左右之娣聽女君之以也如此之娣然後可久故曰以恒有娣相承則妹雖弱而可行故吉九二眇能視利幽人之貞初三四五皆言歸妹此獨不言者即妹之身也陽剛得中女之賢明者也孤弱難行譬則眇也有兄可望是眇而能視也既有兄可望冝如幽人之貞幽謂安靜貞謂堅正亦剛中處柔自然之德也幽人男女有雅操之通稱象曰利幽人之貞未變常也利幽貞者言方待禮於父兄之家未變其常也六三歸妹以須反歸以娣兊爲少女三兊之成卦者也其少可知以六居三是質柔而用剛也其嫁不及時而失之太早者歟故既曰歸而又曰須是待年也古者諸侯一娶九女其娣姪則有待年於父母之國者今歸而反乃以娣之待年者自處故曰反歸以娣象曰歸妹以須未當也言其歸未當其時也九四歸妹愆期遲歸有時以九居四則是質剛而用柔者過兊之體女已非少下无正應未得所歸是當嫁而失時者也然陽剛在女子爲賢明之德其愆期者非无所歸也蓋欲待佳配而後歸故其歸也有時而少遲耳或曰以九居四爲不當位非也剛而處柔乃婦人之正此爻但以過兊體而无應取愆期之義耳象曰愆期之志有待而行也愆期而曰志者言由己非由乎人其志必待得佳配而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉五以柔順得中而居尊下有陽剛之正應此兄之賢歸妹之善者也王姬下嫁自古而然伊川曰必帝乙歸妹始能正其禮法乎以帝之妹豈不能厚飾其袂今乃不如其娣之袂良以言帝妹能勤儉以律身謙和以待下也以帝之妹易至驕縱陵忽其夫今曰月幾望是隂遜陽而不敢與日爲敵以言帝妹不驕不傲能遜其夫也觀帝妹去貴驕之態盡柔巽之道如此則知帝乙之訓其妹觀帝乙之悌於妹如此則知帝乙之孝於親其吉可知矣象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也上二句舉爻辭下二句釋之也言五居尊位而用中故能以至貴而行其勤儉謙遜之道也上六女承筐无實士刲羊无血无攸利上以柔居柔尊而无德其歸妹不令之兄歟上卦二隂一陽虚筐之象虚則无實下卦兊爲羊瘠則无血是於女則承无實之筐於士則割无血之羊兄而如此前人目不瞑矣上不利於親次不利於身下不利於妹將何所利哉故曰无攸利象曰上六无實承虚筐也使其妹承虚筐以歸于人者上六之過也故曰上六无實五與上皆震體而有賢不賢故取以垂訓離下震上豐大也光明盛大也爲卦離下震上離電也震雷也電烈則雷厲雷激則電威雷電皆至光明盛大之象充滿天地間故爲豐然雷則震驚无常電則乍明乍晦是以光明者易蔽盛大者易虧故卦爻皆以盈虧明暗言處豐之道豐亨王假之勿憂宜日中豐大者无往不亨故曰豐亨假至也極也極天下之豐大者莫若王謂其尊臨兆民奄有四海也故曰王假之然豐大者易虧此所當憂唯如日之中臨照无遺而後可以勿憂亦成卦六二爲日之中而不過成卦九四則動而不中不正矣故發此義以爲處豐大之訓彖曰豐大也明以動故豐以卦德釋卦名義豐所以大者明動相資充滿无際也故曰明以動然噬嗑亦明動也義何以異曰噬嗑動而後明是動有窮而明亦有限故止取一噬一嗑之義此則明而後動是明之所至動亦隨之有充滿无窮之象故大故曰豐王假之尚大也勿憂冝日中冝照天下也日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎釋彖辭言惟王者爲能極天下之豐既極其豐則處豐之道亦當尚乎大茍狹而小則必有所遺矣故曰王假之尚大也豐盈盛大之世處之未易保之甚難唯如日之中所照无遺則可以勿憂若日中而過則是豐而滿滿而虧虧則憂矣故曰勿憂冝日中而復以盈虚消息之理明之日中則昃月盈則缺天地盈虚尚不免與時而消息而況於人乎況於鬼神乎然則處豐之道又不可過也明矣象曰雷電皆至豐君子以折獄致刑噬嗑亦電雷也象曰先王以明罸勑法豐亦雷電也象乃曰君子以折獄致刑蓋噬嗑明在上而麗乎威君道也豐則明在下而麗乎威臣道也故不同君子體離之明以之折獄則察情必審體震之威以之致刑則去惡必果威至而明不至則獄辭不能折而服明至而威不至則刑法不能致而果故必曰雷電皆至初九遇其配主雖旬无咎往有尚實齋李果曰旬十日十盈數也今從之配合也主謂四初所主者孟子所謂觀遠臣以其所主是也豐之成卦明動相資非明則動无所之非動則明无所用初九明之初九四動之初同德相配以成豐大之功雖及旬之盈亦无過咎蓋豐之初未至極而滿猶可以往故往有尚尚即彖傳尚大是也象曰雖旬无咎過旬災也豐之初猶可取盈盈而過則災矣此聖人於豐之初示人以處豐之道也六二豐其蔀日中見斗往得疑疾有孚發若吉明以動故豐謂電之明極於无窮則雷之動亦隨所至而无窮然雷方震則電有光雷収則電熄故豐之六爻唯初九應震之初於上六五應離之中於下故明餘則當雷收電熄之時故暗蔀者蔽明之障也二居中得正爲離之主至明者也五以柔暗應之是明而遇暗故曰豐其蔀日君象方中冝明也而雷震焉斗見焉言其暗也君暗如是必不下賢二若往進必得猜疑忌疾之惡然則若何而可君子之事君不幸而遇其暗亦唯盡吾之誠以感發其心而已二虚中故有孚五亦中虚故可發此六二之吉也象曰有孚發若信以發志也言以己之孚誠感發上之心志也九三豐其沛日中見沬折其右肱无咎沛古本作斾沬小星也豐沛則其蔽甚於蔀矣見沬則其暗甚於斗矣三居明體之極陽剛得正能明者也在豐之時必明動相資而後可以成豐大之功今三雖剛明而正應則上六也以隂居隂暗愈甚矣又震之終動終則止不能動矣肱體之運動者右肱尤力而以上六爲之是三右肱折矣不足與成豐大之功矣雖然三何咎哉故曰无咎象曰豐其沛不可大事也折其右肱終不可用也遇暗愈甚其明愈小故不可以大事且人而折其右肱則終不可以有爲矣九四豐其蔀日中見斗遇其夷主吉四居近臣之位以陽剛爲動之主亦君子之有爲者但遇上六隂暗小人蔽其君故亦有豐蔀見斗之象夷等夷也主謂初也言雖遭暗蔽不足以大有爲猶幸其有同德之賢來主於我而我爲之主得以共成豐大之功故吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也下不當其位上暗而不明失豐之道矣觀近臣以其所爲主猶幸有同德之賢來得行其志故吉六五來章有慶譽吉以下卦而視六五有日中隂蔽之象是明而遇暗者也以六五而視下卦有離明返照之象是暗而遇明者也五又柔順得中謙虚待下故能來致章美之才而用之以成其豐大之功是以有慶有譽而獲吉也象曰六五之吉有慶也處豐之時以六居五而獲吉者六二大臣則中正也九四近臣則陽剛也初與三亦皆剛正之才五能虚中招而來之以共成豐大之治豈唯有譽而已哉其福慶將及於天下此君道之吉也上六豐其屋蔀其家闚其戸閴其无人三歲不覿凶以隂暗之資而處豐盛之極當震動之窮而居一卦之上故其意氣自高自大爲衆所棄豐其屋者自處高大也蔀其家者其内不明也以至暗不明而自高自大雖欲求人人皆不與故闚其戸閴其无人至於三歲而終无所見三歲者謂厯三變而終爲六二成卦之主至明者之所棄凶可知也象曰豐其屋天際翔也闚其戸閴其无人自藏也其自高自大之意蓋不啻翔于天之外故雖欲求人人皆自藏而莫之與以若所爲而處豐大宜其凶也艮下離上旅羇旅也爲卦艮下離上艮山止於内離火動於外爲去所止而不處之象故爲旅止於内者出而麗乎外亦旅之義誠齋曰山止而不動猶館舎也火動而不止猶行人也旅小亨旅貞吉旅者人之離所居而處於外者也小亨言成卦六五以隂柔處旅而得中於外故非不亨但亨而小耳故曰旅小亨貞吉言成卦九三處旅而得其正故所止所麗不失其明故曰旅貞吉謂旅於外者不可以不正不正則憂辱隨之雖亨猶不吉也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉以成卦之主釋彖辭旅於外者所行欲其亨所止欲其安所志欲其吉非柔非順非正不可也蓋旅最難處與家居者不同非必中必正隨時冝而知變通者鮮无悔吝故曰旅之時義大矣哉象曰山上有火旅君子以明愼用刑而不留獄山止於内猶所居也火動於外猶離所居而旅於外也君子觀火明於外而山止不動之象必明愼用刑各當其罪而不可轉移觀山止於内而火動不止之象必明決庶獄當斷即斷而不可畱滯此觀象用易之道不可一途取於此可見初六旅瑣瑣斯其所取災瑣瑣猥細之狀初處旅而以隂柔止於至卑最下之地上有正應不能往從乃瑣瑣然經營鄙細之事卑汚而无遠見此其所以取災也象曰旅瑣瑣志窮災也旅已窮矣而志趣又窮冝其召侮而取災也六二旅即次懷其資得童僕貞二以柔順之德居中得正柔順則與人相親中正則處事得冝是善於處旅者也次旅舎也即之則安資貨財也懷之則厚童僕所輔佐者得之則有助此六二以中正處旅之善故曰貞不曰吉者旅而在下得免災憂即吉矣象曰得童僕貞終无尤也人之在旅所倚賴者童僕之助既得之則次可即資可懐故象止言得童僕為旅之貞旅而得貞則終无悔尤矣九三旅焚其次喪其童僕貞厲處旅之道柔順爲先今三以剛居剛而處艮之上是過乎剛而自高者也自高則不順乎上故上不與焚其次而失所安過剛則必暴乎下故下離心喪童僕而失其助處旅之時以此爲正而固守之危厲之道也故曰貞厲火在上故焚象曰旅焚其次亦以傷矣以旅與下其義喪也既失所安亦以傷矣而又以剛遇下能无喪乎九四旅于處得其資斧我心不快以九居四失其正位是近臣喪而在旅者也居柔應柔是既喪而不能去者也故曰旅于處然以陽剛爲五所麗雖失其正位而猶得其富貴之資威權之柄者也然其志終抑鬱故曰我心不快象曰旅于處未得位也得其資斧心未快也近君處旅而不當位故有此象六五射雉一矢亡終以譽命五君也亦柔得中乎外而順乎剛之旅也此爻謂當以旅而求君旅而得君者爲義何也離爲雉喻六五君德之文明也射雉求中乎文明之君也一矢亡言中之易也謂五有文明之德柔順下賢故賢者之譽易於上達蓋上有明君則旅人一旦而公卿如婁敬於漢馬周於唐可也不然雖孔孟亦終身而旅人矣象曰終以譽命上逮也旅人之譽終得上達而受寵命者君之明也上九鳥焚其巢旅人先笑後號咷喪牛于易凶以過剛之資位一卦之上是高亢自居者也鳥飛而處高之物巢其所安今焚其巢是居高而失所安也旅而以剛處高先則快意故笑後則无與故號咷牛順物也易平地也喪牛于易謂失其柔順平易之道以至於此故凶象曰以旅在上其義焚也喪牛于易終莫之聞也爲旅而以剛明自任終莫聞其喪牛于易之過宜其失所安也巽下巽上巽卑巽也隱伏也巽入也以一隂伏處於二陽之下故爲卑巽爲隱伏二陽至剛而在上一隂巽順而入之故爲巽入其象爲風風之行也柔而力无往不入亦巽入之義巽小亨利有攸往利見大人隂爲成卦之主柔而在下不能大有爲雖亨亦小又隂之小者爲主而得亨故曰小亨以柔巽而入於人往必无阻故利有攸往柔巽而進乃見大人之道故利見大人彖曰重巽以申命釋卦名義上下皆巽故曰重巽風者天之號令也巽順而入於物命者君之號令也巽順而入於人皆上順下而出下順上而從亦重巽之義申亦重也言申復其命令也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以卦德及成卦之主釋彖辭謂二以剛中而巽順乎五之剛中正其志得以上行初與四成卦之主而皆巽順乎在上之剛故小亨故利有攸往故利見大人象曰隨風巽君子以申命行事隨者相繼之謂風以相繼而入於物者也君子以之申其命於先行其事於後庶乎民喻上意而命不虚發如風之鼓動萬物物无往而不順從也初六進退利武人之貞初以柔巽之資求入於陽乃其進也然其質巽懦進不能遂是其退也一進一退疑懼若此若以武人剛貞之志處之乃得其宜故曰利武人之貞蓋巽實乾體初又剛位故可以此勉之象曰進退志疑也利武人之貞志治也進退皆疑其志莫之治者巽而弱也必以武人剛貞之道治之乃其宜也九二巽在牀下用史巫紛若吉无咎二以陽剛之才退處隂柔之位德已巽矣而又居重巽之下是過於卑巽而失其所安牀人之所安者故曰巽在牀下然二實剛中其過於卑巽誠也非僞也五同德而不相應二當求以達其誠如用史巫紛然其多然後其志可以上行而吉且无咎不然則人不以爲僞必以爲諂矣安能吉无咎乎象曰紛若之吉得中也其吉者以二剛而得中其誠有以上達也九三頻巽吝三居下之上以剛處剛而又乗剛在巽之時非能巽者然前巽已極後巽復來上以巽應之二與四又以巽比之三不容於不巽然其巽出於勉强而非自然故屢巽而屢失爲可羞吝也象曰頻巽之吝志窮也三之志本不能巽其勉强而巽者志窮故也六四悔亡田獲三品四承乗皆剛宜有悔者然柔而得正處上之下能巽者也故能上巽乎剛中之君下巽乎二陽之臣善處如此故悔亡況巽乎上者上亦巽之巽乎下者下亦巽之是以一巽而獲三巽如蒐田一舉而得君庖賔客乾豆之三品也柔正之報如是夫象曰田獲三品有功也天下事茍善處亡悔而有功可也況本无悔乎九五貞吉悔亡无不利无初有終先庚三日後庚三日吉五居巽之時以剛處剛疑不能巽而有悔者然居中得正故吉故悔亡且无不利中正一立而百順隨之矣五君也申命行事之主也先庚三日後庚三日者申命行事之審詳也蓋甲者事之起端庚者事之更端也謂戊己居十干之中過中則更矣故庚者更也先庚三日丁也所以丁寧於未更之先後庚三日癸也所以揆度於既更之後无初者未更之初事之非也有終者既更之後事之善也先後各三日其審詳而不輕忽如此宜其吉宜其悔亡而无不利也象曰九五之吉位正中也五申命行事而皆吉者位正中而得正中之道也上九巽在牀下喪其資斧貞凶九二巽在牀下則吉謂其巽也出於誠上九巽在牀下則凶謂其巽也出於僞何以知之以志窮之九三知上窮之情狀也上體剛用柔處巽之極身則居高外則退巽是處富貴崇高之地而極其柔順奸邪之巽者至於失其所居之安喪其所有之剛豈其誠哉其脅肩諂笑巧言令色之儔乎不正甚矣故於貞正之道爲凶象曰巽在牀下上窮也喪其資斧正乎凶也伊川曰正乎絶句巽本善行故疑之曰得爲正乎復斷之曰凶也今從之上窮者處巽之窮於上也疑之曰正乎復斷之曰凶者以著其欺僞之情也兌下兌上兊説也不言之説也二隂爲成卦之主皆居二陽之上隂爲陽所説也坎水塞其下流而成澤故亦爲澤澤之及物滋潤光采亦説之義兊亨利貞兊説也説於物物莫不説而與之乃致亨之道故亨然不可妄説故戒以利貞卦體剛中故亨柔外故利在貞正又柔外故説而亨剛中故能貞此皆兊亨利貞之義彖曰兊説也釋卦名義剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉以卦體釋彖辭而極言之也剛中謂五與二皆以剛居中爲中心誠實之象柔外謂上下成卦之主皆以柔居外爲接物和柔之象徒柔外而不剛中則是非道以求説不正也徒剛中而不柔外則是咈人以從己雖正猶不正也故説以利貞然後其説也皆順乎天理人心之正民皆説之是唯无事有事則民歡趨之勞而忘勞是唯无難有難則民與犯之死而忘死何則聖人但知行吾正以利乎民初非求説於民而民自説之相勸相勉以從乎上故賛之曰説之大民勸矣哉象曰麗澤兊君子以朋友講習二澤相麗互有滋益故君子以朋友講習互相資益蓋天下之可説莫若朋友講習故以取象初九和兊吉説之道有二陽剛者義理之説隂柔者情慾之説初去三之隂柔遠且以剛居剛上无係應是居兊之時人皆以柔説爲説而初獨以剛正爲説説而剛正是和而不流者故曰和兊得兊説之正故吉象曰和兊之吉行未疑也兊以一隂成説之主未免涉乎情慾而初九但行其剛正而不疑故吉九二孚兊吉悔亡三與上兊之成卦也故聖人繋諸爻之辭皆以去隂柔逺近取義二與五皆剛實在中故孚然二孚兊而吉五孚剥而厲何也蓋二无應與其所孚以爲説者三也三雖挾其柔説以來於内然承乗皆剛而又能自處以剛二以中實孚之然説之不以道不説也故其所孚猶兊之可説者故吉故孚于隂柔之悔可亡五亦无應與其所孚以爲説者則上也以六居上柔説之極意剥乎陽五以中實孚之是其所孚者剥陽之極隂也故有厲若聖人不於成卦二隂上取兩爻之義則五剛中正乃反不及二之剛中而不正者乎象曰孚兊之吉信志也言二之孚三亦觀其志之何如而後信之也禮不妄説人於兊之二見之六三來兊凶來來於内也三隂柔不中不正爲下卦之主上无應與乃枉已非道下就二陽以求説蓋隂之性下兊之體説下行而不正如此取凶之道也象曰來兊之凶位不當也唯其不正故就下以求説而取凶也九四商兊未寧介疾有喜四處兊説之時上承中正之五下比柔邪之三而不中不正故於二者之間不能決擇方且商度以爲説心未得寕從五正也從三邪也四雖不中不正然質則陽剛若能介隔六三之疾不爲已病而決於從五則不但疾不染身且有喜也左傳曰介在東鄙介隔也象曰九四之喜有慶也言能絶邪從正而得君之説是有喜也得君則福慶及於天下是有慶也九五孚于剥有厲章指見九二爻辭下此爻聖人專以孚上六取義象曰孚于剥位正當也與履九五小象意同謂正當尊位若中實孚上之柔説則消剥於陽必矣故有厲上六引兊上以隂柔成説之主處説之極是柔説之最者其意又欲引下二陽相爲容説然五剛中正而知厲四承中正而知介雖上有引兊之邪謀而未必其從也故未有凶咎象曰上六引兊未光也未光者未明也來兊凶而引兊不凶者上六當位而其邪説未行也坎下巽上渙散也爲卦坎下巽上風行水上也風之爲物飄忽衍迤水之爲物散漫周流其性皆无定止而風又行於水之上披離解散渙之象也故爲渙渙亨王假有廟利涉大川利貞坎下難在内也能以巽順處之使之渙然而釋此渙之所以亨二五剛中亦致亨之道廟者斂聚人心誠敬之地假至也至于廟所以聚人之渙也利涉大川者木乘風而行於水上所以濟世之渙也處渙之道利在貞正而固守之故又曰利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乗木有功也以成卦之主及卦象釋彖辭成卦之二以陽剛來坎之中在他時爲陷於險此則坎已渙故來而不窮成卦之四以隂柔而得位於外且上同乎五上之二陽此渙之亨也萃言假有廟人心聚而保其聚也此言假有廟人心渙而欲其聚也王又至其中則渙者愈聚矣巽風也木也坎水也險也木乗風而順行於水之上是渉大川而有功也此亦以言渙之所以亨也此下疑脱利貞一節象曰風行水上渙先王以享于帝立廟享上帝立宗廟皆所以聚人心之渙散也卦辭爻辭皆言處渙之道享帝立廟乃其大者故以取象初六用拯馬壯吉渙之始而急拯之又得馬壯所以吉馬健而行謂二也二剛健與初皆无應故相親比初又順而承之以拯其渙如得壯馬以致遠必有濟也故吉象曰初六之吉順也謂能順從九二剛中之賢也拯之於初亦順而易故曰順也九二渙奔其机悔亡晦庵曰九奔而二机也今從之机者憑藉以取安之器奔急趨也九奔而二机謂九剛健而二安靜也二之時其渙未深二能以剛中之才急圖安定之計以聚之則悔可亡若既渙而復自擾之或悠悠以處之則天下何時定乎象曰渙奔其机得願也二大臣也當渙之初能急趨以求定豈徒已得所願欲而天下之人亦皆得其所願欲矣六三渙其躬无悔渙之六爻唯三有應然其身未脱於險故志雖從上而不能行必也渙其躬不爲坎險所陷然後能與上九聚而无渙散之悔也象曰渙其躬志在外也外指上九一卦之外也自此以上四爻皆因渙以拯渙者謂渙其所當渙則不當渙者聚矣六四渙其羣元吉渙有丘匪夷所思羣指下二隂四之羣類也丘聚也大也指上二陽聚之大者也世道所以渙由羣小黨私害公是以蕩无紀綱至於渙散而不可收拾今四居近君之正位所謂得位乎外而上同者也雖應初比三而以正義自處下散其羣而上得乎二陽之聚以致大善之吉此其思慮豈夷常之人所能及哉故曰匪夷所思再言渙者上謂處渙下謂渙之時也象曰渙其羣元吉光大也能渙其羣類以致元吉則其所爲豈不光大矣乎九五渙汗其大號渙王居无咎五陽剛中正之君不幸而處渙散之世所以聚天下之渙者大號令也大號令者所以起衆人之聽一衆心之嚮也五能渙其大號如汗一𤼵而不復反則人之聽嚮也堅而渙者聚矣此九五於渙之時得正其所居之位而獲无咎之道也象曰王居无咎正位也言能正其所居之尊位於天下渙散之時者居中得正其大號令大建立足以繫天下之望也上九渙其血去逖出无咎以諸爻文法律之渙其血句也渙之諸爻皆无應與亦渙散之象獨上與三相應然巽風居上亦无聚之理故渙其血血者隂之傷謂三也三居坎險之極爲險所傷上以陽剛之質居巽順之極故能巽順事理渙其所傷之應去之遠之出之唯恐其不渙也故能出乎險而免於難是以无咎其郭林宗申屠蟠處世道渙散之時自渙其禍難之事乎象曰渙其血遠害也渙其所傷之正應者遠禍害故也兌下坎上節有限而止也爲卦兊下坎上澤上有水滿則溢平則容其容有限節之象也兊説坎險説過則流險以止之節之義也故爲節節亨苦節不可貞人之欲无窮物之生有限以有限奉无窮聖人憂之故爲之節節者約其過以歸於中也節則裕裕則通故亨然過於節則人情苦之而不可久故曰苦節不可貞言節而至於苦則不可固守以爲常也事事皆然不但節於財而已彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民以卦體卦德釋彖辭而以成卦之主爲訓也凡事有節則不窮故通而亨卦分二剛一柔以與内分二柔一剛以與外内則有餘外則不足亦節也且二與五皆剛而得中中則不過亦節也若節而過則人情苦之節道窮則非亨矣且人之情遇歡説則不知止必遇艱險而後能止方説而止亦節之義五又以中正爲成卦之主中正則其節也通而不窮故曰節亨大而天地亦以有節而後四時成是以聖人必設禮敎立制度使尊卑有分貴賤有等上下知節故財不傷而民不害也象曰澤上有水節君子以制數度議德行澤上有水適平而止過滿則溢其容有限節之象也君子以之制數度議德行數多寡之數度法制軌物德充諸中行發於外必制立之擬議之使表裏精粗皆中節也初九不出户庭无咎節有限而止也陽剛在下居得其正當節之初知其時未可以行故謹言謹行至於不出户外之庭是知節而能止者故无咎象曰不出户庭知通塞也時有通塞通則行塞則止當止即止其知通塞之君子乎繫辭專以愼密言語説之兊體故也九二不出門庭凶門則高大於半門之户矣然不出户庭不出門庭一也初以无咎二以凶何也初无官守言責守正而不出宜也二大臣也當仕有官職者而乃比柔以失其剛居隂以失其正不應於五是知節而不通者也能免凶乎象曰不出門庭凶失時極也失時極者失時冝之至不正故也六三不節若則嗟若无咎三質隂柔而不中不正者也在下之上則有驕奢之失處澤之盈則有滿溢之患居説之極則有淫樂之非三者皆非能節者也故不節若不節則必至於困困而後咨嗟慨嘆亦何及矣皆其自取又誰咎哉故曰无咎象曰不節之嗟又誰咎也言如六三者自不知節以取困窮无所歸咎也六四安節亨四柔順居正上承剛中正之君是剛柔相濟安於節者也且處坎之下不泛不溢節之安者也故曰安節安則不逆乎物理不咈乎人情何徃而不可行故亨象曰安節之亨承上道也四之安節非一端然大要則承九五中正之力也九五甘節吉往有尚甘不苦也中則甘過則苦也節者聖人之中道五以剛正居中是節之得其中者也中則无過不及无過不及則人樂行之故不苦而甘而吉斯道也无所往而不爲人所尚故曰往有尚此所謂中正以通節之盡善者也象曰甘節之吉居位中也節以得中爲貴五得正又得中故甘故吉上六苦節貞凶悔亡上以隂居隂處節之極是節之過者故苦彖言苦節不可貞今上六貞固守之而不知變通冝其凶也然既曰凶而又曰悔亡何也蓋節至於苦而貞守之固取凶之道然禮與其奢也寧儉且上處一卦之外過乎節以行其一槩之苦雖非中道亦何惡於人何傷於物哉故苦節之悔亦可亡也象曰苦節貞凶其道窮也夫子釋之與彖傳同咎其不知變通也若如初之知通塞則節之道不窮矣兌下巽上中孚信之由中也爲卦兊下巽上風於澤澤於風二者以虚相入以實相受中孚之象也晦庵曰二隂在内四陽在外而二五之陽皆得其中以一卦言之爲中虚以二體言之爲中實亦中孚之象又下説以應上上巽以順下亦爲孚義中孚豚魚吉利涉大川利貞聞之鄉先生云瀘州毛兼山曰豚魚今俗所謂河豚魚豚魚出則澤必風江湖間以爲風信今從之中孚者此信於彼彼信於此皆出於中心之誠也豚魚出則澤必風此天地間不言之信風澤中孚之象也人之孚信及夫豚魚則孚道至矣故曰豚魚吉中虚可以濟難猶舟虚可以濟險今乗巽木而行於兊澤之中亦涉川之象故曰利涉大川正者又孚之本不正非孚也故又曰利貞彖曰中孚柔在内而剛得中説而巽孚乃化邦也以成卦之主及卦德釋卦名義且極言其用也柔在内謂成卦三與四也通一卦言之是爲中虚剛得中謂二與五也析二體言之是爲中實中虚中實皆孚之義且下説而上順上巽而下從相孚以誠化邦之道也豚魚吉信及豚魚也利涉大川乗木舟虚也中孚以利貞乃應乎天也釋彖辭中孚之信及夫豚魚則孚亦至矣故吉卦有舟虚之象且以順行故利涉大川誠者純乎天理一毫无僞天之道也人之孚誠一出於正乃合乎天之道故曰利貞應乎天也象曰澤上有風中孚君子以議獄緩死澤體虚風入之而實風亦虚澤受之而實猶人心虚誠充之而實故爲中孚之象繫獄者恐其有虚中之實故議之臨刑者恐其有實中之虚故緩之此君子體中孚之象而用其誠也初九虞吉有它不燕虞度也相孚之初宜度其可信者而後信之則吉蓋人之交也當度而後信无信而後度初以剛正之資與四爲應四亦居正是初能度其可信而信之既得所信則當專一以信之若復有它則不得其安矣燕安也言相孚之道不可不謹之於初也象曰初九虞吉志未變也相孚之初其志專一是未變也既有定嚮而方虞度則是有它矣豈相孚之道哉故於志未變之初而虞度則吉九二鳴鶴在隂其子和之我有好爵吾與爾靡之聲之高而聞之遠者鶴也在隂者以陽處隂而在下也以喻九二唱孚道之善而在下也子者同氣相求之類和者此以誠感彼以誠應也我謂九五吾九二自謂爾即所和之子也好爵人所同欲者謂五之中正人所慕者靡與縻同共也言九二居大臣之位以剛中孚實之德上輔剛中孚實之君唱孚道於下能推其心之所同欲者與同類共之是以物无不應人无不孚此繫辭所謂出其言善則千里之外應之者也象曰其子和之中心願也言二以誠實感人如此唱之和之皆出於中心之至願也六三得敵或鼓或罷或泣或歌敵者孚之敵也六三虚中以應上九將以求孚也然三以隂居陽處兊説之極上以陽居隂處巽風之極彼此俱无定主是求孚而得孚之敵也故不能以誠相孚而唯情欲是狥情之所激則奮然而鼓情之既衰則萎然而罷茍遂所欲則欣然而歌茍違其欲則慘然而悲動爲情欲所役孚安在哉象曰或鼓或罷位不當也三與上位皆不正故不能爲中虚之孚而適足爲中无定主之敵也六四月幾望馬匹亡无咎四以隂柔得正而居中虚之位五以陽剛得正而居中實之位以此之虚受彼之實上下交孚如月受日之明而相望然曰幾者猶有未滿蓋四與三皆成卦之主而又同類相比故也古者車用四馬不能備純色則兩服兩驂各一色小大必相稱故兩馬爲匹四必絶三之比如馬亡其同類之匹進而上行一於從五則君臣以正交孚乃可无咎卦唯二隂故曰匹象曰馬匹亡絶類上也謂必絶其同類而上從九五然後不害其所孚三四皆成中孚之主而失得不同者正與不正也九五有孚攣如无咎中孚諸爻皆不言孚而五獨言之豈非孚誠之德唯五獨有之乎蓋五以巽順中正爲孚之主初上同德相親三四柔順相承九二剛中而應上下牽攣而歸之是无一民一物之不孚也何咎之有象曰有孚攣如位正當也五之位中正五之德中實若民若物莫不孚之是稱其位也故曰位正當上九翰音登于天貞凶上剛實疑有孚者而乃居柔體巽處孚之窮窮則變而匪孚矣巽爲雞雞曰翰音雞之爲物輕躁好動獨鳴不失時有信之聲而已亦豈一舉沖霄之物哉今乃登于天故取以喻有名无實足以欺世盜名而竊高位者也其晉王衍唐訓注之流乎雖貞亦凶況不貞乎象曰翰音登于天何可長也言无孚之實則其所謂孚者可暫不可久也艮下震上小過小者過也隂小者過乎陽也爲卦艮下震上山上有雷雖震於高非震於天小過其常之象也四隂在外二陽在内隂過乎陽小者過也又隂居尊而陽失位爲小者過其常也皆小過之義小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉過者過乎常非過乎理也事有當過者過所以就中也蓋矯之小過然後能及於中乃求中之用也當過而過則過者乃所以爲亨也故曰小過亨利貞者過之道利於正正者謂當過而過不失其時宜之正也隂柔得中得位故可小事陽剛失位不中故不可大事卦有飛鳥之象焉故取飛鳥過乎所遺之音亦以言過之小也三與四成卦之主也四之陽爲二隂所乗逆也故不宜上三之陽爲二隂所承順也故宜下是小過之義雖曰過而一順乎理故大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦體卦象釋卦名義并釋彖辭事固有待小過之而後亨者故曰小者過而亨也謂當過而過非過也隨時之宜乃過之正故曰過以利貞與時行也卦之二五皆以柔居中故小事則吉卦之二陽皆失位不中故大事不可爲也横觀卦象如飛鳥焉鳥飛而遺其音以過所過不遠亦以言過之小也上卦隂乗陽逆也下卦隂承陽順也故不宜上宜下言用小過之道者一順乎理之當事之宜雖小過其常亦可以獲大吉也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷在地中爲復在天上爲大壯此震動萬物之常也今震於山上是小過其常君子以之爲事之可以小過者如行之恭喪之哀用之儉是皆可以小過而无傷者也故以言之初六飛鳥以凶初隂柔在下於卦象爲鳥翼之末當隂過之時昧宜下之戒而上應九四是隂邪小人得所依附不量己力不度時宜欲高飛于上而不知其過者也其取凶宜矣象曰飛鳥以凶不可如何也初翼之銳而上復有助故其飛而取凶也亦莫如之何也已六二過其祖遇其妣不及其君遇其臣无咎陽在上者父也尊於父者祖也四在三之上祖之象也五又隂而尊過於四妣之象也隂與陽遇理之常也今六二乃過九四而與六五遇是過其祖而遇其妣也然二與五有相應之位无相應之情五不與應是不及其君也既不及其君退而以中正自守九三以剛正比之是遇其臣也過祖遇妣過矣不及其君而遇其臣又過其常皆小過之事然退而得不宜上宜下之道焉故无咎象曰不及其君臣不可過也既過九四而不遇其君矣則九三其又可過乎蓋小過三與四皆成卦之主而二獨中正故雖過而不失其宜也九三弗過防之從或戕之凶小過隂過於陽也隂既過則陽弗能過之矣故三與四皆以弗過爲辭然四所遇者羽翼方生之初六猶可固守以待其自定三所遇者羽翼已成之上六小人得志其所爲必過甚在三尤宜防之若不知防而又從之則將有不我容而戕害我者矣故凶三剛而得正唯能防之巽而不中則或從之故有此戒象曰從或戕之凶如何也聖人戒九三之切如此九四无咎弗過遇之往厲必戒勿用永貞陽剛失位宜有咎者然以剛用柔不過於剛故无咎隂過之時陽雖居上終不能過之與初爲應初方有飛揚上進之勢終與相遇但不可往而從之從之則小人之勢愈張而危厲立至矣故戒勿用往唯常永正固以待之可也蓋隂過之世陽不中正或慕乎隂故戒之象曰弗過遇之位不當也往厲必戒終不可長也以陽居隂故曰不當往則厲必戒勿往謂小人凶惡不可長之長之則愈過也此亦小象一句包兩句義例也六五宻雲不雨自我西郊公弋取彼在穴隂陽和然後雨今隂過乎陽故雲宻而不雨我指五隂也雲隂物西隂方三四五互體爲兊故曰西郊皆以言隂過之極然五雖質隂而得中用剛下有二陽爲之輔二陽公之位初上之敵也初與上如鳥之飛揚自取凶久矣今過而至於極則止止則各安其所居之穴可以弋而取之彼對我而言謂昔之所以不雨者隂過而不和今五用剛以二陽弋而取之則隂之過者適中矣故无凶咎象曰密雲不雨已上也已上者言隂已過而至於上極矣五可以弋而取之矣上六弗遇過之飛鳥離之凶是謂災眚隂從陽理也三爲正應乃當遇而弗遇隂下陽理也二陽在下不當過而過之至如飛鳥之遠揚此上六小人以震動之極處隂過之窮過常越理之甚過五者上逆天道違三者下拂人理也故三不得不防五不得不弋宜其凶而天災人眚並至也象曰弗遇過之已亢也亢者言隂過而至於窮極也離下坎上既濟事之已濟也爲卦離下坎上水火相交而相爲用一隂一陽亦各相交而致其用且六爻之位皆得其正又火以烹水水以柔火乃能相濟故曰既濟既濟亨小利貞初吉終亂既濟六爻各當其位二五中正而陽皆下於隂下之者亨之也故曰亨小言小者亨也小者猶亨則大者可知亦既濟之象也利貞者處既濟者利在貞固以守之亦六爻皆得其正故也初吉者既濟之初六二中正爲之主也終亂者既濟之終以上六隂暗之極而處之也彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也以卦體卦德釋彖辭卦之三隂皆上乎陽是隂之小者亨也利貞者卦之六位剛柔正而位當也是天地間事事物物各得其分位之當也柔得中指六二柔順得中爲能成既濟之功於初者也故曰初吉終止指上六以隂居隂柔暗不立非克終既濟之才也故曰終亂其濟極則道窮也人之常情多難則憂憂則吉无難則怠怠則亂聖人見其初吉而探其終亂故即卦體而爲之戒象曰水在火上既濟君子以思患而豫防之既濟雖非有患之時患每生於既濟之後君子思此而豫防之則可以保其初吉而无終亂之憂矣初九曳其輪濡其尾无咎曳牽引也陽動而在下輪之象濡浸濕也處一卦之後尾之象九處既濟之初險猶在外是猶有未濟者初以剛正之才當竭其力應上以畢其濟雖濡尾而不恤其曳輪而進至於濡尾非不勝任也圗畢濟之勇也不然溺於方濟敗於垂成者有之矣故曳濡而无咎象曰曳其輪義无咎也處濟之初義當從上以畢其濟何咎之有六二婦喪其茀勿逐七日得二應五五陽也夫也二隂也婦也三四蔽其前猶茀也茀婦車之蔽詩所謂翟茀以朝是也言二以柔順中正成既濟之功而五乃處既濟而自滿怠於用賢且水火之體復相違戾三又從而乗之四又從而爭之如婦喪其茀而不能行也逐從物也勿逐七日得言二之車雖爲三四所沮而九五正應終於必合中正之道終於必行七日者謂自二七變而復至於二復得與五中正相應也象曰七日得以中道也言三與四能沮二之車於暫而不能沮之於七日之後者二五皆以中行正故也九三高宗伐鬼方三年克之小人勿用既濟之世冝靜以保之三乃挾至剛之資處炎上之極與上六之終亂者爲應非善保既濟者然以九居三雖過剛猶得正也險在外猶鬼方也故取用剛不已伐遠而得正者爲辭高宗殷之賢王當平世而伐遠國其義雖正猶至三年之久然後克之既克之後復有勿用小人之戒則其危懼可知三臣位而曰高宗何也五處既濟以剛居剛好大喜功失其中正之道故九三得以間六二之中正輔之而爲此過剛之舉故曰高宗三累上也三年者自三變而至五也沮二應上故戒以小人勿用象曰三年克之憊也三年然後克之憊可知也得正且若此況不正乎六四繻有衣袽終日戒四離下體乃濟道變革之時而又居坎故以舟爲義繻衣也袽又衣之敗者所以補苴舟漏四衣常有袽是有處坎之備矣而且終日戒懼不怠言四居近君之位而得其正防患慮變如此周密善處既濟者也然不言吉者既濟而无患即吉矣象曰終日戒有所疑也時雖既濟然居坎體不能无疑慮也九五東鄰殺牛不如西鄰之禴祭實受其福王童溪曰東鄰既濟之九五西鄰未濟之六五以小象不如西鄰之時也見之今從之蓋既濟未濟反對卦也聖人於觀象繫辭之際多互取以相發明如濡尾曳輪濡首及伐鬼方兩卦皆有之則東鄰既濟之九五西鄰未濟之六五是矣蓋九陽也故爲東六隂也故爲西謂既濟之時財物豐盛驕蹇之心易生雖有殺牛盛禮而誠意不加故不如未濟之時儀物雖微而驕蹇之心不作禴祭雖薄而誠意有餘足以受大來之福也何也時使然也此皆自其君致之故於既濟九五兼發此義言人君處既濟如未濟而後有受福之實不然雖極其豐盛而濟道衰矣故曰不如西鄰之時也象曰東鄰殺牛不如西鄰之時也實受其福吉大來也未濟之時其福方來而未艾人君處既濟如未濟則亦受大來之福矣上六濡其首厲上以隂柔暗懦之資處既濟治安之極居坎體之上而懷宴安之志是溺於目前而忘終亂者也至濡其首其凶可知不言凶而言厲者欲人知危懼而速改則濟猶可保也坎體故濡在上故曰首象曰濡其首厲何可久也既濟之終而以小人无遠慮者處之冝其敗壞之速濟不可久也坎下離上未濟事之未濟也爲卦坎下離上與既濟相反水火不交不相爲用隂陽六爻皆失其位以互體循環觀之一卦之象重坎又坎若无可濟之理故爲未濟既濟矣而受以未濟以終六十四卦見盈虚消息之理治亂安危之變无窮已也窮則非易未濟亨小狐汔濟濡其尾无攸利未濟者事之未濟而求其濟者也濟則亨矣五爲成卦之主柔而得中亦有致亨之道故曰未濟亨狐善渡而性多疑疑則不濟陽皆居乎柔故小弱性多疑才小弱故欲濟而未濟汔幾也今多疑則志不勇小弱則才不逮故幾濟而濡其尾獸濟必掲其尾尾濡則不能濟此未濟之象也將何利哉故曰无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也以成卦之主釋彖辭未濟所以能亨者成卦六五體柔用剛得柔之中且得位之中也是以能亨小狐幾濟而不能濟者成卦九二以剛居柔而陷於險而陽剛皆未出於坎之中也汔濟而濡其尾如事之幾成而敗前功俱廢不續終也將何所利哉然六爻雖不當位而一剛一柔亦各相應尚可有爲若加以勇爲之志克終之才則終須濟矣象曰火在水上未濟君子以慎辨物居方火炎上而復居上水潤下而復居下此卦所以爲未濟也六爻陽上隂下亦各正隂陽之位故君子以之慎辨物居方謂使物類各有辨所居不亂方也初六濡其尾吝初以隂柔處坎之下上應乎四處坎則不安有應則必進然四非中正之才不足與濟是時未可也而初不量力不度時冒然輕進至濡其尾何益哉故吝吝其不自度量也象曰濡其尾亦不知極也極終也謂冒險直前以圖濟而不思其終之難也九二曳其輪貞吉既濟初九曳其輪者竭力助上以畢其濟也未濟九二曳其輪者竭力爲上以求其濟也未濟乃君道艱難之時九二以陽剛居大臣之位受六五孚信之知其可坐視乎故乗其中正之車牽曳其輪而進雖未濟保其必濟此二居中行正之吉也故曰貞吉象曰九二貞吉中以行正也以九居二爲得中居中故能行其君臣之正道而獲吉也六三未濟征凶利涉大川三處未濟之時既曰征凶而又曰利涉者何也蓋以其隂柔不中不正往而濟天下之難決无可濟之理故凶以其得剛應之助而身已出險則渉而濟一己之溺亦利也象曰未濟征凶位不當也若陽剛中正則出險可以濟矣尚何征凶之有九四貞吉悔亡震用伐鬼方三年有賞于大國四居隂應隂將有悔者故戒以貞謂能正固以守其陽剛之志則吉則悔可亡也處既濟者利於靜處未濟者利於動震動也鬼方遠也三年久也亦謂厯三變而至上則濟也蓋四以剛明之才居近君之位上輔虚明中順之君以濟世艱難若能貞固其志雖勞雖久而不憚則必有功而受大國之賞矣四已出險而又得君故有此象象曰貞吉悔亡志行也九四所以吉而悔亡者貞固之志得行也故天下之建功立業者以志爲尚六五貞吉无悔君子之光有孚吉五以柔居剛柔而能剛也居中得中中則能正也以此而居尊位冝其吉而无過柔之悔況又有文明之德虚其中以任陽剛之賢是君子而謙光者也虚中故有孚孚則人信之雖未濟而可以畢其濟也故德業皆吉象曰君子之光其暉吉也離故有光暉者光之散光盛則有暉然則暉生於光光生於謙此未濟六五非既濟九五自滿自大者所能及歟上九有孚于飲酒无咎濡其首有孚失是夫濟終則變而濟盈虚消息之理然也況初濡尾以圖濟二曳輪以必濟三有涉川之利四有受賞之功至五吉而又吉是除大難爲无難變未濟爲既濟矣然則上九豈非風濤既息舟楫達岸棹夫奏功之時歟九又能以至剛至明處之冝乎上下有孚信其已濟歡然交欣于飲酒以樂其樂也然樂而不過則无咎若過於樂如既濟上六濡其首則於方濟之初所信者非所信矣故曰有孚失是失是者非也謂先信其已濟者皆非也是以聖人繫辭分明於无咎之後曰濡其首再言有孚而以失是二字解之象曰飲酒濡首亦不知節也既濟坎上故濡首此離上而亦曰濡首者謂亦如既濟之上六溺宴安而不知節也今夫子着一亦字於濡首下益見聖人互取二卦以相發明何也諸卦小象言亦者皆繼彼之辭如頤初九亦不足貴言隂朶頤已不足貴而陽亦不足貴也小畜九二亦不自失言初已自道二亦不自失也咸九三亦不處也言初與二已動三亦不處也則此亦字繫於濡首之下是繼既濟上六之辭明矣不然聖人於不知節也之上加一亦字不幾贅乎大易緝説卷八
