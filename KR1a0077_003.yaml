body:
  text: 大易緝説卷三元王申子撰上經乾下乾上乾健也陽之性健乾陽之純健之至者也得陽之健而成象之大者曰天故以天為乾之象孔子曰乾陽物也物物皆有乾凡三才之內屬乎陽者皆乾道也乾元亨利貞此文王之辭以斷一卦之義即夫子所謂彖也元亨利貞乾之四德元物之始亨物之長利物之遂貞物之成乾主宰造化終始萬物者也元而亨亨而利利而貞物始而終也始而終終而復始此乾之所以為乾生生化化所以無窮也或問曰伊川曰乾天也誠齋曰乾為天為君子皆不以為然何也曰言得乾之大者為天為君可也若統言乾則周萬物而不遺夫子曰乾陽物也説卦曰乾為天天之乾也為君為父人之乾也為金為玉地之乾也為寒為氷氣之乾也為圜象之乾也為大赤色之乾也為良馬為木果物之乾也凡肖形天地間者物物有乾專以天與君言恐非易之旨初九濳龍勿用此周公之辭晦庵曰畫卦自下而上故以下爻為初誠齋曰積天數之一三五曰九理無形也故假象以顯義龍陽物也變化無常升降有時故取以象乾之陽也初以陽德在下其象為濳藏之龍于時為未可用惟當養晦以俟時勿者禁止之辭也九二見龍在田利見大人二離濳藏而見于田是陽氣發逹於地上龍德已著之時也九五與天地合德之大人也而為之應故曰見大人見則九二剛中之道得行故曰利九三君子終日乾乾夕惕若厲無咎九陽剛三陽位以陽居陽而乘二陽之上是重剛也而又不中且居下之上是未離于下而尊顯者也以重剛不中之體處非上非下之時乃危厲之地也唯其剛健得正故能終日乾乾進修不怠加以惕懼至夕不休故處危而無咎不失其為君子也三居下之上四逼近君位此二爻獨不稱龍聖人之意微矣哉九四或躍在淵無咎或者疑而未必之辭躍者動而向於上也淵者靜而安於下也九陽也故或躍四隂也故在淵謂九四居下體變革之際當進退未定之時宜動則動宜靜則靜隨宜進退以就安則無咎也九五飛龍在天利見大人五君位也剛健中正以居之是以天德而居天位其象為飛龍在天謂非人力所能致也所利者見在下大德之人與之其成天下之治而天下亦利見乎大德之君也上九亢龍有悔以純乾之九處一卦之上剛之極位之極也故亢亢者髙上而不能下之謂陽剛過極而至于亢必有悔用九見羣龍無首吉用九言用剛也聖人於乾坤二卦特發剛柔之用以為諸卦之凖羣龍者衆陽也言衆陽皆當以柔濟之而不可過故用剛之道無過於剛而動為物之先則吉首先也彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧此愚所謂彖傳蓋夫子傳文王之彖以言聖人用乾之德也彖者總斷一卦之體能用乾全卦之體者唯聖人故以言之此章必錯簡大明至御天十五字合在乃利貞下大哉贊乾元之大也其大也萬物資之以為始始者氣之元也天亦賴之以總攝焉統者總攝之謂元貫四德亦可以見其統天也此乾之元也散而雲行溥而雨施品彚之物莫不流形於一元和暢之中此乾之亨也元亨出之序利貞入之序故乾道至此而生變化萬物由此而正性命受於天曰命賦於物曰性性命各正是復保合其一元之和此乾之利貞也始即元也終即貞也始而終終而復始天道也惟聖人能大明之以成六爻之位辨其時用之宜不宜又隨其時之宜乘六陽之變以行天之道御者行也如御車焉進退自我險易遲速則因之而已此聖人用乾之德以行天之道也故能首出庶物之上而萬國咸得其寧至此則聖人之德在天下即乾之德在萬物矣或問曰子移聖經之文而説之可乎曰義以必當為主此章夫子舉文王乾元亨利貞之彖而傳之然後言聖人用乾之德以行天之道語意甚明白錯簡無疑况此亦晦庵釋論語互鄉童子見章之例移其義不移其文何不可之有象曰天行健君子以自強不息此夫子之辭乾之大象不言乾而言健與諸卦不同者乾之象大非聖人莫能盡故但言其行健欲人皆可取法也君子上下通稱之名自強不息亦法其行健而已濳龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也此夫子舉周公爻辭而釋之初之濳以龍德而在下也二離濳而見是乾陽發逹於地上龍德之施已普也三居危厲之地故反復於道而不敢自寧也四當可以進可以無進之時審其可而後進則兀咎也五則大人之所為聖人之事也上九亢之極何可久也用剛以柔不為物先乃善用天德者也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞此亦夫子之辭所以申彖傳之旨彖傳之言四德即天道以明之誠者之事也文言之言四德即人道以明之誠之者之事也君子體仁以下言君子體乾之德體者法其所為體之於身之謂也元者萬善之長君子體之以仁則足以君長乎人而無不愛亨者百嘉之會君子體之以禮則足以備秩情文利者萬物之宜君子體之以義則足以裁制事物貞者事之幹也君子體之以正固則如木之有幹足以植立于事君子而行此四德者乃合於乾也初九曰濳龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔濳龍也此夫子再釋爻辭也初以龍德而隱於下故守其道不為時世之轉移晦其光不求名譽之聞逹遁乎世而不以為戚人非之而不愠於心可樂者行之可憂者違之隱居以求其志行義以逹其道確乎其堅而不可奪此初九之所為也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也龍德而正中者以乾剛健之德而處正中之位也正中者以九居二得中而居中也故能於常言常行之間必信必謹外間其邪內存其誠其善足以兼一世而位乎下故處之若無其德足以普萬物而得其中故所過者化是九二有君人之德而無其位者也故利見九五以行之九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九三君子所以乾乾者進德修業而已德足乎已措於事為業其進修也必以忠信為主故其德日進必修其辭而不妄發於外立其誠而無自欺於中故其業日廣又必致知於始求知所當至者而至之故志有定向而可與幾幾者擇善之端也又知其終而力行以終之得其所當至者而至焉故可與存義義者事理之當然也九三內而進德外而修業如此是以居下之上而不驕居上之下而不戚雖處危而得無咎也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎或躍而上或淵而下乃心非為邪也或進而躍或退而淵所行非違衆也蓋君子進德修業至四已成矣時行時止惟時之宜及其時則無咎也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也天地間同聲必相應同氣必相求水於濕火於燥雲從龍風從虎氣類感召皆出於自然有不約而符者夲乎天如日月星辰必親乎上本乎地如草木山川必親乎下亦莫不以類相從大人者出乎其類者也故一作興而在上下固利於見之而上亦利見乎下是亦各從其類也故曰利見大人上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也上雖髙而在外九雖陽而居隂是貴而無位也下皆歸五而不歸已賢皆就五而不就已是無民無輔也孤亢如是焉能無悔況悔吝生乎動剛極無不動者故曰動而有悔濳龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此夫子三釋爻辭也下者時方在下未可用也時舍者時所居猶在田也行事者行其進修之事也自試者審其可則進不可則止是自試其可不可也上治者升乎上而治乎下也窮之災者亢極則災也天下治者言聖人以乾元之德用剛中之道則天下治也濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此夫子四釋爻辭也初九以龍德而潛於下當養晦以待時也以九居二剛柔雜為文而見於地上是文明已著也九三則進修不怠之心與天運相為不息也九四離下而上乃乾道變革之時時既革則處之者亦不可以常也故當審進退之宜九五以天德而宅天位以天位而處天德德與位相稱也上九則時已窮極而處之者又不知變是與時偕極所以動而有悔也天則者剛而不過乃天道當然之則於乾之用九見之乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也此夫子三釋彖辭贊乾之德與道而又言聖人用乾之德以行乾之道也乾之德分之為元亨利貞合之則一元而已元亨出之序自無而有功用相因故曰始而亨言始物者元也亨物者亦元也利貞入之序由散而斂其功用異故曰性情言散而各遂者情也斂而同歸者性也利而貞是性其情也而又曰乾始能以美利利天下則元始之中已有利矣不言所利者所利非止一事故曰大矣哉此贊乾之德也大哉乾乎以下則又贊乾之道剛健中正純粹精乾之道也剛言其體健言其用中者五與二也中正者五也剛而不過為得中者二四上也剛而得正者初三五也此其所以為純粹純者純乎剛健不雜於隂柔粹者一出於中正不雜于邪惡純粹者剛健中正之至精者又純粹之至也此他卦莫能與之同乾之所以為大也故聖人於六爻發揮之以旁通夫濳見厲躍飛亢之情矣而又隨其時之宜乘六陽之變以行天之道焉是以聖人之德流行天地間如雲之行雨之施而天下無不平也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也此夫子五釋爻辭也藴於身為德見於事為行德成而施於用日可見之者行也今初九隱於下德雖成而未見於外是行之未成也故弗用君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也學以聚者聚其善問以辨者辨其非進德之事也寬以居者其處心廣而大仁以行者其及物公而溥修業之事也此九二有君人之德而位乎下之所為也故利見九五大人以行之九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣卦之六位兼三才而兩之初與二為地三與四為人五與上為天三之所居是上未至於天下巳離於田危厲之地也唯剛健而不失其正故能乾乾進修因時惕若是以雖處危地而無咎也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎四上不在天下不在田而又出乎人之上矣是處非可必之地故疑疑則必能審進退之當故無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎大而天地明而日月變而四時幽而鬼神無往不合者合乎道也蓋大人者至公無私以道為體者也先天而天弗違謂意所欲為默與道契而無所戾也後天而奉天時謂知理如是順而行之不失其宜也故大而天地衆而人物幽而鬼神皆弗能違此大人之所以為大是以一作興於上普天之下莫不利於見之也亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎進必有退存必有亡得必有喪理之常也亢而不知能無悔乎唯聖人為能知其理之必然處之以道而不失其正故聖人無亢坤下坤上坤順也隂之性順坤隂之純順之至者也得隂之順而成形之大者曰地故以地為坤之象孔子曰坤隂物也物物皆有坤凡三才之內屬乎隂者皆坤道也坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉乾之元始萬物者也坤之元承乾之始而生萬物者也亨萬物利萬物則同獨貞體異乾以剛健之正為貞坤以柔順之正為貞牝馬取柔順而健行之義乾健行故為馬坤亦為馬者坤乾之配乾行而坤止則無以承天之施而成其化育之功此所謂柔順之貞坤之德也君子而行坤之道者亦唯柔順而已故居先則迷處後則得主利者凡隂之道皆主乎利故曰利萬物者主乎坤西南隂方故得朋東北陽方故喪朋必喪朋然後成其生育之功亦主利之事也安貞吉者謂安靜正固則吉蓋先而不後則失柔順之正朋而不喪則無主利之功不安靜則將妄動不正固則為柔邪失坤道矣彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆此以地道明坤之德以釋彖辭至極也比大之義差緩大則無窮至則有極也始者氣之元生者形之元生萬物者坤也然坤不自生順承天之施而已故其厚足以容載萬物其德足以配合乎乾此坤之元也含𢎞謂其靜而翕則含且𢎞光大謂其動而闢則光且大品彚之物所以咸亨此坤之亨也馬而非牝則不順而非地之類牝而非馬則不能配乾而行地兀疆此坤之柔順利貞也故君子行坤之道者先乎陽則迷而失後乎陽則順而得以隂從隂猶與類行以隂從陽然後有慶又必安靜正固而後獲吉者蓋不安靜則為妄動不正固則為柔邪失坤道矣此章三無疆各不同德合無疆言坤之德合乾之無疆行地無疆言坤得地道之無疆應地無疆言人能合坤道之無疆也象曰地勢坤君子以厚德載物坤地也以形言故曰地勢坤見其所積之厚君子體之以重厚之德容載萬物也初六履霜堅氷至以六之隂居坤之初為隂雖微其勢必盛故聖人為之戒曰履霜堅氷至霜隂之始凝堅氷隂之極盛欲人履之於初知其終之必至於盛而謹之也誠齋曰積地數之二與四故曰六晦庵曰隂陽者造化之本不能相無而消長有常亦非人之所能損益者然陽善而隂惡聖人作易於消長之際必致其扶抑之意焉所以贊化育而參天地也象曰履霜堅氷隂始凝也馴致其道至堅氷也魏志曰初六履霜今從之初隂故取象於霜霜隂之始凝也馴順也言理勢之順也謂隂雖微馴致其道必至堅氷為可畏也六二直方大不習無不利二以隂居隂而在下柔順中正盡坤道之善者也故以地道之至善者言之直者因物之性而生之無所偏曲也方者隨物之形而成之一成而不變也大則德合乎乾也此皆坤道自然而然不假修營而物自生功自成者也故曰不習無不利象曰六二之動直以方也不習無不利地道光也坤之六二靜則中正動則直方直方因動而後見而地道之光又因直方而後見故曰六二之動又曰地道光也六三含章可貞或從王事無成有終以六居三為以隂晦陽故曰含章謂含藏其章美也可貞謂可貞固守之也可者僅可之辭蓋三居下之上得位者也又不可終藏其美而不發故或出而從上之事但不當專有其成以為已功唯當順承以終其事而已蓋以隂居陽而又處二之上四之下其時其位不得不然也象曰含章可貞以時發也或從王事知光大也含非含藏終不發也待時而後發也或從王事而能無成有終者必其知之光大也淺暗者有善唯恐人不知豈能含晦哉六四括囊無咎無譽四居純隂之世位近於五而無相得之義是上下不交時也然四自得其正能謹默晦藏如結括囊口而不露故得無咎既晦藏則無譽矣處斯之時亦不宜有譽曰無譽亦所以戒之也象曰括囊無咎慎不害也四遇純坤之時能慎如此故曰不害不然居近君之正位而全身逺害以自安寧得無咎乎六五黃裳元吉以坤之六而居五為以順處中而在上黃坤之正色亦中色也裳下體之服言以坤順之正而不失其中雖在尊位而能服守坤下之體故大善而吉不然則大凶可知春秋傳南蒯將叛而筮得此以為大吉子服惠伯曰忠信之事則可不然必敗是也象曰黃裳元吉文在中也六柔也五剛也剛柔雜為文而又得中居中故曰文在中文在中故能明理而無過是以元吉上六龍戰于野其血玄黃乾為龍龍陽物也坤無陽之卦聖人於上六特稱龍者存陽也蓋隂盛之極必軋乎陽故陽與之戰水龍所安今戰不于水而于野者言失其所安而戰于外也隂盛故敢與陽抗而兩敗俱傷血隂也其血玄黃言隂傷而陽亦不免于傷也象曰龍戰于野其道窮也不唯隂之道窮陽之道亦窮矣履霜不戒以至於此凶不待言也用六利永貞隂道柔而難常易於失正故用柔之道利在永久而貞正象曰用六永貞以大終也隂本小而能大正也能長守正則雖隂柔而可以大於終也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行物亦有柔者而坤為至柔物亦有靜者而坤為至靜至極也唯柔之極故其動也剛剛者發生必逹也唯靜之極故其德必方方者常而不變也唯其柔故後乎陽而有得唯其動也剛故功化光大唯其靜故含萬物而不遺唯其德之方故主利而有常坤能此者亦承天之施行天之時一本乎順而巳故贊之曰坤道其順乎承天而時行主字下脫一利字積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也此夫子再釋爻辭也天下事未有不由積小以成大者禍福皆然必有者言此理之必然也積之者善則福及子孫積之者不善則殃及後世至於大惡不道亦豈一朝一夕之所致哉莫不由積而成人能謹其微而辨之早則禍亂何自作乎履霜而戒堅氷之至蓋言理勢之順不可不謹其微而防其漸也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直言二之正也方言二之義也正者以隂居隂義者得中之謂君子以敬直其內則亦二之直也以義方其外則亦二之方也敬義並立而德不孤此其所以能大如此則何所用而不周何所行而不利哉行而疑則習不疑則不待習矣故曰不習無不利隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也以六晦陽故能含美而弗敢成以三體隂故能從事而代有終謂三非有美而不發特不敢暴其美唯知代上以終其事而不居其成功猶地代天生物而功則主於天也此因六三以隂之體而居陽處上卦之下而居上發明坤道之當然者以為訓也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也四居純坤之世位雖正而與五無相得之義是上下不交而志不通時也是天地閉而賢人隱時也故取括囊之象言不容不謹以自守也君子黃中句通理正位居體美在其中而暢於四支發於事業美之至也黃坤之正色黃中謂以坤順之正居中得中備坤道之美者也美者其孟子所謂充實之善由中逹外皆此美也故能通逹天下之理辨正君臣之位居守坤下之體其發於外者如此豈非美之至乎蓋黃中美之在其中者也通理正位居體美之暢於四支發於事業者也或問曰諸説皆以黃中通理為句而子獨於黃中絶句何也曰周公爻辭例於初九六二之類兩字上取象取義故夫子釋之稱象曰今此爻黃中字實坤六五之象其通理正位居體乃所以釋黃中之美况通理二字即小象所謂文在中之意非連黃中為句明矣今觀諸家通理絶句者曰文中而逹於理曰有文德而逹於理曰以黃中養德性而通至理於坤六五象義何所取耶隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃隂盛之極必逼乎陽故陽疑之而與之戰稱龍者為嫌其無陽而存陽也且稱天玄是戰有陽也龍豈濳龍之謂哉借曰潛龍則與戰者誰也蓋以時勢言之雖隂強而陽弱以理勢言之隂極必衰陽亦可以少伸矣故戰而俱傷血隂也未離其類故稱血亦不與隂之強也聖人之辭嚴矣哉震下坎上屯難也為卦震下坎上震坎二體隂陽在下而始交其象為雲閣於雷之上而未成雨是隂陽之氣鬱結而未亨也故為屯震動也坎險也動而遇險亦屯之義伊川曰在時則天下未亨泰之時也屯元亨利貞勿用有攸往利建侯此以下元亨利貞字各隨卦義只作兩字解與乾不同易之不可為典要者類如此元亨主五而言利貞主五與初而言勿用有攸往利建侯主初而言蓋初與五成卦之主也五以陽剛中正居尊位雖處屯陷於險而未亨然亨則必大故曰元亨處屯之道利在貞正非貞正何以濟屯故曰利貞坎險在前而初居震體戒其妄動故曰勿用攸往然非終不往也貞正固守求助待時而後往也且天下之屯非獨力所能濟故利建侯彖曰屯剛柔始交而難生動乎險中以二體釋卦名義易之初純陽之乾純隂之坤而已今震一交而為坎坎一交而為震皆居二體之初而為成卦之主故曰剛柔始交以震遇坎故曰難生震動坎險故曰動乎險中是以為屯大亨貞雷雨之動滿盈天造草昧宜建侯而不寧以卦象釋彖辭草昧下脫勿用有攸往一句彖無不釋之文也屯所以能大亨者貞也貞者正而固也非正固何以濟屯故處屯難者不可妄動動必以正果正矣是唯無動動則大亨如雷雨一動而滿盈於天地之間亨孰大焉天造時運也方時運之屯其亂也如草木之未齊其暗也如昧之不明其可冒進乎故勿用有攸往唯宜建立君長旁求輔助與之勠力圖濟而不可自安也象曰雲雷屯君子以經綸雲鬱結於雷之上而未成雨屯之象也君子以之經綸者多難之際正君子經綸之日經綸如治絲順而理之則治紊而紛之則亂謂必審事變之由籌濟屯之道經綸於心而措之事業也初九磐桓利居貞利建侯初以剛正之才當屯難之世居動體而應乎險未能遽進故磐桓時既未利唯宜居守其正以待不可妄動故利居貞初以陽下隂是能以賢下人而得民者也屯難之世宜建之以為侯初亦宜求賢以自助故曰利建侯全卦彖義盡屬初爻以初成卦之主剛正君子雖在下乃濟屯之才也象曰雖磐桓志行正也以貴下賤大得民也初磐桓有待者其志終欲行其正也況方屯之時隂柔者不能自存有一陽剛之才衆必從之以為主而初又能以貴下賤大得民心在上者果能建之以為侯則屯可濟矣故利六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字班班師之班分散而退也二與五中正相應而初亦成卦之主得時於下而已乘之故為所難屯邅而不進乘馬而復班然初下賢者也非與二為冦乃求與二為婚媾者但二守正而不從禮曰女子許嫁笄而字不字者不許初之婚媾也十年乃字者謂二處屯一難也乘初又一難也是必再變脫初之難而後遇五正應而後字而成其婚媾也蓋言六二以中正處屯故能終免於難象曰六二之難乘剛也十年乃字反常也二以柔乘剛為初所難乃其屯也及時與事遷再變而遇正應是反其常也或問曰易中三年十年二歲十嵗字舊説不曰久則曰終而巳而子必以爻變數之何也曰此蓋以復之七日臨之八月例觸類而得之聖人繫辭無一字不在六畫上取來諸説往往皆謂聖人但據理繫辭多是設辭多是泛説初不拘卦爻之象所以為説不勝支離而易之道晦矣六三即鹿無虞唯入于林中君子幾不如舍往吝三質暗而志剛不中不正處屯之時而當震動之極上無應援而貪於進取如逐鹿而無虞人為之引導則唯有陷入於險阻之中而巳言屯而妄動動而愈屯也若以君子見事幾者處之不如舍去往則徒取困吝之辱耳外暗而處屯故唯入處屯而內剛故能舍象曰即鹿無虞以從禽也君子舍之往吝窮也無虞而妄動以從欲也無虞而即鹿以貪禽也君子則見幾而舍之若往則益取困吝之窮也六四乘馬班如求婚媾往吉無不利四居近君之位而得其正者也然處屯之時以柔居柔其才不足以濟故乘馬欲進而復班已之才既不足若能求賢自輔而往則可濟矣初九賢而在下正與已應四若求此婚媾而往輔陽剛中正之君則屯可濟而吉而無不利矣象曰求而往明也知已不足求賢自輔而後往可謂明矣已不能而遂已或又妬賢嫉能至暗者也九五屯其膏小貞吉大貞凶五以陽剛中正居尊位然處屯之時陷於險中內外之臣又皆柔弱而初九得民於下衆皆歸之是威權不在於已膏澤不下於民人君之屯也若以中正之道小正之以漸則可獲吉若以陽剛之道大正之而暴則取凶矣象曰屯其膏施未光也膏澤之施不出於已出於已亦不周於下是未光大人君之屯也上六乘馬班如泣血漣如以隂柔之資處屯難之極無應無與居則不安行則無所之故乘馬班如二之班如將有所往四之班如將有所待今上之班如何所往何所待乎故莫知所為至於泣血漣如言屯之極也象曰泣血漣如何可長也屯難之極而以至柔處之其能久乎坎下艮上蒙蒙昧也物生必蒙謂物之初生蒙昧而未明也伊川曰為卦艮上坎下山下有險遇險而止莫知所之蒙之象也山下有水水必行之物始出而未知所之亦蒙之象蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞成蒙卦之主者二與上也今卦義專主二而不主上以上居一卦之外故也二以陽居中剛而不過得時中之道故亨蒙之未亨所求者陽之明也我謂九二唯陽故明是能發人之蒙者五蒙卦之主其質隂柔如童之蒙而下應之是蒙之世二不求五而五求二也為二者亦宜待上之求而後應之如是則彼之信向也專而我之發之也易若求之自我則不唯教者之心不虛而受教者之心亦不專矣筮者心有未明而求決於明之事決蒙如決筮初則至誠一意故告之再三則瀆慢不誠故不告蒙而求發與明而發蒙者皆當一出乎正故曰利貞亦以二五皆不正故戒彖曰蒙山下有險險而止蒙以卦象卦德釋卦名義艮山也坎險也山下遇險莫知所之內險不可處外止莫能行莫知所為故為蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也以成卦之主釋彖辭蒙之能亨以亨道行也亨道時中也時謂用當其可中謂無過不及亦謂五以隂居陽二以陽居隂皆位乎中也志應者主五而言謂五之志應於二也剛中主二而言謂初筮則至誠一意而來告之者以吾剛中之道告之也若再三則其誠不一與吾剛中之道相戾故不告縱告之彼亦不能信受徒為煩瀆瀆滋蒙耳故曰瀆蒙蓋五體柔而志剛故有誠不誠之異也蒙者純一未發之天也及其未發而以正養之可以作聖此蒙之所以利貞也象曰山下出泉蒙君子以果行育德山下之泉水之始出者也未有所之若人蒙稚未知所適也泉之性行山之性止此欲行而彼止之是行而未逹也皆蒙之象誠齋曰山下之泉其決也不可禦君子得之以果其行其積也不可測君子得之以育其德初六發蒙利用刑人用説桎梏以往吝隂暗在下蒙者也蒙貴於發發貴於初發之之道其蒙而未逹也則宜用者刑威以懲之其蒙之既逹也則宜用者説械繫以寬之或刑或説當隨其宜而用之於初過此以往則扞格而難勝故吝蓋初六質隂故蒙故不免於用刑居陽故可發故可以用説象曰利用刑人以正法也發蒙之初法不可以不正或刑或説不失其宜乃發蒙之法故於初言之九二包蒙吉納婦吉子克家二處蒙之時以剛中之德為一卦之主上應於五得時得位而獨明者也故能包蒙納婦而皆獲其吉包蒙者包衆蒙而為之主也納婦者受衆隂而為之歸也此通一卦而言也五尊也父也二卑也子也處卑而任尊者之事子克家之象也此以應五而言也謂包蒙納婦而皆吉者子克家故也苟非盡子道而包之納之則僭亂耳何吉之有象曰子克家剛柔接也二以剛中承於五五以柔中應於二剛柔相接故能成其主蒙之功也六三勿用取女見金夫不有躬無攸利六三以隂居陽而應比皆陽非純乎蒙者故不言蒙唯不中不正而志剛妄動近見九二為衆蒙所歸得時之盛乃舍其正應而下從之如女之見金夫不能自保其身者何所利哉故聖人不言蒙而專以女之行不順者言之然是亦蒙之至也象曰勿用取女行不順也女之所行唯正則順今行而不順其可取乎六四困蒙吝四以隂處隂既已蒙矣蒙所賴以發者陽明也四于九二則隔於三于上九則隔於五獨逺於陽而又無應是困於蒙者也故可吝象曰困蒙之吝獨逺實也陽實隂虛獨逺實者謂於一卦之中獨不能近陽實之賢故困於蒙而無由逹也六五童蒙吉六五質隂故蒙得中而居剛故能求明童取未發而資於人之義謂五以柔中之德應九二剛中之賢虛其心弱其志如童稚之資於人以成其治蒙之功其吉可知象曰童蒙之吉順以巽也舍已資人順從也降志下求卑巽也能順而巽此其所以有作聖之功歟上九擊蒙不利為冦利禦冦上九亦成卦之主發人之蒙者然居卦之終為蒙之極蒙之極則不明以九居上為剛之極剛之極則必擊以剛而擊人之蒙禦冦也不明而過用其剛為冦也故曰不利為冦利禦冦蓋以剛居上處蒙之極外暗而內剛故不可不以過用其剛而為之戒也象曰利用禦冦上下順也使上九善用其剛因其蒙而擊之如因其冦而禦之則上之辭順下亦得以去其蒙其心亦順故曰上下順也乾下坎丄需須待也為卦乾下坎上乾健而上行前遇坎險不能遽進有須待之義雲上於天欲雨未雨猶有所待亦須待之象故為需需有孚光亨貞吉利涉大川需待也有坐而待人者有行而待於人者九五成卦之主以陽剛中正陷於險中下有三陽進為之助而為隂險得位者阻於其間故五貞守以待三陽之至下三陽亦遞進以待隂險之平故皆不陷於險而能亨亨則必光大也五剛中故有孚中正故貞孚則一於誠貞則正而固以此而需何往不吉何所不濟故大川亦利涉也剛健而不陷於險亦利涉大川之義彖曰需須也險在前也剛健而不陷其義不困窮矣以卦德釋卦名義需者坎險在前須而後進也唯剛則內有所主故能需唯健則動不可禦故能濟且剛健者其動必躁乃能需待而不妄動則坎險不能陷之矣此需之義所以不至於困窮也需有孚光亨貞吉位乎天位以正中也利涉大川往有功也以成卦之主釋彖辭言需所以能有孚光亨貞吉者五以正中而居尊位為需之主是有其位有其德也以此德居此位而需何往不濟故其亨也光明盛大往而涉險則有功也象曰雲上於天需君子以飲食宴樂雲上於天欲雨未雨有所待也故為需君子體此於事之當需者亦更不容復有所為但飲食以自養宴樂以自怡待其時之至而已一有所為則非需也初九需于郊利用恆無咎人所居曰邑邑外曰郊自邑而郊是離所居而有行矣蓋初健體以剛居剛不能不行行則正與四應是行而遇險不能不需故曰需于郊以健體已動而需未必能久故戒之曰利用恆恆者久也需而能久則無冒險之憂故得無咎象曰需于郊不犯難行也利用恆無咎未失常也既行于外而能需是不冒險而行者也故無咎九二需于沙小有言終吉需之為卦以二體言坎險在前不可遽進故需通六爻言四以一隂險而得位阻三陽之進故下三爻指四以分逺近過四而五則陽剛得助需者濟矣蓋二與五同德相應其近險者欲濟險也猶沙近水而滲水也故曰于沙自二至四互體兊也兊為口舌故不免小有言語之傷謂與四相失矣然二居柔守中能不躁不競以需險之夷故終能濟險以獲吉象曰需于沙衍在中也雖小有言以吉終也以剛處柔居中得中是能寬衍以需險之衰者也故與四雖小有言而終與五協濟以獲吉九三需于泥致冦至泥則切近水矣險已近而又以剛用剛而進逼之是招致冦難之至也蓋三剛而不中居健體之極而逼近坎險故有此象象曰需于泥災在外也自我致冦敬愼不敗也坎之災猶在外自我逼之所以來也冦難既自我致之若能敬愼以禦則可無敗蓋所逼者隂柔不能敵吾之剛正也六四需于血出自穴乾陽志於上進坎陽需于酒食以待之久矣四以一隂當其進而處需之時不能早避故見傷血者隂之傷也然居得其正又以柔處柔故能去其所安之穴順以聽之是以雖傷而不至於凶也象曰需于血順以聽也此三陽進而一隂退避之象需之險於是濟矣九五需于酒食貞吉酒食所以養生亦以待客五陽剛中正處坎險之中需同德之來久矣而六四一隂阻之於下故唯以中正之道自養以待其至如備酒食以自養且以待客之來也故曰需于酒食此五貞正以需而獲光亨之道故曰貞吉象曰酒食貞吉以中正也五陷於險中善處需而獲吉者中正故也上六入于穴有不速之客三人來敬之終吉穴所安也以六居上位之正乃所安也入于穴安其所安也乾之三陽既與坎之陽遇則需已濟矣剛健上進不極不止故不待促之而自來然上隂位非陽所安上六又非阻其進者故但安其所安而敬待之彼三陽之需既濟則志願已畢矣故不唯不相陵犯且將得其助而盡夷其險故云終吉象曰不速之客來敬之終吉雖不當位未大失也隂上為主陽來為客是不當其位然用之得其道亦不為大失也坎下乾上訟爭訟也為卦坎下乾上晦庵曰上剛以制其下下險以伺其上剛險相接能無訟乎誠齋曰天道上行水性下注天左而西水右而東相違而不相親皆訟之義故為訟訟有孚窒惕中吉終凶利見大人不利涉大川訟之成卦九二也以剛居中故有孚有孚則不誣陽陷於險故窒能窒則不爭坎為加憂故惕知惕則懼而不敢輕以九居二為得中得中則處之不失其宜此皆處訟之吉道也若訟而至於終窮不反則凶矣訟者不過求辨其曲直也故利見大德之人以決之不利涉大川者謂不可冒大險而行僥幸其吉也亦以二陷於險乾陽上進而不能援有不利涉之象彖曰訟上剛下險險而健訟以卦德釋卦名義訟常息於彼此之相能常成於兩彼之不相下險者狡健者強上挾其強下恃其狡二者相遇能無訟乎伊川曰上剛下險險而又健也若健而不險不生訟也險而不健不能訟也險而又健是以訟也訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也以成卦之主及卦德卦象釋彖辭孚者中實而無妄也窒者塞其爭忿之心也惕者謹畏而不敢輕也中者不過於剛而和平為尚也處訟之道如是則吉亦九二剛自外來而得中成此卦義也蓋訟非美事若極意為之則必凶故曰訟不可成也然聽訟非其人則是非曲直或不得其平所尚者見剛明中正之大人如九五者以決之故曰利見大人與人訟者宜擇安平之地以置其身若冒危行險則將愈入於深淵不測之所陷其身矣故曰不利涉大川象曰天與水違行訟君子以作事謀始天水相違而行訟之象也若彼此相順訟何由興君子觀此知人情相違則必訟故凡作事必謀其始所以絶訟之端期於無訟也初六不永所事小有言終吉訟之六爻以應為敵取象義此非初訟四蓋四挾其剛強訟初者也初位卑才弱得止則止故所事不永然乖違之初不能無暫忿故小有言而終不成訟人我無傷所得多矣故曰終吉吉者不訟之吉也初一變則為兊故曰有言象曰不永所事訟不可長也雖小有言其辨明也止訟於初者上也故於訟之初即以訟不可長為戒所謂辨者豈待上之人為之辨哉初與四相敵亦相應可以自辨是是非非唯理之從故能吉也九二不克訟歸而逋其邑人三百戶無眚五以剛健中正而居一卦之尊二以剛險不正而為成卦之主正所謂險而健故訟二之敢於訟上者以成主得時附之者衆也蓋居坤體二隂附之故曰邑人三百户古者九夫為井四井為邑今曰邑人三百戶是強大也強大故敢於訟上然五剛中正其可訟乎是為訟而義不克也知其不克歸而棄其附已之衆而逋竄焉雖不能無失然猶可以免刑戮之眚也居柔故能逋象曰不克訟歸逋竄也自下訟上患至掇也知義不克歸而逋竄猶可免禍若不知自反則禍患之至如掇拾而取之矣彖稱二剛來而得中而爻義乃如此蓋彖總言一卦之體爻則據其時之用以言之也六三食舊德貞厲終吉或從王事無成六三巽之變今互九四九五亦巽也巽雖柔懦順德也三與上敵應上健極而終凶者也三以柔巽居下不敢與訟而上九極其剛強好上之勢以陵之三幸與九四比猶故舊也四又承五為能庇之三乃就四而受庇焉故曰食舊德以一隂處二陽之下亦有託庇之象然恃人而無慮不可也又當貞正自守常懷惕厲則可終吉且柔從剛下從上理也或者非必之辭謂或從四於王事則不可有其成功若有其成則非避訟者所宜况志在避訟不在從事乎此三質柔用剛與終訟者為應雖能出險而未離乎險故發此義象曰食舊德從上吉也世之柔巽懼訟而借庇於強者多矣况四承五而三比之上得以從王下得以免訟吉可知也舊説皆曰從上九上九之事豈得為王事乎况上九乃訟之終凶者從之豈能獲吉乎九四不克訟復即命渝安貞吉復反也即就也命正理也渝變也四以剛居健體故躁動而不安以九居四故失正而不貞本剛強健訟者然初為之應初柔弱不與之訟四亦居柔且承九五中正之大人而能自止故不克訟而反就正理變其不安不貞而為安貞所以吉也象曰復即命渝安貞不失也反而就正理變而為安貞故不失其吉也九五訟元吉五以剛健中正居尊位是聽訟而得其中正者也天地間唯一中正而已自情偽滋人不皆中正訟所由興今訟之大人以吾之中中天下之不中以吾之正正天下之不正使天下共由乎中正之道而無訟焉所以為元吉元有大善之義象曰訟元吉以中正也五之所以獲元吉者以中正之道化民訟不待聽而自無也上九或錫之鞶帶終朝三褫之鞶帶柔下之服喻六三柔服於下也褫奪也謂三變而遇九二剛中得時者褫奪之也蓋上不中正處訟之終極其剛而好上於人是肆其強而終訟者也雖或與之柔服而下之亦不能止其剛強好上之心故不終朝而三見褫奪言剛而善訟者訟之愈善則嫉之者愈衆也象曰以訟受服亦不足敬也上九訟之終凶者也雖勝而有得亦不足敬况褫奪之辱隨至乎坎下坤丄師兵衆也為卦坎下坤上地中有水水聚於地中衆聚之象也水由地中行師由律中行之象也伊川曰內險外順險道而以順行師之義也一陽為衆隂主統衆之象也比以一陽主衆隂而在上君之象也師以一陽主衆隂而在下將帥之象也故為師師貞丈人吉無咎九二成卦之主也以一陽統衆隂於下將帥統師之象也行師之道以正為主興師動衆以毒天下而不以正民弗從也動以正矣帥師者又得其人然後吉而無咎吉謂有功無咎謂無過丈人謂年德才謀為衆所尊信畏服者也不然則衆心不服行師雖正其能吉乎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣以卦體卦德釋彖辭能以之以猶春秋以某師之以謂能左右之也二以一陽得中衆隂皆為所以也能以衆正正天下之不正則可為王者之師矣王者以德行仁之稱剛中而應謂二以剛處中而五以中順應之是得君信任之專也坎險坤順行險道而順人心師之正也毒害也師旅之興不無傷財害民之事然唯正唯順則毒天下所以安天下故民説從之吉又何咎矣象曰地中有水師君子以容民畜衆散漫而不一者水也容受而無遺者地也水斂聚於地之中衆聚之象君子體此以容保其民畜聚其衆也初六師出以律否臧凶律法制紀律也否不以律也臧善也在卦之初為出師之始出師之道當謹其始先明紀律紀律不明則威信陵夷人心玩弛雖善於用師亦取凶之道也故曰臧凶象曰師出以律失律凶也師出必以律失律則凶矣雖幸而勝亦凶道也九二在師中吉無咎王三錫命二以剛中之才上為六五所應下為衆隂所從於師之時師之主將也梱外之事將軍主之軍事不從中覆故曰在師在師之權既專則可緩可急可剛可柔可進可退周旋舉措皆適其中故吉而有功且無過咎此主將之事也在師使衆知有將錫命使將知有君知有君則不患其專矣至於再至於三諄復之意也錫命如遣使勞軍就軍賜爵之類是也或曰錫命舊説皆以為三錫恩命謂一命受職再命受爵三命受服而子獨以為命令之命何也曰此爻方言在師未及行賞况聖人分明在上六師告成功時言論功行賞之事六爻之等何可亂其次耶象曰在師中吉承天寵也王三錫命懷萬邦也天王也在師而得中吉者承王之寵任也再三以懷來萬邦之意命之者見非殘民以逞師之正也六三師或輿尸凶輿衆也尸主也三不中不正以柔居剛是小人之才弱志剛者而居二之上是二為主將三躐而尸之也凡任將不專偏裨擅命權不出一者皆輿尸也軍旅何所聽命乎其取敗必矣故凶象曰師或輿尸大無功也自古用師權不出一而致覆敗者多矣况望其有功乎六四師左次無咎左次退舍也兵法上將軍居右是師以右為尚左乃無用之地次舍止也蓋四柔而得正故能見可而進知難而退雖無成功然賢於冒不韙而取覆敗者多矣故無咎象曰左次無咎未失常也度不能勝完師以歸亦師之常也伊川曰易發此義其仁逺矣六五田有禽利執言無咎長子帥師弟子輿尸貞凶五君也師之主故以興師任將之道言之五柔順得中非起兵端者敵加於已不得已而應之如田有禽害吾稼然後獵之執言奉辭也明其罪以討之是為有名之師師之正也故利故無咎長子謂九二望尊而更練者也弟子謂六三六四隂小而輕率者也任將宜專若使長子任事而又使弟子得而衆主之則師雖正亦不免於凶矣象曰長子帥師以中行也弟子輿尸使不當也二以剛中受命而行任使已當矣若參以小者輿尸其事則為不當其凶宜也後世有以宦者為監軍何見哉上六大君有命開國承家小人勿用上師之終功之成大君論功行賞之日也大者命之有國小者命之有家然小人有才無德雖有功亦不可用唯以爵祿金帛賞之可也若使挾功而有國有家其禍可勝既哉此聖人於用師成功之後而為深長之慮也坤體國家之象隂柔小人之象象曰大君有命以正功也小人勿用必亂邦也大君恩命所以正定功賞而小人勿用者恐恃功而亂邦也當師之終而以隂柔居之故有小人之戒坤下坎上比親比也為卦坤下坎上衆爻皆隂獨五以陽剛居君位衆所親附是下比於上九五一陽陷於險而不寧亦與下相親附是上比於下上下相比比之義也伊川曰物之相比無間莫如水之在地上比之象也故為比比吉原筮元永貞無咎不寧方來後夫凶五以一陽居君位為成卦之主天下之吉莫吉於此故曰比吉人相親比則安亦吉之道原始初也筮占度也言相比之道當占度在初也元大善也永可久也貞正道也蓋無長人之善則雖比而不親無可久之德則雖比而必離無貞正之道則雖比而不吉故人之相比宜占度於初必得元永貞如九五者然後比之則無咎也且人之安寧不覺相親相比之有益唯不安不寧將恐將懼之際則莫不汲汲以求相比故曰不寧方來亦以言成卦九五也後者退却不前之謂陽夫也謂五也隂婦也謂上也婦而比夫當然之理况比之時下比其上上比其下唯恐不先而上獨退却而後其夫自處孤危凶之道也彖曰比吉也比輔也下順從也以卦體釋卦名義物相親比乃吉道也五以一陽中正以居尊位下之衆隂順而從之故曰比原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也以成卦之五及卦體釋彖辭剛中謂五以剛處中故備此元永貞三者是以相比而無咎也四隂在下順從於五是下比乎上五處險中不寧而下比於四隂是上比乎下故曰上下應言上下之志相應而為比也四隂比於五五比於四隂而上六孤立於外是上六處上下相比之時當比不比如後其夫者則將孤危屈辱以自取困窮失比之道宜其凶也或問曰舊説後夫皆謂卦唯一陽為衆隂所比設再有一人後來求比則此交已固彼來已晚故凶非真有一個後夫者此聖人不過據理設辭耳而子獨指上六言之何也曰聖人觀象繫辭正謂卦有如此之象則繫以如此之辭今五以一陽居尊四隂比之於下故彖曰下順從也而上六獨孤立于外而不從豈非後夫之象歟象曰地上有水比先王以建萬國親諸侯物相親比而無間者莫如地上有水水地相比而不容間先王體此以建萬國親諸侯者所以比天下而無間也比之成卦五也人君比天下之道無大於此故以取象初六有孚比之無咎有孚盈缶終來有它吉孚信之在中者也初居比之始故言彼此相比之道有孚比之孚之在人者也人有孚誠而後已往比之故無咎有孚盈缶孚之在已者也已有孚誠則人來親比故又吉焉盈實也缶質也盈缶謂充實其誠不事假飾唯以質實相比也它不一也謂卦中同德者不一皆相親比其吉可知象曰比之初六有它吉也初六云者比之始也比之始而不謹吉可得乎六二比之自內貞吉二以柔順中正之德上應陽剛中正之君是相比之善者也二處於內故曰自內自內云者言由已也任賢使能則由乎君委質為臣則由乎已謂二必中正自守待上可比而後比之若汲汲求比則非君子自重之道蓋二雖中正然以柔質順體而處比不容不戒象曰比之自內不自失也五中正居尊為下所比二以中正應之是二之比五尤比之正者也今戒以自失無乃涉後凶乎曰非然也言二不可過於柔順以求比乃不自失耳六三比之匪人以隂柔之資不中不正而乘應皆隂所比皆非其人凶悔吝不言可知也象曰比之匪人不亦傷乎人之相比欲求安且吉也乃比於匪人不亦可傷乎傷其失所比也六四外比之貞吉以六居四為得其正故能下舍初六隂類之應而外比九五剛明中正之賢得比之正者也故吉象曰外比於賢以從上也五剛明中正之賢而居君位四比之是比於賢而從上也豈非貞吉乎九五顯比王用三驅失前禽邑人不誡吉五以剛中正而居尊為比之主當比之世盡比道之善者也人君比天下唯當顯明可比之道以示之其從其違聽其自然夫豈區區求人之比已哉如天子之田不合圍開一面網止於三驅禽之來者取之禽之前而往者寧失之而不逐邑屬於已誡告戒也言人自比之如屬已之邑不待告戒而自孚也人君比天下之道其大公至正如此故吉前禽上六之象邑人坤下之象象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也顯比之所以吉者處正中之位行正中之道也舍逆取順聽其自然如前禽之不逐也然人自從之如已之邑人不約而隨亦上能示之以大中至正之道使之然也上六比之無首凶首先也無首不先也不先後也四隂皆從五而已獨後焉是見之不早從之不先下則棄於四隂之類上則絶於一陽之君所謂後夫凶者也象曰比之無首無所終也以隂柔居一卦之終而失比之道故曰無所終大易緝説卷三
