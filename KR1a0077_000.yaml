body:
  text: 大易緝説易類提要臣等謹案大易緝説十卷元王申子撰申子字巽卿邛州人隱居慈利州天門山垂三十年始成此書反覆設問取十數為河圖分緯之以畫先天九數為洛書錯綜之以位後天同時吳澄李琳諸人咸稱其殫思之精程子有云説卦所説卦位亦不能使人曉然朱子云文王八卦不可曉處極多蓋皆闕所疑也至河出圖洛出書其文見于易傳而相傳五位九宫則朱震序其授受源流謂陳搏以先天圖傳种放放傳穆修修傳李之才之才傳邵雍放以河圖洛書傳李溉溉傳許堅堅傳范諤昌諤昌傳劉牧據此則劉牧之河圖洛書與邵之先天圖同本諸希夷然范諤昌以五位九宫之圖為伏羲所造劉牧以九為圖十為書及乎蔡元定乃反易之朱子引大戴禮記明堂鄭注云法龜文證元定之説為確王應麟據北史證大戴禮記實宇文周時盧辨注非康成今考康成注易于五位相得而各有合顯陳一六等數相配之方其注乾鑿度言八卦九宫亦甚詳而不以為圖書惟關朗易傳與元定符合然關朗易傳朱子嘗斥為偽書項安世亦云阮逸所作逸皇祐間人則又在之才諤昌後矣蓋千有餘年莫知所謂圖書即五位九宫之數逮陳希夷出始指以實之宜後人辨論紛紛也是書旁通互貫足以自達其所見一家之説固亦有未可廢者耳乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀大易緝説原序易晦於九師褻於卜筮言易者何紛紛也深者遂為古奧難測之書淺者又如墻壁勸誡之語象數義理幾于不相為用學者徒能習知其辭罕究其蘊而易遂虛矣豫所識知無慮十數家言人人殊獨吾友吳幼清最為精詣往往出人意表今見王君巽卿緝説確然粲然者也夫乾以易知坤以簡能乾坤毁則無以見易欲知易固自乾坤始欲知乾坤必先知易簡之用王氏淵源之學其幾是乎惜幼清方留燕山不得相與探賾其説且印吾言之是否也姑著之篇間以為異日張本大德七年良月朔廣平程文海書嘗觀魏鶴山答蔣得之書及史學齋臨汝講義皆祖張觀物語以九其圖者見後天八卦之象十其書者具洪範五行之數謂晦庵不及見是書故謂十圖而九書余雖不敢以其説為然然亦無以正其説之不然蓋二圖無一相合而縱橫十五乃髣佛八卦之位然卦位雖見而除四正外至補四隅空處老師宿儒復不敢伸一喙此誠宇宙間一大疑事及分教澧陽時丁石潭遞至沅陽書院䇿題以易圖書數偕春秋王正月為問所疑正與前合余謂十圖九書本體也九圖十書經緯也擬書答之未果而石潭已矣至今抱此一恨忽南陽學正李君章袖編易見示讀之則吾巽卿所著緝説補説也巽卿生諸老後乃能力探其原而正之取十其圖者分緯之以畫先天取九其書者錯綜之以位後天自我作古無一毫之穿鑿有理致之自然真可以斷千百年未了底公案昔蔣得之指先天為河圖鶴山猶喜之今巽卿正二圖且緯河洛以為文王全易意見卓勝得之逺矣巽卿鶴山桑梓使鶴山見此其喜又將何如邪數年來經生學士晨星落落吞三爻於天上留七分於人間孰謂天門十六峯下尚有斯人為斯學乎蓋二圖于易猶河之崑崙源委正則下流正矣故特拈出以與世之知易者道時大德辛丑日長至昌元王履序
