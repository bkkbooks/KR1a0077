body:
  text: 大易緝說卷五元王申子撰坤下巽上觀示也觀示於下也凡自上觀示於下之觀字音去聲自下觀仰於上之觀字音平聲爲卦坤下巽上風行地上觸動萬物物皆觀仰觀之象也二陽在上觀示於下爲下衆隂之所觀仰亦觀之象且觀示者二陽之大也故曰大觀觀盥而不薦有孚顒若居上而爲衆表儀以觀示於下者必極其誠敬然後下觀而化也盥者宗廟祭祀之始盥手酌鬯以求神誠意精一之時也薦者奉牲奉醴之際誠移於物精意少散之時也言觀之道當精一其誠若盥而不薦則有孚于人天下莫不顒然仰望而服從之也􅂏曰大觀在上順而巽中正以觀天下以卦體卦徳釋卦名義此通六爻以成卦義者也謂二陽在上觀示于下故曰大觀在上下順上巽而五以中正爲觀之主是又巽順乎理而以中正之道觀示天下觀之善也觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設敎而天下服矣釋􅂏辭而極言觀之道也觀示天下之道其誠意精一常如始盥之時則觀感之下人自相孚莫不從化蓋有不動而敬不言而信之妙如天觀示萬物之道雖神妙莫測然可觀於下者四時行焉萬化成焉未有一差忒者故聖人亦以其神妙莫測者運於上而設爲政教使天下觀仰而服從之如此則聖人觀示天下之道即天之觀示萬物也象曰風行地上觀先王以省方觀民設敎觀之爲卦二陽髙出於衆隂之上是君民勢分本懸絶也今觀之象乃以風自天而下行於地上爲義則是觀之世上下之分雖嚴而上下之情常相通而无間也先王體之時巡狩以省方國觀民俗以設政敎故天下之民尊君如天愛君如親矣省方觀民之事也設敎爲民觀之事也初六童觀小人无咎君子吝初以隂柔處下居觀之世而逺於陽是其所觀見者淺近如童穉然故曰童觀小人下民也所見淺近不能識陽剛中正之道乃其分也不足爲之過咎若君子而如是則可吝矣晦庵曰卦以觀示爲義據九五爲主也爻以觀瞻爲義皆觀乎九五也象曰初六童觀小人道也初卑而下卑下而无逺見在凡民爲可恕在君子則可羞矣六二闚觀利女貞二處大觀之世雖得正而應於五然以隂處隂暗而不明如九五陽剛中正之觀道但能闚覘而不能盡見故曰闚觀言見之小也隂柔居内而觀乎外所見不大而能順從者女子之正道故曰利女貞言見卑識暗但能順從而不失其正者特女子之利非大臣之事也象曰闚觀女貞亦可醜也二居大臣之位處大觀之時徒能闚觀爲女子之貞是可醜也六三觀我生進退生出也謂才徳之出於巳者六三質柔用剛處下之上上之下故有進退之象君子進退常觀乎時今不觀乎時而觀我生者蓋九五方以陽剛中正觀示天下則時不待觀也但觀吾之所有以爲進退可也況三居柔順之極必於進不可也上有正應必於退亦不可也故或進或退但觀其出于已者可不可而已象曰觀我生進退未失道也謂于出處之道未爲失也六四觀國之光利用賔于王四以巽順之徳居公侯之位履得其正而近天子之光者也且居坤土之上有國之象也其所有之國政敎法度莫非天子盛徳輝光之所臨照者四觀於其國欣慕愛戴亦以用賔于王爲利賔者賔于四門之賔言朝覲而承賔禮也大觀之時九五以中正之道觀示天下如初之民二之臣三之賢人君子四之有國有家者皆於觀感之下有孚顒若此觀道之盛也况省方設敎之後有國者其不孚乎春秋𫝊曰敬仲生陳侯筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎亦有國之證也象曰觀國之光尚賔也尚志尚也言觀見天子之光於其國其志意慕說願賔于王也九五觀我生君子无咎五陽剛中正居尊位以觀天下此君子之道也天下皆仰而觀之在五又當觀已之所行必一出於君子之道然後可以立身於无過之地故曰觀我生君子无咎象曰觀我生觀民也此夫子以義推而言之謂民之善惡生於君君之善惡形於民者觀之道也九五欲觀在巳所行之得失觀諸民即可見矣上九觀其生君子无咎觀之二陽皆觀示於下爲下所觀仰者也然人之觀仰止於九五上九雖不當事任然與五同徳相比亦九五尊寵就謀之君子也其對我而言指五也謂五之所行其皆出於君子邪則上九與有光焉其或不然人於上九寧无辭乎此上九所以常觀九五所行使一出於君子之道然後可以自免於咎也故爻辭與五同唯其與我字異耳象曰觀其生志未平也平安寧也言上則受人君之尊寵下則萃臣民之觀瞻所以觀其生者格君之志不敢自寧也震下離上噬嗑噬囓也嗑合也頥中有物梗之噬而後合也上下二剛而中虛頥之象内三隂齒之象四以一剛梗於其中爲頥中有物之象必噬之而後得合故爲噬嗑在人事爲有物梗之在人心爲有欲間之皆務決去然後爲得也噬嗑亨利用獄天下事所以不得亨通者皆由有梗間於其間噬而去之則亨矣故曰噬嗑亨卦二陽居上下三隂列於内如拘守四之一梗於中有獄之象且離明震威明與威乃用獄之道故曰利用獄若以用獄取全卦之義則非也􅂏曰頥中有物曰噬嗑此通六爻而取成卦之象以釋卦名義言九四爲梗如有物梗於頥中非噬而去之不可以合故曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也以卦徳卦體釋􅂏辭噬嗑而亨者梗去則亨也三陽三隂剛柔平分在獄則是非決白之象震動也離明也唯動則能斷唯明則能審徒知斷而不知審則有䧟於非辜者矣徒知審而不知斷則有逸於刑憲者矣必電之明雷之威合用之然後是非无遁情故曰動而明雷電合而章此皆利用獄之道用獄者雖貴乎明而威然爲君者則當推仁恕之心六五以柔居尊柔非去梗之宜然爲君而用之庶獄則其所利故曰雖不當位利用獄也象曰雷電噬嗑先王以明罰勅法雷電當作電雷象无倒置者電掣則雷震雷迅則電赫相須並用亦有一噬一嗑之象電先雷掣使人知懼而修省先王以之先明其刑罰勅其法令以示人使人預知所畏遷善逺罪而不犯有司不然専以用獄爲能則電雷之威亦褻矣初九屨校滅趾无咎趾在下而主於行者也九四爲一卦之梗初居動體與之同徳又與之爲應是與之同惡者也然居卦之初惡雖形而未顯罪雖有而未大故但械其屨滅其趾使不得行止之於初而惡不行故得无咎繫辭曰小懲而大戒小人之福也象曰屨校滅趾不行也趾屨皆行之物校滅所以止其行使不得進而與四同惡也六二噬膚滅鼻无咎膚者惡之淺鼻者氣之通四爲一卦之梗初乃與之相通爲惡二以中正居大臣之位應柔中之君任去惡之責能於初惡尚淺之時乘而去之絶四之與不使之通故曰噬膚滅鼻是以中正之道爲上去梗何咎焉象曰噬膚滅鼻乘剛也曰噬曰滅惡雖淺而力不易者柔乘剛故也六三噬腊肉遇毒小吝无咎腊乾腊全體骨爲之堅韌之物也喻九四之強梗也三以隂柔不中正之才噬之能无遇毒乎故小吝然於時當噬故於義无咎象曰遇毒位不當也以柔居剛位不當也自處不得其當而以治人故人不服而有犯之者故遇毒九四噬乾胏得金矢利艱貞吉四乃一卦之梗而亦曰噬噬者誰也誠齋曰以九四噬九四近君之臣豈一人而已哉今從之胏與胾同乾肉之帶骨者乾胏喻強梗之九四也金剛矢直金矢喻剛直之九四也謂以剛直之臣噬強梗之臣因去強梗之臣而得剛直之臣也四雖剛直亦必艱難其心貞正其守而後可獲吉蓋位終不正故也象曰利艱貞吉未光也言去惡之道未爲光大故必艱貞而後吉也六五噬乾肉得黄金貞厲无咎噬嗑一卦四爲強梗初九應之而其惡尚淺六二以中正噬之故易爲力六三以不中正噬之故艱爲腊九四以剛直噬之故爲胏胏則差易於腊矣上九雖與初及四同惡相濟然其強梗已衰无勢无助五以中剛噬之特乾肉耳雖不免噬囓之勞比胏則又易矣黄中色金剛物五居中用剛爲得中剛之道然以柔質去強梗雖得中剛之道亦不可忽故戒之以貞固危厲乃可无咎象曰貞厲无咎得當也必貞厲然後无咎者謂以柔噬剛不如是不得其當也上九何校滅耳凶四剛強爲一卦之梗而上九恃其剛明之極與之同徳而又同體是同惡相濟而終於爲梗者也且居卦之外火體炎上而去震逺是卦有雷霆之威若罔聞知炎炎于上而不顧故惡積而不可揜罪大而不可解至於何校而受滅耳之凶也象曰何校滅耳聦不明也使不自恃其剛明之極炎炎不顧則聽必聦聦必明聞過知改惡不至是矣離下艮上賁飾也文飾也二與上成賁之主也二之柔來于内以文剛而爲離上之剛往於外以文柔而爲艮艮上離下止於文明賁之義也又艮山也離火也山下有火照見其上草木品彚物物光明有賁飾之象焉故爲賁賁亨小利有攸往徒質則不能亨質而有文以加飾之則可亨故曰賁亨然文盛則實必衰茍專尚文以往則流故曰小利有攸往小者謂不可太過以滅其質也亦以成卦六二文明中正故亨成卦上九剛而終止故小利有攸往􅂏曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下以成卦之主釋􅂏辭而極言之也剛柔相雜曰文故剛柔相文以成賁下體本乾柔來文其中而爲離文雖柔而質則剛又中且正故亨上體本坤剛往文其上而爲艮文雖剛而質則柔又剛而止故小利有攸往剛柔交錯此天道自然之文也聖人見天有剛柔交錯之文乃觀乎三辰五行之昭然者以察四時之變見人有上下尊卑各止其止之文也乃觀乎三綱五常之燦然者以化成天下此聖人用賁之道也象曰山下有火賁君子以明庶政无敢折獄山下有火則草木皆被其文彩賁之象也庶政者國家大小之政如宗廟朝廷禮樂法度之類皆可用文唯獄一事専用情實若用文飾則没其實矣故君子用賁之象以修明庶政而无果敢於折獄初九賁其趾舍車而徒趾取在下而行之義初以陽剛履正而在下故其文未能賁飾於世但能賁飾其身之所行故曰賁其趾六二成卦之主初近從之則安如乘車六四初之正應初逺從之則勞如徒步然應四正也比二非正也初守其正寧舎車而徒此賢者在下賁其行者之所爲也豈茍乎哉象曰舎車而徒義弗乘也初守其剛正知二之車於義不可茍而乘也六二賁其須須鬚也隨頥而動資飾於上之物也剛柔交而後成賁二雖下卦之主然必麗於剛而後賁道可成二柔而正三剛而正皆无應與故二附麗於三以成其賁故曰賁其須象曰賁其須與上興也謂二之柔必上與三之剛同興而後可以成其賁飾之功也九三賁如濡如永貞吉剛柔雜爲文當賁之時三以剛之正文二四之柔二四以柔之正文三之剛是三居剛柔之會處文明之正賁之盛者也故曰賁如二隂上下浸潤以成其賁故曰濡如賁之盛莫善於此復何爲哉唯永久貞固以守之使賁道成而无弊則吉象曰永貞之吉終莫之陵也陵者加而過之之謂終莫之陵者言賁之善終无以加於此也六四賁如皤如白馬翰如匪寇婚媾剛柔相文而後成賁四應初而比三皆可以賁故曰賁如然四守其正舎三而從初爲三所隔故其賁如者皤如皤白也謂其不成賁也下賁不獲乃進而上行行則五亦隂也不能相賁故馬亦白翰馬之白者禮曰殷尚白戎乘翰是上下俱不𫉬賁守正而甘於白者也嚮若不爲九三之寇所隔則與初相親而成賁矣蓋卦唯初與四兩爻以正相應故繫辭之意相似象曰六四當位疑也匪寇婚媾終无尤也以六居四位之當也近有三逺有初亦皆當位故疑然應初正也必與初合以成其賁故終无尤也六五賁于丘園束帛戔戔吝終吉古者建國經野城依丘阪丘在外而髙園在外而近喻上九也上九居卦之外乃髙蹈丘園之士也上卦剛上而文柔故五受賁於上是五不能自賁而賁于丘園也不能自賁故无文物之盛戔戔淺小也但用淺小束帛求賁於人言其質也以君爲此可吝之道然能受賁於人以成其文明之治故亦終吉象曰六五之吉有喜也能取諸人以成賁而享其吉是有喜也上九白賁无咎上以陽剛之賢爲成卦之主居艮止之極當賁道之終止文之流於終終則反而質矣是知文之不可以太過以其成賁之志不成以文而成以白者也故賁道成而无弊无弊故无咎象曰白賁无咎上得志也上九成卦之主志在成賁也今不成賁以文而成以白止文之窮而无滅質之咎是得其成賁之志也故曰上得志坤下艮上剥消剥殆盡之謂五隂上進陽將剥盡是隂剥陽小人剥君子之時也伊川曰山髙起地上而反附着於地頽剥之象故爲剥剥不利有攸往上九一陽成卦之主也旣窮於上往欲何之況天地間利於有所往者陽也今陽既剥矣爲君子者不利於有所往也明矣􅂏曰剥剥也柔變剛也以卦體釋卦名義言五隂剥一陽其勢將盡變乾之剛而爲坤之柔有驚懼之意焉故曰剥剥也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也釋􅂏辭自一隂之姤浸長浸盛至剥而五陽爲五隂矣其進未止也則小人道長莫極於此爲君子者唯當遜言晦迹以避其害故不利於有所往況坤順艮止剥之象也觀其象亦宜順而止之蓋有消必有息有盈必有虛乃天道之常君子處剥之世可不觀剥之象而行天之道乎象曰山附於地剥上以厚下安宅文王重卦合二體以取象義多出於先天卦象之外夫子大象則純取先天卦象爲之且取其義之善者用之故與本卦之象義不同今剥之象山頽剥而附於地則地之基愈厚山之趾愈安爲人上者觀此象以厚培其下安固其居此於剥象之中用其善者也初六剥牀以足蔑貞凶一陽在上五隂承之有牀之象牀人所藉以安其身譬之君子上所賴以安其國者也剥則不安矣足下也蔑无也初柔邪不正處剥之時上附羣隂剥陽於下故曰剥牀以足蔑貞者蔑无正道也以至微至下之小人首變陽剛而爲隂是敢於蔑无正道凶可知也象曰剥牀以足以滅下也以足言者以隂滅陽於下也六二剥牀以辨蔑貞凶辨分隔上下牀之幹也二以隂柔處剥之時固非善𩔖然以六居二猶能以正自處且上无應於此可正可邪可凶可吉之時有以辨之使歸于正猶可爲也若失此不圖使蔑无正道則不至剥膚不止故凶象曰剥牀以辨未有與也謂六五不與之爲應是不與之爲剥也曰以辨者其邪其正由是分歟六三剥之无咎衆隂剥陽之時三獨居剛應剛去邪而從正无咎之道也象曰剥之无咎失上下也言不從其𩔖而獨應上九之陽是與其上下之𩔖相失也故於處剥之道爲无咎六四剥牀以膚凶五剥之主其象身也剥巳及四是剥及膚矣剥其膚則身可知也禍巳及身其凶可知象曰剥牀以膚切近災也小人之禍進至於四極矣而五切近之故凶六五貫魚以宫人寵无不利魚隂物五君位也五以隂柔處剥故隂𩔖如貫魚羣然附之宫人宫中之人亦隂𩔖也五雖隂柔而居中用剛上比君子若能以順而止之之道使貫魚之𩔖受吾恩寵但如宫人之在宫中不使之用事於外以剥乎陽則在彼在已亦无不利矣故此爻獨不言剥聖人於斯之時深有望於五之君也以字着力蓋天下未嘗一日无小人顧人君處之者何如耳象曰以宫人寵終无尤也以隂寵隂尤矣若以宫人之寵處之不使之用事於外則其尤終可无也上九碩果不食君子得輿小人剥廬衆陽剥落而上九獨存爲衆木凋殘而一果不食之象羣隂載一陽爲君子得輿之象一陽庇五隂爲小人託處於廬下之象蓋木落而碩大之果獨存則生生之意不窮以言陽无可盡之理也剥極矣若君子在上則爲民所載小人居之則剥至於盡如自撤其廬而其身亦无所庇矣象曰君子得輿民所載也小人剥廬終不可用也言小人之道終不可用也爻一也君子小人取象不同然則爲小人而自剥其廬亦何利哉震下坤上復剛反也陽无可盡之理剥極則復反復所以次剥也爲卦一陽生於五隂之下隂極於上而陽復於下也嵗十月坤隂既極建子則一陽生是爲陽在地中復陽剛君子之道也消極而復返故爲復善之義復亨出入无疾朋來无咎反復其道七日來復利有攸往復以初之一陽成卦故􅂏專主初而言初陽復反而上進順而无阻於前故亨出者進於外入者反於内反於内而進于外動而以順行是以无害故曰出入无疾一陽動而進羣隂順而退陽雖微而爲主於内故善𩔖之來可无抑塞之咎故曰朋來无咎往而復反者天道之常故曰反復其道自一隂生至此七變而陽始復故曰七日來復是由午至子七閱月而曰日者猶詩言一之日二之日陽也陽剛復反君子道長之時故利有攸往􅂏曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎以卦體卦徳釋􅂏辭復者剛反也陽剛剥極而復反則必漸長而亨通剛既反而動以順行是以亨是以出入无疾朋來亦可以无咎也反復者往而復來乃天道也是以一隂生歷七變而陽復來於内也利有攸往者陽剛復長君子之道可行也天地之心何心哉其動而生物也其長陽善而消隂惡也其進君子而退小人也是心也在人爲静極而動爲一覺之天爲天理復回而善端復見也嚮於積隂用事之時幾於熄矣至此而復乃可以見故曰復其見天地之心象曰雷在地中復先王以至日閉關商旅不行后不省方雷者陽之動地中者動於下而復者動之初也陽動而初生也爲甚微唯宜養之以待其定故先王至日閉關以杜其出入之門商旅不行以絶其利慾之私后不省方不使隂陽往來之錯亂皆所以養陽剛之善爲三極之主也後之主三極者曾不經意爲君子而全吾身之天地者其又可忽諸初九不逺復无祗悔元吉復之卦義剛反也而爻義唯取反善以爲訓初九陽剛得正居動之初亦復之初動而後有失失而後有復初動而即復是不逺復也不逺而復故不扺於悔祗抵也此大善而吉之道夫子以顔子當之謂其有不善未嘗不知知之未嘗復行然則一覺之天其一陽之復歟象曰不逺之復以修身也不逺之復君子修身之道也修身之道无他唯知其不善􅄩改以從善而巳六二休復吉不逺復者復於未然休復者復於巳然也易例陽爲天理隂爲人慾二以隂居隂不能无過然居中得正故知過而能改過而能改即善矣故吉按釋文休亦訓巳象曰休復之吉以下仁也二居中得正而又能順從初九克己復禮之仁人於下故知過而改改而獲吉親近仁者之益如是乎六三頻復厲无咎三質柔志剛質柔故見善不明志剛故狂躁妄動而又不中不正處動之極是復而不固者也故屢失屢復屢失故危復故无咎象曰頻復之厲義无咎也非頻復之厲頻過之厲也厲而无咎者能復則於義爲无咎也六四中行獨復行於四隂之中故曰中行言於其中自行其正也自行其正不從隂𩔖而獨與初應故曰獨復言獨能復於善也然不言吉者初陽尚微未能相與以有爲也象曰中行獨復以從道也言行於羣隂之中而獨能從陽剛君子之道也六五敦復无悔五於陽復之時而以隂柔居尊有一陽剛君子而踈逺在下左右之臣又皆柔弱故不能大有爲但能執其中順之徳敦篤以復一巳之善而已處衆隂之中而不能用其剛雖无悔非君道也象曰敦復无悔中以自考也考成也自考者言以中順自成其巳而已上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征復之成卦陽復於初也二從初故休復而吉四應初故獨復而行五雖應柔而居中用剛故能自復於善唯三與上情不繫於初而體隂柔不中不正以相應故三頻復而厲上迷復而凶迷謂終於惡而不返遂其奸而不悛也其凶可知其凶于而身則天災人眚之交至凶于而國則師敗君凶之甚危雖事經再變至于十年之久而復遇者猶頻復之三是終於迷者也其能濟乎故終不克征爲君而用人如是可不戒哉象曰迷復之凶反君道也二與四順初而不順於五與五同徳相順者唯上六故五信而用之爻言用行師是用之者柔順无爲之六五也爻言以其國君凶是以之者迷奸不復之上六也然則致上六之凶者豈非用之者之過歟象曰反君道言悖爲君用人之道也􅂏曰剛反反復也此曰反道反悖也震下乾上无妄不妄也純乎天理无往非實不容妄也爲卦震下乾上動以天也伊川曰動以天爲无妄動以人慾則妄矣易例陽爲天理隂爲人慾故卦爻以純乎陽者爲貴无妄元亨利貞其匪正有眚不利有攸往无妄誠也誠者天之道也人而行天之道則何往不亨故曰元亨元有大善之義且初九成卦之主剛自外來居得其正而上應乎乾是又以剛正而行天之道也故元亨无妄所以元亨者亦利於貞正其有不正者雖无邪心但動不合乎正亦妄也妄則人將尤之天亦不祐之故匪正則有眚且不利有攸往非无妄之不利於往也匪正而涉於妄則不利於往也故聖人着一其字以别之􅂏曰无妄剛自外來而爲主於内以成卦之主釋卦名義乾之剛本在上今來於初而爲主且居得其正是以剛變柔以正去妄而爲主於内也故无妄動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉以卦體卦徳釋􅂏辭震動乾健故曰動而健是動以天也故大亨而五又以剛中正應二之柔中正而成卦之主又得其正是大亨以正皆天之道也其不正則妄矣妄則逆人理故有𤯝故不利有攸往无妄之往以下必有錯􅂤无乃曰无妄之時而爲此匪正之往往將何之不唯人咎之而有眚天亦不祐之行矣哉言必不可行也蓋无妄六爻三得正而三不正故戒象曰天下雷行物與无妄先王以茂對時育萬物行於天之下鼓動萬物者雷也雷以時行而不妄故能發生萬物物應之亦以時出而不妄是物之无妄視雷之无妄故曰物與无妄先王象之勉對天時以育萬物使各得其宜亦取雷行无妄之義也古茂􅅷通初九无妄往吉初以剛正變柔邪爲成卦之主於内居動之初以剛應剛是純乎天而无妄者也以此道而往何所不吉於以見无妄之往何之之文錯􅂤明矣象曰无妄之往得志也陽善隂惡陽天理隂人慾易之大義也无妄一卦獨初九以剛居剛而應剛動合乎乾是純乎天而无妄者莫如初九所以爲无妄之主所以无往而不得其志也六二不耕穫不菑畬則利有攸往二以柔中正之徳上應剛中正之乾疑若盡善者而爻辭之戒乃有歉然不足之意何哉蓋陽爲天理隂爲人慾二雖中正然以隂居隂寧免乎多慾故聖人戒之使自絶其私意期望之心然後爲无妄之正然後利於有所往也耕農作之始穫其成終也田一嵗曰菑三嵗曰畬不云者欲其无所爲於前无所兾於後也夫如是則慾心不存一順乎天矣夫如是則凡有所往亦无不利矣則云者必如是而後可之辭也象曰不耕穫未富也易例以陽爲富言六二未得爲陽實之富故以不耕穫不菑畬戒其欲也六三无妄之災或繫之牛行人之得邑人之災三處震之極切近於乾是動即天也是无妄者也既无妄奚其災曰事固有莫之致而自至者謂禍非自我致而自我得之无妄之災也如或者繫牛於斯爲行道者得之而去居邑者莫之知也而反受其災蓋以三雖居剛應剛然體實隂柔而不中不正吉凶之報隨之故發此義象曰行人得牛邑人災也三居剛應剛動即乾行是動而得也動而得猶行人之得牛然以隂處陽不中不正是居而災也居而災猶邑人之受禍皆出於无妄故曰无妄之災九四可貞无咎无妄一卦動以天者初九也安其天而不動者九四也餘雖无妄而不純矣蓋四以乾體而應陽剛是純乎天也體陽剛而用隂柔是不動于慾也此九四无妄之道可貞固守之而无咎也象曰可貞无咎固有之也言四之无妄乃其固有之天故可以貞守而无咎九五无妄之疾勿藥有喜无妄者純乎天者也一不純則妄矣易例以陽爲天理以隂爲人慾故陽爲隂所累者皆曰疾如損之損其疾鼎之仇有疾兊之介疾有喜之𩔖是也今五以剛中正之乾而下應純隂之二是二之隂爲五之疾也然二亦柔中正以天徳言之爲不純疾也以中正言之則至善疾而非疾也果疾則藥以治之疾而非疾故勿藥且君臣皆以中正之道處无妄之世豈徒勿藥且有喜也喜者中正之道及於天下也象曰无妄之藥不可試也試暫用也果疾則藥疾而非疾則何以藥爲藥則妄矣故曰不可試也或問曰舊說有曰以五之无妄如有爲之病者勿藥治則有喜也有曰无妄之至而猶有疾則如之何聽其自作信其自愈而已故今人以耳目聦明血氣和平而偶有疾者爲无妄之疾世固有之而子不以爲然何也曰震下乾上動以天者卦之體也動以天爲无妄動以人慾則妄者卦之義也陽爲天理隂爲人慾者又易之大義也今觀九四以陽處隂聖人乃曰可貞无咎九五乾體剛健中正而聖人乃曰无妄之疾且疾則當藥而勿藥疾則无喜而有喜疾必有自喜必有因蓋謂五雖剛健中正而所應則六二之純隂也凡陽爲隂所累者例曰疾是二之隂爲五之疾也二雖爲五之疾然亦柔順中正以隂陽言之則爲疾以中正言之則不可藥也藥則不中不正而妄矣況君臣以中正相遇豈徒勿藥且有喜以及天下故曰无妄之疾勿藥有喜此无妄六爻獨初曰往吉四曰可貞无咎餘雖无妄而不純矣然則无妄一卦聖人取隂陽之純否以見理慾之分數豈不明白歟上九无妄行有眚无攸利以九居上不正也處无妄之極復欲動而有行是過於理而入於妄也其有眚其无攸利冝矣象曰无妄之行窮之災也无妄一卦下三爻動以天爲无妄上三爻安其天而不動爲无妄蓋无妄而復動則是過乎正理而入於妄矣今上九以健之極而動不已寧免窮之災乎乾下艮上大畜大陽也畜止也聚也止則聚也爲卦乾下艮上乾天也艮山也大莫大於天而藴畜於山之中爲所畜者大以艮之止止乾之健爲畜止至大之象故爲大畜大畜利貞不家食吉利涉大川大畜成卦上九也上九艮之止也畜止之道利在正固正固雖艮之體而上九所居不正故曰利貞戒之也上居一卦之外故有不家之象謂有大藴畜者宜施其所畜於外以兼善天下在上者亦冝與之共天位食天禄不可使之家居而食則利澤施於人吉之道也故曰不家食吉有大藴畜者必有大設施以濟天下故曰利涉大川􅂏曰大畜剛健篤實輝光日新其徳以卦徳釋卦名義乾體剛健艮體篤實篤實則有輝光著于外剛健則能日新其徳此其所以有大藴畜也故爲大畜剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也以成卦之主及卦徳釋􅂏辭剛上謂上九成卦之主也六五以柔順尚其賢而巳下之尚其德也乾陽上進而艮止之能止健也尚賢徳止至健大正之道非大正者亦不能此用大畜以畜善也有大藴畜者宜施於外以及於人上之人亦當進用之不可使之自食於家此用大畜以養賢也六五君也下應乎乾是合乎天也居尊位而動合乎天則何險不濟此用大畜以濟時也畜豈徒畜哉象曰天在山中大畜君子以多識前言往行以畜其徳天在山中不必實有是事而說者多強實之愚謂唐有智禪師者荅李泌芥子納須彌之問曰人謂公胷藏萬卷信乎爲得此象之意言其所畜者大也君子以之多識前言往行以大其藴畜謂自極判以來大而天地微而萬𩔖其常其變其得其失莫不備見於前言往行之中君子多識之於彼深體之於此所以大其藴畜於身也初九有厲利巳卦義兼畜止畜聚而言爻則唯言畜止之義上三爻畜止乾健者下三爻爲艮所止者也蓋大畜之時爲成卦之主者艮之止也初健體居下必於上進艮體在上得時得位屹然止之是前有危厲也若犯之而往則必見災故利在止而不進巳止也象曰有厲利巳不犯災也若不度其時之冝犯危而行有災必矣九二輿說輹二爲五所止雖居健體而處得其中故能度其時勢之冝自止而不行如車輿說去輪輹而不進是以无失象曰輿說輹中无尤也能以中道自處止而不進故无過尤也初與二乾體至剛至健四與五隂柔畜之而遂不足以進時爲之也故學易者貴識時識時則識易矣九三良馬逐利艱貞曰閑輿衛利有攸往曰字鄭氏作日今從之九三以剛居剛處健之極上九以剛居上處畜之極健極則必進畜極則必亨三與上同徳故合志合志故不相畜而相與俱進如良馬之相追逐言進之健其勢不可止也雖然三不可恃其才之健上之與而銳於進亦宜持艱危之心由貞正之道日閑習其車輿與其兵衛戒懼而无輕躁然後利於有所往也蓋處畜之時而過剛不中故有此戒九二其輿初九其衛也象曰利有攸往上合志也所以利於有攸往者以剛健之才與上九合志而上進也六四童牛之牿元吉牿者横木於角以防其觸即楅衡也四處艮之初得位之正畜初者也凡事畜止於初則易爲力猶童牛而即加之以牿大善而吉之道也四居近臣之位上止其君之非下止天下之惡能止於未發之初亦大吉之道也象曰六四元吉有喜也上不勞而下不傷以成畜止之功是有喜也六五豶豕之牙吉豶去其勢也豕剛躁之物牙最猛利而難力制者也蓋六五質雖柔而居中用剛知天下之惡不可力止而止之得其機要若去豕之勢則牙雖存而剛強自止故吉象曰六五之吉有慶也五君也止天下之惡而得其機使不勞而天下化豈非一人之有慶乎上九何天之衢亨胡氏云天之衢亨誤加何字今從之畜極則亨理之常也小畜畜之小故極而成大畜畜之大故極而散天衢天路也謂其亨通曠逺无所阻礙也此亦畜乾之極而乾陽亨達之象象曰何天之衢道大行也伊川云天衢非常語故夫子特設問曰何謂天之衢今從之若曰何其亨達无礙如此蓋陽剛之道大行也止惡不止善乃大畜之義震下艮上頥養也上覆下承衆齒森列頥之象也爲卦震下艮上下動上止外實中虛亦頥之象頥曰食物以爲養故取養爲義頥貞吉觀頥自求口實頥養也頥不以正則物而巳故頥之道唯正則吉初與上成卦之主也觀頥謂自内觀外泛觀人物之所養正歟不正歟言上九也自求口實謂自外觀内觀實諸已以自養者正歟不正歟言初九也所養自養皆得其正則頥之道得矣􅂏曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉釋􅂏辭且極言之以賛其大也頥貞吉者頥養之道得其正則吉也觀其所養者謂外觀其所養如天地養萬物聖人養賢養萬民是也觀其自養謂内觀其自養如愼言語節飲食是也所以觀者觀其得正不得正也蓋正者人物所以得生之理而養者所以全其生也徒知全其生而不知所以全其得生之理則人與物何異哉故必以養正爲頥之吉時者又當其可之謂飢而食渴而飲春而生秋而成之𩔖皆欲得其時也然則天地間頥之時豈不大哉象曰山下有雷頥君子以愼言語節飲食上止下動中含四隂頥口之象也震於山下物隨而生頥養之義也君子觀此以時止則止之艮愼其可出而不可復入之言語焉以發動有節之震節其可入而不可復出之飲食焉此皆養生之切用至近而至大者故以取象初九舎爾靈龜觀我朶頥凶龜能咽息不食靈言其明智喻初九陽剛之才可不資養於外也朶樹花之垂者喻上九垂其頥以養在下之衆隂也爾謂初九我謂上九初與上以陽剛居上下爲成卦之主故爾我之頥象也初之位雖應四然其象必與上合而後成頥之功或謂初觀四朶頥非也陽實隂虛實則可以養人虛則受人之養而巳初以陽居陽才本足以養人智本足以自養然以動體急於上行不能自守見上九垂頥於上乃舎其剛正可自養之資仰而觀之以求養失巳自賤亦甚矣其凶可知象曰觀我朶頥亦不足貴也衆隂觀上以求養巳不足貴而陽剛之賢亦爲之自賤已甚故曰亦不足貴言本可貴以自賤而不足貴也六二顚頥拂經于丘頥征凶頥之諸爻自上而求養於下曰顚求養而違其道曰拂六二顚而又拂者也蓋二隂虛資養於人以位則上應於五而五亦隂虛不能及二二又不能自養必求養於陽下求於初則顚而不順不可行也上求於九則又越五而往其拂正道抑又甚焉故往則凶然則奈何曰守正而不動雖不𫉬養於人亦不自失於已可也丘山也艮也象曰六二征凶行失𩔖也言二與上非應且非𩔖也況越五而行取凶必矣六三拂頥貞凶十年勿用无攸利二與五拂頥之經三拂頥之貞頥貞吉而三拂之宜其凶也蓋上九頥之主三居相應之地求養於上疑若正也而拂而凶者何也頥之象上不應三而應初是應初者頥之正而三以柔邪不正之資必欲應上以求養是拂頥之正道也故凶十年勿用者謂雖經再變而上九終不與之爲應是終爲上九所棄也故曰无攸利象曰十年勿用道大悖也初上相應成頥之象頥之正也三以不正拂而違之是大悖乎頥之正道故凶此所謂近而不相得則凶者也六四顚頥吉虎視眈眈其欲逐逐无咎四居大臣之位而得其正顚而下應初九剛正之賢資其養以施於人而巳免曠敗之咎故雖顚而吉且見於外如虎視之眈眈者望之專也其存諸中如虎欲之逐逐者求不已也蓋資諸人者責望不專則人不聽信取之不繼則事將困窮是四自顧不足一意順從在下之賢以成其頥養之功故吉故无咎象曰顚頥之吉上施光也四在上而得其正故能取諸人以養人使徳施光明吉可知也六五拂經居貞吉不可涉大川五君也養人者也而隂虚不足非徒无以養人且反資上九之養是拂違經常之道也故曰拂經然上九有剛實之徳任頥養之責六五但居守爲君之正道順而從之則頥之功亦足以及人此所謂養賢以及萬民者也故曰居貞吉是道也處安平无事之時垂拱仰成以養天下可也若用之艱危險難之際則非所宜故曰不可涉大川象曰居貞之吉順以從上也其吉者但能順從上九之賢以成頥養之功也上九由頥厲吉利涉大川由豫者上下由我以得豫由頥者上下由我以得養也蓋一卦若君若臣若民皆由巳以得養爲人臣而尸此重大之任必常懷危厲之心以處之則吉故曰厲吉戒之也然以陽剛之徳爲成卦之主在上而得時衆皆􅀝任何事不濟故曰利涉大川予之也象曰由頥厲吉大有慶也由豫大有得者天下之豫歸於四也由頥大有慶者頥養之功及天下也巽下兊上大過大者過也四陽之大聚於中過乎隂也爲卦巽下兊上巽木也兊澤也澤滋養木者今過而至於滅木大過之象也故爲大過大過棟橈利有攸往亨小過隂之小者過於上下大過陽之大者過於中也四陽聚於中三與四又中之中有屋棟之象焉上下二隂應三與四有柱之象而皆柔弱不勝二陽之重故有棟橈之象焉四陽雖過而二五得中内巽順而外和說以此而處大過不過於剛而可以行故利有攸往故亨棟橈以象言利亨以徳言也􅂏曰大過大者過也以卦體釋卦名義陽爲大陽之大者過乎隂也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉以成卦之主及卦體卦徳釋􅂏辭本謂初末謂上成卦之主也弱謂隂柔不勝其應之重也然剛雖過而二五得中得中則不過矣下巽而上兊爲内巽順而外以和說行之故利有攸往此大過之所以亨也聖人因此象設此卦正示人以用剛不可以太過故爻義亦以剛柔適中者爲善時者亦適其中當其可之謂若失之於太過則非時矣故曰大過之時大矣哉或問曰舊說皆以大過爲大者過過之大大事過凡事之大過乎常者皆是與夫立非常之大事興不世之大功成絶俗之大徳皆大過之事於名卦之義疑若的當而子不以爲然何也曰聖人作易大要以中正之道示人其觀象繫辭之㫖果如是􅂏辭宜曰大亨宜曰利見大人宜曰利涉大川今皆不言獨曰利有攸往亨夫子𫝊之曰剛過而中巽而說行蓋不過曰陽爲大四陽聚於中陽過乎隂也因此象立此卦正欲示人以用剛不可以太過觀卦爻之辭亦自可見恐非示人以非常不可及之事也象曰澤滅木大過君子以獨立不懼遯世无悶澤至於滅木大過之象也君子觀木在澤下可没而不可仆之象以之進而有爲則獨立不懼以之退而窮處則遯世无悶蓋天下非之而不顧舉世不見知而不悔非君子有大過人之識者不能也初六藉用白茅无咎初六處陽過之時而以隂柔居巽之下上承四陽之大過於畏愼如承物不敢措諸地必藉之以潔白之茅愼之至也是以過柔之道處過剛之世過而得中故无咎象曰藉用白茅柔在下也以柔藉剛而在下也若如諸說以大過其常爲卦義則初既處下而柔巽謹畏如此寧得无咎乎九二枯楊生稊老夫得其女妻无不利楊近水之木陽氣易過者也故取以喻二與五切比初上之隂而處陽之過也陽過則枯稊根芽也生於下喻得初之隂相濟而不枯也大過諸爻以剛柔適中者爲善初以柔居剛二以剛居柔而比之是剛柔適中相濟而有功者也其陽過也如楊之枯如夫之老其相濟而有功也如枯而生稊如老夫得女妻言陽雖過矣九二處之得中故无不利象曰老夫女妻過以相與也老夫而女妻雖過乎常然陽隂相與以成生育之功則无不利也九三棟橈凶求大過二棟之象當以小過飛鳥之象横而觀之卦象如屋室焉三與四二剛聚於中棟之象也二與五二剛夾於傍衆材之象也初承四上承三柱之象也三之棟橈者大過剛巳過矣唯可濟之以柔不冝益之以剛今三以剛居剛而爲棟而上以柔居柔而爲之柱故不勝而取橈折之凶且九三仰而應上六是柱傑然而在上棟反偃然而在下其橈之象亦可見也象曰棟橈之凶不可以有輔也三居剛過之時旣極其剛而上六之應又極其柔故不可以輔而有橈折之凶九四棟隆吉有他吝三以剛居剛猶夫棟重之重上以柔居柔而爲之應乃弱之弱故不能支而三之棟橈而凶今四則以剛居柔是重而得中之棟也初又以柔居剛是不過於柔者而爲之應故能勝其任而四之棟隆而吉他謂三也譬之一室三之棟旣橈四之棟豈能獨隆乎若四恃其隆兼三之棟而有之則剛柔適中者又失之過而有不勝之患矣故吝象曰棟隆之吉不橈乎下也言初之正應在乎下質雖柔而位則剛是本雖弱而基猶固也故曰不橈乎下九五枯楊生華老婦得其士夫无咎无譽男未室曰士喻九五无内助也婦已衰曰老喻上六隂極而衰也華生於上言五處大過之世以剛居剛而三陽皆不爲之用獨與上六比是以過極之陽昵比過極之隂以過極之隂輔助過極之陽雖相與相得而不能成功如枯楊生華无益於枯老婦士夫无益於育縱无咎亦不足稱矣何譽之有象曰枯楊生華何可久也老婦士夫亦可醜也木枯而華是􅄩其枯何可久也老婦士夫是過乎常而爲柔邪所惑亦可醜也上六過涉滅頂凶无咎上以過極之隂處陽過之時與九五九三剛之極過者相比相應而不自知其爲柔之過冐然自同於剛之過者以有爲涉滅木之澤躐衆陽之上是不量已力不顧危亡履險蹈禍自取滅頂之凶者也曰无咎者言无所怨咎也兊體故涉象曰過涉之凶不可咎也上本至柔以比五應三而冐爲大過之事以取沒身之凶然非五與三使之也故爻辭曰无咎而小象曰不可咎言其隂暗自知不明不可咎於人也坎下坎上坎險也䧟也坎地之險而止乎水故爲險一陽䧟於二隂之中故爲䧟卦本坤也乾之陽交於其中體陽而用隂外暗而内明故於象爲水習坎有孚維心亨行有尚八卦皆重坎獨加一習字􅂏象爻凡五言之聖人豈无意歟蓋八卦中唯坎爲險險不可行而聖人作易必示人以行之之道行而不習則是行險僥倖鮮不及禍矣必如生於水者習於水而後可以行坎之道故曰習坎陽實在中爲中有孚心之誠也維其心之誠故可以涉險而致亨故曰有孚維心亨坎以行爲尚不行則常在險中行則无險不濟故曰行有尚卦之所言皆處坎之道也􅂏曰習坎重險也釋卦名義上下皆坎是爲重險重險者險之又險其可不習以處之乎水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉以成卦之主及卦象卦徳釋􅂏辭且極言其時用之大也陽動於中故流䧟而未出故不盈流而盈則出險矣流而不盈是以爲坎水愈險則愈行故曰行險坎中實水就下皆信之義故曰不失其信二五以剛居中爲中心誠實可以致亨故曰維心亨不行則險何以濟故以行爲尚是行則必有功也故曰往有功有險之時不可不濟无險之用不可不設故王公見天險之不可升也設爲禮法使卑髙貴賤之分截不可踰見地險之不可无也設爲城池使藩維屏翰之備嚴不可犯此皆行坎之道以處坎之時用坎之險者也然則坎之時之用豈不大哉王公指五與二成卦之主也象曰水洊至習坎君子以常徳行習敎事水至而又至爲水洊至習坎之象也君子以之治已則必常其徳行如源泉混混不舎晝夜以之治人則必習其教事如江海浸潤有加无已不可使功力之閒斷也初六習坎入于坎窞凶初體柔而用剛居重坎之下重險在前无濟險之才失處坎之道而妄動動而入于坎窞之中其䧟益深故凶窞坎中之陷穴也象曰習坎入坎失道凶也失處險之道而益入于坎窞之中凶可知也九二坎有險求小得二處坎險之時䧟於二隂之中是有險也然剛而得中剛則足以自濟中則動不失宜故可以求小得蓋險難无立脫之理由是以漸求濟險之術可也象曰求小得未出中也以剛中之才處此僅可小濟而不可以大得者以未出乎坎險之中也六三來之坎坎險且枕入于坎窞勿用下卦之險已終上卦之險又至是退而來巳險進而之愈險進退皆險則寧於可止之地而暫息焉且者􅂓爾之辭枕者息而未安之義能如此雖未離乎險亦不至深入于坎窞之中也蓋三質柔志剛不中不正故戒其進而入則䧟益深爲不可用勿者止之之辭也象曰來之坎坎終无功也險者人所欲出六三幸巳出險可以暫息若可息不息而復有進焉則入于坎窞之中愈困窮矣何功之有故戒以勿用謂不可以前險之出而欲圖功於終也六四樽酒簋貳用缶納約自牖終无咎中有孚者坎之徳不失信者坎之道故處險難者唯以誠實爲貴坎之諸爻唯四與五隂陽得正故取兩爻明君臣處險之善道以爲訓樽酒簋貳而用缶質實之至也言相與處險難者尚質實不尚虚華也納約進結於君之謂牖取明之地也言上下情意或有未孚亦冝從其心之通明不蔽者以誠結之期於濟險而巳能如是則雖遇險難而終於无咎也象曰樽酒簋貳剛柔際也五剛四柔各得其正故能以質實之道相交相接以濟險也九五坎不盈祇既平无咎盈則出險平則无險今不盈則不平不平則未出乎險也五雖未出乎險然以剛中正居尊位終有險平之望況險將終矣其時其才亦可出矣祇抵也必抵於旣平盡濟天下以出於險然後无咎象曰坎不盈中未大也言以剛中正之徳猶陷於險而未能光大亦足以見八卦中險最難處而坎之不可以不習也上六繫用徽纆寘于叢棘三歳不得凶此當出險之時既无出險之才又无出險之援展轉不得出之象也上六以柔居柔不能自濟比五應三而三與五亦皆未能出乎險故其身如纒以徽纆寘之叢􅁄之中至於三嵗而終不得出謂三變而遇成卦之二亦陷於坎窞之中是終於不得出也其凶可知象曰上六失道凶三歳也失道者展轉三歳而終不得出險之道也離下離上離麗也明也爲卦一隂麗於二陽之間故爲麗中虚而陽散於外故爲明卦本乾也坤之隂交於中體隂而用陽外明而内暗故於象爲火火體虛麗物而明又爲日亦虛明之象離利貞亨畜牝牛吉離麗也凡物莫不各有所麗天地間无无麗之物在人當審其所麗麗得其正則亨故曰利貞亨離之成卦二與五也皆以柔順麗乎剛牛柔順之物牝牛柔順之柔順者畜牝牛謂離體明而用剛明過則察剛過則暴必畜養之以柔順之徳則吉也􅂏曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也以成卦之主及卦德釋卦名義并釋􅂏辭離麗也萬物皆有所麗日月有象則麗乎天百榖草木有形則麗乎土明與柔无形无象然亦必有所麗而後可行故明必麗乎正不正則偏用其明何以化天下柔必麗乎中正不中正則爲柔邪何以能亨此二五柔明而麗乎中正而爲成卦之主故能亨故能化天下也牝牛柔順之物畜之吉者謂離體明而用剛易失之過必養之以柔順之徳則吉此又二五以柔順而麗上下之剛而爲成卦之主所以吉也象曰明兩作離大人以繼明照于四方明兩作爲大明相繼而出也明而有繼所以爲重明之離大人以之大則世繼其明次則任賢以繼其明於事則以明相繼故能臨照四方而无遺也初九履錯然敬之无咎離者隂麗乎陽非陽麗乎隂也初以陽居下處得其正六二麗之冝也四居相應之地亦欲麗之是上之履我者交錯而來也二中正四同徳所謂地醜徳齊初卑而在下莫知適從唯有盡吾用下敬上之心敬之而已故无咎履詩云履我即兮之履踐其跡以相從也處離麗之世以下麗上之道當如是夫象曰履錯之敬以辟咎也履我者交錯而來吾皆敬之所以辟禍咎也六二黄離元吉離之全卦聖人以明兩作取象離之諸爻聖人以重明繼明取義故以九三爲日昃之離九三既爲日之昃則六二乃日之中也故曰黄離黄中色謂二以正中之徳處離明之世而動合乎正中之道故元吉此離之盛也象曰黄離元吉得中道也六二中且正而止曰得中道者離以中爲重言中則正在其中矣九三日昃之離不鼓缶而歌則大耋之嗟凶缶者質素之器耋者黧耋之色三居下體之終前明巳盡後明將繼之時故於離爲日之昃以理言之日中則昃物盛則衰常事也三乃以其過明之體用其不中之剛不能泰然鼓缶而歌而且怛然爲大耋之嗟謂不能安常守素以自樂而乃嘆老悲衰將何益哉徒取凶而已象曰日昃之離何可久也日昃之明其能久乎明者知其然必求以繼之其身心則安常處順而巳憂嗟者剛明之過也九四突如句其來如焚如死如棄如突如絶句聖人於五如之中特着一其字辭意蓋可見易例反於内曰來謂四以不中不正之剛而處下體方革之際是繼明而不正者也既不正又剛強故其進也暴突如言其進之暴也然進而往則六五明順得中不可以犯退而來則遇二之中正初與三之剛正皆疾其所爲自下炎上而焚之焚之不足而誅死之而棄擲之言其疾之之甚其取禍已極凶不待言也或問曰小象以突如其來如爲句而子於突如絶句可乎曰小象合兩句作一句之例甚多如包荒得尚于中行有孚惕出不節之嗟往厲必戒飲酒濡首之𩔖皆是此言突如又言其來如方見其進退无所容也象曰突如其來如无所容也旣著其突如犯上之遇又言其來如取禍之酷然後見其進退皆无所容其身也六五出涕沱若戚嗟若吉明兩作爲離故六爻以繼明取義離之一卦唯四與上旣剛強而又不中不正五當繼明之始不幸而麗於剛強不正者之閒爲所陵犯故其憂懼至於沱然之涕嗟然之戚發於聲音顔色勢亦危矣幸其明而居剛能知憂懼故終能正其天位而獲吉也象曰六五之吉離王公也二與五成離之主也昔也爲柔中之二重明而麗乎下公也今也居剛中之五繼明而麗乎上王也曰王曰公者其位號未定之時故不得不憂不懼或問曰舊說皆曰王與公皆尊而在上者之稱故不曰所麗得王公之正位則曰天下皆附麗於王公而子之說獨不然何也曰此諸賢疑繫辭而不詳考之之過也繫辭曰初辭擬之卒成之終者聖人繫爻辭之序也離之一卦聖人分明曰明兩作曰重明曰繼明故於九三即曰日昃曰大耋則上卦是繼明分曉信如諸說則六五乃麗天之日以文明之徳得中用剛而居尊與其他柔居尊位者不同下有中正之二又有剛正之初與三可謂多助之世縱有強暴侵陵何至戚嗟涕沱邪蓋繼明之初位號未定遭此強暴不得不憂不懼故曰六五之吉離王公也至上九則王位已正然後曰王用出征聖人旨意豈不明白歟上九王用出征有嘉折首獲匪其醜无咎初九其日出之光六二其日之中九三則日之昃矣九四繼明之不正者六五繼明之正中而知懼者也至上則王之位已定矣故稱王王位既定則用之以出征者王命也故曰王用出征斯時也下雖附麗而有不附麗者焉上處剛明之極明則能照能照則足以察邪惡剛則能斷能斷則足以行刑威故王位既正即用之以征討其不附麗者以正定其邦家是以有嘉美之功然亦不可過於嚴察但當折取其首惡而所獲非及其醜𩔖則庶乎威振而刑不濫罪得而民心服无咎之道也象曰王用出征以正邦也謂王位既正可以出征正其不正以正定其邦國也茍非繼明之始邦何待正乎大易緝說卷五
