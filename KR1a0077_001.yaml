body:
  text: 大易緝說卷一元王申子撰河圖易大傳曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合此言河圖數與象也先天畫卦伏羲氏仰觀天文俯察地理近取諸身逺取諸物者理也象也天不祕道龍馬負圖而出於河一竒一耦者數也象也理與氣寓於其中伏羲之心默與之契遂因之以畫八卦故大傳言其畫卦之序曰易有太極是生兩儀兩儀生四象四象生八卦是為先天易易者三才之道河圖當分作三宫看三才之象也其中宫天五地十太極也謂理氣象數所以為萬化之根本者全體已具而未分渾然居中而舉天地萬物生生化化盡無以出於此亦無以加於此故曰太極蓋中宫之五其一其三其五總之則九天也其二其四總之則六地也合九與六已具十五之全數矣愚故曰天地真元之數止有五其六其七其八其九其十則各因五而得數以配上五者而已曰五曰十則數也五為陽十為隂隂陽氣也五為竒十為耦竒耦象也析而言之三二之合則天地也三個五則三才各一天地也九與六則老隂老陽七與八則少隂少陽也其十五則洛書縱橫之數亦五行生成之數也以五乘十以十乘五則乂大衍之數五十也是曰理曰氣曰象曰數靡不全具渾然為一於中而未分豈非兩儀未判之太極乎兩儀天地也在易為乾坤河圖之上七也二也河圖之中五也十也河圖之下一也六也太極動而生陽一五七之三竒乃陽之輕清者上而為天太極靜而生隂二十六之三耦乃隂之重濁者下而為地豈非太極既判之兩儀乎故先天卦止於三畫河圖中宫之五即參天兩地三二之合也即渾然之兩儀也積之已具十五之全數是天地真元之數止此五者其六七八九十則於五上加一二三四五而得數以配上五者而已故獨取五以生四象河圖次中宫一二三四也以五配一成三耦之六而六之成數在北是為老隂以五配二成二耦一竒之七而七之成數在南是為少陽以五配三成二竒一耦之八而八之成數在東是為少隂以五配四成三竒之九而九之成數在西是為老陽此豈非兩儀生四象乎河圖一五七之三陽上而為天在易則純陽之乾也二十六之三隂下而為地在易則純隂之坤也乾上坤下所以辨隂陽之分乾交於坤之中而為坎坤交於乾之中而為離離東坎西所以著隂陽之交故其畫坎離也以河圖中宫五陽之左者交於右十隂之右者交於左自其本體交而後形於外者無不交故取五之竒十之耦就左三之竒畫離於東離火也且藏八之耦於東之內故火之象內暗而外明又取十之耦五之竒就右四之耦畫坎於西坎水也且藏九之竒於西之內故水之象內明而外暗故曰水火隂陽之交又曰隂陽互藏其宅是以大傳於水火獨加一不字而曰不相射也隂陽既交極則必變故其畫兊震艮巽也陽左隂右不離本體取河圖中宫五與十之一竒一耦就外宫四象已成之竒耦而畫之中宫五之竒陽也陽動而左故取五之竒就正南七之竒正東八之耦得二竒一耦畫東南之卦曰兊又取五之竒就正東八之耦正北六之耦得一竒二耦畫東北之卦曰震陽極於左則隂轉而右右隂也故取中宫十之耦就正北六之耦正西九之竒得二耦一竒畫西北之卦曰艮又取十之耦就正西九之竒正南七之竒得一耦二竒畫西南之卦曰巽是乾之極則變而兊離之極則變而震坤之極則變而艮坎之極則變而巽也愚故曰乾上坤下所以辨隂陽之分離東坎西所以著隂陽之交兊震艮巽所以極隂陽之變此其所以為易此豈非四象生八卦乎先天或問或問漢孔安國劉歆班固皆曰伏羲繼天而王龍馬出河遂則其文以畫八卦禹治水時神龜負文列於背有數至九禹法之以陳九疇魏關朗亦曰河圖之文七前六後八左九右洛書之文九前一後三左七右是漢魏諸儒皆以十為河圖九為洛書初無異說及宋劉牧獨以九為河圖十為洛書易而置之且引大傳而曰二者皆出於伏羲之世故易範相為表裏謂其傳得之范諤昌諤昌得之許堅許堅得之李溉李溉得之种放种放得之希夷今九經圖及經生學士皆凖劉牧之說晦菴雖曽改正然猶有安知圖之不為書書之不為圖之疑今子乃直訂十其數者為河圖且謂伏羲斷斷則是圖以畫八卦天地聖人之㫖意果出於是則斯文幸甚其有不然豈不犯大不韙歟曰正緣漢魏諸儒止言圖書象數而不言伏羲如何則之以畫易大禹如何法之以叙疇遂使劉牧諸人得而易之而為九圖十書之說以惑後學晦菴雖曾改正然亦不過案舊說案禮經而訂之至其所自為說則亦曰安知圖之不為書書之不為圖又曰洛書固可以為易而河圖亦可以為範使圖書皆可為易皆可為範則不必改正可也今愚案天之文以求羲之畫即羲之畫以溯天之文而得自然而然不容但巳之理雖不敢自謂盡合天地聖人之㫖意然十為河圖羲則其文以畫八卦則斷斷乎其不誣矣又問曰晦庵師友其講明河圖洛書真所謂工深而力到者其說曰河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五竒數統四耦數而各居其所蓋主於陽以統隂而肇其變數之用也又曰河圖洛書之數皆以五居中河圖以生數為主故其中之所以為五者亦具五生數之象焉洛書以竒數為主故其中之所謂五者亦具五竒數之象焉其數與位皆三同而二異蓋陽不可易而隂可易成數雖陽固亦生之隂也又曰河圖之一二三四各居其五象本方之外而六七八九十又各因五而得數以附于其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附于竒數之側又曰河圖主全故極于十而竒耦之位均論其積實然後見其耦饒而竒乏也洛書主變故極于九而其位與實皆竒饒而耦乏也必皆虛其中也然後隂陽之數均於二十而無偏耳又曰河圖六七八九既附于生數之外矣此隂陽老少進退饒乏之正也洛書之縱橫十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉又曰聖人則河圖者虛其中則洛書者總其實也河圖之虛五與十者太極也竒數二十耦數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤坎離補四隅之空以為兊震巽艮者八卦也又曰是其時雖有先後數雖有多寡然其為理則一而已但易乃伏羲之所先得乎圖而初無待乎書範則大禹之所獨得乎書而未必追考於圖耳今反覆其說義亦深長而子皆不從之何也曰自古講明河圖洛書之象數未有如晦庵之詳者但先生未免泥漢儒相為表裏之說故一一合圖與書而並言之不思其說之非然也且以河圖五與十為太極是矣然虛而不用却用四旁竒耦各二十為兩儀則是太極自太極兩儀自兩儀而非太極生兩儀也以六七八九為四象是矣然外之而取卦於四方則是四象自四象八卦自八卦而非四象生八卦也且謂析四方之合以為乾坤坎離不知如何析其合以為坎離於西東而其位不可易謂補四隅之空以為兊震巽艮不知如何惟兊可以補東南惟艮可以補西北而他卦不可補此愚所以不得而從之也又問曰玉井陽氏家傳易學蓋自其五世祖得之㬊蓮蕩蓮蕩得之晦庵淵源有自故其家如字溪如以齊各有易說行于世玉井亦以明易擢髙科年將八十工於易久矣今見子緝說特編二帙與子辨難平山蹇氏又為之跋以致諸子豈非緝說之砭劑歟其間舉大傳曰古者包羲氏之王天下也仰則觀象于天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始畫八卦晦庵亦曰聖人仰觀俯察逺物近身固有以超然默契於心取而畫卦則易非獨以河圖而作也伊川亦曰圖不出八卦亦須作玉井申之曰聖人畫卦始于一竒一耦一畫具時畫畫皆具逐莭生去八卦而小成六十四卦而八卦之重八卦亦周以子之說為拘泥為不然奈何曰大傳㫖意謂伏羲仰觀俯察逺求近取得其法象文理于心及見河圖與心默契於是則其象數以畫八卦以通神明之德以類萬物之情故曰河出圖聖人則之非謂觀象於天觀法於地近取諸身逺取諸物而遂以之畫八卦也況果如程朱之說則古今所謂河圖洛書特天地間一贅物耳河出圖洛出書聖人則之之言亦妄矣且玉井逐莭生去之說以畫後天橫圖則可若以畫先天圓圖則巽五又居乾一之後則又逐莭生不去矣又問曰玉井難子先天四圖謂乾坤二卦兼取三圈之數乾用五而不用十坤用十而不用五坎離兼用中圈之五與十及本位之生數而不及成數兊震用中圈之五而不用十巽艮用中圈之十而不用五四卦又皆用本隅之成數而不及生數推詳到此不無偏枯其於兊震曰陽動而左左陽也故用五然兊隂卦也借曰左為陽離胡為而兼用十其於巽艮曰陽既極則隂轉而右右隂也故用十然艮陽卦也借曰右為隂則坎胡為而兼用五是皆出於安排非自然也又曰坎離以五居右十居左兊震艮巽則五居左十居右一左一右皆子自為之所謂附㑹遷就以成其說者也其難如是奈何曰前賢論先天卦圖者多矣雖康莭亦不過據見成之圖推見成之卦而曰天地定位乾與坤對也山澤通氣艮與兊對也雷風相薄震與巽對也水火不相射坎與離對也愚以為伏羲當初位艮於東南位兊於西北位震於西南位巽於東北亦是相對因何各此定位而不可易離胡為而不可西坎胡為而不可東水火相息者也既對則胡為而不相射聖人又胡為於四句中獨加一不字邪遂取大傳生卦之序求之河圖案河圖竒耦之象以位八卦研窮數載然後略見端緒於是分河圖為三宫而三畫之象明錯綜其竒耦而八卦之位定乃近取諸身而質之然後曉然蓋乾坤猶人之男女隂陽全體也坎離水火猶一身之血氣也艮為山猶一身之骨肉髮膚兊為澤猶一身之津液涕唾震為雷猶一身之聲音巽為風猶一身之噓吸又血氣之變者也人身小天地亦止有此八者乾坤兼取三圈之數者隂陽全體也三陽上而為乾三隂下而為坤所謂分隂分陽兩儀立焉若乾用十則非純陽之乾矣坤用五則非純隂之坤矣坎離隂陽之交也故五之陽左者交於右十之隂右者交於左是隂陽本體之交也自其本體一交而後形於外者無不交故離居左而兼用十坎居右而兼用五其兼用五與十而不及成數者坎離乃隂陽交之中非交之極又為隂陽互藏其宅故隂之中有陽陽之中有隂所以離隂卦也正居左而為日為火坎陽卦也正居右而為月為水此其所以不相射聖人所以獨加一不字也其畫兊震艮巽也陽左隂右不離本體兊震居左故用五不用十巽艮居右故用十不用五左陽也兊離以隂卦居之故隂卦多陽而隂為之主右隂也艮坎以陽卦居之故陽卦多隂而陽為之主也四卦皆用成數而不用生數者隂陽已極而變也蓋乾之極變而為兊離之極變而為震坤之極變而為艮坎之極變而為巽也坎離隂陽既分而交生之後事也故用生數而不用成數兊震艮巽隂陽交極而變成之後事也故用成數而不用生數愚故曰乾上坤下所以辨隂陽之分離東坎西所以著隂陽之交兊震艮巽所以極隂陽之變此其所以為易蓋太極分而隂陽隂陽分而四象四象分而八卦天道左旋地道右轉此皆天地造化自然而然之理不可加毫末人為於其間者也天之圖具此象伏羲氏因而畫之愚不過探索而發明之耳而謂豫安排附㑹遷就以成其說可乎或問曰晦庵謂先天之學康蓈得於李之才挺之挺之得於穆修伯長伯長得於希夷希夷先天圖說曰先天用九謂乾一與坤八震四與巽五兊二與艮七離三與坎六縱橫皆九而其九居中也希夷又自述龍圖序曰天之垂象的如貫珠皆纍纍然如繫之於縷也且若龍圖本合則聖人不得見其象所以天意先未合以形其象聖人觀象以明其用是龍圖天散而示之伏羲合而用之仲尼默而形之始龍圖之未合也惟五十五數上二十五天數也中貫三五九外包之十五盡天三天五天九并十五之用後形一六無位又顯二十四之為用也兹所謂天垂象矣下三十地數也亦分五位皆明五之用也十分而為六形坤之象焉六分而成四象地六不配在上則一不用形二十四在下則六不用亦形二十四後既合也天一居上為道之宗地六居下為氣之本天三幹地二地四為之用三若在陽則避孤隂在隂則避寡陽大矣哉龍圖之變岐分萬途今略述其梗槩焉以子之見希夷所說其然否如何曰先賢謂希夷之學知天知地者也後學何所容喙然以愚見觀之厥初天果散其數以示聖人則必無前後左右之次何以謂之圖聖人果自合而用之則是率巳意以畫卦又何以謂之因且乾一兊二離三震四巽五坎六艮七坤八此乃次第生卦之序蓋謂卦成之初第一為乾第二為兊云耳非若後天離坎配戴九履一而得九與一之數也今希夷乃以次第生卦之序為先天用數雖適凑著然非天地之真數而可用乎其曰圖之未合則陽去一隂去六陽形五隂形六以明五而顯二十四之用以為天地及圖之既合隂則天一為宗地六載之而用四十九陽則天三統地二地四用九以幹五行之數四十亦用四十九是未合時一數也既合後又一數也二十四四十九又何足以包羅天地之用邪至如去一去六而後成數形五形六而後成用幾七八九而後成象避孤避寡而後成卦愚恐天然之圖不如是之汗漫易簡之易不如是之穿鑿故亦未敢以其說為然也問畫卦自下而上或問伏羲當初始畫卦必自下而上何也曰於以見易者三才生生之象也天地間萬物之生那件不自下而上雖風雲雨露猶自下而上況他乎問畫卦橫而不竪或問玉井難子之說曰河圖之數四方平鋪初無橫竪特畫之簡編其在左右者若竪耳借曰圖有橫竪則水火兩字雖似𥪡畫坎離然今一六在北二七在南離坎橫而不竪其說為不通矣奈何曰此愚案卦畫以覆河圖之象見伏羲當初畫卦皆因河圖故先天卦圖圓而不方蓋河圖六一十五二七之象皆橫三八四九在左右則豎故今水火字猶似竪畫坎離以見伏羲取河圖以畫八卦皆出於自然而無一毫作為之意於其間耳故愚止曰伏羲畫卦之初今玉井以文王重卦之位言之宜其不通也愚案河圖竒耦以求伏羲畫卦之因復案八卦位次以覆河圖象數之本見河圖中宫天五地十為太極分曉於是以極居中極分而兩儀兩分而四象四分而八卦然後見先天卦位的不可移復從而推之與六十四卦圓圖一一湊著於是作此圖名曰演極以發明之此即太極生兩儀兩儀生四象四象生八卦也即天地定位山澤通氣雷風相薄水火不相射也即康莭所謂一中分造化也即濓溪所謂太極動而生陽靜而生隂動極而靜靜極復動一動一靜互為其根也即數往者順知來者逆也太極判輕清者上而為天重濁者下而為地陽左而隂右陽南而隂北水火居隂陽之交因而重之為六十四乾盡于午中而姤隂生坤盡於子中而復陽生離日也盡於卯中坎月也盡於酉中皆自然而然此先天易也愚因餘暇又以已意畫此圖與前圖無一不合故名曰演極後圖蓋以天地間陽左隂右陽上隂下乃隂陽一定而自然之體也於是畫一陽於左畫一隂於右而為兩儀太極居中又於一隂一陽之外各畫一陽於上一隂於下而為四象再於左偏短畫陽之左畫一陽於上而得乾畫一隂於下而得兊於左偏短畫隂之左畫一陽於上而得離畫一隂於下而得震再於右偏短畫陽之右畫一陽於上而得巽畫一隂於下而得坎於右偏短畫隂之右畫一陽於上而得艮畫一隂於下而得坤愚以是益信伏羲因河圖以畫八卦斷斷乎其不誣矣此所以知仰觀俯察逺物近身一竒一耦逐莭生去之說決不可以畫先天卦也愚故曰先天易易之體也太極或問或問曰玉井舉晦庵之說難子云太極者象數未形而其理已具之稱且有理而後有氣有氣而後有象有象而後有數當是時兩儀且未有安有所謂五與十哉朱子曰虛五與十者太極也此亦猶大衍虛一以象太極之說非謂五與十為太極也子以為如何曰象數未形而其理已具此雖是晦庵之言然止可以言易有太極之易與濓溪之無極耳非太極也若太極止具其理則是初無一物既無一物則大傳曰太極生兩儀不知一隂一陽之兩儀於何處突然生來便分為兩世豈有是理哉濓溪太極圖說又不應便道太極動而生陽何則自古及今天地間物未有止具其理空空虛虛而有可動者其動也必是氣存焉氣即隂陽特有分未分之别而已且易中謂一為太極為道為元五為君位為極為中九為老陽六為老隂七為少陽八為少隂九為君德之類甚多若専以數言則一五九六七八亦數而巳如上取義皆非也玉井曰當是時兩儀且未有安有所謂五與十哉是専以數說五與十此豈明易者之言乎況龍馬所負之圖雖有五與十在然出河之初理氣象數之名猶渾然為一也其中宫五與十以氣言則隂陽渾然渾然者五陽十隂老少未分也以象言則竒耦渾然渾然者三竒三耦二竒一耦二耦一竒亦未分也以數言則三二之合五行生成小衍大衍亦未分也是曰氣曰象曰數之全體渾然于中而未分故為太極若次宫外宫則均為隂陽均為象數便非渾然未分之全體矣愚故曰兩儀天地也以卦言乾坤也其實一隂一陽也隂陽未分為太極隂陽既分為兩儀是未分時隂陽渾然既分後陽自陽隂自隂隂又根陽陽又根隂象立而數行矣到此時然後說得有理而後有氣有氣而後有象有象而後有數是河圖中宫五與十實函三極之理氣象數渾然為一而居中謂非太極不可是太極者不但只具其理而已玉井又執虛五與十為太極之言謂如大衍虛一以象太極不思洛書虛五而含十謂之虛其中五可也今既實用四傍竒耦各二十為兩儀則亦當實用其中五與十為太極矣不然則是一虛一實一去一取皆人為之非天然也況大衍虛一以象太極而不用者謂天地之數皆始於一故揲蓍者虛之以象太極渾然之體及分二以象兩儀掛一以象三才揲四以象四時歸竒以象閏則其用也然亦不過以象之而已與此不類此既明用四旁竒耦各二十則亦合用其中五與十矣況五與十實隂陽象數渾然為一之全體而又可虛乎洛書伏羲八卦則河圖以畫之然天地間數非竒不行象非耦不立而河圖之數則十而耦也其象則一六二七三八四九五十合而皆竒故先天卦止見易之體而用有未周禹治水時神龜負文復出於洛其數有九九則竒也其象縱橫皆十十則耦也文王於是取之以錯綜河圖重位八卦然後隂陽竒耦亭當不偏而易之體用始備是為後天易故曰河出圖洛出書聖人則之後天說卦曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮此言後天卦位也此圖中圓者河圖外方者洛書也蓋文王取洛書之竒數耦象錯綜河圖之耦數竒象以重位八卦然後隂陽竒耦不偏易之體用始備何則天地間數無耦象無竒人皆曰二四六八十耦也而不思二之前巳有一則已成三矣自二至十數之皆然故曰數無耦非竒不行天地間事事物物有對有待然後成象謂如有父斯有子之象有子斯有父之象有隂斯有陽之象有陽斯有隂之象獨則不成象矣故曰象無竒非耦不立然河圖之數十則耦也其一六二七三八四九五十合而成象則皆竒也故先天卦止見易之體而用有未周洛書之數九則竒也其一九二八三七四六合而成象則皆耦也故文王取洛書錯綜河圖而用之然後隂陽竒耦亭亭當當而易之體用始備蓋先合河圖之一六為水位坎于北二七為火位離于南三八為木位震于東四九為金位兊于西是合河圖老少四象以位四正也然其象合而皆竒故又取洛書一含九以河圖正北之一含正西之九九乃三竒乾老陽數也故位乾于坎之右附于西北取洛書四含六以河圖正西之四含正北之六六乃三耦坤老隂數也故位坤于兊之右附于西南取洛書二含八以河圖正南之二含正東之八八乃一耦二竒巽少隂數也故位巽于離之右附于東南取洛書三含七以河圖正東之三含正南之七七乃二耦一竒艮少陽數也故位艮于震之右附于東北是又取洛書錯綜河圖之老少四象以補四隅而其象合而皆耦此亦四象生八卦也由是一隂一陽一竒一耦相為體用由是東北子至已陽之方乾坎艮震居之西南午至亥隂之方巽離坤兊居之隂陽各正其位動靜互為其根四時行焉百物生焉故出乎震齊乎巽相見乎離致役乎坤說乎兑戰乎乾勞乎坎成乎艮終而復始生生化化而易行乎天地之中矣圖出於羲書出於禹文王錯綜之以重位八卦是為後天故曰河出圖洛出書聖人則之若夫太𤣥則有數無象而専用竒故竒竒而無對待經世書則有象無數而専用耦故耦耦而無變通皆不免於一偏後天或問或問曰希夷先後天圖說先天之數縱而為六合後天之數橫而為六合合者交㑹也自文王退乾于西北退坤於西南然後方位交錯於天地既交之後而四時順序五氣流行萬物生生而無窮也康莭曰此文王八卦乃入用之位後天之學也又曰文王八卦應地之方又曰易者一隂一陽之謂震兊始交者也故當朝夕之位坎離交之極者也故當子午之位巽艮雖不交而隂陽猶雜也故當用中之偏位乾坤純隂純陽也故當不用之位經生學士多取康莭之說而子皆不以為然何也曰希夷謂橫而為六合及退乾退坤固非通論而康莭謂震兊始交兊豈始交者乎又謂巽艮居用中之偏位則乾坤之位亦非中也謂乾坤居不用之位則巽艮之位亦豈切於用邪且乾胡為不可居於坤之位艮胡為不可居於巽之宫邪故愚不敢以為然也又問曰伊川門人問伊川云六子固是乾坤之用西北西南之位聖人如何安排來伊川曰康莭說伏羲八卦乾位本在南坤位本在北文王重易時更定此位其說甚長大槩近於附㑹穿鑿固不曽深留意然說卦所說卦位亦不能使人曉然且當缺之不必强通也晦庵亦曰康莭言文王八卦這是他不用卦畫生底次第序四正卦出四角似那方底意思這個且恁他說無大故分曉證佐未甚安且缺之又曰文王八卦不可曉處多如離南坎北離坎却不應在南北且做水火居南北兑也不屬金如今只看他底慣了似合當恁地相似姑缺之二大賢於此猶缺疑而不敢妄議子乃直取而位之文王㫖意果如是乎曰易大傳謂河出圖洛出書聖人則之使洛書止可以為範則聖人不言之於易矣豫取河圖以求伏羲先天八卦既見端的乃求後天於洛書積有餘年然後見文王取洛書所含之四象以錯綜河圖以重位八卦是亦本諸天地未嘗加毫末人為於其間雖不敢自謂盡合文王之㫖意然晦庵釋錯綜字有曰錯者交而互之一左一右之謂綜者總而挈之一低一昂之謂今以北之一含西之九以西之四含北之六以南之二含東之八以東之三含南之七豈非一左一右一低一昂之錯綜乎然則錯綜其數之言夫子殆為文王發也豈可為先賢缺疑而遂不之思邪又問曰南軒云天一之水得六而居北為坎地二之火得七而居南為離天三之木得八而居東為震地四之金得九而居西為兊是以坎之數六去三而餘三此三畫之乾所以生於西北離之數七去三而餘四此四畫之巽所以生於東南兊之數九去三而餘六此六畫之坤所以生於西南震之數八去三而餘五此五畫之艮所以生於東北乃四象生八卦也此說如何曰南軒此說即李泰伯劉牧四方取其位四維取其畫之說也然後天乃六畫卦若析之則坤六位而十二畫矣焉得曰六畫之坤乎又問曰玉井難子之說云案文王錯綜圖書位卦圖乾與巽猶可通坤與艮則難以强通矣蓋河圖之一在北九在西二在南八在東位乾於西北位巽於東南猶有巴鼻若坤位西南四雖在西而六却在北艮位東北三雖在東而七却在南六逺於坤七逺於艮是不可以強通矣奈何曰愚案文王後天位卦之意先取河圖一六為水位坎於北二七為火位離於南三八為木位震於東四九為金位兊於西是先合河圖老少隂陽之四象以位四正卦然其為象皆竒故又取洛書一四二三含九六八七之象錯綜河圗而用之以北之一含西之九位老陽之乾於西北以西之四含北之六位老隂之坤於西南以南之二含東之八位少隂之巽於東南以東之三含南之七位少陽之艮於東北是又以洛書錯綜河圖合其老少隂陽之四象以位四隅然後其象皆耦由是東北陽之方乾坎艮震陽卦居之西南隂之方巽離坤兊隂卦居之隂陽各正其位動靜互為其根竒耦不偏體用兼備而易之道行乎天地之中矣蓋以北含西以西含北以南含東以東含南是一左一右交而互之一低一昂總而挈之夫子所謂錯綜其數也況一四二三生之所在即九六八七成之所在蓋一四二三積而總之已具河圖天地之全數故用一則四二三之九在矣用四則一二三之六在矣用二則一四三之八在矣用三則一二四之七在矣又獨不見揲蓍十有八變以取老少隂陽之䇿者乎變變皆得一四二三得一四二三即得九六八七之䇿此易之神自然而然者也而謂之不可强通可乎先天圓圖陽左隂右易之體也後天橫圗隂左陽右易之用也此二圖不知希夷以前何所託至希夷始出亦已竒矣然諸儒不究其本㫖不知其為先後天體用之殊圎圖易之體愚已論之於前矣橫圖為易之用者謂太極既判隂陽已分隂交於左陽交於右而為兩儀兩儀之上各加一隂一陽而為太陽少隂少陽太隂之四象四象之上又各加一隂一陽而為乾一兊二離三震四巽五坎六艮七坤八之八卦八卦之上各加兩儀則八而十六矣八卦之上各加四象則十六而三十二矣八卦之上各加八卦則三十二而六十四矣此正所謂一竒一耦一畫具時畫畫皆具逐莭生去八卦而小成八卦而重為六十四卦亦周也故曰重卦既重後下三畫則八卦各居其宫上三畫則乾一兊二離三震四巽五坎六艮七坤八各以次加於八宫之上重乾仍居一重兊仍居二重離仍居三重震仍居四重巽仍居五重坎仍居六重艮仍居七重坤仍居八與逐畫生去無少差異其初畫之一隂即三十二卦之初六也其初畫之一陽即三十二卦之初九也剛柔交錯而三百八十四爻成矣皆自然而然此後天易易之用也重卦或問或問曰十三卦包羲氏已用之是包羲時巳有六十四卦之名矣且大衍起於河圖而生蓍蓍興於犧其十有八變而成卦則是包犧時已重卦明矣今子獨以為文王重易然則大傳非歟曰愚詳大傳十三卦之義乃夫子引上古聖人制作示人以用易之法若曰上古作為某事蓋得諸某卦之象義云耳非必取是卦始為是事也故張橫渠曰此夫子之言耳若夫蓍十有八變而成卦愚竊意伏羲時固已錯重而用之特未定其卦未繫其名及至文王始重而定之繫之名而為之彖此其所以稱周易歟又問曰玉井難子之說云伏羲畫八卦即自重為六十四卦孔潁逹正義已有定說又周禮掌三易之法其經卦皆八其别皆六十四歸藏以坤為首連山以艮為首則夏商時已有卦名矣今王氏以為文王重之始繫以名而為之彖别無證據殆臆度之說也奈何曰愚歷考傳記重卦聖人諸說不同原其初止有四說王輔嗣等以為伏羲鄭𤣥之徒以為神農孫盛輩以為夏禹史遷等以為文王後之論者不出此四說愚於四說之中求之伏羲而後神農神農而後黃帝黃帝以前太朴未散黃帝以後風氣漸開人之情僞方始交作而六畫卦中有損有益有革有訟有困有遁有蠱有剝有蹇有解有旅有莭有否有明夷等卦名殊無上古淳朴之意與先天乾兊離震巽坎艮坤之名氣象大不侔歸藏連山亦不見屯蒙需訟之名且大傳曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪愚於是從漢藝文志歸之文王非臆度也不敢貴耳而賤心思也若孔潁逹正義則祖王輔嗣之注而曰鄭等以為伏羲畫八卦神農重之諸家以為伏羲畫八卦還自重之初亦未嘗有定說也又謂豫拘於子雲之說子雲其亦從史之一人耳此案先天卦位推後天六十四卦位次以發明隂陽往來進退屈伸也說卦曰天地定位山澤通氣雷風相薄水火不相射數往者順知來者逆是故易逆數也而說者乃以為案巳往之迹知未來之事非也蓋案後天六十四卦位次以覆考先天八卦之位而有此已生未生之異也往者已生謂自一陽之復數至六陽之乾是回從先天震四離三兊二而至乾一皆數已生之卦如今日而追數往日也故曰數往者順來者未生謂自一隂之姤前數至六隂之坤是方從巽五坎六艮七而後至坤八皆數未生之卦如今日而逆數來日也故曰知來者逆若一隂一陽之上復加一隂一陽如橫圖倍而乘之以成六十四卦則自乾一至坤八純數未生之卦故又曰易逆數也先後天或問或問曰玉井難子之說云所謂先天者太極未判之先元有此易借聖人手畫出來一隂一陽逐莭生去不待安排若先於天而天同之者邵子所謂畫前元有之易所謂先天之易也此伏羲氏之易也所謂後天之易者文王因伏羲已成之卦移易方位以應天之時應地之方若後於天而奉天者今隂陽家皆用之邵子所謂入用之位所謂後天之易也謂子以伏羲之易為先天文王之易為後天為不然如何曰愚謂先天後天只合如今人說前日後日前時後時時與日亦本於天而用於人者非先於天後於天之謂果如所說先後二字皆合音去聲況謂先天借聖人手畫出來頗似渺茫謂後天移易方位以應天應地頗似作為所謂太極未判之先元有此易此不過言其理而已正如大𫝊言生生之謂易而後言成象之謂乾之易也邵子所謂畫前元有易亦言其理而已曰畫前則是未有畫也明矣皆非謂伏羲有畫之易也愚謂通於天者河也龍馬負圖而出於河伏羲因之畫卦於先是為先天中於地者洛也神龜負書而出於洛文王取之重位八卦於後是為後天羲先文後豈不簡易豈不明白歟一二三四五天地之數止此五者六七八九十各因五而後得數以配上五者而已此五者小衍大衍所由起也故曰衍數然所以為是數者其條有七一者一二三四五積之則十五也二者參天兩地共十五也三者河圖中宫天五地十亦十五也四者洛書縱橫之數皆十五也五者一為太極極生兩儀兩生四象四生八卦亦十五也六者老隂六老陽九共十五少陽七少隂八亦共十五也七者以十乘五以五乘十則大衍之數五十也是此五者小衍之則為十五大衍之則為五十此亦自然而然易之所以為易也衍數或問或問曰大衍之數自張觀物作衍數圖縱橫布算不可窮極自此以後說之見於世者凡五十餘家近世丁石潭又作原衍圖其說謂天一地二衍而為三地二天三衍而為五以至天九地十衍而為十九總而積之得九十九數餘五十不用止用四十九以為大衍玉井問石潭曰今衍數止九十九又必須虛其一否石潭曰此不用數也然則由古及今諸儒論衍數者初無一定之說而子乃執一已之見以為如是而已可乎曰說經不比作文作文者可以各立一說說之髙者為勝說經則必如唐𤣥宗所謂傳以通經為義義以必當為主至當歸一精義無二然後可以得聖經之旨況易簡之易乎愚謂大衍之數至易至簡只合如此不用求之於艱深也但天地之數五十有五而大衍之數止用五十者謂天地真元之數五而已小衍之為十五大衍之為五十若更用此真元之五則是兩個五十矣故虛五而不用而止用五十也顧不易簡而明白歟說卦曰參天兩地而倚數諸說皆以為參天之一三五兩地之二與四獨晦庵曰如此止是積數非倚數也故其論河圖洛書中有曰陽之象圓圓者徑一而圍三隂之體方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為四是所謂參天兩地也然未為明白故今圗以明之倚者依也依而用之之謂蓋天之象圓圓者徑一而圍三地之體方方者徑一而圍四竒圓用全故歸竒之餘三其三而為九四九為三十六乾老陽䇿也耦方用半謂上與左屬陽故止用半故歸竒之餘三其二而為六四六為二十四坤老隂策也二耦一竒為七四七為二十八少陽䇿也二竒一耦為八四八為三十二少隂䇿也易之數皆依此而用之故曰倚數其竒之圓者有上有下其耦之方者有隂有陽又可以見天地間獨陽不生獨隂不成也序卦雜卦皆反對卦也先儒已圖之矣但其說未備且不及雜卦兼未正雜卦之錯簡故此復圖之上萹十八卦其中不反對者六乾坤坎離頥大過也下萹亦十八卦其中不反對者二中孚小過也此八卦雖不反對乃兩兩全體反易且雜卦自大過以下錯簡而不對者亦有八卦愚已移而正之於本文之下于以見縱橫逆順隨時變易無適而不遇其合焉此其所以為易也易之蓍七七而四十九竒也竒則數也蓋數非竒不行故易言蓍曰大衍之數曰天地之數易之卦八八而六十四耦也耦則象也蓋象非耦不立故易言卦曰設卦以觀象曰八卦以象告惟竒故圓故曰蓍之德圓而神惟耦故方故曰卦之德方以智蓍探未來之吉凶以示人故曰神以知來卦藏已往之吉凶以示人故曰智以藏往以蓍取卦變而變之合有四千九十六卦二萬四千五百七十六爻皆自然而然不可加毫末人力於其間若夫太𤣥潛虛亦有揲蓍之法然俱不免於一偏且不出於自然豫巳論之於後學者宜參取而並觀之則知易之所以為神也大易緝說卷一
