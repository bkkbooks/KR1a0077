body:
  text: 大易緝說卷十元王申子撰繫辭下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭八卦成列謂乾一兊二離三震四巽五坎六艮七坤八之列既成而天地風雷水火山澤之象在其中矣因而重之八卦之上各加八卦而三百八十四爻在其中矣有卦有爻剛柔交錯而變又在其中矣聖人又繫之以辭而命之占者可以因其動而知吉凶悔吝矣蓋吉凶悔吝生乎動者也陽剛隂柔易所由生故曰立本隨時取義變而通之故曰趣時貞王侯得一以為天下貞之貞貞正為主之意也天下之事非吉則凶非凶則吉是吉凶者常主於相勝者也常主於觀示萬物者天地也常主於明照萬物者日月也若夫天下之動則當常主乎一一則從善而違惡趨吉而避凶也此易之教亦天地自然之理何則乾確然而健行示人以易而不難之理也坤隤然而順承示人以簡而不繁之理也夫何人之動也不從其易而從其難不從其簡而從其繁是以聖人設為爻象以示人爻者效乾坤之易簡者也象者像乾坤之易簡者也故爻象易簡之理動乎內則吉凶即見乎外各以類應變變無窮而功業見矣謂變之善則功業成而吉變不善則功業隳而凶悔吝也上繫首章原聖人得天下易簡之道以示人矣此則言重易聖人以爻象推天地易簡之道以示人也故曰聖人之情見乎辭辭者爻象之辭也右第一節發明重易之旨天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為罔罟以佃以漁蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙服牛乘馬引重致遠以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬此夫子言上古聖人之制作蓋得諸某卦之象義云耳非必見是卦而始為是事也夫易者生生不窮之理即天地之大德也天地賴聖人以推廣此德故畀之以大寶之位聖人能推廣其德於天下然後居其位而無歉故守位曰仁仁即天地生物之德也聚人以財禁民以義亦所以推廣此仁也故古者伏羲氏繼天立極仰觀象於天俯觀法於地近取諸身遠取諸物有以見天地之賾事物之情於是畫八卦以前民用後之聖人相繼而作制為相生相養之具皆所以廣天地生生之德自罔罟至書契是也其為罔罟取諸離者五五縱橫交互罔罟之象物所麗也其為耒耜取諸益者二體皆木上入下動天下之益莫大於此也日中為市取諸噬嗑者上明下動亦交合之義也神農以上民用未滋所急者食貨而已此聚人之本也及黃帝堯舜之世民用日滋若復守其朴略則非變而通之之道故黃帝堯舜氏作通其變使民由之而不倦神其化使民冝之而不知凡此者非聖人喜新而惡舊也窮則變變則通通則久易之道然也得易之道則天亦從而祐之是以吉無不利衣裳之制取諸乾坤者上下之分也舟楫之利取諸渙者木在水上而風行之也馬牛之利取諸隨者下動上說動則隨人也取諸豫者二隂在前重門之象震木於外擊柝之象三隂安於內逸豫之象亦豫備之義杵臼之利取諸小過者上動下止亦小過乎常而合理也弧矢之利取諸睽者弧却於後矢發於前用則睽也弧曲而張矢直而利體則睽也然二者相有而不可相無本同而後睽也大壯二隂覆於上四陽柱於下宫室之象亦壯麗之意大過四陽之長者聚於中二隂之短者布於外棺槨之象亦過厚之意夬則取明決之義也右第二節承上章功業見乎變而言聖人繼天立極凡所制作皆得諸易故能推廣天地生生之大德也是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也易者理也有理斯有象象者像也像一卦之體如此也有卦斯有彖彖者斷也斷一卦之材如此也有像有彖斯有爻爻者以天下之動效於人也動者吉凶悔吝之所由生悔積成吉吝積成凶故曰吉凶生而悔吝著也震坎艮陽卦也三畫之中有二隂焉巽離兊隂卦也三畫之中有二陽焉蓋陽卦竒竒則一陽為主故多隂所謂一君而二民道之正也故曰君子之道隂卦耦耦則一隂為主故多陽所謂二君而一民非正道也故曰小人之道陽貴而大故曰君隂賤而小故曰民右第三節承上章制器尚象之事因言易象而併及易之義例也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也釋咸九四爻義理本無二有感必有應理之自然何以思慮為哉故極言天地萬物往來屈信以發明感應自然之理至於精其義以入於神則屈之至也然亦所以為出而致用之本利其用而無適不安則信之極也然亦所以為入而崇德之資自是以上則亦無所用其力至於窮不測之神知變極而化乃德之盛也此又即學之屈信相為用者以明感應之理也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪釋困六三爻義見本卦下矣易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也釋解上六爻義以言藏器待時蓋器不具固不利於用時未至亦不可以輕用使在我者動有阻括而望其有獲於外難矣解至上六解之極也是動而不括之時也故曰待時而動何不利之有子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶釋噬嗑初上兩爻之義言懲惡在初改過在小也子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑釋否九五爻義見本卦下子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也釋鼎九四爻義見本卦下子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望釋豫六二爻義幾者善惡方動之初也既能見而審之則無凶悔吝矣故但曰吉之先見者也諂與瀆雖不足以言幾然諂與瀆則必有後悔知幾者不為也蓋豫之六二有介然之守有豫見之明聖人以知幾與之謂其知微之必有彰知柔之必有剛其知幾之神足以為人之法故曰萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無只悔元吉釋復初九爻義而以顔子當之言顔子之心至靜而清明故微有不善觸之則未嘗不知知之未嘗復行覺即復矣此幾學也在顔子為不二過在易為不遠復天地絪縕萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也釋損六三爻義絪縕天地交感綢密之意一隂一陽之謂道一與二對待生生之本自然之理也一必有二一與二即三矣復參以三則餘矣非致一之道也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶釋益上九爻義利者衆所同欲唯君子有潔矩之道度諸己而安者然後動故動不失其宜度諸心而可者然後語故語必得其當度其交之可求者然後求故無悔吝之愆是能以己之心度人之心以人之心為己之心故能與衆同其利而人亦與之也若但知有己不知有人徒知有利不知有義則其動也必危其語也必懼而人亦莫之與不但不與之且有起而擊之者矣聖人舉此以為偏於利己者之戒右第四節釋十一爻之義示人以推求卦爻辭之法也子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨遠其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報易之興也其於中古乎作易者其有憂患乎乾陽坤隂一闢一闔而生生化化於無窮故曰易之門乾三竒陽物也坤三耦隂物也竒耦合而生六子八卦合而生六十四此隂陽之合德也體者質也卦爻之中剛有剛之質柔有柔之質剛柔之質雖各不同然皆自夫乾坤合德而成以體者即而同之之謂撰者所為也如四時運行五行生成之類皆天地之撰也以通者相與無間之謂如隂陽變化剛柔消長之類皆神明之德也唯易能體之能通之者亦自夫乾坤合德剛柔有體中見之唯其合德而各有體各體而實合德也故其稱名不一乾為馬坤亦為馬坤為牛離亦為牛錯雜而舉之然亦不越乎陽健隂順而已此易卦所以皆自乾坤而出也人能即此參稽其類以求之則可以隨其時觀其變避凶而趨吉去危而即安矣於此見聖人作易深為衰世慮也况易也可以彰既往可以察方來顯者可使之微幽者可使之闡蓋亦自夫乾坤之門一開而為八八而六十四其卦其象各當其名其剛其柔各辨其物而又正之以至賾至動之言斷之以吉凶悔吝之辭易之道無不備故也然以一牛一馬擬天地以一門一戶擬乾坤之類是稱名也小而其取類則大也其為旨遠遠者使人思而求之其為辭文文者使人玩而得之其言委曲而切中事情故可信其事閎肆而無跡可指故不窮此皆聖人因民行事之有疑二不決也故以吉凶明失得之報以決其未斷之疑以濟其所行之行也然則重易聖人其憂患後世為何如哉右第五節言易之變化生於隂陽事之吉凶生於變化故聖人取之以為衰世慮也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權此夫子摘九卦以發明處憂患之道其謂文王乎故序於作易者其有憂患之後蓋夏商之末易道中微文王遭羑里之難重卦繫辭易道復興故以己之憂患以憂患天下後世而此九卦於處憂患尤切履者禮也謹於踐履則德有基謙者遜也執其恭遜則德有柄復者反諸身而善原缺存故曰本恆者久於道而所守不變故曰固損則懲忿窒欲故德以修益則遷善改過故德以裕困則自驗其力故為德之辨井則不易其所故為德之地然猶巽順於理隨冝而行此聖人取九卦以成己之德也履以說而行故和而至謙以卑下人故尊而光復陽雖微而不亂於隂故小而辨恆居雖雜而不一然皆可久故雜而不厭損先自損而後得益故曰先難而後易益推所有而不外求故曰長裕而不設困身雖窮而道則亨故曰窮而通井雖居其所而用則遷巽雖稱其命而入則隱此又贊九卦之德也履以說行故可以和行謙卑自牧故可以制禮復以自反其善恆以惟一其德損所當損則害己之事遠矣益所當益則利人之事興矣困而自反則可以寡怨井隨所與則可以辨義巽順於理則可以行權此又贊九卦之用也六十四卦備於聖人之身矣而處憂患則九卦尤為至要故反覆言之以示人亦待衰世之意也右第六節三陳九卦以示人處憂患之道易之為書也不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虛行日用事物之間何莫非易不可須臾離也可離非易矣故曰不可遠然易者變易也故其為道也屢遷變動不居其所而周流於卦之六虛六虛者六位也謂虛以待變動之事也如乾初九上居於坤則坤變為剝矣坤上六下居於乾則乾變為姤矣上下安有常哉故或以剛而易柔或以柔而易剛不可拘以典常繩以要約此易之用存乎變也然變變無常者固易之用常而不變者易之體也故其一出一入也以度有度則吉或內或外也知懼不懼則凶又能明於憂患及事理當然之故使用易者凛凛然知戒懼而不敢肆雖無師保在前亦如臨父母之慈且嚴也如此方能率循其吉凶之辭揆度其趨向之方是於變動不居之中蓋自有典常不可變者在也然其常其變行之則又存乎其人故曰茍非其人道不虛行右第七節言易之用主乎變而易之體則有不可變者存宜常而常宜變而變用之則存乎其人也易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣智者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利遠者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪質謂卦體聖人設卦必原其始要其終原缺四字卦之全體也爻則各隨其事及其時而為變通者也初與上一卦本末也聖人之繫爻辭初則其事未定故難知上則其事已成故易知初猶擬議以為辭上則成其初辭而已若夫雜陳一卦之事論撰一卦之德辨其或是或非又非其中四爻則不能備通而求之則存亡吉凶於所居之或當或否可得而知矣至於統綸一卦之體則彖辭盡之蓋括一卦大義於數語之間智者未觀爻辭先觀彖辭以思之則得其意已過半矣同功者二與四皆隂三與五皆陽也異位者二與四近君遠君之不同三與五君貴臣賤之不同也四近君故多懼柔本不利乎遠而二多譽者以柔居中也五多功三多凶者君臣之别也然又以柔居之則危以剛居之則勝當位與不當位也右第八節言聖人繫爻辭之義例示人以推求六爻之法也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之為書廣且大也故三才之道皆備焉未重之先初為地二為人三為天時也廣而未大孤故也既重之後初與二為地三與四為人五與上為天於是有對有待有數有象廣原缺八字而成卦六者非他三才之道也道有變動故錯雜而成爻等者謂貴賤之有等也物者謂剛柔之成質也相雜者或以剛居柔或以柔居剛交相錯雜而成章也故曰文其文之物隨其所處當與不當而吉凶於是生焉此六爻之義也右第九節極言六爻之義例以承上章之文易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也易之興也興於上古然上古之時情僞未滋易之道猶在人心至殷之末世生民之情僞侈矣世道之險阻極矣聖人亦不免罹憂患之中矣羑里之難文王之於憂患所謂身履之者於是推吾身之憂患以慮天下後世之憂患故易又興焉文王之於易也其心危其心危故其辭危無他以安吾身之危者欲天下後世之危者平以正吾身之傾者欲天下後世之傾者易易者使傾之文錯簡也其慮患之道甚大故取喻於物者甚詳大而天地微而蟲魚茍可以取象以明吉凶失得之報者一物不廢使人懼之於始懼之於終其要歸於無咎而已此愚以重卦歸之文王而稱周易以别夏殷之易也右第十節結上文衰世之意夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生遠近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈天下事健而不息則易息而不健則難順而不拂則簡拂而不順則繁故乾至健而其德行恆易坤至順而其德行恆簡然健而易者多忽於險順而簡者多忽於阻唯乾坤之德易而知險故不陷於險簡而知阻故不困於阻上繫言易簡而及於可久可大此言易簡而及於知險知阻亦衰世之事也能以易簡之道說諸心研諸慮則可以斷天下吉凶失得之變成天下亹亹不倦之務矣侯之二字羡文也是故於變化云為之際見祥而知吉見象而知器見占而知來無所疑焉是天地以易簡之道設位於上下聖人以易簡之道成能於兩間人謀者天下之亹亹是也鬼謀者天下之吉凶是也天人合一幽顯無遺至於百姓莫不與知而與能此易簡之至也此三極所原缺八字然伏羲畫卦未有辭也象焉原缺八字有辭皆以情言剛柔雜居而吉凶可見經曰剛柔雜而不當故吉凶生是也變動以利言經曰變而通之以盡利是也吉凶以情遷謂吉凶隨事之情而遷也如愛惡相攻逺近相取情僞相感相近而不相得是也學易者知此則知易之為易矣然欲知其情者又在知言彼歉於中者必愧於外故將叛者其辭慚疑於中者必泛其說故中心疑者其辭枝吉德之人見理直故其辭寡躁競之人急於售故其辭多誣善類者必深匿其跡而陰寓其忮故其辭游失其守者必見義不明而內無所主故其辭屈觀卦爻之辭亦猶是也人而知此則知易之情矣是亦待衰世之意也右第十一節言乾坤至易至簡而知至險至阻者以示人愚故曰上繫言先天易用易處常之道也下繫言後天易用易處變之道也說卦昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章義存乎人者也命繫乎天者也使天下之人能知義知命則聖人之易可無作也惟夫人不知義之在我而縱欲徇私不知命之在天而行險僥幸故聖人之易不得不作神明者變化不測之理也易則生蓍而幽贊之數者奇耦之數也易則參天兩地而倚用之而又觀陰陽之變以立卦焉發剛柔之用以生爻焉凡此皆所以使人和順乎天之道己之德使合乎義而不違和順者相與無乖戾之謂理者得其條理之宜也又使人窮天下之理盡在己之性以達乎天命而不悖窮者推而極之之謂盡者全其固有之謂故曰易者性命之書也夫何中古以降不知命者不順乎天不知性者不求諸人易之未作聖人之意已在是矣故其作也將以順性命之理是以因六爻而立三才之道使人知是理之本一而不可違也初剛也二柔也地之道也剛柔以形言三義也四仁也人之道也仁義以性言五陽也上陰也天之道也陰陽以氣言兼三才而兩之故易六畫而成卦分陰分陽者謂陰有陰位二四上也陽有陽位初三五也迭用柔剛者謂居剛者不必皆剛而或以柔居柔者不必皆柔而或以剛陰陽錯居剛柔迭用故易六位而成章言剛柔雜而成文也右一節言聖人作易合三才以明一理使人潛此理以盡己之性盡己之性以順天之命也天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之上繫曰易有太極是生兩儀兩儀生四象四象生八卦者言先天畫卦之序此言卦位與象也數往者順言已生之卦知來者逆言未生之卦易逆數則純以未生之卦推之愚已圖于前矣雷以動之以下又言乾坤退處而不自用以任六子然非乾坤則無以君而主之藏而安之也右一節言伏羲先天易也帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所說也故曰說言乎兊戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮帝者主宰造化生物所宗之謂震三生木主乎春也齊者藝藝而生至此皆潔齊也相見者萬物之生至此皆相見也役己以養物者地也故致役乎坤收成而遂萬物者秋也故說言乎兊乾陽而西北陰陰陽相薄故戰物歸於坎坎者水也水之動不舍晝夜故勞艮則北而東冬而春是乃萬物之所成終而所成始也故曰成言乎艮右一節言文王後天易也神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此言六子變化成萬物之功而不言乾坤蓋六子之功即乾坤之功也乾坤而非六子則陰窮於陰陽窮於陽亦不足以神其變化矣故始言神也者妙萬物而為言者也終言變化既成萬物言六子之功用各有所在神則無在無不在也六子之變化各有所為神則無為無不為也此非乾坤其孰能當之右一節言六子變化化生萬物也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊說也此言八卦性情也健動陷止陽剛之象順麗入說隂柔之體也乾為馬健行也坤為牛順從也震為龍陽動於下而奮於上也巽為雞剛振於外而隂伏於內也坎為豕剛躁藏於內也離為雉文明著於外也艮為狗內柔而外剛狠也兊為羊外柔而內剛狠也此言八卦遠取諸物乾為首尊而首物也坤為腹容物也震為足缺也前巽為股缺乎上也坎為耳陷而明於內也離為目麗而明於外也艮為手外堅執而止物也兊為口上開張而說人也此言八卦近取諸身乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女此言乾坤之生六子乾為天以象言為圜以形言為君為父以人道言尊也為玉純粹精也為金至剛也為寒西北氣也為冰寒而堅也為大赤純陽之正色也為良馬健行也為老馬行不妄也為瘠馬為駁馬剛健常存也為木果堅實也坤為地以形言為母以人道言為布行之廣也為釡中高而四垂地之形也為吝嗇隂之性也為均矩之方也為子母牛順而生育也為大輿厚載也為文隂之畫也為衆耦數多也為柄靜制動也其於地也為黑隂之正色也震為雷以象言為龍陽奮而上也為𤣥黃缺疑為敷發暢也為大塗陽進而無壅物由而出也為長子一索也為決躁陽始動也為蒼筤竹為萑葦春而易生也其於馬也為善鳴剛於內而柔於外也為馵足為作足為的顙缺疑其於稼也為反生陽實在下也其究為健言終也為乾之健為蕃鮮生意在下也巽為木下根散而柔上幹高而剛為風無往不入也為長女一索之隂也為繩直柔而正也為工巧於入物也為白入色也為長為高二陽在上也為進退為不果二陽上一隂下進而退也為臭隂懦而腐也其於人也為寡髮陽窮於上為廣顙二陽在上為多白眼為近利市三倍其究為躁卦缺疑坎為水以象言為溝瀆水而動於中為隱伏陽陷於內也為矯輮為弓輪內剛外柔故可矯揉可為弓輪其於人也為加憂為心病為耳痛陽陷隂之中也為血卦水而流通也為赤其於馬也為美脊為亟心為下首為薄蹄為曳缺其於輿也為多眚水行舟非車輿之利為通水之性也為月水之精也為盜剛中而行險也其於木也為堅多心中剛離為火以象言為日明也為電火之精也為中女再索之隂為甲胄剛在外也為戈兵剛於外也其於人也為大腹中虛也為乾卦日火也為鱉為蟹為螺為蚌為龜內柔而外剛也其於木也為科上槁中空而外乾也艮為山以象言為徑路時行時止也為小石隂多也為門闕止也亦卦之象為果蓏陽實於上也為閽寺止於外也為指長短五畫也為狗剛於外也為鼠陽止而隂動也為黔喙之屬剛於外也其於木也為堅多節剛於外而不中也兊為澤坎水塞其下流之象也為少女三索之隂為巫說於上也為口舌開張於上也為毁折為附決上缺也其於地也為剛鹵下澤之地也為妾女少而柔說也為羊外柔而內狠也此言八卦取象所謂仰觀天文俯察地理近取諸身遠取諸物其道甚大百物不廢也中間有不可强釋者缺疑以俟後之君子序卦上有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必䝉故受之以䝉䝉者䝉也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也序卦下有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者晉也晉必有所傷故受之以明夷夷者傷也傷於外者必反於家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失所居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兊兊者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉愚於或問序卦下已辨之矣此決非聖人之言也雜卦乾剛坤柔三竒三耦也比樂師憂一陽居上得衆故樂一陽居下用衆故憂臨觀之義或與或求以上臨下有所與以下觀上有所求屯見而不失其居䝉雜而著屯處難事為見於外而不失其內䝉處昧智見雜於內而著明於外震起也艮止也震陽動於下故起艮陽窮於上故止損益盛衰之始也缺而不已必損益大畜時也無妄災也大畜缺缺無妄而萃聚而升不來也萃勢之所歸也升勢之所去也謙輕而豫怠也自卑故輕自滿故怠噬嗑食也賁無色也陽梗於中故必食陽藏於中故無色兊見而巽伏也隂說於外故見隂隱於內故伏隨無故也蠱則飭也隨則前無故蠱則後當飭剝爛也復反也剝窮於上復反於下晉晝也明夷誅也明出地晝也明入地傷也井通而困相遇也相遇而取足故通相遇而取窮故困咸速也恆久也咸之感也速恆之居也久渙離也節止也渙則離節則止解緩也蹇難也解則勢已寬故緩蹇則勢方急故難睽外也家人內也乖則于外合則于內否泰反其類也隂陽內外正相反也大壯則止遁則退也壯則四陽並進君子宜知止遁則四陽漸退君子宜知避大有衆也同人親也有其大者衆也與人同者親也革去故也鼎取新也革弊所以去其故鼎烹所以取其新小過過也中孚信也中實而剛不中故過中虛而剛得中故孚豐多故也親寡旅也物盛則多事身寓則少親離上而坎下也火炎上水潤下小畜寡也履不處也以耦畜竒故寡以柔履剛故行需不進也訟不親也需有待故不進訟相違故不親大過顚也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也此經本文大過顚也頥養正也大過上下虛故顚頥中虛故養漸女歸待男行也歸妹女之終也漸則未得所歸故待歸妹已得所歸故終既濟定也未濟男之窮也既濟隂陽皆得其位故定未濟隂陽皆失其位故窮姤遇也柔遇剛也夬決也剛決柔也姤以一隂遇五陽夬以五陽遇一隂君子道長小人道憂也申言夬決之義此以反對及對待之卦並言以發明上下經各十八卦相對之義語意甚明白但經之本文大過以下八卦不以二卦對言晦庵原缺七字以韻叶之又似非誤未詳何義原缺七字聖人立言之意則失矣況上文屯䝉咸速恆久之類亦不拘韻錯簡無疑今移之如上此亦易之所以為易也學者觸類而通之則易之道得矣大易緝說卷十
