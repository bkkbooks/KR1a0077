body:
  text: 大易緝說卷六元王申子撰下經艮下兊上咸感也无心之感也爲卦兊上艮下艮止也兊說也止而感物物說應之咸之義也一有作爲則非感矣故六爻皆以静爲貴伊川曰男女相感之深莫如少者故二少爲咸咸亨利貞取女吉天地間一感應之理而巳感以正則亨感不以正則入於邪惡而失其所亨矣故曰咸亨利貞亦以三與上成卦之主剛柔皆得其正而相交相感故以此義取女則吉彖曰咸感也釋卦名義伊川曰咸感也不曰感者咸有皆義上下交相感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣以成卦之主及卦徳釋彖辭而極言之也坤六三上而兊乾上九下而艮故曰柔上而剛下坤之一柔上矣二柔復下而艮乾之一剛下矣二剛復上而兊是隂陽男女相交相感而和合相與也止而說者謂艮止不動而意氣自相和說乃所謂感不止而動則是出於作爲非感也故六爻皆欲其静男下女謂少男下少女此感之至也感以正然後亨感不以正雖亨不吉故以感得其正者爲取女之吉亦謂成卦之主三與上皆得其正也大而天地以氣交感而得其正然後萬物化生聖人以心相感而得其正然後天下和平故極言之以見交感之道无物不有感得其正无物不亨也象曰山上有澤咸君子以虛受人澤能潤下山能受潤今山上有澤是山受潤而澤通于上山澤通氣咸感之象也澤得以通于上者山之虛也君子以之虚其中以受人中旣虛則亦无感不通矣初六咸其拇咸之六爻皆取諸身以爲象者天地萬物本吾同體此感彼應自有不言之妙也拇足大指也足雖未行而拇常向外此自然之天也以言初六艮體處下而應於四是身雖未動而志之所向常在外也猶君子在下道雖未行而應物之志未嘗不在天下也象曰咸其拇志在外也外九四也𥘉與四隂陽交感身未動而志巳應如拇之常向外也六二咸其腓凶居吉腓足肚也隨股而轉移柔虛而易動喻二以柔居柔易於隨三之股而動也二處咸之時居中得正若隨三而動則失咸之道故凶若居守其中正以待五中正之應則感得其正矣故吉爻一也用之有得失吉凶之報異焉可不愼歟象曰雖凶居吉順不害也得五之正應則不唯於義爲順且不害其中正也九三咸其股執其隨往吝股隨足而動者咸之義静則爲感動則非也今三以陽剛之才居得其正爲艮之主是冝自守其正以感於物而乃以剛用剛應上六柔說而往從之遂執其同體之拇腓隨之而動是剛正之才不能自主失咸之道者也故吝象曰咸其股亦不處也志在隨人所執下也亦云者承上爻辭言前二隂感於陽而動今三陽剛亦感於隂柔而不能自止故曰亦不處也且志在下隨是所執者下也冝其吝九四貞吉悔亡憧憧往來朋從爾思四居股之上脢之下心之位也不言心者四柔說不正有時不免廢心而任思故爻辭有善有惡謂四以陽剛之質介二剛之中居隂而静此其未感之初有心體静而貞之象得咸之道故吉故悔亡及一有所感其體說而居柔不中不正遂憧憧焉役其思慮於事物往來之間以謂天下事皆可以私意計慮而得之也故其思所及者朋從之思所不及者則弗之從四之象具此二者故聖人於貞吉悔亡後言其任思之失以見咸之道无心而待物之自感則无所不應一容心於其閒則非感矣其應之狹也冝哉象曰貞吉悔亡未感害也憧憧往來未光大也未感害者言未感之初未爲私意所累也未光大者言任思之失於咸感之道未得爲光大也九五咸其脢无悔脢背肉也醫書曰一身腑臟之腧皆繫于背則是不思不動而繫者衆矣謂九五陽剛中正爲咸之主能不思不動以感而待人之自應得咸之道是以无悔象曰咸其脢志末也志末者謂他有志於感者抑末耳不若五感以无思之善也或問曰志末也子以爲他有志於感者抑末耳諸賢皆不如此說无乃聖人背意解經乎曰安行也信如何也過旬災也之𩔖豈非聖人背意解經乎上六咸其輔頰舌輔頰舌皆以言者上以兊之極處咸之窮是柔說之至急於求感者也故不能以誠感物而徒事乎口舌之間以求感其能感乎失咸之道矣象曰咸其輔頰舌滕口說也滕騰通以心思感人所感巳狹況口說乎巽下震上恒常久也咸以少男下少女男女交感之義夫婦之始也恒則二長同居男尊女卑男外女内各正其位夫婦居室之常亦人道之常也故爲恒恒亨无咎利貞利有攸往可恒之道必可以亨不可以亨豈可恒之道哉亨而且无咎者貞正故也蓋不正則不可恒恒亦不可亨而无咎故曰亨无咎利貞謂貞正則可恒且可亨而无咎也然所謂恒者謂其可久也非守一而不知變也故利有攸往亦可恒之道何往不利彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒以成卦之主及卦體卦德釋卦名義初與四成卦之主也乾之初上而四坤之下下而初剛上柔下也二爻上下而成震巽亦剛上柔下也以卦體言剛上柔下乃分之常以卦象言雷風相與乃氣之常以卦徳言巽順而動乃理之常以卦位言剛柔相應乃情之常故曰恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣凡可恒而亨且无咎者正而巳故利貞爲久於其道言不正則非可久之道也亦以成卦兩爻皆不當位故戒之天地之道其所以恒久而不息者亦正而巳利有攸往者變而通之非執乎一以爲恒也故曰終則有始始而終終而復始亦天道之恒也故日月得此恒而能久照四時得此恒而能久成聖人得此恒故能久於道以成天下之化觀乎此則天地萬物有恒之情亦可見矣象曰雷風恒君子以立不易方相須相與以鼓動萬物者雷風之恒也發聲收聲不爽其時或涼或温不舛其候者亦雷風之恒也君子以之立不易方不易者不遷也方者所也即大學所謂至善之所人物所當止之地也立身於此而不遷易乃君子之恒亦可恒之道故以取象初六浚恒貞凶无攸利恒久也天下可久之事豈一朝夕所能致者初六質柔而志剛質柔故昧於逺見志剛故欲速不達處恒之初是方爲可久之計者而遽焉求深故曰浚恒非急暴而不能恒則必茍且而不可恒矣貞固守此以爲恒取凶之道也何所利哉象曰浚恒之凶始求深也可恒之道以久而成始而求深是施諸已則欲速不達施諸人則責之太遽者也故凶九二悔亡恒利貞以九居二不正疑有悔者然處下之中位之中也以剛居柔徳之中也上應六五應之中也居中得中而應中是无往不中乃時中之君子也中則正矣況中者无過不及天地間可恒之道也二既得之是以悔亡象曰九二悔亡能久中也中庸其至矣乎民鮮能久矣能久於中恒之善者也尚何悔之有九三不恒其徳或承之羞貞吝人之爲徳過乎中則不能恒三過乎中矣且以剛居剛而處巽之極過剛則躁巽則不果是无恒者也其徳不恒則羞辱承之或者在彼有時而至也若貞固守此以爲恒必取羞吝矣象曰不恒其徳无所容也人而无恒則進退无所據矣尚何所容其身哉九四田无禽天下之功以久而成恒久之道以正爲貴四雖陽剛而不中不正居不當之位承柔弱之君雖久何益故如田獵而不得其道雖淹久而終无禽獸之獲焉則亦徒勞而巳象曰久非其位安得禽也以不正之徳事柔懦之君又處非其位故雖久而无功也六五恒其徳貞婦人吉夫子凶隂柔居中而以順從陽剛爲恒者在婦人之徳爲貞故吉若夫子以此而爲恒則失其爲夫子之道而凶矣況五君也而一以柔徳下從九二之剛以爲恒如婦人焉可乎象曰婦人貞吉從一而終也夫子制義從婦凶也五居中而一以柔順從二之剛以爲恒此義在婦人則吉婦人以從爲正以順爲徳從一而終也若夫子則制義自我從婦人之徳以爲恒則凶矣況君道乎上六振恒凶振者連動而无常也居恒之終處震之極恒終則變而不能恒震極則動而不能止故有振恒之象在上而動无恒其凶冝矣象曰振恒在上大无功也此所謂天下本无事庸人自擾之其好功生事之過乎故聖人折之曰大无功言振擾於守恒之世決无所成也艮下乾上遯退避也爲卦艮下乾上二隂浸長於内四陽將消於外小人漸盛君子退而避之遯之象也然二隂雖長四陽猶盛而遯者何也蓋一變則爲否否則隂其外我非我遯之也故二隂爲遯遯亨小利貞二隂浸長否道將成君子見幾而遯是身雖遯而道則亨故曰遯亨小利貞晦庵曰小人利於守正不可以浸長故侵迫於陽謂成卦九三猶能止二隂於下也伊川曰四陽猶盛於外其𫝑猶可小有所正謂二五中正相應尚可與時行也二說兼之於義始備彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉釋彖辭隂道浸長之時君子退遯以伸其道是君子之遯乃其道之亨也故曰遯而亨五以陽剛中正居尊位下有柔順中正之臣爲之應尚可隨時消息以致其力況九三成卦之主猶能止二隂於下故曰與時行也小隂柔小人也雖隂道浸長亦冝守正不可遽迫乎陽所以扶君子而抑小人亦小人之利也且二隂雖長於内其勢尚孤四陽猶盛於外其勢猶可以小有所正爲君子者亦不可決於退遯以遂一已之髙而付世道於不可爲也時義者以時而言二隂浸長而將否見幾者不得不去以義而言二五中正相應猶可有爲是君子決去處之義於此時爲難故曰遯之時義大矣哉象曰天下有山遯君子以逺小人不惡而嚴天乾也上三陽健行而逺去山艮也下二隂爲一陽止之而不得行是小人猶有所制而君子得以從容逺去又見去之髙者其勢不可得而止遯之象也君子以之逺小人不惡而嚴如孔子之待陽貨孟子之待王驩雖非遯猶遯也初六遯尾厲勿用有攸往尾在後也他卦以下爲初遯往遯也故遯以初爲後在前者見幾先遯初柔而不能決止而不能行故遯而在後危厲之道也既巳處後然位卑居下不往即遯也若又有所進往則危厲益甚矣初柔而不正故戒之象曰遯尾之厲不往何災也君子處遯如上九知幾而最先者善也遯而居後危之道也然處卑易晦但不往進則亦何災之有六二執之用黄牛之革莫之勝說黄中色牛順物革柔而堅者也二以中正居大臣之位與五中正相應當賢人君子見幾而遯之時豈容坐視以聽其去故以其中順之徳内固君臣之志外繫賢者之心以扶持世道其執之堅如用黄牛之革至於不可說此六二之志也其彖所謂應當位之剛與時行之事乎象曰執用黄牛固志也言執守之以中順之道其堅固如此不爲時變所移者六二之志也故此爻獨不言遯九三係遯有疾厲畜臣妾吉乾之三陽皆巳前遯而三乃以陽說隂比二而止於下是有所係累害其遯也凡陽爲隂所累者曰疾故曰係遯有疾遯而有疾危厲之道也然以此道畜養臣妾則吉蓋係戀之私恩施之於小人女子則得其心也象曰係遯之厲有疾憊也畜臣妾吉不可大事也遯而有係必以所累致困蓋暱比之私止可以畜臣妾不可以當大事也九四好遯君子吉小人否九四與五同徳是上而君臣猶相好也與初正應是下而隂陽又相好也四冝好愛而乃捨之以遯者蓋陽剛之徳而居乾體識時之冝上不貪利禄之榮下不牽係累之私也此非以道制慾之君子不能故聖人許之以君子吉又嘆其非小人之所能也象曰君子好遯小人否也言捨其所好而遯唯見義明用心剛之君子能之故小人否也九五嘉遯貞吉嘉襃嘉也五以陽剛中正居尊位下有柔順中正之臣爲之應是豈坐視羣賢之遯而付世道於不可爲者故弓旌之招束帛之賁尊尚而襃嘉之使復其所且正固以守其志不爲羣小之轉移安得而不吉象曰嘉遯貞吉以正志也五之能嘉遯以致吉者貞正固守而不移乃其志也時不然而志則然者遯之君臣也故二曰固志五曰正志此彖所謂剛當位而應與時行也上九肥遯无不利上以剛健之至居一卦之外處遯之先而无係累是充然自足於一世之外者自非徳豐道腴安能如是而其進退豈不綽綽然有餘裕哉故无不利象曰肥遯无不利无所疑也由其剛決爲遯之先故從容逺去而无所疑也乾下震上大壯大者壯也陽爲大四陽壯而倍於隂陽剛壯盛也爲卦乾下震上乾剛震動剛以動也雷震於天上亦大者壯也亦壯之大也故爲大壯大壯利貞大壯之道利在貞正壯而不得其正則爲剛惡豈君子之壯哉亦以九四爲成卦之主不得其正故戒彖曰大壯大者壯也剛以動故壯釋卦名義陽長過中爲大者壯以乾之剛而動於上爲壯之大故曰大壯大壯利貞大者正也正大而天地之情可見矣釋彖辭大壯之道利乎正不正則爲強暴爲狠惡豈大者之事乎大莫大於天地天地之所以不屈於萬物之下者亦正而已唯正故大唯正大故壯故正大則雖天地之情亦可見矣人而不正大其能壯乎象曰雷在天上大壯君子以非禮勿履天下雷行爲无妄雷在天上爲大壯无妄震下乾上其動皆天大壯乾下震上以天而動故无妄之象曰先王以對時育物所謂誠者天之道聖人之事也大壯之象曰君子以非禮勿履所謂誠之者人之道賢者之事也非禮勿履者必以天而動也以天而動則所行一出於正大君子之壯也初九壯于趾征凶有孚卦雖以剛壯爲義然爻義皆貴於用柔蓋以剛而動剛不可過也趾在下而主於行初乾體而居剛用剛是壯于行而不顧者也在上猶爲過況在下乎其凶必矣有孚者信其凶之必然也象曰壯于趾其孚窮也居下而用壯任剛而決行信乎其窮而凶也九二貞吉九二居中而又以剛履柔剛而得中是處壯不用其剛而用其中者也用中而不過於剛乃用壯之正道二得之故吉象曰九二貞吉以中也以者用也言以九居二不用其剛而用其中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角三體剛用剛不中不正以乾體之健處大壯之時是過於壯者也小人尚力者用之則爲勇猛怙強好勝若固守此道而行危也君子尚徳者用之亦爲剛狠蔑視於事若固守此道而行亦危也故曰貞厲其象如羝羊觸藩而羸其角銳於進而艱於反用壯之道不可過於剛也如是夫象曰小人用壯君子罔也言小人用此必以壯取敗君子用此必以罔取困也九四貞吉悔亡藩決不羸壯于大輿之輹用壯之道貴乎得中而不過九二體剛用柔而居中故貞吉九四亦體剛用柔不足於中故雖貞吉而有悔有悔而後亡今四爲成卦之主得壯之時進无阻礙謂三前有四猶有藩也四前二隂則藩決矣无能害其壯者故藩不待觸角亦不羸可以壯于大輿之輹而勇往言四處壯而得時用剛而不過可以任重而致逺也象曰藩決不羸尚往也尚往者陽剛君子之道可以往進而莫有阻之者矣六五喪羊于易无悔羊剛狠而羣行之物喻衆陽也易和易言五以柔居中得和易之道也衆陽用壯而並進豈无剛觸之害五爲壯之主能以和易處之使喪其剛壯而不用是能以柔制剛而歸於中者也故无悔象曰喪羊于易位不當也位不當者以六居五以柔居尊才不足而位有餘也若陽剛中正則下亦无壯矣上六羝羊觸藩不能退不能遂无攸利艱則吉羝字疑羨上六雖隂柔而體震之極處壯之終震之極故不能自止壯之終故終於用壯所以亦有觸藩之象然羊之觸藩者至剛之角也今不言角者見隂柔而用壯也體震而極其用壯之心故不能退質柔而處大壯之窮故亦不能遂其進妄動如此何所利哉艱則吉者遇艱難則吉蓋柔遇艱則止壯既終則變也象曰不能退不能遂不詳也艱則吉咎不長也進退不能者但知用壯而不詳審其可否也艱則吉者壯終則變若遇艱難而改其所爲則咎亦不長也坤下離上晉進也爲卦坤下離上明出於地有升進之象焉故曰晉進也蓋明出地上猶可以進若明在天上則不可以進言矣六十四卦離上者八專取六五一爻以爲成卦之主者二晉大有也大有曰柔得尊位大中而上下應之晉則曰康侯柔進而上行是專以康侯之進者當此一卦之義明矣晉康侯用錫馬蕃庶晝日三接易中彖辭未有如晉獨取康侯爲義者且六十四卦无有无卦徳者地中生木升猶曰元亨用見大人南征吉況大明出地而爲晉冝曰亨曰吉曰利見大人曰利有攸往今皆不言獨曰康侯是專以康侯之進者成一卦之義也何則明出地上足以照臨一方不足以照臨四海未至於天猶可以進若明麗乎天則何進之有或曰日者君之表康侯謂日可乎曰不然日月君臣之𧰼固不同而以明徳居上爲衆所附麗則一況彖象之辭止曰明不曰日如明夷之取義乎以離明之徳居坤土之上以柔進而上行此象此義非諸侯之進者而何康侯治安其國之侯既能治安其國則其進也冝受天子之寵命矣車馬之錫重賜也蕃庶賜之多文之盛也三接恩禮之勤也晝日取其光顯明之盛也以見康侯晉進之時文明之盛也彖曰晉進也釋卦名義愈進而愈明故爲晉明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庻晝日三接也以成卦之主釋彖辭明出地上者謂以離明之徳出於坤土之上也順而麗乎大明者謂以坤順之徳麗乎大明以進也柔進而上行者謂以隂柔之徳進而行於上以言成卦六五也是以二字接上文見康侯以如是之明如是之順如是之柔以進冝其光膺錫賚之多顯承恩禮之厚也錫馬坤上取義晝日離上取義象曰明出地上晉君子以自昭明徳明出地上則无能掩其明矣君子體之以自昭其明徳昭明之也所謂明明徳也初六晉如摧如貞吉罔孚裕无咎初六柔而處下必於進不可也上有正應必於退亦不可也晉如升進也摧如抑退也進退无常唯正則吉若猶未爲上所孚信則唯寛裕以自處不躁不競則亦无咎此君子當晉進之初處進退之正道也象曰晉如摧如獨行正也裕无咎未受命也君子處進退之道无他唯獨行吾正而巳且初進而未受命其孟子所謂无官守言責則進退豈不綽綽然有餘裕者何咎之有六二晉如愁如貞吉受兹介福于其王母小過之五亦隂也二遇之曰過其祖遇其妣然又必曰不及其君今晉之五亦隂也而止曰王母王母即祖之妣也以謂五雖居尊而實隂猶居君人之位而實臣也六二處晉之時與五同徳其仕於諸侯之命卿命大夫歟方康侯晉進之時身爲國佐非社稷之守則羈絏之僕必同其憂故曰晉如愁如然二居中得正是能以中正自守之君子也故上爲天子所知而𫉬吉下爲其君所敬受此助增之福于其國之君也其者隨其仕國之辭詩曰以介景福介助也象曰受兹介福以中正也受此介福以二中正故也六三衆允悔亡三處下之上不中不正冝有悔者然居坤體之極順之至順彖曰順而麗乎大明柔進而上行是三於柔進之時以其至順先進而上行者也此衆心之所信從故悔亡象曰衆允之志上行也衆志之所允者以其順之至先進而上行也九四晉如鼫鼠貞厲晝而伏者鼠也貪而畏人者鼫鼠也鼫大也旋食旋驚故曰貪而畏人謂四以陽剛居晉晝之時而處於隂是質剛而伏於晝之鼠也不中不正而據髙位下忌三隂之進是又貪而畏人之鼫鼠也蓋衆方晉進而居不當之位懷貪畏之心隂伏自處當進不進貞固自守其危厲可知也象曰鼫鼠貞厲位不當也言四以陽居隂據非其位貪而畏人當晉進之時貞固隂伏而不動冝其厲也六五悔亡失得勿恤往吉无不利此爻成晉之主也聖人以康侯當之若曰明出地上未至于天位雖尊而明不及逺且居坤土之上君一國之君也今合以彖所謂順而麗乎大明柔進而上行之康侯取義蓋以柔體居一國之上不能无悔然以中順盡臣之道故悔得亡且尺地一民皆天子所有處晉之時當進則進不可以患失患得爲心而懷顧望之意故曰失得勿恤但往而進則必獲吉且於其身於其國亦无不利也象曰失得勿恤往有慶也不恤已之失得唯中順以事其上則往而進也必受庶錫三接之寵矣故曰往有慶有慶者其孟子所謂則有慶慶以地之𩔖乎上九晉其角維用伐邑厲吉无咎貞吝以離之極處晉之極是剛明而進至於窮極者也明極者必窮物剛極者必觸物故曰晉其角角者剛極於上而善觸之物而以處晉故思攻伐乎人以自益此豈康侯所冝爲者維可用之伐巳邑以自治然亦當以危厲之心處之然後吉而无咎雖然亦不可以此爲正而固守之故又有貞吝之戒象曰維用伐邑道未光也以九之陽體離之明處晉之極而曰未光者征伐自天子出以諸侯而自伐巳邑雖无咎而於臣道亦未得爲光大也離下坤上夷傷也爲卦離下坤上爲大明傷夷之象其昏暗在上明者見傷之時也傷非毁其明特晦其明耳明固自若也故不曰夷明而曰明夷此明字亦猶晉明出地上之明言徳之明初不指大明之日以爲君象也明夷利艱貞明夷者聖賢處亂世而用晦之道也利艱貞者利於處艱厄而不失其正亦謂六二成卦之主雖處明夷之世而中正自若蓋昏暗在上不晦其明則遭禍患艱厄之際不守其正則非君子也彖曰明入地中明夷釋卦名義與大象同辭異乎諸卦入地中云者言暗君在上明者自晦其明故曰明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之以卦徳引證以釋彖義明夷一卦大抵主商之末造言之上爻爲不明晦之主紂是也五以下皆處明夷者也用一卦之義者文王也内卦離故曰内文明外卦坤故曰外柔順文王内有文明之徳而外盡柔順以事君故紂之大難足以及天下而不足以及文王此文王用明夷之力也故曰文王以之用一爻之義者箕子也以六居五自晦其明故能處艱厄而不失其正遭内難而不變所守故紂之内難足以及一家而不足以及箕子此箕子用明夷之力也故曰箕子以之象曰明入地中明夷君子以莅衆用晦而明離之明而入于地中故爲明夷明雖夷而明固自若故君子以之莅衆用晦而明謂於含容韜晦之中有條理密察者在也蓋用晦而不明則失之暗不用晦而明則失之察皆非莅衆之道初九明夷于飛垂其翼君子于行三日不食有攸往主人有言此剛正君子居明夷之初見幾而作者也然君子所爲衆人不識飛而垂其翼者逺去之志見傷於其所也君子于行三日不食者行而見傷於其途也往而主人有言者隨所至皆曰不然是又見傷於其止舍之地也然君子不以翼之垂而不飛不以不食而不行不以有言而不往蓋見之明知之審其義在所必去也世之處昏亂而不能決去以䧟於禍者亦多矣象曰君子于行義不食也夫子於三者之中止釋于行一語以爲義所不食則于飛攸往義所當行亦明矣去之可不速乎其伯夷太公之事乎六二明夷夷于左股用拯馬壯吉既曰夷于左股矣又必先之曰明夷所以甚悲六二之不幸也蓋離之所以爲明者二也成明夷之卦者亦二也柔順中正不幸而遇明夷之時斯時也唯晦可以免而二備文明中正之徳此暗主之所深忌者也唯去可以免而二居大臣之位此昏世之所不得去者也故有左股之傷股肱大臣之象左雖尊而於行之用不切猶位雖尊而於昏世之用不切也亦既傷矣用拯之道必健而順乃可以免馬健而順乎人者也蓋不順則取禍不健則失則故曰馬壯吉吉者亦免禍害而巳象曰六二之吉順以則也六二之吉以柔順處之而亦不自失其中正之則也昔者文王用明夷之道其如是乎九三明夷于南狩得其大首不可疾貞三離之上明之極也上坤之上暗之極也正相敵應是以至明遇至暗也南嚮明之方狩畋而去害之事是爲嚮明除害得其元惡之象故曰得其大首疾害也言上六雖極其隂暗而終下能爲九三之害者九三剛明貞正故也故曰不可疾貞象曰南狩之志乃大得也志在嚮明而除害故曰南狩之志猶曰九三之志所以大得者以晦之明害之除也昔武王處明夷之世其若是歟六四入于左腹獲明夷之心于出門庭坤爲腹腹者不能用明之物左又无用之地六四柔而正下有陽剛之應而處上暗之時非不欲入而正救之奈遇不明而不用于是退而得明夷之道於心于出門庭而逺去之蓋四爲近臣其入也不忘其君其出也不失其明其微子數諫不聽抱祭器以歸周之事乎象曰入于左腹𫉬心意也意者心之所發𫉬心意者因入不明而不見用有以發其逺去之心也六五箕子之明夷利貞五君位而曰箕子之明夷何也明夷之世日君象也而入于地是天下无君也六五柔徳得中獨夫紂又不足以當之箕子者以徳而言則柔順得中能逺九三而比上六以處而言則以隂居陽能正其志而晦其明以位而言則同姓世臣獨與殷之天位相爲終始故以當之此箕子之處明夷利於不失其正也象曰箕子之貞明不可息也箕子之明雖夷而終不息者貞正常存故也上六不明晦初登于天後入于地旣曰不明而又曰晦者甚其昏暗之辭也處一卦之上得至髙之位是初登于天也以坤隂之極居明夷之終盡夷其明是後入于地也此其所以成明夷之世象曰初登于天照四國也後入于地失則也言升于至髙之位本可以照臨四方而乃盡夷其明是失其則也失則者失其爲君當然之道也離下巽上家人一家之人也爲卦離下巽上離火也巽木也風也火生於木風又生於火如夫婦父子相生於无窮家人之象也上下二陽如宫牆焉竒耦倡和於中室家之象也明於内而巽於外處家之道也故爲家人家人利女貞聖人取巽長女離中女爲家人卦又二與四爲成卦之主皆隂柔得正故曰利女貞亦自古以來家之興衰未有不由於婦人者蓋男正唯能正身以率下女正則家道俱正也故家人之義唯利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣此釋彖辭而推極家人之義也以六居二而位乎内卦之中女正位乎内也以九居五而位乎外卦之中男正位乎外也男女各正其位則尊卑上下之義得矣此天地之大義也嚴君者主於出命以正一家父母之謂也父道固主乎嚴母道尤不可以不嚴猶國有尊嚴之君長也故曰嚴君蓋處家之道无尊嚴則孝敬衰无君長則法度廢故家人一卦大要以剛嚴爲尚父父者父盡父道子子者子盡子道以至兄弟夫婦皆盡其道則家道正推一家可以及天下故正家而天下定矣象曰風自火出家人君子以言有物而行有恒風自火出敎自家出家自身出此家人之象亦家人之義也故君子以之先正其身言必有物行必有恒物事實也恒常度也言而无物則欺行而无恒則僞欺乎言僞乎行而能正家者无之初九閑有家悔亡初有家之始也閑防閑有法度也閑家之道閑之於始則不傷恩不害義處家之善也初之不謹而閑之於後所傷多矣悔得亡乎諺所謂訓子嬰孩訓婦初來之意九剛明之才能閑家者也不云无悔而曰悔亡者羣居不能无悔以能閑故亡耳象曰閑有家志未變也言閑之於家人正志未變之初也正志巳變而後閑之所傷必多矣非有家之善也六二无攸遂在中饋貞吉二以柔順中正之徳正位乎内而外應陽剛中正之五陽倡隂和男行女隨而巳故曰无攸遂遂專也傳曰大夫无遂事示不敢專也唯居中而主饋者乃婦人之職詩曰無非無儀惟酒食是議故无攸遂在中饋唯以順從爲正故吉象曰六二之吉順以巽也不順則不能承乎上而有先迷之失不巽則不能安乎下而曠在中之職故二之吉順與巽而已九三家人嗃嗃悔厲吉婦子嘻嘻終吝三以剛居剛雖得正而過乎剛者也治家過剛則必傷於嚴故家人嗃嗃常存恐悚之意骨肉恩勝嚴過故悔然雖悔於嚴厲而家道齊肅人心祗畏猶爲家之吉若婦子嘻嘻笑樂无節則終有吝矣象曰家人嗃嗃未失也婦子嘻嘻失家節也治家不可以不嚴嗃嗃雖厲未爲失也若婦子嘻嘻則失家之節矣王弼曰與其瀆也寧過乎嚴六四富家大吉四以柔順居上卦之内而得其正其家人之母歟家人六位皆得其正禮所謂父子篤兄弟睦夫婦和之家肥者也其富可知而四又以巽順之正處之於上保有其富而𫉬大吉也冝哉象曰富家大吉順在位也四以柔順之徳得其正位是能安處以長守其富者也吉孰大焉九五王假有家勿恤吉五君位故以王言假至也極也五以陽剛中正位乎外二以柔順中正位乎内是五有刑家之道二有内助之徳一卦六爻皆得其正是極乎有家之善者也尚何憂恤哉其吉者家正而天下定也象曰王假有家交相愛也言王所以極有家之善者由一家各盡其道上下交相愛也上九有孚威如終吉家人之終家道成也故極言齊家久逺之道齊家之道以誠爲本以嚴爲用蓋不誠則上下相欺衆事不立不嚴則禮法不存瀆慢易生如此而家道齊者未之有也故家人之終以孚威二者言之是二者保家道之終吉者也象曰威如之吉反身之謂也九以剛居上能威者也然威乎人而不能威乎巳則人亦不我信而不我從矣故曰欲齊其家者先修其身兊下離上睽乖異也爲卦兊下離上伊川曰離火上炎兊澤潤下二體相違睽之象也中女少女雖同居而所歸各異睽之義也故爲睽睽小事吉睽之成卦三與五也皆以隂居陽而不當位故不能大有所爲且當睽之時上下之情動相乖戾故不可以大事唯於小事則吉也彖曰睽火動而上澤動而下二女同居其志不同行以二體釋卦名義離兊皆乾體而火上澤下不動則巳動則睽違女之少也同處長則各適所歸是其志不同行所以爲睽睽者本同而後異也本不同則何睽之有說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉以卦徳釋彖辭而極言處睽之道也下以兊說而上麗乎離之明五以柔中而下應乎二之剛卦徳如此而不能成天下之大事者當睽之時柔上行而居尊成卦之主皆不當位故也然則睽終不合歟說麗乎明睽之合也五應乎二睽之合也天髙地下其勢睽矣而生成之事則同也陽男隂女其質睽矣而交感之志則通也物分萬殊睽矣而同稟隂陽生成肅殺之事則相類也以其時之事言之則可小而不可大以其時之用言之則甚大而非小也故曰小事吉而又曰時用大矣哉象曰上火下澤睽君子以同而異彖言異而同象言同而異非同而異何以爲睽離兊皆出於乾澤火均於濟物而上下之性不同是同而異者睽之象也君子以之於世俗所同之中義有不可同者不能不異其同其異豈茍乎哉初九悔亡喪馬勿逐自復見惡人无咎睽之諸爻皆言處睽之道九當人情睽異之初以剛居剛冝有悔者然居得其正且處說體不與人睽故悔亡馬所以行陽上行者也初與四同徳居相應之地而四離體上進不應於初故有失馬之象火水相仇又有惡人之象然失馬冝逐而不逐惡人不冝見而見之何也蓋方睽之初其睽未深馬之失也未逺惡人睽間之情未甚也失馬逐之則愈逐愈逺惡人激之則愈激愈睽故勿逐而聽其自復見之而可以免咎也處睽之初其道當如此不然睽終於睽矣象曰見惡人以辟咎也以辟咎者謂睽之初若遽絶之則益生怨懟見之則可免睽乖之咎也九二遇主于巷无咎九二剛中之臣六五柔中之君在他時則爲隂陽相應在睽之時則爲剛柔相戾故二於其主不得不遇于巷蓋遇者逢迎之謂巷者委曲之意言不幸當睽之時爲九二者不可自挾其剛亦當委曲求遇然後可以免君臣睽乖之咎也象曰遇主于巷未失道也遇非枉道以相求巷非邪僻之曲徑本吾正應但處上下睽乖之時不得不委曲以求合耳故曰未失道言於正道未爲失也六三見輿曳其牛掣其人天且劓无初有終三處睽之時正應在上爲二與四睽間之而不得合輿以載人牛以引輿而進者然居二陽之間欲進則其輿方曳於前而其牛或掣於後是九二爲之厄也而六三志剛勇於進其人又遭天劓之傷天者髠其首止之於上也劓者刑其鼻絶其交通也是九四又爲之厄也蓋三處睽之時質柔志剛不中不正而居二強之間故見侵陵如此然二四於三无合之義上亦孤而居睽之極睽極必合是初不免爲二陽所厄而終必與上九相合也故曰无初有終象曰見輿曳位不當也无初有終遇剛也以六居三位不當也方睽之初遇二四之剛无初也睽終必合遇上九之剛有終也九四睽孤遇元夫交孚厲无咎四遭時之睽處二隂之間而无應與是睽而孤者也元夫猶言善士指初也觀其不校知其善也四居近臣之位獨立无與幸有初九同徳君子與之相遇四能交之以誠則睽不孤矣雖然當睽之時非自然之合必危厲以處之乃得无咎象曰交孚无咎志行也言與善人君子至誠相交可以合睽而行其志故无咎六五悔亡厥宗噬膚往何咎以隂居尊冝有悔者得中應剛故能亡之睽之諸爻皆言睽獨二五不言而言合蓋合天下之睽者君相責也隂以陽爲宗如同人于宗亦指九五膚者睽之淺噬則合之深睽之世上下皆睽而君臣之合如此可以往而有爲何咎之有象曰厥宗噬膚往有慶也二以陽剛之才當濟睽之任五以柔中之徳噬而深合之以此道而往其福慶將及於天下豈但无咎而巳哉上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉以九居上剛之極也處睽之終睽之極也位離之上明之極也而一以不正處之故其剛極則躁暴而不詳其睽極則咈戾而難合其明極則過察而多疑有三爲應本不孤唯其如此妄生猜疑自取孤獨故曰睽孤謂其不孤而取孤者睽極而疑生疑極而妄生也其見三之如豕負泥塗而汚巳疑也其見三之載鬼一車而祟巳妄也疑妄之極至欲張弧以射之則親爲讎矣然物理極則必反及其妄去疑釋則說之弧然後知六三非寇乃婚媾之親也雨隂陽和也往遇雨者謂疑妄既釋上九六三隂陽和而復合故吉致此吉者亦剛明之力也象曰遇雨之吉羣疑亡也孤生於睽睽生於疑今羣疑既亡則睽而合合而和所以吉也艮下坎上蹇難也足不能進之義爲卦艮下坎上伊川曰坎險也艮止也險在前止而不能進也前有險䧟後有峻阻足進不能故爲蹇蹇利西南不利東北利見大人貞吉西南坤方言成卦九五往得坤之中坤之體順而平也東北艮方言成卦九三止於艮之上艮之體險而阻也處蹇之道順處平地則難可紓止於險地則難益甚矣故曰利西南不利東北濟蹇難者必有過人之才必得貞正之道而後可故曰利見大人貞吉卦爻之辭皆處蹇之道彖曰蹇難也險在前也見險而能止知矣哉以卦體釋卦名義而賛處蹇之善也坎險在前止而不進知也若冐險而進豈知者之事哉故諸爻喜來而惡往唯二與五不言來往蓋君臣濟蹇者也其可見險而遽止乎其止者處蹇之事也不止者濟蹇之事也蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉以成卦之主釋彖辭西南坤之方坎實坤體成卦之五以陽剛往居其中故曰往得中是處蹇而得就平地也東北艮之方成卦之三止於艮體之上是處蹇而止危險之地以自取困窮故曰其道窮大人者九五也處蹇而見此陽剛中正之大人往必有功故利五三成卦之主得位之正一卦六爻皆得其正率以此正蓋不但濟蹇而吉雖一正天下可也故曰當位貞吉以正邦也由此觀之當蹇之時濟蹇之用豈不大哉象曰山上有水蹇君子以反身修徳地上有山險矣山上復有水是險之又險行不能進蹇之象也君子以之反身修徳者所謂行有不得則反求諸其身修徳以俟命而巳行險僥倖君子不爲也初六往蹇來譽隂柔在下而處蹇坎險在前而无應若遂往進則蹇愈甚故曰往蹇來對往而言來而不往則有知幾識時之譽故曰來譽象曰往蹇來譽宜待也往而行險不如居易以俟之爲宜也六二王臣蹇蹇匪躬之故以二奉五王臣之象二以柔順中正之臣上奉陽剛中正之君當蹇之世君䧟於險而二又居互體重坎之下是蹇之又蹇也然二之志曾不少變必欲往濟其君之難豈身謀之故其忠則然也不言吉凶者六二之中正但知鞠躬盡瘁而巳成敗利鈍非所計也象曰王臣蹇蹇終无尤也大臣遭天下之多難君䧟於險而捐軀求濟假使不濟志義亦可嘉矣何尤之有九三往蹇來反三居艮體之極進即遇險應又隂柔故往則蹇然以剛正處下之上爲下二隂所附方蹇之時隂柔者不能自立皆欲親附於陽故九三往而入險不如來反於内之安也象曰往蹇來反内喜之也内之二隂所以能立於蹇難之世者以三爲之捍蔽外險也若反而來於内則二隂得所附其喜何如哉故曰内喜六四往蹇來連往即䧟於坎之中故曰往蹇來則與三相比三又爲下二隂所附二隂又與四同徳故曰來連謂來則與下相牽連而合也能與衆合亦處蹇之道象曰往蹇來連當位實也四與三皆當位易例隂虛陽實謂得九三之比而後得與衆相連也九五大蹇朋來五君也而處蹇天下之大蹇也五以陽剛䧟於險中亦大者蹇也然居中得正故得朋來之助彖曰當位貞吉以正邦者謂收正邦之功雖在九五而任正邦之責則内外之正人也故曰朋來如是則蹇不足慮矣而不言吉者朋雖正人而皆柔弱當此大蹇濟否未可知也象曰大蹇朋來以中節也謂五不失其中正之節故能得朋來之助也上六往蹇來碩吉利見大人居蹇難之極難極則當解矣然至柔至弱不足以獨濟故戒之曰往蹇言據巳之才而往則必蹇若不往而來於内則九三有剛碩之才爲成卦之主得時得位與巳相應當難極之時有可濟之理其吉可知大人謂九五亦成卦之主也使上六來於内與得時得位剛碩之賢協力濟蹇蹇既濟則宜以其成功見於君故聖人於吉之後曰利見大人象曰往蹇來碩志在内也利見大人以從貴也志在内者以濟蹇之志應在内之陽也以從貴者言蹇難巳濟而得君也坎下震上解散也難之散也爲卦坎下震上坎險也震動也動乎險外出乎險也故爲難之解坎爲雨震爲雷雨闔於雷之上隂陽未散則為屯雨作於雷之下隂陽巳散則爲解解者其天下患難解散之時也解利西南无所往其來復吉有攸往夙吉西南坤之方言成下卦者九二也往居坤之中得坤之衆且坤體安靜故難之巳解无所往則利於來而復諸安靜之域使天下知有休息之所故吉此指二居坤靜之中言之也成上卦者九四也居震動之初故難或未解若有所往則宜早爲之夙早也早則有功且不致煩擾之久則亦吉此指四居震動之初言之也大抵難之解也无所往則靜吉若猶有所往則速吉彖曰解險以動動而免乎險解以卦體釋卦名義伊川曰坎險震動險以動也不險則无難不動則不能出險動而出乎險之外是免乎險難也故爲解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉以成卦之主釋彖辭而極言之也險難旣平之後人心樂於安靜能以安静之道而往則得衆心之歸故曰利西南往得衆也謂成卦九二以陽剛來而居坤之中是來復於安靜之地而得坤之衆也故曰其來復吉此難既解无所往則利於靜者也若猶有未解則宜速往蓋速則有功緩則惡滋而害深矣謂成卦九四居震動之初動不可緩也故曰夙吉此難或未解猶有所往則利於速者也故解以時爲大譬諸天地解而雷雨作勾萌甲拆倐忽變化未嘗留滯及其止也雷收雨霽寂然若无昔之勾萌甲拆者莫不各遂其生於天地間由此觀之解之時豈不大哉象曰雷雨作解君子以赦過宥罪隂陽解而爲雷雨故雷雨作爲解之象雷雨作則天地間无一物不遂其生君子觀此亦欲使普天之下无一民不得其安故於過誤則赦而釋之於罪惡則寛而宥之蓋禍難既平之後亦宜與天下蕩滌其舊染之汚鼓舞其自新之念如雷雨解也初六无咎難之未解處卑下之小人或有得志者難之既解小人能知時安分以順乎上則无咎矣故三負乘而致寇上據髙而見射皆不能知時安分故也今於患難解散之初能以隂柔安於卑下上順乎得時得位之四而聽命焉故无咎象曰剛柔之際義无咎也言初之柔能順承四之剛四說其柔順而下應之故在初之義爲无咎在四則朋不孚也九二田獲三狐得黄矢貞吉三狐指卦之三隂致難之根也解難而不解其根則難將再作難雖解非解之吉也二以剛中之才上應柔中之君當解之時以震之動任解之責獨能田而𫉬之黄中色矢直物謂二得中直之道以去致難之根又能貞固其志以守之此解之世君子有解之吉惟九二獨能之象曰九二貞吉得中道也二以剛得中故能田𫉬三狐行中直固守之道適時之宜使天下復歸於安靜之域難不再作吉可知也六三負且乗致寇至貞吝負者小人之事乗者君子之器六三柔邪小人宜在卑下今乃處下之上是何異負販小夫而乗公卿大夫之路車乗馬乎又況上不爲四所與下將爲二所獲僭竊如此冦將奪之雖得之以正猶可羞吝況不正乎象曰負且乗亦可醜也自我致戎又誰咎也小人僭冒於時平世泰之日不足爲榮祇足爲醜雖王法不加而冦戎必至矣皆小人不安分而自取之也爻辭貞吝上疑有无咎二字而今逸之九四解而拇朋至斯孚拇足大指在下而向外謂初也解之君子唯二與四又皆成卦之主四以陽剛之才居近君之位當解之時乃不能親天下之君子而下應初六之小人君子之朋其能无疑乎四若斷以義解而去之則君子之朋至而相信矣而汝也朋謂九二象曰解而拇未當位也陽處隂不當其位不然則不繫於初之拇矣六五君子維有解吉有孚于小人天下之難所以未解者君子事功无以服小人之心而小人未肯退聽也今五以柔中居尊位爲解之主九二大臣九四近臣皆君子也成卦由之得時得位維能解天下之難者而五兼用之故有解之吉君子既有解難之功足以取信於小人則小人誠服自知退聽而天下之難无不解矣此人君解難之道也象曰君子有解小人退也維君子有解難之功足以服小人則小人自退此君子之吉亦君道之吉也上六公用射隼于髙墉之上𫉬之无不利隼指上以其柔邪謂之狐以其隂鷙謂之隼蓋上以隂柔處震之極而居一卦之上是隂鷙而居髙者也不言王而言公者射而獲之其唯成卦之主九二九四之大臣乎用者言公用解之道於此之時也墉城牆之髙者髙墉之上喻上六居外卦最髙之位也當解之時以小人而乗君子之車盜猶得以奪之況以隂悍小人而據髙位天下側目久矣解之既極尚何俟乎故𫉬之无不利繫辭曰待時而動何不利之有時者豈非解既極之時乎象曰公用射隼以解悖也以隂柔鷙悍之資竊富貴崇髙之位而躐五之上非悖而何兊下艮上損減損也爲卦兊下艮上損兊澤之深益艮山之髙下愈深而上愈髙損下益上之象也又澤在山下其氣上潤亦損下益上也損之成卦六三上九也損下卦乾之陽而爲隂益上卦坤之隂而爲陽亦損下益上也故爲損損有孚元吉无咎可貞利有攸往曷之用二簋可用享損下以益上損剛有餘以益柔不足此損之大義也然以理言損下以益上者其事逆以情言損有餘以益不足者其事難蓋損非人所好故必合乎實理之當然有孚于人然後損之則有大善之吉則无過咎居則可以貞固守之行亦利於有所往也雖然聖人猶有未安者焉故又設爲之問曰曷之用言用損道者宜如何二簋可用享二者數之約簋者器之質享者奉上而上受之之謂二簋者言損於下者有時而不可不省約不質儉也可用享者言上之受益者適其時之不可損則亦不可過求於其下也不如是則非損也害也其道豈可行乎或曰案諸說損者損過以就中損其失以就理義損浮末以就本實損人欲以復天理損奢以從儉損不善以從善有損已以益人者有損巳以取人之益者有損之損者有損之益者有不損之損者有損已以從人者有行損道以損於人者有不行損道而益於人者其言損之義損之用至矣盡矣如二簋可用享皆曰損奢以從儉也寧儉爲禮之本也禮雖薄而時可用也易之爲訓冝若是而子獨不以爲然謂聖人止取損下以益上之義而巳得无失之拘乎曰聖人觀艮兊二體損下之剛益上之柔設爲損卦專明損下益上之道以爲訓故彖象爻辭即无諸說所云之意義況諸說所云乃節也非損也又二簋可用享誠如諸說則是損之時冝於用此聖人何不曰利用二簋之享何必設問曰曷之用邪愚嘗謂伏羲因河圖以畫易文王又取洛書因羲之畫以重之周孔又因二聖人所畫所重而繫之其畫其重其繫皆因天地自然而然之象義以爲之不容但已今人不去根尋四聖人因天地自然而然不容但巳處求易本㫖往往只就上較量一個道理率已意以說之與說諸書一般故易之道反因解說而晦此之類也彖曰損損下益上其道上行以成卦之主及卦體釋卦名義損之所以爲損者損下以益上也且三之乾陽居於上兊之隂說而應之是損之道皆行於上故曰其道上行故爲損損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損而有孚者言損之道出於事理之當然有孚於人則有下文元吉无咎可貞利有攸往四者之善故夫子但加一而字而意義自見蓋損非衆所好必合乎理而孚於人當其時而適其可二簋禮之儉約可用享謂享于上有時而可用儉約也故曰應有時謂時有可損有不可損也時不可損享於上者不可過求於其下也故又曰損剛益柔有時謂損剛有餘益柔不足固損之義然剛有時而不可損柔有時而不可益也若夫盈而有餘者損之虚而不足者益之亦顧其時之宜何如耳故曰損益盈虛與時偕行象曰山下有澤損君子以懲忿窒慾君子觀山澤爲損之象損巳之所當損者唯忿與慾是二者亦損人徳之大者故必懲治之窒塞之蓋亦體兊之說懲其忿體艮之止窒其慾謂和說則无忿知止則无慾故曰損徳之修也初九巳事遄往无咎酌損之損剛益柔損下益上損之義也初剛而在下四柔而在上損初益四正所謂出粟米絲麻以事其上乃處卑下者在已當損之事故曰巳事既在已當然之事則冝速往以奉其上乃可无咎爲人上者又當酌度其冝與不冝而後損之如彖𫝊所云過不可也不當其時亦不可也夫如是則上之損下也不爲暴下之益上也不爲怨此聖人於損之初著損下益上之良法也无咎之後曰酌損之聖人繫辭之㫖亦可見矣象曰已事遄往尚合志也初下民也有剛實之資四上位也有柔虚之疾初益於四理當然者初遄往則四遄喜矣曰酌則上合下之志曰喜則下合上之志言損之所尚者上下之志欲其相合也九二利貞征凶弗損益之二以剛中之賢上應柔中之君處剛益柔下益上之時是宜上益其君者也然所居不正故戒以利貞體柔而說故戒以征凶言當以剛中之正道益其上不可以柔說之邪道而往往則必凶蓋不自損其剛中之徳然後可以益柔中之君若損其剛中則將失貞用柔以進益之適足以損之矣象曰九二利貞中以爲志也謂不損其剛中之志然後得貞然後可益於其君六三三人行則損一人一人行則得其友此成卦之主也故爻辭緫言一卦之象三人者謂下三陽本乾行者也乾九三獨損而爲兊以益上六是三人行則損一人也及兊六三又以一隂獨行而應上九而上九友之是一人行而得其友也由此一爻之交而艮兊男女之體成天地化生之道著聖人因之於大傳明致一之理以極言之此損之大義也不言於上而言於三者損下爲損上則得剛之益非損矣象曰一人行三則疑也六三者成兊之主上九者成艮之主六三獨往以應上九而上九友之是一隂一陽配合之道專蓋一與二竒與耦相對待生生之本也三則餘而疑矣疑者謂莫知所與也六四損其疾使遄有喜无咎隂陽過而失其和平則疾四隂居隂過乎隂之疾也初九損其陽以益之四受之以損其疾然疾之所在治之不速則疾愈深必遄速然後有喜而无咎也象曰損其疾亦可喜也无疾者上也疾而遄有喜者次也亦之爲言次之之辭也六五或益之十朋之龜弗克違元吉五居損下益上損剛益柔之時以柔居尊是冝受天下之益所謂有孚元吉者也五又能持謙虚之徳以應在下之剛故在下者皆願益之不但九二之臣而已或益之十人朋而助之龜靈而智者亦從之而弗違是人與之天與之故元吉象曰六五元吉自上祐也以君而受天下之益理之當然五又持謙虚以受之曰上祐者言五之得益雖人與之實天與之也上九弗損益之无咎貞吉利有攸往得臣无家居上冝受益者今乃處損之終艮之極又以陽應隂損終則變艮極則止陽應隂則益人故有弗損而益之之象冝其无咎居則貞守而獲吉行亦无往不利得臣无家者謂弗損下則得臣民之心能益人則无私家之累賛之也象曰弗損益之大得志也君子之志唯在利益乎人今衆皆損下而我獨能益之故大得志也大易緝說卷六
